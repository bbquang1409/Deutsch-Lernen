<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wortschatz A2 – Testtraining</title>
<style>
  :root{
    --teal:#0d7377;
    --teal-dark:#0a5a5d;
    --teal-light:#e6f6f6;
    --accent:#14a3a8;
    --bg:#f4f9f9;
    --card:#ffffff;
    --text:#1b3535;
    --muted:#6b8585;
    --green:#2e9e5b;
    --green-bg:#e5f7ec;
    --red:#d64545;
    --red-bg:#fdeaea;
    --radius:14px;
    --shadow:0 2px 10px rgba(13,115,119,.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:60px;
  }
  header{
    background:linear-gradient(135deg,var(--teal),var(--teal-dark));
    color:#fff; padding:18px 16px 14px; text-align:center;
    position:sticky; top:0; z-index:20; box-shadow:var(--shadow);
  }
  header h1{margin:0; font-size:1.25rem;}
  header p{margin:4px 0 0; font-size:.8rem; opacity:.9;}
  nav.tabs{
    display:flex; flex-wrap:wrap; justify-content:center; gap:6px; padding:10px 8px;
    background:#fff; position:sticky; top:70px; z-index:19;
    box-shadow:var(--shadow);
  }
  .tab-btn{
    flex:0 0 auto; border:none; background:var(--teal-light); color:var(--teal-dark);
    padding:9px 14px; border-radius:20px; font-size:.85rem; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:.2s;
  }
  .tab-btn.active{background:var(--teal); color:#fff;}
  main{max-width:720px; margin:0 auto; padding:14px;}
  .section-title{
    font-size:1.1rem; font-weight:700; color:var(--teal-dark);
    margin:6px 0 14px; display:flex; align-items:center; gap:8px;
  }
  .card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:16px; margin-bottom:16px;
  }
  .card h3{margin:0 0 4px; font-size:1rem; color:var(--teal-dark);}
  .card .instr{font-size:.82rem; color:var(--muted); margin-bottom:12px;}
  .item{margin-bottom:12px; font-size:.95rem; line-height:1.5;}
  .item .num{font-weight:700; color:var(--teal); margin-right:4px;}
  input.blank{
    border:none; border-bottom:2px solid #b7d9d9; background:transparent;
    font-size:.95rem; padding:3px 4px; min-width:90px; max-width:220px;
    color:var(--text); font-family:inherit; outline:none;
  }
  input.blank:focus{border-color:var(--teal);}
  input.blank.ok{border-color:var(--green); background:var(--green-bg); color:var(--green);}
  input.blank.bad{border-color:var(--red); background:var(--red-bg); color:var(--red);}
  .mark{font-weight:700; margin-left:2px;}
  .mark.ok{color:var(--green);}
  .mark.bad{color:var(--red);}
  .hint{font-size:.75rem; color:var(--muted); margin-left:6px;}
  .item-img{margin:4px 0 8px;}
  .item-img img{
    width:100%; max-width:180px; border-radius:10px; display:block;
    box-shadow:0 2px 8px rgba(13,115,119,.15);
  }

  .btn{
    background:var(--teal); color:#fff; border:none; border-radius:10px;
    padding:9px 16px; font-size:.85rem; font-weight:600; cursor:pointer;
    transition:.15s;
  }
  .btn:hover{background:var(--teal-dark);}
  .btn.secondary{background:#e2eeee; color:var(--teal-dark);}
  .btn.secondary:hover{background:#d2e4e4;}
  .row-actions{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap;}
  .score{font-size:.85rem; font-weight:700; color:var(--teal-dark);}

  /* Match (tap-tap) */
  .match-wrap{display:flex; gap:10px;}
  .match-col{flex:1; display:flex; flex-direction:column; gap:8px;}
  .match-opt{
    background:var(--teal-light); border:2px solid transparent; border-radius:10px;
    padding:9px 10px; font-size:.85rem; cursor:pointer; text-align:left; color:var(--text);
    transition:.15s;
  }
  .match-opt.selected{border-color:var(--teal); background:#d4ecec;}
  .match-opt.locked{background:var(--green-bg); color:var(--green); border-color:var(--green); cursor:default;}
  .match-opt.shake{animation:shake .3s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);}
    75%{transform:translateX(5px);}
  }

  /* MC / Cross pills */
  .mc-q{font-size:.92rem; margin-bottom:8px; line-height:1.4;}
  .mc-opts{display:flex; flex-wrap:wrap; gap:8px;}
  .pill{
    background:var(--teal-light); border:2px solid transparent; border-radius:20px;
    padding:7px 14px; font-size:.82rem; cursor:pointer; color:var(--text);
  }
  .pill.selected{border-color:var(--teal); background:#d4ecec; font-weight:700;}
  .pill.correct{background:var(--green-bg); border-color:var(--green); color:var(--green); font-weight:700;}
  .pill.incorrect{background:var(--red-bg); border-color:var(--red); color:var(--red);}

  /* Table sort */
  table.sort-table{width:100%; border-collapse:collapse; font-size:.85rem;}
  table.sort-table td{padding:6px 4px; vertical-align:middle;}
  table.sort-table select{
    padding:6px 8px; border-radius:8px; border:1px solid #b7d9d9; font-size:.82rem;
    background:#fff; color:var(--text); max-width:100%;
  }
  table.sort-table select.ok{border-color:var(--green); background:var(--green-bg);}
  table.sort-table select.bad{border-color:var(--red); background:var(--red-bg);}
  .word-cell{font-weight:600;}

  footer{
    text-align:center; font-size:.78rem; color:var(--muted); margin:30px 0 10px;
  }
  .top-score{
    position:fixed; bottom:10px; right:10px; background:var(--teal); color:#fff;
    padding:8px 14px; border-radius:20px; font-size:.8rem; font-weight:700;
    box-shadow:var(--shadow); z-index:30;
  }
  @media (max-width:400px){
    .match-wrap{gap:6px;}
    .match-opt{font-size:.78rem; padding:8px;}
    input.blank{min-width:70px;}
  }
</style>
</head>

/* =========================================================
   HELPERS
   ========================================================= */
function norm(s){
  return (s||"").toString().trim().toLowerCase().replace(/[.,!?]+$/,"");
}
// Case-sensitive normalization (trims + strips trailing punctuation, keeps capitalization)
// German nouns MUST be capitalized, so exact-case matching is used for single-word fill answers.
function normCase(s){
  return (s||"").toString().trim().replace(/[.,!?]+$/,"");
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
let totalRight=0, totalChecked=0;
function updateTopScore(){
  document.getElementById("topScore").textContent = "✅ "+totalRight+" / "+totalChecked;
}

/* =========================================================
   RENDER: FILL
   ========================================================= */
function renderFill(ex){
  let html = `<div class="card" id="${ex.id}"><h3>${ex.title}</h3><p class="instr">${ex.instr}</p>`;
  ex.items.forEach((it,idx)=>{
    if(it.example){
      html += `<div class="item"><span class="num">${it.n}.</span> ${it.tpl}</div>`;
      return;
    }
    const parts = it.tpl.split("___");
    let line = "";
    if(it.img){ line += `<div class="item-img"><img src="${it.img}" alt="Foto ${it.n}"></div>`; }
    line += `<span class="num">${it.n}.</span> `;
    parts.forEach((p,i)=>{
      line += p;
      if(i < parts.length-1){
        line += `<input type="text" class="blank" data-ex="${ex.id}" data-item="${idx}" data-blank="${i}" autocomplete="off" autocapitalize="off" spellcheck="false"><span class="mark" id="${ex.id}-mark-${idx}-${i}"></span>`;
      }
    });
    if(it.tip){ line += `<div class="hint" style="display:block;margin-top:3px;">${it.tip}</div>`; }
    html += `<div class="item">${line}</div>`;
  });
  html += `<div class="row-actions"><button class="btn" onclick="checkFill('${ex.id}')">✅ Prüfen</button>
  <button class="btn secondary" onclick="resetFill('${ex.id}')">↺ Zurücksetzen</button>
  <span class="score" id="${ex.id}-score"></span></div></div>`;
  return html;
}
function checkFill(exId){
  const ex = findEx(exId);
  let right=0, total=0;
  ex.items.forEach((it,idx)=>{
    if(it.example) return;
    it.ans.forEach((accepted,bIdx)=>{
      total++;
      const input = document.querySelector(`input[data-ex="${exId}"][data-item="${idx}"][data-blank="${bIdx}"]`);
      const mark = document.getElementById(`${exId}-mark-${idx}-${bIdx}`);
      let isOk, wrongCaseOnly=false;
      if(ex.freeText){
        const val = norm(input.value);
        isOk = accepted.some(a => val.includes(norm(a)));
      } else {
        // Nouns must be capitalized correctly (case-sensitive check)
        const val = normCase(input.value);
        isOk = accepted.some(a => normCase(a)===val);
        if(!isOk){
          wrongCaseOnly = accepted.some(a => norm(a)===norm(val)) && val.length>0;
        }
      }
      input.classList.remove("ok","bad");
      if(isOk){
        input.classList.add("ok"); mark.textContent="✓"; mark.className="mark ok"; right++;
      } else if(wrongCaseOnly){
        input.classList.add("bad"); mark.textContent="✗ Großschreibung! ("+accepted[0]+")"; mark.className="mark bad";
      } else {
        input.classList.add("bad"); mark.textContent="✗ ("+accepted[0]+")"; mark.className="mark bad";
      }
    });
  });
  document.getElementById(exId+"-score").textContent = right+" / "+total+" richtig";
  totalRight += right; totalChecked += total; updateTopScore();
}
function resetFill(exId){
  document.querySelectorAll(`input[data-ex="${exId}"]`).forEach(inp=>{
    inp.value=""; inp.classList.remove("ok","bad");
  });
  document.querySelectorAll(`[id^="${exId}-mark-"]`).forEach(m=>{m.textContent=""; m.className="mark";});
  document.getElementById(exId+"-score").textContent="";
}

/* =========================================================
   RENDER: MATCH (tap-tap)
   ========================================================= */
function renderMatch(ex){
  const leftItems = ex.pairs.map((p,i)=>({text:p.l, pair:i}));
  const rightItems = ex.pairs.map((p,i)=>({text:p.r, pair:i}));
  const leftShuffled = shuffle(leftItems);
  const rightShuffled = shuffle(rightItems);
  ex._left = leftShuffled; ex._right = rightShuffled; ex._locked = new Set(); ex._selL=null; ex._selR=null;

  let html = `<div class="card" id="${ex.id}"><h3>${ex.title}</h3><p class="instr">${ex.instr}</p>`;
  html += `<div class="match-wrap"><div class="match-col" id="${ex.id}-left">`;
  leftShuffled.forEach((it,i)=>{
    html += `<button type="button" class="match-opt" data-ex="${ex.id}" data-side="l" data-idx="${i}">${it.text}</button>`;
  });
  html += `</div><div class="match-col" id="${ex.id}-right">`;
  rightShuffled.forEach((it,i)=>{
    html += `<button type="button" class="match-opt" data-ex="${ex.id}" data-side="r" data-idx="${i}">${it.text}</button>`;
  });
  html += `</div></div>
  <div class="row-actions"><span class="score" id="${ex.id}-score">0 / ${ex.pairs.length} richtig</span></div></div>`;
  return html;
}
function matchClick(exId, side, idx){
  const ex = findEx(exId);
  const btn = document.querySelector(`.match-opt[data-ex="${exId}"][data-side="${side}"][data-idx="${idx}"]`);
  if(btn.classList.contains("locked")) return;

  if(side==="l"){
    if(ex._selL!==null){
      document.querySelector(`.match-opt[data-ex="${exId}"][data-side="l"][data-idx="${ex._selL}"]`).classList.remove("selected");
    }
    ex._selL = idx; btn.classList.add("selected");
  } else {
    if(ex._selR!==null){
      document.querySelector(`.match-opt[data-ex="${exId}"][data-side="r"][data-idx="${ex._selR}"]`).classList.remove("selected");
    }
    ex._selR = idx; btn.classList.add("selected");
  }

  if(ex._selL!==null && ex._selR!==null){
    const lPair = ex._left[ex._selL].pair;
    const rPair = ex._right[ex._selR].pair;
    const lBtn = document.querySelector(`.match-opt[data-ex="${exId}"][data-side="l"][data-idx="${ex._selL}"]`);
    const rBtn = document.querySelector(`.match-opt[data-ex="${exId}"][data-side="r"][data-idx="${ex._selR}"]`);
    if(lPair === rPair){
      lBtn.classList.remove("selected"); rBtn.classList.remove("selected");
      lBtn.classList.add("locked"); rBtn.classList.add("locked");
      ex._locked.add(lPair);
      document.getElementById(exId+"-score").textContent = ex._locked.size+" / "+ex.pairs.length+" richtig";
      if(ex._locked.size===ex.pairs.length){
        totalRight += ex.pairs.length; totalChecked += ex.pairs.length; updateTopScore();
      }
    } else {
      lBtn.classList.add("shake"); rBtn.classList.add("shake");
      setTimeout(()=>{
        lBtn.classList.remove("shake","selected"); rBtn.classList.remove("shake","selected");
      },350);
    }
    ex._selL=null; ex._selR=null;
  }
}

/* =========================================================
   RENDER: MC / CROSS
   ========================================================= */
function renderChoice(ex, isCross){
  ex._sel = new Array(ex.items.length).fill(null);
  let html = `<div class="card" id="${ex.id}"><h3>${ex.title}</h3><p class="instr">${ex.instr}</p>`;
  ex.items.forEach((it,idx)=>{
    html += `<div class="mc-q"><span class="num">${idx+1}.</span> ${it.q}</div><div class="mc-opts">`;
    it.opts.forEach((opt,oi)=>{
      html += `<button type="button" class="pill" data-ex="${ex.id}" data-item="${idx}" data-opt="${oi}">${opt}</button>`;
    });
    html += `</div>`;
  });
  html += `<div class="row-actions"><button class="btn" onclick="checkChoice('${ex.id}')">✅ Prüfen</button>
  <button class="btn secondary" onclick="resetChoice('${ex.id}')">↺ Zurücksetzen</button>
  <span class="score" id="${ex.id}-score"></span></div></div>`;
  return html;
}
function choiceClick(exId, itemIdx, optIdx){
  const ex = findEx(exId);
  ex._sel[itemIdx] = optIdx;
  document.querySelectorAll(`.pill[data-ex="${exId}"][data-item="${itemIdx}"]`).forEach(p=>{
    p.classList.remove("selected","correct","incorrect");
  });
  document.querySelector(`.pill[data-ex="${exId}"][data-item="${itemIdx}"][data-opt="${optIdx}"]`).classList.add("selected");
}
function checkChoice(exId){
  const ex = findEx(exId);
  const target = ex.type==="cross" ? "wrong" : "correct";
  let right=0;
  ex.items.forEach((it,idx)=>{
    const correctIdx = it[target];
    const sel = ex._sel[idx];
    document.querySelectorAll(`.pill[data-ex="${exId}"][data-item="${idx}"]`).forEach((p,oi)=>{
      p.classList.remove("selected","correct","incorrect");
      if(oi===correctIdx) p.classList.add("correct");
      else if(oi===sel && sel!==correctIdx) p.classList.add("incorrect");
    });
    if(sel===correctIdx) right++;
  });
  document.getElementById(exId+"-score").textContent = right+" / "+ex.items.length+" richtig";
  totalRight += right; totalChecked += ex.items.length; updateTopScore();
}
function resetChoice(exId){
  const ex = findEx(exId);
  ex._sel = new Array(ex.items.length).fill(null);
  document.querySelectorAll(`.pill[data-ex="${exId}"]`).forEach(p=>p.classList.remove("selected","correct","incorrect"));
  document.getElementById(exId+"-score").textContent="";
}

/* =========================================================
   RENDER: TABLE (categorize + article)
   ========================================================= */
function renderTable(ex){
  let html = `<div class="card" id="${ex.id}"><h3>${ex.title}</h3><p class="instr">${ex.instr}</p>`;
  html += `<table class="sort-table"><tbody>`;
  ex.words.forEach((w,idx)=>{
    html += `<tr><td class="word-cell">${w.w}</td>`;
    if(ex.needArt){
      html += `<td><select data-ex="${ex.id}" data-idx="${idx}" data-field="art">
        <option value="">Artikel</option>
        <option value="der">der</option><option value="die">die</option><option value="das">das</option><option value="-">–</option>
        </select></td>`;
    }
    html += `<td><select data-ex="${ex.id}" data-idx="${idx}" data-field="col"><option value="">Kategorie wählen</option>`;
    ex.cols.forEach((c,ci)=>{ html += `<option value="${ci}">${c}</option>`; });
    html += `</select></td></tr>`;
  });
  html += `</tbody></table>
  <div class="row-actions"><button class="btn" onclick="checkTable('${ex.id}')">✅ Prüfen</button>
  <button class="btn secondary" onclick="resetTable('${ex.id}')">↺ Zurücksetzen</button>
  <span class="score" id="${ex.id}-score"></span></div></div>`;
  return html;
}
function checkTable(exId){
  const ex = findEx(exId);
  let right=0, total=0;
  ex.words.forEach((w,idx)=>{
    const colSel = document.querySelector(`select[data-ex="${exId}"][data-idx="${idx}"][data-field="col"]`);
    total++;
    if(parseInt(colSel.value)===w.col){ colSel.classList.remove("bad"); colSel.classList.add("ok"); right++; }
    else { colSel.classList.remove("ok"); colSel.classList.add("bad"); }
    if(ex.needArt){
      const artSel = document.querySelector(`select[data-ex="${exId}"][data-idx="${idx}"][data-field="art"]`);
      total++;
      const expected = w.art === "" ? "-" : w.art;
      if(artSel.value===expected){ artSel.classList.remove("bad"); artSel.classList.add("ok"); right++; }
      else { artSel.classList.remove("ok"); artSel.classList.add("bad"); }
    }
  });
  document.getElementById(exId+"-score").textContent = right+" / "+total+" richtig";
  totalRight += right; totalChecked += total; updateTopScore();
}
function resetTable(exId){
  document.querySelectorAll(`select[data-ex="${exId}"]`).forEach(s=>{ s.value=""; s.classList.remove("ok","bad"); });
  document.getElementById(exId+"-score").textContent="";
}

    ex.cols.forEach((c,ci)=>{ html += `<option value="${ci}">${c}</option>`; });
    html += `</select></td>
    <td><input type="text" class="blank" data-ex="${ex.id}" data-idx="${idx}" data-field="opp" placeholder="Gegenteil" autocomplete="off" autocapitalize="off" spellcheck="false"></td></tr>`;
  });
  html += `</tbody></table>
  <div class="row-actions"><button class="btn" onclick="checkTable2('${ex.id}')">✅ Prüfen</button>
  <button class="btn secondary" onclick="resetTable2('${ex.id}')">↺ Zurücksetzen</button>
  <span class="score" id="${ex.id}-score"></span></div></div>`;
  return html;
}
function checkTable2(exId){
  const ex = findEx(exId);
  let right=0, total=0;
  ex.words.forEach((w,idx)=>{
    const colSel = document.querySelector(`select[data-ex="${exId}"][data-idx="${idx}"][data-field="col"]`);
    const oppInp = document.querySelector(`input[data-ex="${exId}"][data-idx="${idx}"][data-field="opp"]`);
    total+=2;
    if(parseInt(colSel.value)===w.col){ colSel.classList.remove("bad"); colSel.classList.add("ok"); right++; }
    else { colSel.classList.remove("ok"); colSel.classList.add("bad"); }
    if(norm(oppInp.value)===norm(w.opp)){ oppInp.classList.remove("bad"); oppInp.classList.add("ok"); right++; }
    else { oppInp.classList.remove("ok"); oppInp.classList.add("bad"); }
  });
  document.getElementById(exId+"-score").textContent = right+" / "+total+" richtig";
  totalRight += right; totalChecked += total; updateTopScore();
}
function resetTable2(exId){
  document.querySelectorAll(`select[data-ex="${exId}"],input[data-ex="${exId}"]`).forEach(el=>{
    if(el.tagName==="SELECT") el.value=""; else el.value="";
    el.classList.remove("ok","bad");
  });
  document.getElementById(exId+"-score").textContent="";
}

/* =========================================================
   NAVIGATION / MAIN RENDER
   ========================================================= */
function findEx(id){
  for(const key in SECTIONS){
    const found = SECTIONS[key].exercises.find(e=>e.id===id);
    if(found) return found;
  }
  return null;
}

let currentTab = "A";
function renderTabs(){
  const bar = document.getElementById("tabBar");
  bar.innerHTML = Object.keys(SECTIONS).map(key=>{
    const s = SECTIONS[key];
    return `<button class="tab-btn ${key===currentTab?'active':''}" data-key="${key}">${s.icon} ${key}</button>`;
  }).join("");
  bar.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{ currentTab = btn.dataset.key; renderTabs(); renderMain(); window.scrollTo({top:0, behavior:"smooth"}); });
  });
}
function renderMain(){
  const s = SECTIONS[currentTab];
  const main = document.getElementById("main");
  let html = `<div class="section-title">${s.icon} ${currentTab} — ${s.label}</div>`;
  s.exercises.forEach(ex=>{
    if(ex.type==="fill") html += renderFill(ex);
    else if(ex.type==="match") html += renderMatch(ex);
    else if(ex.type==="mc") html += renderChoice(ex,false);
    else if(ex.type==="cross") html += renderChoice(ex,true);
    else if(ex.type==="table") html += renderTable(ex);
    else if(ex.type==="table2") html += renderTable2(ex);
  });
  main.innerHTML = html;

  // attach delegated listeners
  main.querySelectorAll(".match-opt").forEach(btn=>{
    btn.addEventListener("click", ()=>matchClick(btn.dataset.ex, btn.dataset.side, parseInt(btn.dataset.idx)));
  });
  main.querySelectorAll(".pill").forEach(btn=>{
    btn.addEventListener("click", ()=>choiceClick(btn.dataset.ex, parseInt(btn.dataset.item), parseInt(btn.dataset.opt)));
  });
}

renderTabs();
renderMain();
</script>
</body>
</html>
