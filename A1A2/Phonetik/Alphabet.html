<html lang="de">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Alphabet – Deutsche Phonetik</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Mono:wght@500&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;min-height:100vh;color:#1a2336}
.sticky-header{position:sticky;top:0;z-index:100;background:#1a2336;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.25)}
.header-top{display:flex;align-items:center;gap:12px}
.back-btn{color:#8fa3bf;text-decoration:none;font-size:20px;line-height:1}
.back-btn:hover{color:#4ecdc4}
.site-title{color:#fff;font-size:17px;font-weight:800}
.site-title span{color:#4ecdc4}
.main{padding:14px;max-width:600px;margin:0 auto}
.section-label{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#4ecdc4;margin-bottom:10px;margin-top:20px}

/* PLAY ALL */
.play-all-bar{background:#1a2336;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;margin-top:6px}
.play-all-bar .desc{color:#8fa3bf;font-size:13px;flex:1;line-height:1.4}
.btn-play-all{background:#4ecdc4;color:#1a2336;border:none;border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .2s;min-width:110px;justify-content:center}
.btn-play-all.playing{background:#ff6b6b;color:#fff}
.btn-play-all svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.progress-bar-wrap{margin-bottom:12px;display:none}
.progress-bar-wrap.active{display:block}
.progress-label{font-size:12px;color:#8fa3bf;margin-bottom:5px;display:flex;justify-content:space-between}
.progress-bar{height:5px;background:#dde3ea;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#4ecdc4;border-radius:3px;transition:width .3s;width:0%}
/* CARDS */
.alpha-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:480px){.alpha-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:600px){.alpha-grid{grid-template-columns:repeat(5,1fr)}}
.alpha-card{background:#fff;border-radius:14px;padding:18px 8px 14px;text-align:center;cursor:pointer;transition:all .18s;border:2.5px solid transparent;user-select:none;box-shadow:0 2px 6px rgba(0,0,0,0.07);display:flex;flex-direction:column;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent}
.alpha-card:active{transform:scale(0.95)}
.alpha-card:hover{border-color:#4ecdc4;box-shadow:0 4px 14px rgba(78,205,196,0.2)}
.alpha-card.speaking{border-color:#ff6b6b;background:#fff5f5;transform:scale(1.06);box-shadow:0 6px 20px rgba(255,107,107,0.25)}
.alpha-card .letter{font-size:32px;font-weight:800;color:#1a2336;line-height:1}
.alpha-card.speaking .letter{color:#ff6b6b}
.alpha-card .example{font-size:11px;color:#4ecdc4;font-weight:700;font-family:'Fira Mono',monospace;line-height:1.2}
.alpha-card .speak-icon{font-size:15px;opacity:0.25;line-height:1}
.alpha-card.speaking .speak-icon,.alpha-card:hover .speak-icon{opacity:0.8}
.umlaut-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:6px}
@media(min-width:400px){.umlaut-grid{grid-template-columns:repeat(4,1fr)}}
.umlaut-card{background:#1a2336;border-radius:14px;padding:18px 8px 14px;text-align:center;cursor:pointer;transition:all .18s;border:2.5px solid transparent;user-select:none;display:flex;flex-direction:column;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent}
.umlaut-card:active{transform:scale(0.95)}
.umlaut-card:hover{border-color:#4ecdc4}
.umlaut-card.speaking{border-color:#ff6b6b;box-shadow:0 6px 20px rgba(255,107,107,0.3);transform:scale(1.06)}
.umlaut-card .letter{font-size:32px;font-weight:800;color:#4ecdc4;line-height:1}
.umlaut-card.speaking .letter{color:#ff9999}
.umlaut-card .example{font-size:11px;color:#5a7a9a;font-weight:700;font-family:'Fira Mono',monospace}
.umlaut-card .speak-icon{font-size:15px;opacity:0.25;color:#fff}
.umlaut-card.speaking .speak-icon{opacity:1}
</style>

  function stopCurrent(){clearTimeout(stopTimer);if(currentSrc){try{currentSrc.stop(0);currentSrc.disconnect();}catch(e){}currentSrc=null;}}

  function playBuffer(buf,start,dur,onEnd){
    if(!buf)return;
    if(actx.state==='suspended')actx.resume();
    var src=actx.createBufferSource();
    src.buffer=buf;src.connect(actx.destination);
    src.start(0,start||0,dur);currentSrc=src;
    if(onEnd)stopTimer=setTimeout(function(){if(currentSrc===src)onEnd();},dur*1000+150);
  }

  function playKey(key,onEnd){
    stopCurrent();
    if(key==='X'){var dur=xBuf?xBuf.duration:2.5;playBuffer(xBuf,0,dur,onEnd);return;}
    var idx=LETTERS.indexOf(key),s=STARTS[idx],e=ENDS[idx],d=e-s;
    if(d<=0){if(onEnd)onEnd();return;}
    playBuffer(mainBuf,s,d,onEnd);
  }

  function playLetter(key,card){
    if(currentCard&&currentCard!==card)currentCard.classList.remove('speaking');
    currentCard=card;if(card)card.classList.add('speaking');
    initAudio(function(){playKey(key,function(){if(card)card.classList.remove('speaking');if(currentCard===card)currentCard=null;});});
  }

  function buildCards(data,cid,isUmlaut,isBuch){
    var cont=document.getElementById(cid);
    data.forEach(function(d,i){
      var div=document.createElement('div');
      div.className=isUmlaut?'umlaut-card':'alpha-card';
      div.id=cid+'_'+i;
      var key=isBuch?d[1]:LETTER_KEY[d[0]];
      if(isBuch){div.innerHTML='<div class="letter" style="font-size:11px;font-weight:700;color:#1a2336;line-height:1.4">'+d[0]+'</div><span class="speak-icon">&#128266;</span>';}
      else{div.innerHTML='<div class="letter">'+d[0]+'</div><div class="example">'+d[1]+'</div><span class="speak-icon">&#128266;</span>';}
      div.addEventListener('click',function(){playLetter(key,div);});
      cont.appendChild(div);
    });
  }
  buildCards(alphaData,'alphaGrid',false,false);
  buildCards(umlautData,'umlautGrid',true,false);
  buildCards(buchData,'buchGrid',false,true);

  var allItems=[];
  alphaData.forEach(function(d,i){allItems.push({key:LETTER_KEY[d[0]],label:d[0]+' – '+d[1],id:'alphaGrid_'+i});});
  umlautData.forEach(function(d,i){allItems.push({key:LETTER_KEY[d[0]],label:d[0]+' – '+d[1],id:'umlautGrid_'+i});});

  var playIdx=0,playTimer2=null,isPlaying=false;
  window.togglePlayAll=function(){isPlaying?stopPlayAll():startPlayAll();};

  function startPlayAll(){
    isPlaying=true;playIdx=0;
    document.getElementById('btnPlayAll').classList.add('playing');
    document.getElementById('playLabel').textContent='Stop';
    document.getElementById('playIcon').innerHTML='<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
    document.getElementById('progressWrap').classList.add('active');
    clearHighlights();
    initAudio(function(){if(actx.state==='suspended')actx.resume();playNext();});
  }

  function stopPlayAll(){
    isPlaying=false;stopCurrent();clearTimeout(playTimer2);clearHighlights();
    document.getElementById('btnPlayAll').classList.remove('playing');
    document.getElementById('playLabel').textContent='Play All';
    document.getElementById('playIcon').innerHTML='<path d="M8 5v14l11-7z"/>';
    document.getElementById('progressWrap').classList.remove('active');
  }

  function playNext(){
    if(!isPlaying||playIdx>=allItems.length){stopPlayAll();return;}
    var item=allItems[playIdx];clearHighlights();
    var card=document.getElementById(item.id);if(card)card.classList.add('speaking');
    document.getElementById('progressFill').style.width=Math.round((playIdx+1)/allItems.length*100)+'%';
    document.getElementById('progressText').textContent=item.label;
    document.getElementById('progressCount').textContent=(playIdx+1)+' / '+allItems.length;
    playKey(item.key,function(){if(card)card.classList.remove('speaking');playIdx++;if(isPlaying)playTimer2=setTimeout(playNext,2500);});
  }

  function clearHighlights(){document.querySelectorAll('.alpha-card.speaking,.umlaut-card.speaking').forEach(function(el){el.classList.remove('speaking');});}
})();
