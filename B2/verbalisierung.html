<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verbalisierung & Nominalisierung C1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fa;--card:#fff;--card2:#f0f2f9;--bd:#e2e6f3;
  --indigo:#4338ca;--indigo-l:#eef2ff;--indigo-m:#c7d2fe;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --teal:#0f766e;--teal-l:#f0fdfa;
  --amber:#b45309;--amber-l:#fef3c7;
  --rose:#be185d;--rose-l:#fdf2f8;
  --ok:#15803d;--ok-bg:#f0fdf4;
  --tx:#111827;--tx2:#4b5563;--mu:#9ca3af;
  --shadow:0 1px 3px rgba(67,56,202,.07),0 4px 16px rgba(67,56,202,.06);
  --r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;min-height:100vh}

.hdr{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-left{display:flex;flex-direction:column}
.hdr-t{font-family:'Playfair Display',serif;font-size:18px;color:var(--indigo);line-height:1.2}
.hdr-sub{font-size:10px;color:var(--mu);letter-spacing:.05em}
.hdr-b{font-size:10px;font-weight:700;background:var(--indigo);color:#fff;padding:3px 11px;border-radius:99px;flex:none}

.view-wrap{background:#fff;border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;gap:8px;align-items:center;justify-content:space-between}
.view-tabs{display:flex;gap:6px}
.vtab{font-size:12px;font-weight:600;padding:7px 16px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;transition:all .18s}
.vtab.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.vi-toggle{font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .18s}
.vi-toggle.show{background:var(--amber-l);border-color:var(--amber);color:var(--amber)}
.vi-dot{width:8px;height:8px;border-radius:50%;background:var(--mu);transition:.18s}
.vi-toggle.show .vi-dot{background:var(--amber)}

.cat-wrap{background:#fff;border-bottom:1px solid var(--bd);padding:8px 12px;overflow-x:auto;display:flex;gap:5px;scrollbar-width:none}
.cat-wrap::-webkit-scrollbar{display:none}
.cat-btn{flex:none;font-size:11px;font-weight:600;padding:6px 12px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .18s}
.cat-btn.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}

.main{max-width:680px;margin:0 auto;padding:16px 14px 40px}

/* list */
.cat-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--indigo);padding:12px 0 8px;border-bottom:2px solid var(--indigo-m);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.item-row{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:7px;box-shadow:var(--shadow)}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-body{flex:1;min-width:0}
.item-pair{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.pill{font-size:13.5px;font-weight:600;line-height:1.5}
.pill em{color:var(--indigo);font-style:normal}
.pill-arrow{font-size:14px;color:var(--mu);align-self:center}
.pill-b{font-size:13.5px;font-weight:600;color:var(--purple)}
.item-ex{font-size:12px;color:var(--tx2);font-style:italic;line-height:1.55;margin-top:3px}
.item-dede{font-size:12px;color:var(--teal);margin-top:3px;line-height:1.5}
.item-vi{font-size:11.5px;color:var(--amber);margin-top:4px;font-weight:500;display:none;padding:3px 8px;background:var(--amber-l);border-radius:6px}
.item-vi.show{display:inline-block}
.type-badge{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:99px;flex:none;margin-top:3px;white-space:nowrap}
.tp-nom{background:var(--indigo-l);color:var(--indigo)}
.tp-vrb{background:var(--purple-l);color:var(--purple)}
.tp-fvg{background:var(--teal-l);color:var(--teal)}

/* suffix table */
.suffix-card{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.suffix-head{background:var(--indigo);padding:10px 16px;font-size:13px;font-weight:700;color:#fff;letter-spacing:.03em}
.suffix-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.suffix-cell{padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--bd)}
.suffix-cell:nth-child(odd){border-right:1px solid var(--bd);background:var(--indigo-l);font-weight:600;color:var(--indigo)}
.suffix-cell:nth-child(even){color:var(--tx2)}
.suffix-cell:last-child,.suffix-cell:nth-last-child(2){border-bottom:none}

/* flashcard */
.flash-progress{height:4px;background:var(--bd);border-radius:99px;margin-bottom:14px;overflow:hidden}
.flash-bar{height:100%;background:var(--indigo);border-radius:99px;transition:width .3s}
.flash-nav{display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;gap:10px}
.flash-counter{font-size:13px;font-weight:600;color:var(--mu);text-align:center;flex:1}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex:none}
.nav-btn:active{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.flash-cat-lbl{font-size:11px;font-weight:600;color:var(--mu);text-align:center;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.flash-card{background:var(--card);border:1px solid var(--bd);border-radius:16px;min-height:230px;padding:28px 22px;box-shadow:0 4px 20px rgba(67,56,202,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;user-select:none;transition:transform .15s;position:relative}
.flash-card:active{transform:scale(.98)}
.flash-type{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding:3px 12px;border-radius:99px}
.flash-from{font-size:14px;color:var(--mu);margin-bottom:4px}
.flash-main{font-family:'Playfair Display',serif;font-size:24px;color:var(--tx);line-height:1.3;margin-bottom:6px}
.flash-arrow{font-size:20px;color:var(--mu);margin:6px 0}
.flash-to{font-family:'Playfair Display',serif;font-size:22px;color:var(--indigo);line-height:1.3;display:none}
.flash-to.show{display:block}
.flash-ex{font-size:12px;color:var(--tx2);font-style:italic;margin-top:8px;display:none;line-height:1.5}
.flash-ex.show{display:block}
.flash-vi{display:none;margin-top:8px;padding:6px 14px;background:var(--amber-l);border-radius:8px;font-size:13px;color:var(--amber);font-weight:500}
.flash-vi.show{display:block}
.flash-reveal{font-size:13px;color:var(--mu);margin-top:12px}
.flash-hint{text-align:center;font-size:11px;color:var(--mu);margin-top:10px}

.copy{text-align:center;padding:24px 16px 48px;opacity:.3}
.copy-main{font-family:'Playfair Display',serif;font-size:18px}
.copy-sub{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-t">Verbalisierung &amp; Nominalisierung</div>
    <div class="hdr-sub">Nomen ↔ Verb · Funktionsverbgefüge</div>
  </div>
  <div class="hdr-b">C1</div>
</div>

<div class="view-wrap">
  <div class="view-tabs">
    <button class="vtab on" onclick="setView('list')">☰ Liste</button>
    <button class="vtab" onclick="setView('flash')">🃏 Flashcard</button>
  </div>
  <button class="vi-toggle" id="viBtn" onclick="toggleVI()">
    <span class="vi-dot"></span> DE↔VI
  </button>
</div>

<div class="cat-wrap" id="catWrap"></div>
<div class="main" id="mainArea"></div>

<div class="copy">
  <div class="copy-main">Made with ♥ by Bảo Quang</div>
  <div class="copy-sub">Deutsch Lernen unterwegs</div>
</div>

<script>
// type: nom = Nominalisierung (Verb→Nomen), vrb = Verbalisierung (Nomen→Verb), fvg = Funktionsverbgefüge
var DATA = [
  {cat:"Verb → Nomen", cat_id:"nom", icon:"📥",
   note:"Verb wird zu Nomen durch Suffixe: -ung, -heit, -keit, -nis, -tion, -tät, -schaft",
   suffixes:[
     ["-ung","entscheiden → die Entscheidung"],
     ["-heit / -keit","möglich → die Möglichkeit · frei → die Freiheit"],
     ["-nis","erleben → das Erlebnis · kennen → die Kenntnis"],
     ["-tion / -tion",  "organisieren → die Organisation"],
     ["-tät","produktiv → die Produktivität"],
     ["-schaft","Freund → die Freundschaft"],
     ["Infinitiv als Nomen","laufen → das Laufen · Schreiben → das Schreiben"],
   ],
   items:[
    {from:"analysieren",to:"die Analyse",ex:"Die gründliche Analyse der Daten ist notwendig.",de_de:"systematische Untersuchung von etwas",vi:"sự phân tích",type:"nom"},
    {from:"entscheiden",to:"die Entscheidung",ex:"Eine schnelle Entscheidung war gefragt.",de_de:"das Treffen einer Wahl zwischen Alternativen",vi:"quyết định",type:"nom"},
    {from:"verbessern",to:"die Verbesserung",ex:"Die Verbesserung der Qualität ist unser Ziel.",de_de:"positives Verändern eines Zustands",vi:"sự cải thiện",type:"nom"},
    {from:"entwickeln",to:"die Entwicklung",ex:"Die technische Entwicklung geht rasant voran.",de_de:"Wachstum oder Veränderung über Zeit",vi:"sự phát triển",type:"nom"},
    {from:"lösen",to:"die Lösung",ex:"Die Lösung des Problems braucht Zeit.",de_de:"das Beheben oder Klären eines Problems",vi:"giải pháp, sự giải quyết",type:"nom"},
    {from:"vorbereiten",to:"die Vorbereitung",ex:"Eine gute Vorbereitung ist der halbe Erfolg.",de_de:"alles bereit machen für etwas Kommendes",vi:"sự chuẩn bị",type:"nom"},
    {from:"durchführen",to:"die Durchführung",ex:"Die Durchführung des Plans liegt bei uns.",de_de:"das praktische Umsetzen von etwas",vi:"sự thực hiện",type:"nom"},
    {from:"fördern",to:"die Förderung",ex:"Die Förderung junger Talente ist wichtig.",de_de:"Unterstützung und Entwicklung von etwas/jemandem",vi:"sự hỗ trợ, xúc tiến",type:"nom"},
    {from:"beraten",to:"die Beratung",ex:"Sie bietet kostenlose Beratung an.",de_de:"professionelle Hilfe und Empfehlung geben",vi:"sự tư vấn",type:"nom"},
    {from:"verändern",to:"die Veränderung",ex:"Veränderungen bringen Chancen und Risiken.",de_de:"etwas wird anders als vorher",vi:"sự thay đổi",type:"nom"},
    {from:"kommunizieren",to:"die Kommunikation",ex:"Gute Kommunikation ist der Schlüssel.",de_de:"Austausch von Informationen zwischen Personen",vi:"giao tiếp, sự liên lạc",type:"nom"},
    {from:"organisieren",to:"die Organisation",ex:"Die Organisation der Veranstaltung war komplex.",de_de:"strukturierte Planung und Umsetzung",vi:"sự tổ chức",type:"nom"},
    {from:"integrieren",to:"die Integration",ex:"Die Integration neuer Mitarbeiter ist eine Aufgabe.",de_de:"Eingliederung in eine Gruppe oder ein System",vi:"sự hội nhập",type:"nom"},
    {from:"realisieren",to:"die Realisierung",ex:"Die Realisierung des Projekts dauert Monate.",de_de:"etwas in die Praxis umsetzen",vi:"sự thực hiện (dự án...)",type:"nom"},
    {from:"qualifizieren",to:"die Qualifikation",ex:"Welche Qualifikation braucht man für die Stelle?",de_de:"formeller Nachweis von Fähigkeiten",vi:"trình độ, bằng cấp",type:"nom"},
  ]},

  {cat:"Nomen → Verb", cat_id:"vrb", icon:"📤",
   note:"Formeller Nominalstil wird in mündlicher/informeller Sprache zurück in Verben umgewandelt.",
   suffixes:[
     ["Nomen + -ieren","Signal → signalisieren · Analyse → analysieren"],
     ["Nomen + -en","Druck → drücken · Antwort → antworten"],
     ["Präfix + Nomen","Bewerbung → sich bewerben · Entscheidung → entscheiden"],
   ],
   items:[
    {from:"die Entscheidung",to:"entscheiden",ex:"Wir müssen entscheiden, nicht die Entscheidung verschieben.",de_de:"eine Wahl aktiv treffen",vi:"quyết định",type:"vrb"},
    {from:"die Durchführung",to:"durchführen",ex:"Wir führen das Experiment durch.",de_de:"etwas in die Praxis umsetzen",vi:"thực hiện",type:"vrb"},
    {from:"die Verbesserung",to:"verbessern",ex:"Wir verbessern kontinuierlich unsere Methoden.",de_de:"etwas besser machen",vi:"cải thiện",type:"vrb"},
    {from:"die Lösung",to:"lösen",ex:"Wir lösen das Problem gemeinsam.",de_de:"ein Problem beheben",vi:"giải quyết",type:"vrb"},
    {from:"die Analyse",to:"analysieren",ex:"Wir analysieren die Daten sorgfältig.",de_de:"etwas systematisch untersuchen",vi:"phân tích",type:"vrb"},
    {from:"die Beratung",to:"beraten",ex:"Ich berate dich gerne bei deiner Entscheidung.",de_de:"jemandem Rat und Hilfe geben",vi:"tư vấn",type:"vrb"},
    {from:"die Bewerbung",to:"sich bewerben",ex:"Er bewirbt sich um die Stelle.",de_de:"offiziell eine Position anfragen",vi:"ứng tuyển",type:"vrb"},
    {from:"die Diskussion",to:"diskutieren",ex:"Lass uns darüber diskutieren.",de_de:"ein Thema gemeinsam besprechen",vi:"thảo luận",type:"vrb"},
    {from:"die Unterstützung",to:"unterstützen",ex:"Wir unterstützen das Projekt finanziell.",de_de:"helfen und fördern",vi:"hỗ trợ",type:"vrb"},
    {from:"die Präsentation",to:"präsentieren",ex:"Sie präsentiert die Ergebnisse morgen.",de_de:"etwas vor Publikum vorstellen",vi:"trình bày",type:"vrb"},
    {from:"die Vorbereitung",to:"vorbereiten",ex:"Wir bereiten uns intensiv auf die Prüfung vor.",de_de:"sich bereit machen für etwas",vi:"chuẩn bị",type:"vrb"},
    {from:"die Kommunikation",to:"kommunizieren",ex:"Wir kommunizieren offen und direkt.",de_de:"miteinander sprechen und Infos teilen",vi:"giao tiếp",type:"vrb"},
    {from:"die Organisation",to:"organisieren",ex:"Wer organisiert das nächste Treffen?",de_de:"etwas planen und vorbereiten",vi:"tổ chức",type:"vrb"},
    {from:"die Evaluation",to:"evaluieren",ex:"Nach dem Kurs evaluieren wir den Fortschritt.",de_de:"systematisch bewerten",vi:"đánh giá",type:"vrb"},
    {from:"die Motivation",to:"motivieren",ex:"Ein gutes Gehalt motiviert die Mitarbeiter.",de_de:"jemanden antreiben und begeistern",vi:"tạo động lực",type:"vrb"},
  ]},

  {cat:"Funktionsverbgefüge", cat_id:"fvg", icon:"⚙️",
   note:"Feste Nomen-Verb-Kombinationen mit spezifischer Präposition. Typisch in formeller Sprache (C1).",
   items:[
    {from:"entscheiden",to:"eine Entscheidung treffen",ex:"Wir haben eine wichtige Entscheidung getroffen.",de_de:"formal/schriftlich: eine Wahl machen",vi:"đưa ra quyết định",type:"fvg"},
    {from:"kritisieren",to:"Kritik üben (an)",ex:"Er übt scharfe Kritik an der neuen Politik.",de_de:"formal: negative Bewertung äußern",vi:"thực hiện phê bình",type:"fvg"},
    {from:"ausdrücken",to:"zum Ausdruck bringen",ex:"Sie brachte ihre Unzufriedenheit zum Ausdruck.",de_de:"formal: eine Meinung/ein Gefühl zeigen",vi:"bày tỏ, thể hiện",type:"fvg"},
    {from:"beeinflussen",to:"Einfluss nehmen auf",ex:"Die Medien nehmen Einfluss auf die öffentliche Meinung.",de_de:"formal: etwas verändern oder steuern",vi:"tạo ảnh hưởng lên",type:"fvg"},
    {from:"verfügbar sein",to:"zur Verfügung stehen",ex:"Die Daten stehen ab Montag zur Verfügung.",de_de:"formal: vorhanden und nutzbar sein",vi:"có sẵn, sẵn sàng sử dụng",type:"fvg"},
    {from:"möglich sein",to:"in Frage kommen",ex:"Für diese Stelle kommen mehrere Kandidaten in Frage.",de_de:"als Option oder Möglichkeit gelten",vi:"có thể áp dụng, phù hợp",type:"fvg"},
    {from:"drücken / zwingen",to:"unter Druck setzen",ex:"Er setzt seine Kollegen unter Druck.",de_de:"formal: jemanden zu etwas zwingen",vi:"gây áp lực lên",type:"fvg"},
    {from:"beginnen zu nutzen",to:"in Betrieb nehmen",ex:"Die neue Maschine wird nächste Woche in Betrieb genommen.",de_de:"etwas technisches zum ersten Mal starten",vi:"đưa vào vận hành",type:"fvg"},
    {from:"diskutieren über",to:"zur Diskussion stellen",ex:"Wir stellen die neue Regelung zur Diskussion.",de_de:"etwas offiziell besprechen lassen",vi:"đưa ra để thảo luận",type:"fvg"},
    {from:"scheitern",to:"zum Scheitern bringen",ex:"Interne Konflikte brachten das Projekt zum Scheitern.",de_de:"formal: dafür sorgen, dass etwas misslingt",vi:"làm thất bại",type:"fvg"},
    {from:"vollenden",to:"zum Abschluss bringen",ex:"Das Projekt wurde erfolgreich zum Abschluss gebracht.",de_de:"etwas erfolgreich beenden",vi:"hoàn thành",type:"fvg"},
    {from:"verwenden",to:"in Anspruch nehmen",ex:"Sie nimmt das Angebot in Anspruch.",de_de:"etwas nutzen oder beanspruchen",vi:"tận dụng, sử dụng",type:"fvg"},
    {from:"kontrollieren",to:"unter Kontrolle halten",ex:"Die Situation wurde unter Kontrolle gehalten.",de_de:"etwas stabil und beherrschbar halten",vi:"kiểm soát",type:"fvg"},
    {from:"Bedeutung haben",to:"eine Rolle spielen",ex:"Die Qualifikation spielt eine entscheidende Rolle.",de_de:"wichtig oder relevant sein",vi:"đóng vai trò quan trọng",type:"fvg"},
    {from:"berücksichtigen",to:"in Betracht ziehen",ex:"Wir sollten alle Optionen in Betracht ziehen.",de_de:"etwas als Möglichkeit ernsthaft bedenken",vi:"xem xét, tính đến",type:"fvg"},

  {cat:"Typische Paare C1", cat_id:"pair", icon:"🔁",

    {from:"zur Kenntnis nehmen",to:"erfahren / wissen",ex:"Wir haben zur Kenntnis genommen, dass ...",de_de:"formal: etwas bewusst wahrnehmen",vi:"tiếp nhận thông tin / nhận thức",type:"fvg"},
    {from:"in Frage stellen",to:"bezweifeln",ex:"Niemand stellt seine Kompetenz in Frage.",de_de:"etwas zweifelhaft oder unsicher machen",vi:"đặt câu hỏi về / nghi ngờ",type:"fvg"},
    {from:"Rücksicht nehmen",to:"rücksichtsvoll sein / achten auf",ex:"Bitte nehmt Rücksicht auf die Nachbarn.",de_de:"respektvoll und vorsichtig gegenüber anderen sein",vi:"tôn trọng, để ý đến người khác",type:"fvg"},
    {from:"Fortschritte machen",to:"sich verbessern / vorankommen",ex:"Die Studentin macht große Fortschritte.",de_de:"besser werden oder Ziele erreichen",vi:"tiến bộ",type:"fvg"},
    {from:"auf den Markt bringen",to:"einführen / launchen",ex:"Das Produkt wurde weltweit auf den Markt gebracht.",de_de:"formal: etwas Neues für Käufer verfügbar machen",vi:"tung ra thị trường",type:"fvg"},
    {from:"Verantwortung übernehmen",to:"verantwortlich sein / haften",ex:"Er übernimmt die Verantwortung für den Fehler.",de_de:"formal: Pflicht und Haftung akzeptieren",vi:"nhận trách nhiệm",type:"fvg"},
    {from:"Bezug nehmen auf",to:"sich beziehen auf / erwähnen",ex:"Ich nehme Bezug auf Ihren Brief vom 3. März.",de_de:"formal (Brief/Protokoll): auf etwas verweisen",vi:"tham chiếu đến, đề cập đến",type:"fvg"},
    {from:"einen Beitrag leisten",to:"beitragen zu",ex:"Jeder kann einen Beitrag zum Klimaschutz leisten.",de_de:"aktiv zu einem Ziel mitwirken",vi:"đóng góp vào",type:"fvg"},
    {from:"Verständnis aufbringen",to:"verstehen / tolerieren",ex:"Ich bringe kein Verständnis für dieses Verhalten auf.",de_de:"formal: Toleranz oder Empathie zeigen können",vi:"thông cảm, thấu hiểu",type:"fvg"},
  ]},
];

// STATE
var currentView = 'list';
var showVI = false;
var currentCat = -1;
var flashIndex = 0;
var flashItems = [];
var flashRevealed = false;

var allItems = [];
DATA.forEach(function(cat){ cat.items.forEach(function(item){ allItems.push({item:item,cat:cat.cat,note:cat.note}); }); });

function init(){
  buildCatTabs();
  renderList();
}

function buildCatTabs(){
  var wrap = document.getElementById('catWrap');
  wrap.innerHTML = '';
  var all = document.createElement('button'); all.className='cat-btn on'; all.textContent='Alle';
  all.onclick=function(){ setCat(-1); }; wrap.appendChild(all);
  DATA.forEach(function(cat,i){
    var btn = document.createElement('button'); btn.className='cat-btn';
    btn.textContent=cat.icon+' '+cat.cat;
    btn.onclick=(function(idx){ return function(){ setCat(idx); }; })(i);
    wrap.appendChild(btn);
  });
}

function setCat(idx){
  currentCat=idx;
  document.querySelectorAll('.cat-btn').forEach(function(b,i){ b.classList.toggle('on',(idx===-1&&i===0)||(i===idx+1)); });
  if(currentView==='list') renderList();
  else{ buildFlashItems(); renderFlash(); }
}

// LIST
function renderList(){
  var area=document.getElementById('mainArea'); area.innerHTML='';
  var toShow=currentCat===-1?DATA:[DATA[currentCat]];
  toShow.forEach(function(cat){
    var title=document.createElement('div'); title.className='cat-title';
    title.innerHTML='<span style="font-size:18px">'+cat.icon+'</span>'+cat.cat;
    area.appendChild(title);

    // suffix/note box
    if(cat.note){
      var note=document.createElement('div');
      note.style.cssText='background:var(--indigo-l);border:1px solid var(--indigo-m);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--indigo);margin-bottom:10px;line-height:1.6';
      note.innerHTML='💡 '+cat.note;
      area.appendChild(note);
    }
    if(cat.suffixes){
      var sc=document.createElement('div'); sc.className='suffix-card';
      var sh=document.createElement('div'); sh.className='suffix-head'; sh.textContent='Suffixe & Beispiele'; sc.appendChild(sh);
      var sb=document.createElement('div'); sb.className='suffix-body';
      cat.suffixes.forEach(function(row){
        var c1=document.createElement('div'); c1.className='suffix-cell'; c1.textContent=row[0]; sb.appendChild(c1);
        var c2=document.createElement('div'); c2.className='suffix-cell'; c2.textContent=row[1]; sb.appendChild(c2);
      });
      sc.appendChild(sb); area.appendChild(sc);
    }

    cat.items.forEach(function(item){
      var row=document.createElement('div'); row.className='item-row';
      var top=document.createElement('div'); top.className='item-top';
      var body=document.createElement('div'); body.className='item-body';

      var pair=document.createElement('div'); pair.className='item-pair';
      var pf=document.createElement('span'); pf.className='pill'; pf.innerHTML=item.from; pair.appendChild(pf);
      var arr=document.createElement('span'); arr.className='pill-arrow'; arr.textContent='→'; pair.appendChild(arr);
      var pt=document.createElement('span'); pt.className='pill-b'; pt.innerHTML=item.to; pair.appendChild(pt);
      body.appendChild(pair);

      var ex=document.createElement('div'); ex.className='item-ex'; ex.textContent=item.ex; body.appendChild(ex);
      var dede=document.createElement('div'); dede.className='item-dede'; dede.innerHTML='→ '+item.de_de; body.appendChild(dede);
      var vi=document.createElement('div'); vi.className='item-vi'+(showVI?' show':''); vi.textContent='🇻🇳 '+item.vi; body.appendChild(vi);

      top.appendChild(body);
      var badge=document.createElement('div');
      badge.className='type-badge tp-'+item.type;
      badge.textContent={nom:'→ Nom.',vrb:'→ Verb',fvg:'FVG',pair:'Paar'}[item.type]||item.type;
      top.appendChild(badge);
      row.appendChild(top); area.appendChild(row);
    });
  });
}

// FLASH
function buildFlashItems(){
  if(currentCat===-1){ flashItems=allItems.slice(); }
  else{ flashItems=[]; DATA[currentCat].items.forEach(function(item){ flashItems.push({item:item,cat:DATA[currentCat].cat}); }); }
  flashIndex=0; flashRevealed=false;
}

function renderFlash(){
  var area=document.getElementById('mainArea'); area.innerHTML='';
  var prog=document.createElement('div'); prog.className='flash-progress';
  var bar=document.createElement('div'); bar.className='flash-bar';
  bar.style.width=((flashIndex+1)/flashItems.length*100)+'%'; prog.appendChild(bar); area.appendChild(prog);

  var nav=document.createElement('div'); nav.className='flash-nav';
  var prev=document.createElement('button'); prev.className='nav-btn'; prev.innerHTML='&#8592;';
  prev.onclick=function(){ if(flashIndex>0){flashIndex--;flashRevealed=false;renderFlash();} };
  var counter=document.createElement('div'); counter.className='flash-counter'; counter.textContent=(flashIndex+1)+' / '+flashItems.length;
  var next=document.createElement('button'); next.className='nav-btn'; next.innerHTML='&#8594;';
  next.onclick=function(){ if(flashIndex<flashItems.length-1){flashIndex++;flashRevealed=false;renderFlash();} };
  nav.appendChild(prev); nav.appendChild(counter); nav.appendChild(next); area.appendChild(nav);

  var obj=flashItems[flashIndex], item=obj.item;
  var catLbl=document.createElement('div'); catLbl.className='flash-cat-lbl'; catLbl.textContent=obj.cat; area.appendChild(catLbl);

  var card=document.createElement('div'); card.className='flash-card';
  card.onclick=function(){ flashRevealed=!flashRevealed; renderFlash(); };

  var typemap={nom:'→ Nominalisierung',vrb:'→ Verbalisierung',fvg:'Funktionsverbgefüge',pair:'Stilpaar C1'};
  var typeEl=document.createElement('div'); typeEl.className='flash-type';
  typeEl.style.cssText='background:var(--indigo-l);color:var(--indigo)';
  typeEl.textContent=typemap[item.type]||item.type; card.appendChild(typeEl);

  var fromEl=document.createElement('div'); fromEl.className='flash-from'; fromEl.textContent='Ausgangsform:'; card.appendChild(fromEl);
  var mainEl=document.createElement('div'); mainEl.className='flash-main'; mainEl.innerHTML=item.from; card.appendChild(mainEl);

  var arrowEl=document.createElement('div'); arrowEl.className='flash-arrow'; arrowEl.textContent='↓'; card.appendChild(arrowEl);

  var toEl=document.createElement('div'); toEl.className='flash-to'+(flashRevealed?' show':'');
  toEl.innerHTML='<span style="font-size:13px;color:var(--mu)">Zielform:</span><br>'+item.to; card.appendChild(toEl);

  if(!flashRevealed){
    var reveal=document.createElement('div'); reveal.className='flash-reveal'; reveal.textContent='▶ Tippen zum Aufdecken'; card.appendChild(reveal);
  } else {
    var exEl=document.createElement('div'); exEl.className='flash-ex show'; exEl.textContent=item.ex; card.appendChild(exEl);
    var dede=document.createElement('div'); dede.style.cssText='margin-top:6px;font-size:12px;color:var(--teal);display:block'; dede.innerHTML='→ '+item.de_de; card.appendChild(dede);
    if(showVI){ var fvi=document.createElement('div'); fvi.className='flash-vi show'; fvi.textContent='🇻🇳 '+item.vi; card.appendChild(fvi); }
  }
  area.appendChild(card);
  var hint=document.createElement('div'); hint.className='flash-hint'; hint.textContent='← Zurück  |  Vorwärts →'; area.appendChild(hint);
}

function setView(v){
  currentView=v;
  document.querySelectorAll('.vtab').forEach(function(b,i){ b.classList.toggle('on',(v==='list'&&i===0)||(v==='flash'&&i===1)); });
  if(v==='list') renderList();
  else{ buildFlashItems(); renderFlash(); }
}

function toggleVI(){
  showVI=!showVI;
  var btn=document.getElementById('viBtn'); btn.classList.toggle('show',showVI);
  if(currentView==='list') renderList(); else renderFlash();
}

init();
</script>
</body>
</html>
