<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>50 Verben B2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#1e3a5f;--emerald:#10b981;--bg:#f1f5f9;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:#1e3a5f;padding-bottom:40px;}
  .hdr{background:var(--blue);padding:40px 20px;text-align:center;color:white;}
  .tab-active{border-bottom:4px solid var(--emerald);color:var(--emerald);font-weight:700;}
  .flip-card{perspective:1000px;height:380px;width:100%;max-width:400px;margin:0 auto;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front, .flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 15px 35px rgba(0,0,0,0.1);}
  .flip-front{background:white;}
  .flip-back{background:var(--blue);color:white;transform:rotateY(180deg);}
</style>
</head>
<body>
<div class="hdr">
    <h1 class="text-3xl font-bold uppercase tracking-tight">Starke Verben</h1>
    <p class="text-blue-200 mt-2">B2 • Grammatik</p>
    <a href="index.html" class="inline-block mt-4 text-white/50 text-sm">← Back</a>
</div>

<div class="max-w-3xl mx-auto px-4 -mt-8 relative z-20">
  <div class="bg-white rounded-2xl shadow-lg flex p-1 mb-8">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-4 tab-active">📖 Liste</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-4">🔄 Flashcards</button>
  </div>

  <div id="content1" class="space-y-4">
    <div id="list-container" class="grid gap-4"></div>
  </div>

  <div id="content2" class="hidden">
    <div class="text-center mb-6"><span id="counter" class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full font-bold text-sm"></span></div>
    <div class="flip-card" onclick="toggleFlip()"><div id="card-inner" class="flip-inner"><div class="flip-front"><p id="f-verb" class="text-4xl font-black text-blue-900"></p></div><div class="flip-back"><p id="f-forms" class="text-xl md:text-2xl text-center font-bold mb-6 leading-relaxed"></p><p id="f-viet" class="text-2xl font-semibold italic text-emerald-400"></p></div></div></div>
    <div class="flex justify-center gap-6 mt-10">
      <button onclick="prev()" class="w-14 h-14 bg-white rounded-full shadow-md flex items-center justify-center"><i class="fas fa-chevron-left"></i></button>
      <button onclick="random()" class="px-6 py-3 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">Random</button>
      <button onclick="next()" class="w-14 h-14 bg-white rounded-full shadow-md flex items-center justify-center"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
</div>

<script>
const data = [
  {verb:"beginnen", forms:"beginnt • begann • hat begonnen", viet:"bắt đầu"},
  {verb:"bieten", forms:"bietet • bot • hat geboten", viet:"cung cấp/đưa ra"},
  {verb:"bitten", forms:"bittet • bat • hat gebeten", viet:"nhờ vả/xin"},
  {verb:"bleiben", forms:"bleibt • blieb • ist geblieben", viet:"ở lại"},
  {verb:"bringen", forms:"bringt • brachte • hat gebracht", viet:"mang đến"},
  {verb:"denken", forms:"denkt • dachte • hat gedacht", viet:"suy nghĩ"},
  {verb:"dürfen", forms:"darf • durfte • hat gedurft", viet:"được phép"},
  {verb:"empfehlen", forms:"empfiehlt • empfahl • hat empfohlen", viet:"khuyên/đề xuất"},
  {verb:"essen", forms:"isst • aß • hat gegessen", viet:"ăn"},
  {verb:"fahren", forms:"fährt • fuhr • ist gefahren", viet:"lái xe"},
  {verb:"fallen", forms:"fällt • fiel • ist gefallen", viet:"ngã/rơi"},
  {verb:"fangen", forms:"fängt • fing • hat gefangen", viet:"bắt lấy"},
  {verb:"finden", forms:"findet • fand • hat gefunden", viet:"tìm thấy"},
  {verb:"fliegen", forms:"fliegt • flog • ist geflogen", viet:"bay"},
  {verb:"geben", forms:"gibt • gab • hat gegeben", viet:"cho/đưa"},
  {verb:"gehen", forms:"geht • ging • ist gegangen", viet:"đi bộ"},
  {verb:"genießen", forms:"genießt • genoss • hat genossen", viet:"tận hưởng"},
  {verb:"geschehen", forms:"geschieht • geschah • ist geschehen", viet:"xảy ra"},
  {verb:"gewinnen", forms:"gewinnt • gewann • hat gewonnen", viet:"chiến thắng"},
  {verb:"haben", forms:"hat • hatte • hat gehabt", viet:"có"},
  {verb:"halten", forms:"hält • hielt • hat gehalten", viet:"cầm/giữ"},
  {verb:"helfen", forms:"hilft • half • hat geholfen", viet:"giúp đỡ"},
  {verb:"kennen", forms:"kennt • kannte • hat gekannt", viet:"quen biết"},
  {verb:"kommen", forms:"kommt • kam • ist gekommen", viet:"đến"},
  {verb:"können", forms:"kann • konnte • hat gekonnt", viet:"có thể"},
  {verb:"lassen", forms:"lässt • ließ • hat gelassen", viet:"để cho"},
  {verb:"laufen", forms:"läuft • lief • ist gelaufen", viet:"chạy"},
  {verb:"lesen", forms:"liest • las • hat gelesen", viet:"đọc"},
  {verb:"liegen", forms:"liegt • lag • hat gelegen", viet:"nằm"},
  {verb:"mögen", forms:"mag • mochte • hat gemocht", viet:"thích"},
  {verb:"müssen", forms:"muss • musste • hat gemusst", viet:"phải"},
  {verb:"nehmen", forms:"nimmt • nahm • hat genommen", viet:"lấy"},
  {verb:"nennen", forms:"nennt • nannte • hat genannt", viet:"gọi tên"},
  {verb:"raten", forms:"rät • riet • hat geraten", viet:"khuyên"},
  {verb:"rufen", forms:"ruft • rief • hat gerufen", viet:"gọi"},
  {verb:"schlafen", forms:"schläft • schlief • hat geschlafen", viet:"ngủ"},
  {verb:"schreiben", forms:"schreibt • schrieb • hat geschrieben", viet:"viết"},
  {verb:"schwimmen", forms:"schwimmt • schwamm • ist geschwommen", viet:"bơi"},
  {verb:"sehen", forms:"sieht • sah • hat gesehen", viet:"nhìn"},
  {verb:"sein", forms:"ist • war • ist gewesen", viet:"là/ở"},
  {verb:"singen", forms:"singt • sang • hat gesungen", viet:"hát"},
  {verb:"sitzen", forms:"sitzt • saß • hat gesessen", viet:"ngồi"},
  {verb:"sollen", forms:"soll • sollte • hat gesollt", viet:"nên"},
  {verb:"sprechen", forms:"spricht • sprach • hat gesprochen", viet:"nói"},
  {verb:"stehen", forms:"steht • stand • hat gestanden", viet:"đứng"},
  {verb:"sterben", forms:"stirbt • starb • ist gestorben", viet:"chết"},
  {verb:"tragen", forms:"trägt • trug • hat getragen", viet:"mặc/mang"},
  {verb:"treffen", forms:"trifft • traf • hat getroffen", viet:"gặp gỡ"},
  {verb:"trinken", forms:"trinkt • trank • hat getrunken", viet:"uống"},
  {verb:"tun", forms:"tut • tat • hat getan", viet:"làm"},
  {verb:"vergessen", forms:"vergisst • vergaß • hat vergessen", viet:"quên"},
  {verb:"verlieren", forms:"verliert • verlor • hat verloren", viet:"đánh mất"},
  {verb:"verstehen", forms:"versteht • verstand • hat verstanden", viet:"hiểu"},
  {verb:"waschen", forms:"wäscht • wusch • hat gewaschen", viet:"giặt/rửa"},
  {verb:"werden", forms:"wird • wurde • ist geworden", viet:"trở thành"},
  {verb:"wissen", forms:"weiß • wusste • hat gewusst", viet:"biết"},
  {verb:"wollen", forms:"will • wollte • hat gewollt", viet:"muốn"},
  {verb:"ziehen", forms:"zieht • zog • hat gezogen", viet:"kéo"}
];

let current = 0;
function showTab(n) {
  document.getElementById('content1').classList.toggle('hidden', n!==1);
  document.getElementById('content2').classList.toggle('hidden', n!==2);
  document.getElementById('tab1').className = n===1 ? 'flex-1 py-4 tab-active' : 'flex-1 py-4';
  document.getElementById('tab2').className = n===2 ? 'flex-1 py-4 tab-active' : 'flex-1 py-4';
  if(n===2) updateFlashcard();
}
function renderList() {
  document.getElementById('list-container').innerHTML = data.map((item, i) => `
    <div class="bg-white p-5 rounded-2xl shadow-sm border flex items-center gap-4">
      <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-bold flex-shrink-0">${i+1}</div>
      <div>
        <h3 class="text-2xl font-black text-slate-800">${item.verb}</h3>
        <p class="text-slate-600 font-bold text-sm uppercase">${item.forms}</p>
        <p class="text-emerald-600 font-medium text-sm mt-1 italic">${item.viet}</p>
      </div>
    </div>
  `).join('');
}
function updateFlashcard() {
  const item = data[current];
  document.getElementById('f-verb').textContent = item.verb;
  document.getElementById('f-forms').innerHTML = item.forms.replace(/ • /g, '<br>');
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}
function toggleFlip() { document.getElementById('card-inner').classList.toggle('flipped'); }
function next() { current = (current+1)%data.length; updateFlashcard(); }
function prev() { current = (current-1+data.length)%data.length; updateFlashcard(); }
function random() { current = Math.floor(Math.random()*data.length); updateFlashcard(); }
window.onload = renderList;
</script>
</body>
</html>
