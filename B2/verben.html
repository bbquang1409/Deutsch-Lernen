<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>100 Verben B2-C1 (Big Font)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;margin:0;}
  .hdr{background:var(--ink);padding:45px 20px;text-align:center;color:white;position:relative;}
  .tab-active{border-bottom:6px solid var(--blue);color:var(--blue);font-weight:800;}
  .flashcard-zone{display:flex;align-items:stretch;justify-content:center;width:100%;max-width:600px;margin:0 auto;height:500px;position:relative;}
  .nav-area{width:80px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;color:rgba(37,99,235,0.1);font-size:2rem;transition:0.2s;-webkit-tap-highlight-color:transparent;}
  .nav-area:active{background:rgba(37,99,235,0.05);color:var(--blue);}
  .flip-card{perspective:1000px;flex:1;position:relative;z-index:20;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;box-shadow:0 25px 50px rgba(30,58,95,0.15);border:1px solid #fff;}
  .flip-front{background:white;}
  .flip-back{background:linear-gradient(145deg,#1e3a5f,#2563eb);color:white;transform:rotateY(180deg);}
</style>
</head>
<body>
<div class="hdr">
    <h1 class="text-4xl font-extrabold mb-1">100 Verben</h1>
    <p class="opacity-60 text-lg italic">Große Schrift lớn hơn</p>
    <a href="index.html" class="inline-block mt-4 text-white/40 text-sm font-bold uppercase tracking-widest">← Zurück</a>
</div>
<div class="max-w-3xl mx-auto px-4 -mt-10 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl flex p-2 mb-10">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-5 tab-active text-xl font-bold font-sans">LISTE</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-5 text-xl font-bold text-slate-300 font-sans">KARTEN</button>
  </div>
  <div id="content1" class="space-y-4 pb-12"></div>
  <div id="content2" class="hidden">
    <div class="text-center mb-6"><span id="counter" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-lg shadow-lg font-sans"></span></div>
    <div class="flashcard-zone">
      <div onclick="prev()" class="nav-area">❮</div>
      <div class="flip-card" onclick="toggleFlip()">
        <div id="card-inner" class="flip-inner">
          <div class="flip-front"><p id="f-main" class="text-6xl font-black text-center text-blue-700 tracking-tight"></p></div>
          <div class="flip-back">
            <p id="f-detail" class="text-blue-100 text-2xl font-bold text-center leading-relaxed mb-6"></p>
