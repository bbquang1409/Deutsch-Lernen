<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>50 wichtigste Verben B2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link href="https://cdn.tailwindcss.com" rel="stylesheet">
<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;--card:#fff;--border:#c5d8ee;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  .hdr{background:#1e3a5f;padding:24px 20px 20px;position:relative;overflow:hidden;text-align:center;}
  .hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% -10%,#3b82f6 0%,transparent 55%),radial-gradient(ellipse at 10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;}
  .hdr-inner{position:relative;max-width:700px;margin:0 auto;}
  .hdr-tag{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#93c5fd;margin-bottom:6px;}
  .hdr h1{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;margin-bottom:4px;}
  .hdr p{font-size:13px;color:rgba(255,255,255,.5);}
  .hdr-back{display:inline-block;margin-top:14px;background:rgba(255,255,255,.12);border-radius:10px;color:#93c5fd;font-size:12px;font-weight:600;padding:7px 16px;text-decoration:none;}
  .tab-active{border-bottom:4px solid #10b981;color:#10b981;font-weight:600;}
  .flip-card{perspective:1000px;}
  .flip-card-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform .7s;transform-style:preserve-3d;}
  .flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
  .flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;}
  .flip-card-front{background:#f3e8d8;}
  .flip-card-back{background:#1e2937;color:white;transform:rotateY(180deg);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-tag">B2 • TELC & GOETHE</div>
    <h1>50 wichtigste Verben</h1>
    <p>Präsens • Präteritum • Perfekt</p>
    <a href="index.html" class="hdr-back">← Zurück zur Übersicht</a>
  </div>
</div>

<div class="max-w-4xl mx-auto p-4">
  <div class="flex border-b mb-6">
    <button onclick="showTab(1)" id="tab1" class="tab-active flex-1 py-4 text-lg">📖 Giải thích chi tiết</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-4 text-lg">🔄 Flashcard (tap lật)</button>
  </div>

  <div id="content1"><div class="space-y-6" id="list-detail"></div></div>
  <div id="content2" class="hidden">
    <div class="flex justify-between items-center mb-4">
      <button onclick="prevCard()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 rounded-xl">← Trước</button>
      <span id="card-counter" class="text-xl font-medium text-emerald-700">1 / 50</span>
      <button onclick="nextCard()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 rounded-xl">Sau →</button>
    </div>
    <div class="flip-card mx-auto max-w-lg h-80 cursor-pointer" onclick="flipCard()">
      <div class="flip-card-inner h-full" id="flip-inner">
        <div class="flip-card-front flex items-center justify-center p-8 shadow-2xl">
          <div id="front-text" class="text-3xl font-semibold text-gray-800"></div>
        </div>
        <div class="flip-card-back flex flex-col items-center justify-center p-8 shadow-2xl text-center">
          <div id="back-forms" class="text-2xl font-semibold mb-4"></div>
          <div id="back-viet" class="italic text-emerald-300 text-xl"></div>
        </div>
      </div>
    </div>
    <div class="text-center mt-8">
      <button onclick="randomCard()" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700">🎲 Ngẫu nhiên</button>
    </div>
  </div>
</div>

<script>
const data = [
  {id:1, verb:"sein", forms:"ist • war • ist gewesen", viet:"là"},
  {id:2, verb:"haben", forms:"hat • hatte • hat gehabt", viet:"có"},
  {id:3, verb:"werden", forms:"wird • wurde • ist geworden", viet:"trở thành"},
  {id:4, verb:"gehen", forms:"geht • ging • ist gegangen", viet:"đi"},
  {id:5, verb:"kommen", forms:"kommt • kam • ist gekommen", viet:"đến"},
  {id:6, verb:"machen", forms:"macht • machte • hat gemacht", viet:"làm"},
  {id:7, verb:"sagen", forms:"sagt • sagte • hat gesagt", viet:"nói"},
  {id:8, verb:"sehen", forms:"sieht • sah • hat gesehen", viet:"nhìn / thấy"},
  {id:9, verb:"geben", forms:"gibt • gab • hat gegeben", viet:"cho"},
  {id:10, verb:"nehmen", forms:"nimmt • nahm • hat genommen", viet:"lấy"},
  {id:11, verb:"finden", forms:"findet • fand • hat gefunden", viet:"tìm thấy"},
  {id:12, verb:"wissen", forms:"weiß • wusste • hat gewusst", viet:"biết"},
  {id:13, verb:"denken", forms:"denkt • dachte • hat gedacht", viet:"nghĩ"},
  {id:14, verb:"lassen", forms:"lässt • ließ • hat gelassen", viet:"để / cho phép"},
  {id:15, verb:"stehen", forms:"steht • stand • hat gestanden", viet:"đứng"},
  {id:16, verb:"sitzen", forms:"sitzt • saß • hat gesessen", viet:"ngồi"},
  {id:17, verb:"liegen", forms:"liegt • lag • hat gelegen", viet:"nằm"},
  {id:18, verb:"fahren", forms:"fährt • fuhr • ist gefahren", viet:"lái xe / đi"},
  {id:19, verb:"laufen", forms:"läuft • lief • ist gelaufen", viet:"chạy"},
  {id:20, verb:"bleiben", forms:"bleibt • blieb • ist geblieben", viet:"ở lại"},
  {id:21, verb:"bringen", forms:"bringt • brachte • hat gebracht", viet:"mang đến"},
  {id:22, verb:"helfen", forms:"hilft • half • hat geholfen", viet:"giúp"},
  {id:23, verb:"kaufen", forms:"kauft • kaufte • hat gekauft", viet:"mua"},
  {id:24, verb:"verkaufen", forms:"verkauft • verkaufte • hat verkauft", viet:"bán"},
  {id:25, verb:"lesen", forms:"liest • las • hat gelesen", viet:"đọc"},
  {id:26, verb:"schreiben", forms:"schreibt • schrieb • hat geschrieben", viet:"viết"},
  {id:27, verb:"sprechen", forms:"spricht • sprach • hat gesprochen", viet:"nói"},
  {id:28, verb:"verstehen", forms:"versteht • verstand • hat verstanden", viet:"hiểu"},
  {id:29, verb:"fragen", forms:"fragt • fragte • hat gefragt", viet:"hỏi"},
  {id:30, verb:"antworten", forms:"antwortet • antwortete • hat geantwortet", viet:"trả lời"},
  {id:31, verb:"essen", forms:"isst • aß • hat gegessen", viet:"ăn"},
  {id:32, verb:"trinken", forms:"trinkt • trank • hat getrunken", viet:"uống"},
  {id:33, verb:"schlafen", forms:"schläft • schlief • hat geschlafen", viet:"ngủ"},
  {id:34, verb:"arbeiten", forms:"arbeitet • arbeitete • hat gearbeitet", viet:"làm việc"},
  {id:35, verb:"lernen", forms:"lernt • lernte • hat gelernt", viet:"học"},
  {id:36, verb:"studieren", forms:"studiert • studierte • hat studiert", viet:"học đại học"},
  {id:37, verb:"bezahlen", forms:"bezahlt • bezahlte • hat bezahlt", viet:"trả tiền"},
  {id:38, verb:"reservieren", forms:"reserviert • reservierte • hat reserviert", viet:"đặt chỗ"},
  {id:39, verb:"bestellen", forms:"bestellt • bestellte • hat bestellt", viet:"đặt món"},
  {id:40, verb:"probieren", forms:"probiert • probierte • hat probiert", viet:"thử"},
  {id:41, verb:"beginnen", forms:"beginnt • begann • hat begonnen", viet:"bắt đầu"},
  {id:42, verb:"enden", forms:"endet • endete • hat geendet", viet:"kết thúc"},
  {id:43, verb:"gewinnen", forms:"gewinnt • gewann • hat gewonnen", viet:"thắng"},
  {id:44, verb:"verlieren", forms:"verliert • verlor • hat verloren", viet:"thua"},
  {id:45, verb:"öffnen", forms:"öffnet • öffnete • hat geöffnet", viet:"mở"},
  {id:46, verb:"schließen", forms:"schließt • schloss • hat geschlossen", viet:"đóng"},
  {id:47, verb:"anrufen", forms:"ruft an • rief an • hat angerufen", viet:"gọi điện"},
  {id:48, verb:"treffen", forms:"trifft • traf • hat getroffen", viet:"gặp"},
  {id:49, verb:"erzählen", forms:"erzählt • erzählte • hat erzählt", viet:"kể"},
  {id:50, verb:"zeigen", forms:"zeigt • zeigte • hat gezeigt", viet:"chỉ / cho xem"}
];

function renderDetailList(){const container=document.getElementById('list-detail');container.innerHTML=data.map(item=>`<div class="bg-white rounded-3xl shadow p-6"><div class="flex items-start gap-4"><div class="w-8 h-8 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center font-bold text-lg flex-shrink-0">${item.id}</div><div class="flex-1"><div class="text-3xl font-semibold text-gray-800 mb-1">${item.verb}</div><div class="text-gray-700 mb-1">${item.forms}</div><div class="italic text-emerald-600 text-xl">${item.viet}</div></div></div></div>`).join('');}
function showTab(n){document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));document.getElementById('content'+n).classList.remove('hidden');document.querySelectorAll('button[id^="tab"]').forEach(btn=>btn.classList.remove('tab-active'));document.getElementById('tab'+n).classList.add('tab-active');}
let currentIndex=0;let isFlipped=false;function showCard(i){currentIndex=i;isFlipped=false;document.getElementById('flip-inner').classList.remove('flipped');document.getElementById('front-text').textContent=data[i].verb;document.getElementById('back-forms').textContent=data[i].forms;document.getElementById('back-viet').textContent=data[i].viet;document.getElementById('card-counter').textContent=`${i+1} / 50`;}
function flipCard(){isFlipped=!isFlipped;document.getElementById('flip-inner').classList.toggle('flipped',isFlipped);}
function nextCard(){showCard((currentIndex+1)%50);}
function prevCard(){showCard((currentIndex-1+50)%50);}
function randomCard(){showCard(Math.floor(Math.random()*50));}
window.onload=function(){renderDetailList();showCard(0);};
</script>
</body>
</html>
