<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>50 Verben B2 - Bảo Quang</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#1e3a5f;--emerald:#10b981;--bg:#f1f5f9;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:#1e3a5f;padding-bottom:40px;}
  .hdr{background:var(--blue);padding:40px 20px;text-align:center;color:white;position:relative;overflow:hidden;}
  .hdr::after{content:'';position:absolute;inset:0;background:linear-gradient(45deg, rgba(59,130,246,0.2) 0%, transparent 100%);}
  .tab-active{border-bottom:4px solid var(--emerald);color:var(--emerald);font-weight:700;}
  .flip-card{perspective:1000px;height:380px;width:100%;max-width:400px;margin:0 auto;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front, .flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 15px 35px rgba(0,0,0,0.1);}
  .flip-front{background:white;border:2px solid #e2e8f0;}
  .flip-back{background:var(--blue);color:white;transform:rotateY(180deg);}
  .verb-tag { background: #f0fdf4; color: #15803d; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
</style>
</head>
<body>

<div class="hdr">
  <div class="relative z-10">
    <h1 class="font-serif text-3xl md:text-4xl mb-2">50 Wichtige Verben</h1>
    <p class="text-blue-200 uppercase tracking-widest text-xs font-bold">Chia động từ • Trình độ B2</p>
    <a href="index.html" class="inline-block mt-5 text-white/70 hover:text-white transition-all text-sm">
      <i class="fas fa-arrow-left mr-2"></i> Quay lại trang chính
    </a>
  </div>
</div>

<div class="max-w-3xl mx-auto px-4 -mt-8 relative z-20">
  <div class="bg-white rounded-2xl shadow-lg flex p-1 mb-8 text-sm md:text-base">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-4 tab-active transition-all">📖 Danh sách chia</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-4 transition-all">🔄 Flashcards</button>
  </div>

  <div id="content1" class="space-y-4">
    <div id="list-container" class="grid gap-4"></div>
  </div>

  <div id="content2" class="hidden">
    <div class="text-center mb-6">
      <span id="counter" class="bg-emerald-100 text-emerald-700 px-4 py-1 rounded-full font-bold text-sm">1 / 50</span>
    </div>

    <div class="flip-card" onclick="toggleFlip()">
      <div id="card-inner" class="flip-inner">
        <div class="flip-front">
          <p id="f-verb" class="text-4xl font-extrabold text-blue-900"></p>
          <span class="mt-8 text-gray-400 text-xs italic">Chạm để xem cách chia</span>
        </div>
        <div class="flip-back">
          <p class="text-emerald-400 text-xs font-bold mb-4 uppercase tracking-widest">Konjugation:</p>
          <p id="f-forms" class="text-xl md:text-2xl text-center font-bold mb-6 leading-relaxed"></p>
          <div class="h-px w-12 bg-white/20 mb-6"></div>
          <p id="f-viet" class="text-2xl font-semibold text-center italic"></p>
        </div>
      </div>
    </div>

    <div class="flex justify-center items-center gap-6 mt-10">
      <button onclick="prev()" class="w-14 h-14 bg-white rounded-full shadow-md flex items-center justify-center text-blue-900"><i class="fas fa-chevron-left"></i></button>
      <button onclick="random()" class="px-6 py-3 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg shadow-emerald-200">Ngẫu nhiên</button>
      <button onclick="next()" class="w-14 h-14 bg-white rounded-full shadow-md flex items-center justify-center text-blue-900"><i class="fas fa-chevron-right"></i></button>
    </div>
  </div>
</div>

<script>
const data = [
  {verb: "sehen", forms: "sieht • sah • hat gesehen", viet: "nhìn, xem"},
  {verb: "sprechen", forms: "spricht • sprach • hat gesprochen", viet: "nói"},
  {verb: "nehmen", forms: "nimmt • nahm • hat genommen", viet: "lấy, cầm"},
  {verb: "geben", forms: "gibt • gab • hat gegeben", viet: "cho, đưa"},
  {verb: "gehen", forms: "geht • ging • ist gegangen", viet: "đi"},
  {verb: "fahren", forms: "fährt • fuhr • ist gefahren", viet: "lái xe, đi xe"},
  {verb: "trinken", forms: "trinkt • trank • hat getrunken", viet: "uống"},
  {verb: "essen", forms: "isst • aß • hat gegessen", viet: "ăn"},
  {verb: "schreiben", forms: "schreibt • schrieb • hat geschrieben", viet: "viết"},
  {verb: "bleiben", forms: "bleibt • blieb • ist geblieben", viet: "ở lại"}
  // Bạn hãy copy thêm danh sách các động từ khác vào đây nhé
];

let current = 0;

function showTab(n) {
  document.getElementById('content1').classList.toggle('hidden', n !== 1);
  document.getElementById('content2').classList.toggle('hidden', n !== 2);
  document.getElementById('tab1').classList.toggle('tab-active', n === 1);
  document.getElementById('tab2').classList.toggle('tab-active', n === 2);
  if(n === 2) updateFlashcard();
}

function renderList() {
  const container = document.getElementById('list-container');
  container.innerHTML = data.map((item, i) => `
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-transparent hover:border-emerald-200 transition-all flex items-center gap-4">
      <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-lg flex-shrink-0">${i+1}</div>
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-1">
          <h3 class="text-2xl font-extrabold text-slate-800">${item.verb}</h3>
          <span class="verb-tag">V2</span>
        </div>
        <p class="text-slate-600 font-bold text-sm tracking-wide">${item.forms}</p>
        <p class="text-emerald-600 font-medium text-sm mt-1 italic">${item.viet}</p>
      </div>
    </div>
  `).join('');
}

function updateFlashcard() {
  const item = data[current];
  document.getElementById('f-verb').textContent = item.verb;
  document.getElementById('f-forms').innerHTML = item.forms.replace(/•/g, '<br>');
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current + 1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}

function toggleFlip() {
  document.getElementById('card-inner').classList.toggle('flipped');
}

function next() {
  current = (current + 1) % data.length;
  updateFlashcard();
}

function prev() {
  current = (current - 1 + data.length) % data.length;
  updateFlashcard();
}

function random() {
  current = Math.floor(Math.random() * data.length);
  updateFlashcard();
}

window.onload = renderList;
</
