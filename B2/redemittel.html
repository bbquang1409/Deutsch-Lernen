<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wichtige Redemittel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;margin:0;}
  .hdr{background:var(--ink);padding:45px 20px;text-align:center;color:white;position:relative;}
  .tab-active{border-bottom:4px solid var(--blue);color:var(--blue);font-weight:800;}
  .flashcard-zone{display:flex;align-items:stretch;justify-content:center;width:100%;max-width:500px;margin:0 auto;height:450px;position:relative;}
  .nav-area{width:70px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;color:rgba(37,99,235,0.1);font-size:1.5rem;transition:0.2s;-webkit-tap-highlight-color:transparent;}
  .nav-area:active{background:rgba(37,99,235,0.05);color:var(--blue);}
  .flip-card{perspective:1000px;flex:1;position:relative;z-index:20;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 20px 40px rgba(30,58,95,0.1);border:1px solid #fff;}
  .flip-front{background:white;}
  .flip-back{background:linear-gradient(145deg,#1e3a5f,#2563eb);color:white;transform:rotateY(180deg);}
</style>
</head>
<body>
<div class="hdr">
    <h1 class="text-3xl font-extrabold mb-1">Wichtige Redemittel</h1>
    <p class="opacity-50 text-sm italic">Sprechen & Argumentieren</p>
    <a href="index.html" class="inline-block mt-4 text-white/30 text-xs font-bold uppercase tracking-widest">← Zurück</a>
</div>
<div class="max-w-2xl mx-auto px-4 -mt-8 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl flex p-1.5 mb-8">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-4 tab-active font-bold font-sans">LISTE</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-4 font-bold text-slate-300 font-sans">KARTEN</button>
  </div>
  <div id="content1" class="space-y-3 pb-12"></div>
  <div id="content2" class="hidden">
    <div class="text-center mb-4"><span id="counter" class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold text-xs shadow-lg font-sans"></span></div>
    <div class="flashcard-zone">
      <div onclick="prev()" class="nav-area">❮</div>
      <div class="flip-card" onclick="toggleFlip()">
        <div id="card-inner" class="flip-inner">
          <div class="flip-front"><p id="f-main" class="text-2xl font-bold text-center leading-snug text-blue-800"></p></div>
          <div class="flip-back">
            <p id="f-detail" class="text-blue-100 text-sm font-bold text-center uppercase tracking-widest mb-4"></p>
            <div class="h-px w-12 bg-white/20 mb-4"></div>
            <p id="f-viet" class="text-2xl font-bold text-white text-center"></p>
          </div>
        </div>
      </div>
      <div onclick="next()" class="nav-area">❯</div>
    </div>
    <div class="flex justify-center mt-10 pb-12"><button onclick="random()" class="px-12 py-4 bg-blue-600 text-white rounded-2xl font-extrabold shadow-xl uppercase tracking-widest text-sm font-sans">Zufällig</button></div>
  </div>
</div>
<script>
const data = [
  {phrase:"Ich bin der festen Überzeugung, dass...", explain:"Meinung äußern", viet:"Tôi tin chắc rằng..."},
  {phrase:"Das ist ein schlagendes Argument.", explain:"Zustimmung", viet:"Đó là một lập luận thuyết phục."},
  {phrase:"Darf ich Sie kurz unterbrechen?", explain:"Unterbrechen", viet:"Tôi có thể ngắt lời ngài một chút không?"},
  {phrase:"Meines Erachtens nach...", explain:"Eigene Meinung", viet:"Theo quan điểm của tôi..."},
  {phrase:"Ich teile diese Auffassung nur bedingt.", explain:"Zustimmung", viet:"Tôi chỉ đồng ý một phần thôi."},
  {phrase:"Das liegt auf der Hand, dass...", explain:"Offensichtlichkeit", viet:"Rõ ràng là..."},
  {phrase:"Daraus ergibt sich die Schlussfolgerung...", explain:"Schlussfolgern", viet:"Từ đó rút ra kết luận là..."},
  {phrase:"Könnten Sie das bitte näher erläutern?", explain:"Nachfragen", viet:"Ngài có thể giải thích rõ hơn không?"},
  {phrase:"Ich möchte einen weiteren Punkt anführen.", explain:"Ergänzen", viet:"Tôi muốn đưa thêm một ý kiến nữa."},
  {phrase:"Das widerspricht meiner Erfahrung.", explain:"Widersprechen", viet:"Điều đó mâu thuẫn với kinh nghiệm của tôi."},
  {phrase:"In diesem Zusammenhang sollte man bedenken...", explain:"Ergänzen", viet:"Trong mối liên hệ này cần lưu ý là..."},
  {phrase:"Ich sehe einen lớn Vorteil darin, dass...", explain:"Vorteile", viet:"Tôi thấy một lợi ích lớn ở việc..."},
  {phrase:"Zusammenfassend lässt sich sagen...", explain:"Fazit", viet:"Tóm lại có thể nói là..."},
  {phrase:"Ich vertrete den Standpunkt, dass...", explain:"Position", viet:"Tôi giữ lập trường rằng..."},
  {phrase:"Darf ich dazu trực tiếp etwas sagen?", explain:"Einmischen", viet:"Tôi có thể nói thẳng vào ý này không?"},
  {phrase:"Ich halte das für problematisch.", explain:"Bedenken", viet:"Tôi thấy điều đó có vấn đề."},
  {phrase:"Das überzeugt mich nicht.", explain:"Ablehnung", viet:"Điều đó không thuyết phục được tôi."},
  {phrase:"Es steht außer Frage, dass...", explain:"Gewissheit", viet:"Không cần bàn cãi rằng..."},
  {phrase:"Ich sehe das etwas differenzierter.", explain:"Sichtweise", viet:"Tôi nhìn nhận vấn đề hơi khác một chút."},
  {phrase:"Das là ein berechtigter Einwand.", explain:"Einwand", viet:"Đó là một sự phản đối có cơ sở."},
  {phrase:"Alles in allem zeigt sich...", explain:"Zusammenfassung", viet:"Tất cả cho thấy rằng..."},
  {phrase:"Ein wesentlicher Aspekt dabei ist...", explain:"Wichtigkeit", viet:"Một khía cạnh cốt yếu là..."},
  {phrase:"Einerseits..., andererseits...", explain:"Kontrast", viet:"Một mặt..., mặt khác..."},
  {phrase:"Trotz dieser Vorteile...", explain:"Einräumung", viet:"Mặc dù có những lợi ích này..."},
  {phrase:"Darüber hinaus sollte man berücksichtigen...", explain:"Ergänzen", viet:"Ngoài ra cần cân nhắc rằng..."},
  {phrase:"Wie man an diesem Beispiel sieht...", explain:"Beispiel", viet:"Như chúng ta thấy ở ví dụ này..."},
  {phrase:"Dafür spricht, dass...", explain:"Pro", viet:"Điều ủng hộ cho việc này là..."},
  {phrase:"Dagegen spricht, dass...", explain:"Contra", viet:"Điều chống lại việc này là..."},
  {phrase:"In gewisser Weise haben Sie recht, aber...", explain:"Zustimmung", viet:"Ở khía cạnh nào đó ngài có lý, nhưng..."},
  {phrase:"Soweit ich das beurteilen kann...", explain:"Einschätzung", viet:"Theo như tôi có thể đánh giá..."},
  {phrase:"Dies lässt sich wie folgt begründen:", explain:"Begründung", viet:"Điều này được lý giải như sau:"},
  {phrase:"Es spielt eine entscheidende Rolle, ob...", explain:"Wichtigkeit", viet:"Nó đóng vai trò quyết định liệu..."},
  {phrase:"Kommen wir nun zum nächsten Punkt.", explain:"Überleitung", viet:"Bây giờ chuyển sang ý tiếp theo."},
  {phrase:"Ich stimme Ihnen voll und ganz zu.", explain:"Zustimmung", viet:"Tôi hoàn toàn đồng ý với ngài."},
  {phrase:"Das halte ich für ausgeschlossen.", explain:"Ablehnung", viet:"Tôi cho rằng điều đó là không thể."},
  {phrase:"Ich möchte das mit folgendem Beispiel verdeutlichen:", explain:"Beispiel", viet:"Tôi muốn làm rõ qua ví dụ sau:"},
  {phrase:"Darf ich noch etwas ergänzen?", explain:"Ergänzung", viet:"Tôi có thể bổ sung thêm gì không?"},
  {phrase:"Darf ich das kurz zusammenfassen?", explain:"Zusammenfassung", viet:"Tôi có thể tóm tắt ngắn gọn lại không?"},
  {phrase:"Das ist doch völlig unakzeptabel.", explain:"Ablehnung", viet:"Điều đó hoàn toàn không thể chấp nhận."},
  {phrase:"Ich bin mir nicht ganz sicher, ob...", explain:"Zweifel", viet:"Tôi không chắc chắn lắm liệu..."},
  {phrase:"Das là một câu hỏi hay.", explain:"Zeit gewinnen", viet:"Đó là một câu hỏi hay."},
  {phrase:"Im Grunde genommen...", explain:"Zusammenfassend", viet:"Về cơ bản thì..."},
  {phrase:"Was halten Sie von...?", explain:"Meinung", viet:"Ngài nghĩ gì về...?"},
  {phrase:"Könnten Sie das an einem Beispiel festmachen?", explain:"Präzisierung", viet:"Ngài có thể lấy ví dụ cụ thể không?"},
  {phrase:"Das kann ich mir không vorstellen.", explain:"Zweifel", viet:"Tôi không thể tưởng tượng được điều đó."},
  {phrase:"Es kommt darauf an, ob...", explain:"Abhängigkeit", viet:"Nó phụ thuộc vào việc liệu..."},
  {phrase:"In der Regel ist es so, dass...", explain:"Allgemein", viet:"Thông thường là như vậy..."},
  {phrase:"Damit bin ich am Ende meines Beitrags.", explain:"Abschluss", viet:"Đến đây tôi xin kết thúc phần phát biểu."},
  {phrase:"Vielen Dank für Ihre Aufmerksamkeit.", explain:"Abschluss", viet:"Cảm ơn ngài đã chú ý lắng nghe."},
  {phrase:"Ich danke Ihnen für das Gespräch.", explain:"Abschluss", viet:"Cảm ơn ngài về cuộc trò chuyện."}
];
let current = 0;
function showTab(n){
  document.getElementById('content1').classList.toggle('hidden',n!==1);
  document.getElementById('content2').classList.toggle('hidden',n!==2);
  document.getElementById('tab1').className = n===1?'flex-1 py-4 tab-active font-bold font-sans':'flex-1 py-4 font-bold text-slate-300 font-sans';
  document.getElementById('tab2').className = n===2?'flex-1 py-4 tab-active font-bold font-sans':'flex-1 py-4 font-bold text-slate-300 font-sans';
  if(n===2) updateFlashcard();
}
function renderList(){
  document.getElementById('content1').innerHTML = data.map((item, i) => `
    <div class="bg-white p-5 rounded-2xl border border-slate-100 flex gap-4 shadow-sm items-center">
      <div class="text-blue-600 font-black opacity-20 text-2xl w-10 text-center font-sans">${i+1}</div>
      <div class="flex-1">
        <div class="font-bold text-slate-800 text-lg leading-tight">${item.phrase}</div>
        <div class="text-emerald-600 text-sm font-bold mt-1">${item.viet}</div>
      </div>
    </div>`).join('');
}
function updateFlashcard(){
  const item = data[current];
  document.getElementById('f-main').textContent = item.phrase;
  document.getElementById('f-detail').textContent = item.explain;
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}
function toggleFlip(){document.getElementById('card-inner').classList.toggle('flipped');}
function next(){current=(current+1)%data.length;updateFlashcard();}
function prev(){current=(current-1+data.length)%data.length;updateFlashcard();}
function random(){current=Math.floor(Math.random()*data.length);updateFlashcard();}
window.onload = renderList;
</script>
</body>
</html>
