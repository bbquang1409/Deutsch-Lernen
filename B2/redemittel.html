<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wichtige Redemittel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;margin:0;}
  .hdr{background:var(--ink);padding:45px 20px;text-align:center;color:white;position:relative;}
  .tab-active{border-bottom:4px solid var(--blue);color:var(--blue);font-weight:800;}
  .flashcard-zone{display:flex;align-items:stretch;justify-content:center;width:100%;max-width:500px;margin:0 auto;height:450px;position:relative;}
  .nav-area{width:70px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;color:rgba(37,99,235,0.1);font-size:1.5rem;transition:0.2s;-webkit-tap-highlight-color:transparent;}
  .nav-area:active{background:rgba(37,99,235,0.05);color:var(--blue);}
  .flip-card{perspective:1000px;flex:1;position:relative;z-index:20;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 20px 40px rgba(30,58,95,0.1);border:1px solid #fff;}
  .flip-front{background:white;}
  .flip-back{background:linear-gradient(145deg,#1e3a5f,#2563eb);color:white;transform:rotateY(180deg);}
</style>
</head>
<body>
<div class="hdr">
    <h1 class="text-3xl font-extrabold mb-1">Wichtige Redemittel</h1>
    <p class="opacity-50 text-sm italic">Diskussion & Meinung</p>
    <a href="index.html" class="inline-block mt-4 text-white/30 text-xs font-bold uppercase tracking-widest">← Zurück</a>
</div>
<div class="max-w-2xl mx-auto px-4 -mt-8 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl flex p-1.5 mb-8">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-4 tab-active font-bold font-sans">LISTE</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-4 font-bold text-slate-300 font-sans">KARTEN</button>
  </div>
  <div id="content1" class="space-y-3 pb-12"></div>
  <div id="content2" class="hidden">
    <div class="text-center mb-4"><span id="counter" class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold text-xs shadow-lg font-sans"></span></div>
    <div class="flashcard-zone">
      <div onclick="prev()" class="nav-area">❮</div>
      <div class="flip-card" onclick="toggleFlip()">
        <div id="card-inner" class="flip-inner">
          <div class="flip-front"><p id="f-main" class="text-2xl font-bold text-center leading-snug text-blue-800"></p></div>
          <div class="flip-back">
            <p id="f-detail" class="text-blue-100 text-lg font-bold text-center uppercase tracking-widest"></p>
          </div>
        </div>
      </div>
      <div onclick="next()" class="nav-area">❯</div>
    </div>
    <div class="flex justify-center mt-10 pb-12"><button onclick="random()" class="px-12 py-4 bg-blue-600 text-white rounded-2xl font-extrabold shadow-xl uppercase tracking-widest text-sm font-sans">Zufällig</button></div>
  </div>
</div>
<script>
const data = [
  {phrase:"Ich bin der festen Überzeugung, dass...", explain:"Meinung äußern"},
  {phrase:"Das ist ein schlagendes Argument.", explain:"Zustimmung"},
  {phrase:"Darf ich Sie kurz unterbrechen?", explain:"Unterbrechen"},
  {phrase:"Meines Erachtens nach...", explain:"Eigene Meinung"},
  {phrase:"Ich teile diese Auffassung nur bedingt.", explain:"Zustimmung"},
  {phrase:"Das liegt auf der Hand, dass...", explain:"Offensichtlichkeit"},
  {phrase:"Daraus ergibt sich die Schlussfolgerung...", explain:"Schlussfolgern"},
  {phrase:"Könnten Sie das bitte näher erläutern?", explain:"Nachfragen"},
  {phrase:"Ich möchte einen weiteren Punkt anführen.", explain:"Ergänzen"},
  {phrase:"Das widerspricht meiner Erfahrung.", explain:"Widersprechen"},
  {phrase:"In diesem Zusammenhang sollte man bedenken...", explain:"Ergänzen"},
  {phrase:"Ich sehe einen lớn Vorteil darin, dass...", explain:"Vorteile"},
  {phrase:"Zusammenfassend lässt sich sagen...", explain:"Fazit"},
  {phrase:"Ich vertrete den Standpunkt, dass...", explain:"Position"},
  {phrase:"Darf ich dazu direkt etwas sagen?", explain:"Einmischen"},
  {phrase:"Ich halte das für problematisch.", explain:"Bedenken"},
  {phrase:"Das überzeugt mich nicht.", explain:"Ablehnung"},
  {phrase:"Es steht außer Frage, dass...", explain:"Gewissheit"},
  {phrase:"Ich sehe das etwas differenzierter.", explain:"Sichtweise"},
  {phrase:"Das ist ein berechtigter Einwand.", explain:"Einwand"},
  {phrase:"Alles in allem zeigt sich...", explain:"Zusammenfassung"},
  {phrase:"Ein wesentlicher Aspekt dabei ist...", explain:"Wichtigkeit"},
  {phrase:"Einerseits..., andererseits...", explain:"Kontrast"},
  {phrase:"Trotz dieser Vorteile...", explain:"Einräumung"},
  {phrase:"Darüber hinaus sollte man berücksichtigen...", explain:"Ergänzen"},
  {phrase:"Wie man an diesem Beispiel sieht...", explain:"Beispiel"},
  {phrase:"Dafür spricht, dass...", explain:"Pro"},
  {phrase:"Dagegen spricht, dass...", explain:"Contra"},
  {phrase:"In gewisser Weise haben Sie recht, aber...", explain:"Zustimmung"},
  {phrase:"Soweit ich das beurteilen kann...", explain:"Einschätzung"},
  {phrase:"Dies lässt sich wie folgt begründen:", explain:"Begründung"},
  {phrase:"Es spielt eine entscheidende Rolle, ob...", explain:"Wichtigkeit"},
  {phrase:"Kommen wir nun zum nächsten Punkt.", explain:"Überleitung"},
  {phrase:"Ich stimme Ihnen voll und ganz zu.", explain:"Zustimmung"},
  {phrase:"Das halte ich für ausgeschlossen.", explain:"Ablehnung"},
  {phrase:"Ich möchte das mit folgendem Beispiel verdeutlichen:", explain:"Beispiel"},
  {phrase:"Darf ich noch etwas ergänzen?", explain:"Ergänzung"},
  {phrase:"Darf ich das kurz zusammenfassen?", explain:"Zusammenfassung"},
  {phrase:"Das ist doch völlig unakzeptabel.", explain:"Ablehnung"},
  {phrase:"Ich bin mir nicht ganz sicher, ob...", explain:"Zweifel"},
  {phrase:"Das ist eine gute Frage.", explain:"Zeit gewinnen"},
  {phrase:"Im Grunde genommen...", explain:"Zusammenfassend"},
  {phrase:"Was halten Sie von...?", explain:"Meinung"},
  {phrase:"Könnten Sie das an einem Beispiel festmachen?", explain:"Präzisierung"},
  {phrase:"Das kann ich mir không vorstellen.", explain:"Zweifel"},
  {phrase:"Es kommt darauf an, ob...", explain:"Abhängigkeit"},
  {phrase:"In der Regel ist es so, dass...", explain:"Allgemein"},
  {phrase:"Damit bin ich am Ende meines Beitrags.", explain:"Abschluss"},
  {phrase:"Vielen Dank für Ihre Aufmerksamkeit.", explain:"Abschluss"},
  {phrase:"Ich danke Ihnen für das Gespräch.", explain:"Abschluss"}
];
let current = 0;
function showTab(n){
  document.getElementById('content1').classList.toggle('hidden',n!==1);
  document.getElementById('content2').classList.toggle('hidden',n!==2);
  document.getElementById('tab1').className = n===1?'flex-1 py-4 tab-active font-bold font-sans':'flex-1 py-4 font-bold text-slate-300 font-sans';
  document.getElementById('tab2').className = n===2?'flex-1 py-4 tab-active font-bold font-sans':'flex-1 py-4 font-bold text-slate-300 font-sans';
  if(n===2) updateFlashcard();
}
function renderList(){
  document.getElementById('content1').innerHTML = data.map((item, i) => `
    <div class="bg-white p-5 rounded-2xl border border-slate-100 flex gap-4 shadow-sm items-center">
      <div class="text-blue-600 font-black opacity-20 text-2xl w-10 text-center font-sans">${i+1}</div>
      <div class="font-bold text-slate-800 text-lg leading-tight">${item.phrase}</div>
    </div>`).join('');
}
function updateFlashcard(){
  const item = data[current];
  document.getElementById('f-main').textContent = item.phrase;
  document.getElementById('f-detail').textContent = item.explain;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}
function toggleFlip(){document.getElementById('card-inner').classList.toggle('flipped');}
function next(){current=(current+1)%data.length;updateFlashcard();}
function prev(){current=(current-1+data.length)%data.length;updateFlashcard();}
function random(){current=Math.floor(Math.random()*data.length);updateFlashcard();}
window.onload = renderList;
</script>
</body>
</html>
