<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  .hdr{background:var(--ink);padding:40px 20px;text-align:center;color:white;position:relative;overflow:hidden;}
  .hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% -20%,#3b82f6 0%,transparent 60%);opacity:0.5;}
  .tab-active{border-bottom:4px solid var(--blue);color:var(--blue);font-weight:800;}
  .card-container{display:flex;align-items:stretch;justify-content:center;gap:4px;width:100%;max-width:500px;margin:0 auto;height:450px;}
  .nav-area{width:15px;display:flex;align-items:center;justify-content:center;color:var(--blue);opacity:0.3;transition:0.2s;cursor:pointer;}
  .nav-area:active{opacity:1;background:rgba(37,99,235,0.1);border-radius:10px;}
  .flip-card{perspective:1000px;flex:1;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:30px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 20px 40px rgba(30,58,95,0.15);border:1px solid rgba(255,255,255,0.8);}
  .flip-front{background:white;}
  .flip-back{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:white;transform:rotateY(180deg);}
</style>
</head>
<body>
<div class="hdr">
    <div class="relative z-10">

        <h1 class="text-3xl font-extrabold">Redemittel</h1>
        <a href="index.html" class="inline-block mt-4 text-white/40 text-sm italic font-medium">← Zurück</a>
    </div>
</div>
<div class="max-w-2xl mx-auto px-4 -mt-8 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl flex p-1.5 mb-8">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-4 tab-active font-bold">📖 Liste</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-4 font-bold text-slate-300">🔄 Karten</button>
  </div>
  <div id="content1" class="space-y-3"></div>
  <div id="content2" class="hidden">
    <div class="text-center mb-4"><span id="counter" class="bg-blue-600 text-white px-4 py-1 rounded-full font-bold text-xs shadow-lg"></span></div>
    <div class="card-container">
      <div onclick="prev()" class="nav-area"><i class="fas fa-chevron-left"></i></div>
      <div class="flip-card" onclick="toggleFlip()">
        <div id="card-inner" class="flip-inner">
          <div class="flip-front"><p id="f-phrase" class="text-2xl font-bold text-center leading-snug"></p></div>
          <div class="flip-back">
            <p id="f-explain" class="text-blue-200 text-sm mb-6 italic uppercase tracking-wider font-bold"></p>
            <div class="h-px w-16 bg-white/30 mb-6"></div>
            <p id="f-viet" class="text-2xl font-bold text-white text-center"></p>
          </div>
        </div>
      </div>
      <div onclick="next()" class="nav-area"><i class="fas fa-chevron-right"></i></div>
    </div>
    <div class="flex justify-center mt-10"><button onclick="random()" class="px-10 py-4 bg-blue-600 text-white rounded-2xl font-extrabold shadow-xl uppercase tracking-tighter text-sm">Zufällig</button></div>
  </div>
</div>
