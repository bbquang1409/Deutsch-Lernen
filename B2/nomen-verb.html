<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nomen-Verb B2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#10b981;--ink:#064e3b;--bg:#ecfdf5;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;margin:0;position:relative;}
  .hdr{background:var(--ink);padding:45px 20px;text-align:center;color:white;}
  .tab-active{border-bottom:6px solid var(--blue);color:var(--blue);font-weight:800;}
  .flashcard-zone{display:flex;align-items:stretch;justify-content:center;width:100%;max-width:600px;margin:0 auto;height:550px;}
  .nav-area{width:80px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;color:rgba(16,185,129,0.1);font-size:2.5rem;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;box-shadow:0 25px 50px rgba(6,78,59,0.15);}
  .flip-front{background:white;}
  .flip-back{background:linear-gradient(145deg,#064e3b,#10b981);color:white;transform:rotateY(180deg);}
  .copyright{position:fixed;bottom:10px;right:15px;font-size:10px;opacity:0.3;font-weight:700;letter-spacing:1px;pointer-events:none;color:var(--ink);}
</style>
</head>
<body>
<div class="hdr">
    <h1 class="text-4xl font-extrabold mb-1">Nomen-Verb B2</h1>
    <a href="index.html" class="inline-block mt-4 text-white/30 text-sm font-bold tracking-widest uppercase">← ZURÜCK</a>
</div>
<div class="max-w-3xl mx-auto px-4 -mt-10 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl flex p-2 mb-10">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-5 tab-active text-2xl font-bold uppercase">LISTE</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-5 text-2xl font-bold text-slate-300 uppercase">KARTEN</button>
  </div>
  <div id="content1" class="space-y-4 pb-12"></div>
  <div id="content2" class="hidden">
    <div class="text-center mb-6"><span id="counter" class="bg-emerald-600 text-white px-8 py-2 rounded-full font-bold text-xl shadow-lg"></span></div>
    <div class="flashcard-zone">
      <div onclick="prev()" class="nav-area">❮</div>
      <div class="flip-card flex-1" onclick="toggleFlip()">
        <div id="card-inner" class="flip-inner">
          <div class="flip-front"><p id="f-main" class="text-5xl font-black text-center text-emerald-700 leading-tight"></p></div>
          <div class="flip-back">
            <p id="f-detail" class="text-emerald-100 text-3xl font-bold text-center leading-relaxed mb-6"></p>
            <div class="h-1 w-20 bg-white/30 mb-6 rounded-full"></div>
            <p id="f-viet" class="text-4xl font-extrabold text-white text-center"></p>
          </div>
        </div>
      </div>
      <div onclick="next()" class="nav-area">❯</div>
    </div>
    <div class="flex justify-center mt-12 pb-16"><button onclick="random()" class="px-16 py-6 bg-emerald-600 text-white rounded-3xl font-extrabold shadow-2xl uppercase tracking-widest text-xl">ZUFÄLLIG</button></div>
  </div>
</div>
<div class="copyright uppercase">Made by BBQ with love</div>
<script>
const data = [
  {phrase:"Abschied nehmen", verb:"sich verabschieden", viet:"tạm biệt"},
  {phrase:"einen Antrag stellen", verb:"beantragen", viet:"nộp đơn"},
  {phrase:"Berücksichtigung finden", verb:"berücksichtigt werden", viet:"được cân nhắc"},
  {phrase:"eine Entscheidung treffen", verb:"entscheiden", viet:"quyết định"},
  {phrase:"in Frage kommen", verb:"möglich sein", viet:"có khả năng"},
  {phrase:"Hilfe leisten", verb:"helfen", viet:"giúp đỡ"},
  {phrase:"Kritik üben", verb:"kritisieren", viet:"phê bình"},
  {phrase:"Maßnahmen ergreifen", verb:"handeln", viet:"biện pháp"},
  {phrase:"Protokoll führen", verb:"protokollieren", viet:"ghi biên bản"},
  {phrase:"eine Rolle spielen", verb:"wichtig sein", viet:"đóng vai trò"},
  {phrase:"Stellung nehmen", verb:"meine Meinung sagen", viet:"nêu quan điểm"},
  {phrase:"Verantwortung tragen", verb:"verantwortlich sein", viet:"chịu trách nhiệm"},
  {phrase:"Vorbereitungen treffen", verb:"vorbereiten", viet:"chuẩn bị"},
  {phrase:"Wert legen auf", verb:"wichtig finden", viet:"coi trọng"},
  {phrase:"Zustimmung finden", verb:"akzeptiert werden", viet:"được tán thành"},
  {phrase:"auf Ablehnung stoßen", verb:"abgelehnt werden", viet:"bị bác bỏ"},
  {phrase:"Eindruck machen", verb:"beeindrucken", viet:"gây ấn tượng"},
  {phrase:"zu Ende bringen", verb:"beenden", viet:"kết thúc"},
  {phrase:"in Kauf nehmen", verb:"akzeptieren", viet:"chấp nhận rủi ro"},
  {phrase:"Kontakt aufnehmen", verb:"kontaktieren", viet:"liên lạc"},
  {phrase:"die Meinung vertreten", verb:"meinen", viet:"giữ ý kiến"},
  {phrase:"in Not geraten", verb:"nötig haben", viet:"gặp khó khăn"},
  {phrase:"Rat suchen", verb:"beraten werden", viet:"tìm lời khuyên"},
  {phrase:"Ruhe bewahren", verb:"ruhig bleiben", viet:"giữ bình tĩnh"},
  {phrase:"einen Schluss ziehen", verb:"schließen", viet:"rút kết luận"},
  {phrase:"Verständnis haben", verb:"verstehen", viet:"thấu hiểu"},
  {phrase:"Vertrauen genießen", verb:"vertraut werden", viet:"được tin tưởng"},
  {phrase:"Widerstand leisten", verb:"widerstehen", viet:"kháng cự"},
  {phrase:"einen Wunsch erfüllen", verb:"wünschen", viet:"thực hiện ước nguyện"},
  {phrase:"Zweifel haben", verb:"bezweifeln", viet:"nghi ngờ"}
  // (Tiếp tục thêm danh sách từ vựng B2 tại đây)
];
let current = 0;
function showTab(n){
  document.getElementById('content1').classList.toggle('hidden',n!==1);
  document.getElementById('content2').classList.toggle('hidden',n!==2);
  document.getElementById('tab1').className = n===1?'flex-1 py-5 tab-active text-2xl font-bold uppercase':'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  document.getElementById('tab2').className = n===2?'flex-1 py-5 tab-active text-2xl font-bold uppercase':'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  if(n===2) updateFlashcard();
}
function renderList(){
  document.getElementById('content1').innerHTML = data.map((item, i) => `
    <div class="bg-white p-8 rounded-3xl border border-slate-100 flex gap-8 shadow-sm items-center">
      <div class="text-emerald-600 font-black opacity-20 text-4xl w-14 text-center">${i+1}</div>
      <div class="flex-1">
        <h3 class="font-bold text-slate-800 text-3xl mb-2">${item.phrase}</h3>
        <p class="text-slate-500 text-lg font-bold uppercase tracking-wide mb-3">= ${item.verb}</p>
        <p class="text-emerald-600 text-2xl font-extrabold">${item.viet}</p>
      </div>
    </div>`).join('');
}
function updateFlashcard(){
  const item = data[current];
  document.getElementById('f-main').textContent = item.phrase;
  document.getElementById('f-detail').innerHTML = "= " + item.verb;
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}
function toggleFlip(){document.getElementById('card-inner').classList.toggle('flipped');}
function next(){current=(current+1)%data.length;updateFlashcard();}
function prev(){current=(current-1+data.length)%data.length;updateFlashcard();}
function random(){current=Math.floor(Math.random()*data.length);updateFlashcard();}
window.onload = renderList;
</script>
</body>
</html>
