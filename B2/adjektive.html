<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adjektive B2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{--blue:#8b5cf6;--ink:#2e1065;--bg:#f5f3ff;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;margin:0;position:relative;}
  .hdr{background:var(--ink);padding:45px 20px;text-align:center;color:white;}
  .tab-active{border-bottom:6px solid var(--blue);color:var(--blue);font-weight:800;}
  .flashcard-zone{display:flex;align-items:stretch;justify-content:center;width:100%;max-width:600px;margin:0 auto;height:550px;}
  .nav-area{width:80px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;color:rgba(139,92,246,0.1);font-size:2.5rem;}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;box-shadow:0 25px 50px rgba(46,16,101,0.15);}
  .flip-front{background:white;}
  .flip-back{background:linear-gradient(145deg,#2e1065,#8b5cf6);color:white;transform:rotateY(180deg);}
  .copyright{position:fixed;bottom:10px;right:15px;font-size:10px;opacity:0.3;font-weight:700;letter-spacing:1px;pointer-events:none;color:var(--ink);text-transform:uppercase;}
  .speaker-btn{transition:0.2s;}
  .speaker-btn:active{transform:scale(0.8);}
</style>
</head>
<body>
<div class="hdr">
    <h1 class="text-4xl font-extrabold mb-1">Adjektive B2</h1>
    <a href="index.html" class="inline-block mt-4 text-white/30 text-sm font-bold tracking-widest uppercase">← ZURÜCK</a>
</div>
<div class="max-w-3xl mx-auto px-4 -mt-10 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl flex p-2 mb-10">
    <button onclick="showTab(1)" id="tab1" class="flex-1 py-5 tab-active text-2xl font-bold uppercase">LISTE</button>
    <button onclick="showTab(2)" id="tab2" class="flex-1 py-5 text-2xl font-bold text-slate-300 uppercase">KARTEN</button>
  </div>
  <div id="content1" class="space-y-4 pb-12"></div>
  <div id="content2" class="hidden">
    <div class="text-center mb-6"><span id="counter" class="bg-violet-600 text-white px-8 py-2 rounded-full font-bold text-xl shadow-lg"></span></div>
    <div class="flashcard-zone">
      <div onclick="prev()" class="nav-area">❮</div>
      <div class="flip-card flex-1">
        <div id="card-inner" class="flip-inner">
          <div class="flip-front" onclick="toggleFlip()">
            <p id="f-main" class="text-6xl font-black text-center text-violet-700 leading-tight"></p>
          </div>
          <div class="flip-back" onclick="toggleFlip()">
            <p id="f-detail" class="text-violet-100 text-2xl font-bold text-center leading-relaxed mb-6"></p>
            <div class="h-1 w-20 bg-white/30 mb-6 rounded-full"></div>
            <p id="f-viet" class="text-4xl font-extrabold text-white text-center"></p>
          </div>
        </div>
      </div>
      <div onclick="next()" class="nav-area">❯</div>
    </div>
    <div class="flex justify-center gap-4 mt-12 pb-16">
        <button onclick="speakCurrent()" class="w-20 h-20 bg-white text-violet-600 rounded-3xl flex items-center justify-center text-3xl shadow-xl speaker-btn"><i class="fa-solid fa-volume-high"></i></button>
        <button onclick="random()" class="px-12 py-6 bg-violet-600 text-white rounded-3xl font-extrabold shadow-2xl uppercase tracking-widest text-xl">ZUFÄLLIG</button>
    </div>
  </div>
</div>
<div class="copyright">Made by BBQ with love</div>
<script>
const data = [
  {adj:"ausführlich", opp:"knapp", viet:"chi tiết/tỉ mỉ"},
  {adj:"begeistert", opp:"enttäuscht", viet:"hào hứng/nhiệt tình"},
  {adj:"bescheiden", opp:"eingebildet", viet:"khiêm tốn"},
  {adj:"ehemalig", opp:"aktuell", viet:"cựu/trước đây"},
  {adj:"eindeutig", opp:"unklar", viet:"rõ ràng/dứt khoát"},
  {adj:"ehrgeizig", opp:"faul", viet:"tham vọng"},
  {adj:"empfindlich", opp:"robust", viet:"nhạy cảm"},
  {adj:"erforderlich", opp:"unnötig", viet:"cần thiết (bắt buộc)"},
  {adj:"geduldig", opp:"ungeduldig", viet:"kiên nhẫn"},
  {adj:"großzügig", opp:"geizig", viet:"hào phóng"},
  {adj:"hartnäckig", opp:"nachgiebig", viet:"ngoan cố/kiên trì"},
  {adj:"hervorragend", opp:"schlecht", viet:"xuất sắc"},
  {adj:"lebendig", opp:"tot/still", viet:"sống động"},
  {adj:"mühsam", opp:"mühelos", viet:"vất vả/khó khăn"},
  {adj:"nachhaltig", opp:"kurzfristig", viet:"bền vững"},
  {adj:"neugierig", opp:"gleichgültig", viet:"tò mò"},
  {adj:"rücksichtsvoll", opp:"rücksichtslos", viet:"biết điều/chu đáo"},
  {adj:"selbstständig", opp:"abhängig", viet:"tự lập"},
  {adj:"umfangreich", opp:"begrenzt", viet:"sâu rộng/quy mô"},
  {adj:"verantwortlich", opp:"unbeteiligt", viet:"chịu trách nhiệm"},
  {adj:"zuverlässig", opp:"unzuverlässig", viet:"đáng tin cậy"},
  {adj:"auffällig", opp:"unauffällig", viet:"gây chú ý/nổi bật"},
  {adj:"bequem", opp:"unbequem", viet:"tiện lợi/thoải mái"},
  {adj:"erfolgreich", opp:"erfolglos", viet:"thành công"},
  {adj:"großartig", opp:"furchtbar", viet:"tuyệt vời"},
  {adj:"hilfreich", opp:"nutzlos", viet:"có ích"},
  {adj:"kompliziert", opp:"einfach", viet:"phức tạp"},
  {adj:"nützlich", opp:"schädlich", viet:"hữu ích"},
  {adj:"spannend", opp:"langweilig", viet:"hồi hộp/thú vị"},
  {adj:"überrascht", opp:"erwartet", viet:"ngạc nhiên"}
];

let current = 0;
function speak(text) {
  const msg = new SpeechSynthesisUtterance();
  msg.text = text;
  msg.lang = 'de-DE';
  window.speechSynthesis.speak(msg);
}
function speakCurrent() { speak(data[current].adj); }

function showTab(n){
  document.getElementById('content1').classList.toggle('hidden',n!==1);
  document.getElementById('content2').classList.toggle('hidden',n!==2);
  document.getElementById('tab1').className = n===1?'flex-1 py-5 tab-active text-2xl font-bold uppercase':'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  document.getElementById('tab2').className = n===2?'flex-1 py-5 tab-active text-2xl font-bold uppercase':'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  if(n===2) updateFlashcard();
}
function renderList(){
  document.getElementById('content1').innerHTML = data.map((item, i) => `
    <div class="bg-white p-8 rounded-3xl border border-slate-100 flex gap-8 shadow-sm items-center">
      <div class="text-violet-600 font-black opacity-20 text-4xl w-14 text-center font-sans">${i+1}</div>
      <div class="flex-1">
        <h3 class="font-bold text-slate-800 text-4xl mb-2">${item.adj}</h3>
        <p class="text-slate-400 text-lg font-bold uppercase tracking-wide mb-3">↔ ${item.opp}</p>
        <p class="text-violet-600 text-2xl font-extrabold">${item.viet}</p>
      </div>
      <button onclick="speak('${item.adj}')" class="w-16 h-16 bg-violet-50 text-violet-600 rounded-2xl flex items-center justify-center text-xl active:scale-90 transition-all"><i class="fa-solid fa-volume-high"></i></button>
    </div>`).join('');
}
function updateFlashcard(){
  const item = data[current];
  document.getElementById('f-main').textContent = item.adj;
  document.getElementById('f-detail').innerHTML = "Gegenteil: " + item.opp;
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}
function toggleFlip(){document.getElementById('card-inner').classList.toggle('flipped');}
function next(){current=(current+1)%data.length;updateFlashcard();}
function prev(){current=(current-1+data.length)%data.length;updateFlashcard();}
function random(){current=Math.floor(Math.random()*data.length);updateFlashcard();}
window.onload = renderList;
</script>
</body>
</html>
