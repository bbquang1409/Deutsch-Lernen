  "Alltag":"bg-blue-100 text-blue-700",
  "Jugendsprache":"bg-pink-100 text-pink-700",
  "Zeit":"bg-teal-100 text-teal-700",
  "Tempo":"bg-orange-100 text-orange-700",
  "Sprichwort":"bg-amber-100 text-amber-700",
  "Gefühle":"bg-rose-100 text-rose-700",
  "Führung":"bg-indigo-100 text-indigo-700",
  "Arbeit":"bg-cyan-100 text-cyan-700",
  "Kommunikation":"bg-green-100 text-green-700",
  "Ehrlichkeit":"bg-lime-100 text-lime-700",
  "Geld":"bg-yellow-100 text-yellow-800",
  "Bewertung":"bg-purple-100 text-purple-700",
  "Empörung":"bg-red-100 text-red-700",
  "Probleme":"bg-orange-100 text-orange-800",
  "Beziehungen":"bg-violet-100 text-violet-700",
  "Erfolg":"bg-emerald-100 text-emerald-700",
  "Misserfolg":"bg-red-100 text-red-600",
  "Irrtum":"bg-orange-100 text-orange-600",
  "Entscheidung":"bg-sky-100 text-sky-700",
  "Diskussion":"bg-indigo-100 text-indigo-600",
  "Kultur":"bg-amber-100 text-amber-800",
  "Derb":"bg-red-100 text-red-700",
  "default":"bg-violet-100 text-violet-700"
};

let current = 0;

function speak(text){
  const msg = new SpeechSynthesisUtterance();
  msg.text = text; msg.lang = 'de-DE';
  window.speechSynthesis.speak(msg);
}
function speakCurrent(){ speak(data[current].phrase); }

function showTab(n){
  document.getElementById('content1').classList.toggle('hidden', n!==1);
  document.getElementById('content2').classList.toggle('hidden', n!==2);
  document.getElementById('tab1').className = n===1 ? 'flex-1 py-5 tab-active text-2xl font-bold uppercase' : 'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  document.getElementById('tab2').className = n===2 ? 'flex-1 py-5 tab-active text-2xl font-bold uppercase' : 'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  if(n===2) updateFlashcard();
}

function renderList(){
  document.getElementById('content1').innerHTML = data.map((item, i) => {
    const cc = catColors[item.cat] || catColors["default"];
    return `
    <div class="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm">
      <div class="flex items-start gap-5">
        <div class="text-violet-400 font-black opacity-30 text-2xl w-10 text-center font-sans pt-1">${i+1}</div>
        <div class="flex-1 min-w-0">
          <div class="mb-2"><span class="cat-badge ${cc}">${item.cat}</span></div>
          <h3 class="font-black text-slate-800 text-2xl mb-2 leading-tight">${item.phrase}</h3>
          <p class="text-slate-500 text-base font-bold mb-2">&#128161; ${item.erkl}</p>
          <p class="text-violet-500 text-sm italic mb-2">z.B.: &ldquo;${item.bsp}&rdquo;</p>
          <p class="text-violet-600 text-xl font-extrabold">&#x1F1FB;&#x1F1F3; ${item.viet}</p>
        </div>
        <button onclick="speak('${item.phrase.replace(/'/g,"\\'")}\')" class="w-14 h-14 bg-violet-50 text-violet-500 rounded-2xl flex items-center justify-center text-xl active:scale-90 transition-all flex-none"><i class="fa-solid fa-volume-high"></i></button>
      </div>
    </div>`;
  }).join('');
}

function updateFlashcard(){
  const item = data[current];
  const cc = catColors[item.cat] || catColors["default"];
  document.getElementById('f-cat').className = `cat-badge ${cc} mb-3`;
  document.getElementById('f-cat').textContent = item.cat;
  document.getElementById('f-main').textContent = item.phrase;
  document.getElementById('f-erkl').textContent = item.erkl;
  document.getElementById('f-bsp').textContent = '\u201e' + item.bsp + '\u201c';
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}

function toggleFlip(){ document.getElementById('card-inner').classList.toggle('flipped'); }
function next(){ current=(current+1)%data.length; updateFlashcard(); }
function prev(){ current=(current-1+data.length)%data.length; updateFlashcard(); }
function random(){ current=Math.floor(Math.random()*data.length); updateFlashcard(); }
window.onload = renderList;
</script>
