<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Präpositionen B2–C1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fa;--card:#fff;--card2:#f0f2f9;--bd:#e2e6f3;
  --blue:#2f5de8;--blue-l:#eef1fd;--blue-m:#c7d3fb;
  --teal:#0f766e;--teal-l:#f0fdfa;--teal-m:#99f6e4;
  --amber:#b45309;--amber-l:#fef3c7;
  --rose:#be185d;--rose-l:#fdf2f8;
  --ok:#15803d;--ok-bg:#f0fdf4;--ok-bd:#86efac;
  --err:#b91c1c;--err-bg:#fef2f2;--err-bd:#fca5a5;
  --tx:#111827;--tx2:#4b5563;--mu:#9ca3af;
  --shadow:0 1px 3px rgba(30,60,200,.06),0 4px 16px rgba(30,60,200,.05);
  --r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-t{font-family:'Playfair Display',serif;font-size:20px;color:var(--teal)}
.hdr-b{font-size:10px;font-weight:700;background:var(--teal);color:#fff;padding:3px 11px;border-radius:99px}

/* VIEW TOGGLE */
.view-wrap{background:#fff;border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;gap:8px;align-items:center;justify-content:space-between}
.view-tabs{display:flex;gap:6px}
.vtab{font-size:12px;font-weight:600;padding:7px 16px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;transition:all .18s}
.vtab.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.vi-toggle{font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .18s}
.vi-toggle.show{background:var(--amber-l);border-color:var(--amber);color:var(--amber)}
.vi-dot{width:8px;height:8px;border-radius:50%;background:var(--mu);transition:.18s}
.vi-toggle.show .vi-dot{background:var(--amber)}

/* CAT TABS */
.cat-wrap{background:#fff;border-bottom:1px solid var(--bd);padding:8px 12px;overflow-x:auto;display:flex;gap:5px;scrollbar-width:none}
.cat-wrap::-webkit-scrollbar{display:none}
.cat-btn{flex:none;font-size:11px;font-weight:600;padding:6px 12px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .18s}
.cat-btn.on{background:var(--teal);color:#fff;border-color:var(--teal)}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:16px 14px 40px}

/* LIST VIEW */
.list-sec{display:none}.list-sec.on{display:block}
.cat-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--teal);padding:12px 0 8px;border-bottom:2px solid var(--teal-m);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cat-icon{font-size:18px}
.item-row{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:7px;box-shadow:var(--shadow);transition:.15s}
.item-row:active{border-color:var(--teal)}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.item-de{font-size:14.5px;font-weight:600;color:var(--tx);line-height:1.5}
.item-de em{color:var(--teal);font-style:normal}
.item-ex{font-size:12.5px;color:var(--tx2);margin-top:3px;line-height:1.55;font-style:italic}
.item-vi{font-size:12px;color:var(--amber);margin-top:5px;font-weight:500;display:none;padding:4px 8px;background:var(--amber-l);border-radius:6px}
.item-vi.show{display:block}
.item-type{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:99px;flex:none;margin-top:2px}
.type-adj{background:var(--blue-l);color:var(--blue)}
.type-nom{background:var(--rose-l);color:var(--rose)}
.type-vrb{background:var(--teal-l);color:var(--teal)}

/* FLASH VIEW */
.flash-sec{display:none}.flash-sec.on{display:block}
.flash-counter-wrap{text-align:center;margin-bottom:10px;}
.flash-counter{display:inline-block;background:var(--teal);color:#fff;padding:5px 22px;border-radius:99px;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(15,118,110,.2)}
.flash-progress{height:4px;background:var(--bd);border-radius:99px;margin-bottom:12px;overflow:hidden}
.flash-bar{height:100%;background:var(--teal);border-radius:99px;transition:width .3s}
.flashcard-zone{display:flex;align-items:stretch;justify-content:center;width:100%;max-width:680px;margin:0 auto;min-height:340px;}
.nav-area{width:64px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;color:rgba(15,118,110,.12);font-size:2.4rem;flex:none;user-select:none;transition:color .15s;}
.nav-area:active{color:rgba(15,118,110,.5);}
.flash-card{background:var(--card);border:1px solid var(--bd);border-radius:28px;flex:1;padding:28px 22px;box-shadow:0 4px 24px rgba(15,118,110,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;user-select:none;transition:transform .15s;}
.flash-card:active{transform:scale(.98)}
.flash-type{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;padding:3px 12px;border-radius:99px}
.flash-main{font-family:'Playfair Display',serif;font-size:24px;color:var(--tx);line-height:1.35;margin-bottom:6px}
.flash-main em{color:var(--teal);font-style:normal}
.flash-sub{font-size:13px;color:var(--tx2);font-style:italic;margin-bottom:10px}
.flash-reveal{font-size:13px;color:var(--mu);margin-top:8px}
.flash-meaning{display:none;margin-top:12px;padding:10px 16px;background:var(--teal-l);border-radius:10px;font-size:13.5px;color:var(--teal);font-weight:600}
.flash-meaning.show{display:block}
.flash-vi{display:none;margin-top:6px;padding:7px 14px;background:var(--amber-l);border-radius:8px;font-size:13px;color:var(--amber);font-weight:500}
.flash-vi.show{display:block}
.flash-bottom{display:flex;justify-content:center;gap:12px;margin-top:14px;}
.flash-random{padding:10px 24px;border-radius:99px;border:none;background:var(--teal);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;}
.flash-cat-lbl{font-size:11px;font-weight:600;color:var(--mu);text-align:center;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}

.copy{text-align:center;padding:24px 16px 48px;opacity:.3}
.copy-main{font-family:'Playfair Display',serif;font-size:18px}
.copy-sub{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

/* UEBUNGEN VIEW */
.ue-sec{display:none}.ue-sec.on{display:block}
.ue-intro{background:var(--teal-l);border:1px solid var(--teal-m);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--teal);margin-bottom:14px;line-height:1.6}
.ue-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.ue-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.ue-num{font-family:'Playfair Display',serif;font-size:16px;color:var(--teal)}
.ue-diff{font-size:11px;color:var(--mu);font-weight:600}
.ue-title{font-weight:700;font-size:13.5px;color:var(--tx2);margin-bottom:12px}
.ue-sent{font-size:13.5px;line-height:2.3;margin-bottom:4px}
.ue-select{border:1.5px solid var(--bd);border-radius:8px;padding:4px 9px;font-size:13px;font-family:inherit;background:#fff;color:var(--tx);cursor:pointer;outline:none}
.ue-select:focus{border-color:var(--teal)}
.ue-select.correct{border-color:var(--ok-bd);background:var(--ok-bg);color:var(--ok)}
.ue-select.wrong{border-color:var(--err-bd);background:var(--err-bg);color:var(--err)}
.ue-btn{margin-top:10px;padding:9px 22px;border-radius:99px;border:none;background:var(--teal);color:#fff;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.02em}
.ue-btn:active{opacity:.85}
.ue-score{display:none;margin-top:10px;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700;border:1.5px solid}
.ue-score.show{display:block}
.ue-text-block{background:var(--bg);border-radius:10px;padding:14px;font-size:13.5px;line-height:2.4}
</style>
<script>
// ===========================================
//  DEUTSCH-LERNEN LOGGING
// ===========================================
const _DL_SHEET = "https://script.google.com/macros/s/AKfycbw7uN5J6WwDG2vl5SgcpeeJ_ZnXDEaXLh-49VzYhQV11baq0pklFJEdhT660frW1kVS/exec";
const _DL_FILE  = "Praepositionen (B2)";
let _dlU = null;
function _dlUser() {
  if (_dlU) return _dlU;
  try { var s = localStorage.getItem('dl_user'); if (s) _dlU = JSON.parse(s); } catch(e) {}
  return _dlU;
}
function _dlLog(setName, score, total) {
  var u = _dlUser(); if (!u) return;
  fetch(_DL_SHEET, {
    method:'POST', mode:'no-cors',
    body: JSON.stringify({name:u.name, email:u.email, file:_DL_FILE, set:setName, score:score, total:total})
  }).catch(function(){});
}

</script>
</head>

function init(){
  buildCatTabs();

function buildCatTabs(){
  var wrap = document.getElementById('catWrap');
  wrap.innerHTML = '';
  var all = document.createElement('button');
  all.className = 'cat-btn on'; all.textContent = 'Alle';
  all.onclick = function(){ setCat(-1); }; wrap.appendChild(all);
  DATA.forEach(function(cat,i){
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat.icon + ' ' + cat.cat;
    btn.onclick = (function(idx){ return function(){ setCat(idx); }; })(i);
    wrap.appendChild(btn);
  });
}

function setCat(idx){
  currentCat = idx;
  document.querySelectorAll('.cat-btn').forEach(function(b,i){ b.classList.toggle('on', (idx===-1&&i===0)||(i===idx+1)); });
  if(currentView==='list') renderList();
  else{ buildFlashItems(); renderFlash(); }
}

// ── LIST VIEW ──
function renderList(){
  var area = document.getElementById('mainArea');
  area.innerHTML='';
  var toShow = currentCat===-1 ? DATA : [DATA[currentCat]];
  toShow.forEach(function(cat){
    var title = document.createElement('div'); title.className='cat-title';
    title.innerHTML = '<span class="cat-icon">'+cat.icon+'</span>'+cat.cat;
    area.appendChild(title);
    cat.items.forEach(function(item){
      var row = document.createElement('div'); row.className='item-row';
      var top = document.createElement('div'); top.className='item-top';
      var left = document.createElement('div');
      var de = document.createElement('div'); de.className='item-de'; de.innerHTML=item.de; left.appendChild(de);
      var ex = document.createElement('div'); ex.className='item-ex'; ex.innerHTML=item.ex; left.appendChild(ex);
      var dede = document.createElement('div'); dede.className='item-ex'; dede.style.color='var(--teal)'; dede.innerHTML='→ '+item.de_de; left.appendChild(dede);
      var vi = document.createElement('div'); vi.className='item-vi'+(showVI?' show':''); vi.textContent='🇻🇳 '+item.vi; left.appendChild(vi);
      top.appendChild(left);
      var tp = document.createElement('div'); tp.className='item-type type-'+item.type;
      tp.textContent={adj:'Adj',nom:'Nom',vrb:'Verb'}[item.type]; top.appendChild(tp);
      row.appendChild(top);
      area.appendChild(row);
    });
  });
}

function shuffleArr(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}

function buildSelect(id, options, answer){
  var opts = shuffleArr(options);
  var html = '<select class="ue-select" id="'+id+'" data-answer="'+answer.replace(/"/g,'&quot;')+'"><option value="">–</option>';
  opts.forEach(function(o){ html += '<option>'+o+'</option>'; });
  html += '</select>';
  return html;
}

function renderUebungen(){
  var area = document.getElementById('mainArea');
  area.innerHTML = '';
  var intro = document.createElement('div'); intro.className='ue-intro';
  intro.innerHTML = '📝 5 Übungen für B2–C1. Wähle die richtige Präposition (bzw. den richtigen Kasus) und klicke auf "Auswerten".';
  area.appendChild(intro);

  UE_EXERCISES.forEach(function(ex, exIdx){
    var card = document.createElement('div'); card.className='ue-card';
    var head = document.createElement('div'); head.className='ue-head';
    head.innerHTML = '<span class="ue-num">Übung '+(exIdx+1)+'</span><span class="ue-diff">'+ex.diff+'</span>';
    card.appendChild(head);
    var title = document.createElement('div'); title.className='ue-title'; title.textContent = ex.title;
    card.appendChild(title);

    if(ex.mode === 'items'){
      ex.items.forEach(function(item, i){
        var id = 'ue'+exIdx+'_'+i;
        var sentHtml = item.sentence.replace('{{b}}', buildSelect(id, item.options, item.answer));
        var sent = document.createElement('div'); sent.className='ue-sent';
        sent.innerHTML = (i+1)+'. '+sentHtml;
        card.appendChild(sent);
      });
    } else if(ex.mode === 'paragraph'){
      var block = document.createElement('div'); block.className='ue-text-block';
      var n = 0;
      var html = ex.text.replace(/\{\{b\}\}/g, function(){
        var id = 'ue'+exIdx+'_'+n;
        var bl = ex.blanks[n];
        n++;
        return buildSelect(id, bl.options, bl.answer);
      });
      block.innerHTML = html;
      card.appendChild(block);
    }

    var btn = document.createElement('button'); btn.className='ue-btn'; btn.textContent='Auswerten';
    btn.onclick = (function(idx){ return function(){ checkUe(idx); }; })(exIdx);
    card.appendChild(btn);
    var score = document.createElement('div'); score.className='ue-score'; score.id='ue-score-'+exIdx;
    card.appendChild(score);

    area.appendChild(card);
  });
}

function checkUe(exIdx){
  var card = document.querySelectorAll('.ue-card')[exIdx];
  var selects = card.querySelectorAll('.ue-select');
  var correct = 0;
  selects.forEach(function(s){
    var ans = s.getAttribute('data-answer');
    if(s.value === ans){
      s.classList.remove('wrong'); s.classList.add('correct'); correct++;
    } else {
      s.classList.remove('correct'); s.classList.add('wrong');
    }
  });
  var total = selects.length;
  var pct = Math.round(correct/total*100);
  var box = document.getElementById('ue-score-'+exIdx);
  box.classList.add('show');
  var emoji = pct>=90?'🏆':pct>=70?'👍':pct>=50?'💪':'📚';
  var col = pct>=90?'var(--ok)':pct>=70?'var(--amber)':'var(--err)';
  var bg = pct>=90?'var(--ok-bg)':pct>=70?'var(--amber-l)':'var(--err-bg)';
  box.style.color = col; box.style.background = bg; box.style.borderColor = col;
  _dlLog('Uebung', correct, total);
  box.innerHTML = emoji+' Ergebnis: '+correct+' / '+total+' ('+pct+'%)';
}

function renderFlash(){
  var area = document.getElementById('mainArea');
  area.innerHTML='';

  // progress bar
  var prog = document.createElement('div'); prog.className='flash-progress';
  var bar = document.createElement('div'); bar.className='flash-bar';
  bar.style.width=((flashIndex+1)/flashItems.length*100)+'%'; prog.appendChild(bar);
  area.appendChild(prog);

  // counter
  var cw = document.createElement('div'); cw.className='flash-counter-wrap';
  var ct = document.createElement('span'); ct.className='flash-counter';
  ct.textContent=(flashIndex+1)+' / '+flashItems.length; cw.appendChild(ct);
  area.appendChild(cw);

  var obj = flashItems[flashIndex];
  var item = obj.item;

  var catLbl = document.createElement('div'); catLbl.className='flash-cat-lbl'; catLbl.style.marginTop='10px'; catLbl.textContent=obj.cat; area.appendChild(catLbl);

  // zone with full-height side nav
  var zone = document.createElement('div'); zone.className='flashcard-zone';

  var prevArea = document.createElement('div'); prevArea.className='nav-area'; prevArea.innerHTML='&#10094;';
  prevArea.onclick=function(){ if(flashIndex>0){flashIndex--;flashRevealed=false;renderFlash();} };
  zone.appendChild(prevArea);

  var card = document.createElement('div'); card.className='flash-card';
  card.onclick=function(){ flashRevealed=!flashRevealed; renderFlash(); };

  var typeEl = document.createElement('div'); typeEl.className='flash-type';
  typeEl.textContent={adj:'Adjektiv + Präp.',nom:'Nomen + Präp.',vrb:'Verb + Präp.'}[item.type]||'';
  var typeBg={adj:'var(--blue-l)',nom:'var(--rose-l)',vrb:'var(--teal-l)'};
  var typeCol={adj:'var(--blue)',nom:'var(--rose)',vrb:'var(--teal)'};
  typeEl.style.cssText='background:'+typeBg[item.type]+';color:'+typeCol[item.type]+';font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 12px;border-radius:99px;margin-bottom:12px;';
  card.appendChild(typeEl);

  var main = document.createElement('div'); main.className='flash-main'; main.innerHTML=item.de; card.appendChild(main);
  var sub = document.createElement('div'); sub.className='flash-sub'; sub.innerHTML=item.ex; card.appendChild(sub);

  if(!flashRevealed){
    var reveal = document.createElement('div'); reveal.className='flash-reveal'; reveal.textContent='▶ Tippen zum Aufdecken';
    card.appendChild(reveal);
  } else {
    var meaning = document.createElement('div'); meaning.className='flash-meaning show'; meaning.innerHTML='→ '+item.de_de; card.appendChild(meaning);
    if(showVI){ var fvi = document.createElement('div'); fvi.className='flash-vi show'; fvi.textContent='🇻🇳 '+item.vi; card.appendChild(fvi); }
  }
  zone.appendChild(card);

  var nextArea = document.createElement('div'); nextArea.className='nav-area'; nextArea.innerHTML='&#10095;';
  nextArea.onclick=function(){ if(flashIndex<flashItems.length-1){flashIndex++;flashRevealed=false;renderFlash();} };
  zone.appendChild(nextArea);
  area.appendChild(zone);

  // random button
  var fb = document.createElement('div'); fb.className='flash-bottom';
  var rnd = document.createElement('button'); rnd.className='flash-random'; rnd.textContent='ZUFÄLLIG';
  rnd.onclick=function(){ flashIndex=Math.floor(Math.random()*flashItems.length); flashRevealed=false; renderFlash(); };
  fb.appendChild(rnd); area.appendChild(fb);
}

// ── VIEW SWITCH ──
function setView(v){
  currentView=v;
  document.querySelectorAll('.vtab').forEach(function(b,i){ b.classList.toggle('on',(v==='list'&&i===0)||(v==='flash'&&i===1)||(v==='ue'&&i===2)); });
  var catWrap=document.getElementById('catWrap');
  var viBtn=document.getElementById('viBtn');
  if(v==='ue'){
    catWrap.style.display='none';
    viBtn.style.display='none';
    renderUebungen();
  } else {
    catWrap.style.display='';
    viBtn.style.display='';
    if(v==='list') renderList();
    else{ buildFlashItems(); renderFlash(); }
  }
}

// ── VI TOGGLE ──
function toggleVI(){
  showVI=!showVI;
  var btn=document.getElementById('viBtn');
  btn.classList.toggle('show',showVI);
  if(currentView==='list') renderList();
  else if(currentView==='flash') renderFlash();
}

init();
</script>

</body>
</html>
