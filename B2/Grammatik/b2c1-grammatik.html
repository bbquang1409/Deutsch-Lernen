<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grammatik B2-C1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fa;--card:#fff;--card2:#f0f2f9;--bd:#e2e6f3;
  --blue:#2f5de8;--blue-l:#eef1fd;--blue-m:#c7d3fb;
  --purple:#6d28d9;--purple-l:#f3f0fe;
  --amber:#b45309;--amber-l:#fef3c7;
  --rose:#be185d;--rose-l:#fdf2f8;
  --ok:#15803d;--ok-bg:#f0fdf4;--ok-bd:#86efac;
  --er:#b91c1c;--er-bg:#fef2f2;--er-bd:#fca5a5;
  --tx:#111827;--tx2:#4b5563;--mu:#9ca3af;
  --shadow:0 1px 3px rgba(30,60,200,.06),0 4px 16px rgba(30,60,200,.05);
  --r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 0 var(--bd)}
.hdr-t{font-family:'Playfair Display',serif;font-size:21px;color:var(--blue);letter-spacing:-.2px}
.hdr-b{font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:3px 11px;border-radius:99px;letter-spacing:.07em}
.tab-wrap{background:#fff;border-bottom:1px solid var(--bd);padding:9px 14px;overflow-x:auto;display:flex;gap:6px;scrollbar-width:none}
.tab-wrap::-webkit-scrollbar{display:none}
.tab-btn{flex:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:99px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .18s}
.tab-btn.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(47,93,232,.25)}
.main{max-width:650px;margin:0 auto;padding:16px 14px 20px}
.sec{display:none}.sec.on{display:block;animation:fu .26s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.lvrow{display:flex;gap:6px;margin-bottom:14px}
.lv{font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 10px;border-radius:99px;text-transform:uppercase}
.lv-b1{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d}
.lv-b2{background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue-m)}
.lv-c1{background:var(--purple-l);color:var(--purple);border:1.5px solid #d8b4fe}
.theory-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:6px;box-shadow:var(--shadow)}
.theory-head{background:var(--blue);padding:15px 18px;display:flex;align-items:center;gap:10px}
.theory-ic{font-size:20px}
.theory-ht{font-family:'Playfair Display',serif;font-size:18px;color:#fff;line-height:1.25}
.theory-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px}
.tb{border-radius:10px;overflow:hidden}
.tb-h{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 13px}
.tb-b{font-size:13.5px;line-height:1.75;padding:10px 14px}
.tb-b b{font-weight:600}
.tb.c0 .tb-h{background:var(--blue-l);color:var(--blue)}.tb.c0 .tb-b{background:#f9fafe;color:var(--tx)}.tb.c0 .tb-b b{color:var(--blue)}
.tb.c1 .tb-h{background:var(--purple-l);color:var(--purple)}.tb.c1 .tb-b{background:#faf8ff;color:var(--tx)}.tb.c1 .tb-b b{color:var(--purple)}
.tb.c2 .tb-h{background:var(--amber-l);color:var(--amber)}.tb.c2 .tb-b{background:#fffdf5;color:var(--tx)}.tb.c2 .tb-b b{color:var(--amber)}
.tb.c3 .tb-h{background:var(--rose-l);color:var(--rose)}.tb.c3 .tb-b{background:#fff8fb;color:var(--tx)}.tb.c3 .tb-b b{color:var(--rose)}
.ex-divider{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.ex-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.ex-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:11px;box-shadow:var(--shadow)}
.ex-head{padding:11px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;background:var(--card2)}
.ex-tag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:99px;flex:none}
.tp-inp .ex-tag{background:var(--blue-l);color:var(--blue)}
.tp-mc  .ex-tag{background:var(--purple-l);color:var(--purple)}
.tp-dd  .ex-tag{background:var(--amber-l);color:var(--amber)}
.ex-htitle{font-size:13.5px;font-weight:600;color:var(--tx);flex:1}
.ex-hcount{font-size:11px;color:var(--mu);flex:none}
.ex-body{padding:11px 13px}
.xi{background:var(--card2);border:1.5px solid var(--bd);border-radius:10px;padding:12px 13px;margin-bottom:8px;transition:border-color .18s,background .18s}
.xi.ok{border-color:var(--ok-bd);background:var(--ok-bg)}
.xi.er{border-color:var(--er-bd);background:var(--er-bg)}
.xi-num{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.xi-q{font-size:13.5px;color:var(--tx);margin-bottom:9px;line-height:1.65}
.xinp{width:100%;background:#fff;border:1.5px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Inter',sans-serif;font-size:15px;padding:10px 13px;outline:none;transition:border-color .18s}
.xinp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,93,232,.1)}
.xi.ok .xinp{border-color:var(--ok-bd);color:var(--ok)}
.xi.er .xinp{border-color:var(--er-bd);color:var(--er)}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mc-btn{background:#fff;border:1.5px solid var(--bd);border-radius:9px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;padding:9px 11px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.35}
.mc-btn.sel{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}
.mc-btn.cc{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok);font-weight:600}
.mc-btn.cw{background:var(--er-bg);border-color:var(--er-bd);color:var(--er)}
.mc-btn.rc{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
.mc-btn.dis{pointer-events:none;opacity:.5}
.dd-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.dd-zone{display:flex;flex-wrap:wrap;gap:6px;min-height:42px;background:#fff;border:2px dashed var(--bd);border-radius:9px;padding:8px;margin-bottom:7px;transition:border-color .15s}
.dd-zone.ov{border-color:var(--blue);background:var(--blue-l)}
.dd-bank{display:flex;flex-wrap:wrap;gap:6px;min-height:32px}
.dd-chip{background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue-m);border-radius:7px;padding:5px 12px;font-size:13px;font-weight:500;cursor:grab;user-select:none;transition:opacity .15s;touch-action:none}
.dd-chip.placed{background:#f1f5f9;border-color:#cbd5e1;color:var(--tx2)}
.dd-chip.drag{opacity:.35}
.fb{margin-top:8px;font-size:13px;border-radius:8px;padding:8px 12px;display:none;font-weight:500;line-height:1.5}
.fb.show{display:block}
.fb.ok{background:var(--ok-bg);color:var(--ok)}
.fb.er{background:var(--er-bg);color:var(--er)}
.chk-btn{width:100%;margin-top:10px;padding:12px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(47,93,232,.18);transition:all .18s}
.chk-btn:active{opacity:.85}
.rst-btn{width:100%;margin-top:7px;padding:10px;border-radius:9px;border:1.5px solid var(--bd);background:#fff;color:var(--tx2);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;display:none}
.rst-btn:hover{border-color:var(--blue);color:var(--blue)}
.sc-bar{align-items:center;gap:12px;background:var(--card2);border:1.5px solid var(--bd);border-radius:10px;padding:11px 15px;margin-bottom:11px;display:none}
.sc-n{font-family:'Playfair Display',serif;font-size:28px;color:var(--tx)}
.sc-lbl{font-size:12px;color:var(--mu)}
.sc-emo{font-size:26px;margin-left:auto}
.copy{text-align:center;padding:32px 16px 52px;opacity:.3}
.copy-main{font-family:'Playfair Display',serif;font-size:22px;color:var(--tx);letter-spacing:.01em;line-height:1.35}
.copy-sub{font-size:10px;color:var(--tx2);margin-top:5px;letter-spacing:.1em;text-transform:uppercase}
</style>
</head>

var dragSrc=null,touchWd=null,touchCl=null;

function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}

function makeDDItem(item,iid,num){
  var xi=el("div","xi"); xi.id="xi-"+iid;
  xi.appendChild(el("div","xi-num","Aufgabe "+(num+1)));
  xi.appendChild(el("div","xi-q",item.q));
  xi.appendChild(el("div","dd-lbl","Dein Satz:"));
  var zone=el("div","dd-zone"); zone.id="zone-"+iid; xi.appendChild(zone);
  xi.appendChild(el("div","dd-lbl","W&ouml;rterbank:"));
  var bank=el("div","dd-bank"); bank.id="bank-"+iid;
  var words=item.words.slice().sort(function(){return Math.random()-.5;});
  words.forEach(function(w){var chip=el("div","dd-chip",w);chip.setAttribute("data-w",w);setupChip(chip,zone,bank);bank.appendChild(chip);});
  xi.appendChild(bank);
  var fb=el("div","fb"); fb.id="fb-"+iid; xi.appendChild(fb);
  return xi;
}

function setupChip(chip,zone,bank){
  chip.draggable=true;
  chip.addEventListener("dragstart",function(e){dragSrc=chip;chip.classList.add("drag");e.dataTransfer.effectAllowed="move";});
  chip.addEventListener("dragend",function(){chip.classList.remove("drag");dragSrc=null;document.querySelectorAll(".dd-zone").forEach(function(z){z.classList.remove("ov");});});
  [zone,bank].forEach(function(tgt){
    tgt.addEventListener("dragover",function(e){e.preventDefault();if(tgt.classList.contains("dd-zone"))tgt.classList.add("ov");});
    tgt.addEventListener("dragleave",function(){tgt.classList.remove("ov");});
    tgt.addEventListener("drop",function(e){e.preventDefault();tgt.classList.remove("ov");if(dragSrc){tgt.appendChild(dragSrc);if(tgt.classList.contains("dd-zone"))dragSrc.classList.add("placed");else dragSrc.classList.remove("placed");}});
  });
  chip.addEventListener("touchstart",function(e){
    touchWd=chip;var cl=chip.cloneNode(true);
    cl.style.cssText="position:fixed;opacity:.65;pointer-events:none;z-index:9999;";
    document.body.appendChild(cl);touchCl=cl;
    var t=e.touches[0];cl.style.left=(t.clientX-40)+"px";cl.style.top=(t.clientY-20)+"px";
    e.preventDefault();
  },{passive:false});
  chip.addEventListener("touchmove",function(e){
    if(!touchCl)return;var t=e.touches[0];
    touchCl.style.left=(t.clientX-40)+"px";touchCl.style.top=(t.clientY-20)+"px";
    document.querySelectorAll(".dd-zone").forEach(function(z){z.classList.remove("ov");});
    var hit=document.elementFromPoint(t.clientX,t.clientY);
    if(hit){var z=hit.closest(".dd-zone");if(z)z.classList.add("ov");}
    e.preventDefault();
  },{passive:false});
  chip.addEventListener("touchend",function(e){
    if(touchCl&&touchCl.parentNode)touchCl.parentNode.removeChild(touchCl);touchCl=null;
    if(!touchWd)return;var t=e.changedTouches[0];
    var hit=document.elementFromPoint(t.clientX,t.clientY);
    if(hit){var z=hit.closest(".dd-zone"),bk=hit.closest(".dd-bank");
      if(z){z.appendChild(touchWd);touchWd.classList.add("placed");z.classList.remove("ov");}
      else if(bk){bk.appendChild(touchWd);touchWd.classList.remove("placed");}
    }
    touchWd=null;document.querySelectorAll(".dd-zone").forEach(function(z){z.classList.remove("ov");});
    e.preventDefault();
  },{passive:false});
}

function checkDD(ti,ei){
  var ex=T[ti].ex[ei],sid=ti+"-"+ei,ok=0;
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii,zone=document.getElementById("zone-"+iid);
    var xi=document.getElementById("xi-"+iid),fb=document.getElementById("fb-"+iid);
    var got=Array.from(zone.children).map(function(c){var d=document.createElement("div");d.innerHTML=c.getAttribute("data-w")||c.innerHTML;return d.textContent.trim().toLowerCase();}).join(" ").replace(/\s+/g," ").trim();
    var d=document.createElement("div");d.innerHTML=item.ans;var exp=d.textContent.toLowerCase().replace(/\s+/g," ").trim();
    if(got===exp){ok++;xi.className="xi ok";fb.className="fb ok show";fb.textContent="\u2713 Richtig!";}
    else{xi.className="xi er";fb.className="fb er show";d.innerHTML=item.ans;fb.textContent="\u2717 Richtig: "+d.textContent;}
    Array.from(zone.children).forEach(function(c){c.style.pointerEvents="none";});
  });
  showScore(sid,ok,ex.items.length);
  document.getElementById("cb-"+sid).style.display="none";
  document.getElementById("rb-"+sid).style.display="block";
}

function resetDD(ti,ei){
  var ex=T[ti].ex[ei],sid=ti+"-"+ei;
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii,zone=document.getElementById("zone-"+iid),bank=document.getElementById("bank-"+iid);
    var xi=document.getElementById("xi-"+iid),fb=document.getElementById("fb-"+iid);
    xi.className="xi";fb.className="fb";fb.textContent="";
    Array.from(zone.children).forEach(function(c){c.classList.remove("placed");c.style.pointerEvents="";bank.appendChild(c);});
  });
  document.getElementById("sc-"+sid).style.display="none";
  document.getElementById("cb-"+sid).style.display="block";
  document.getElementById("rb-"+sid).style.display="none";
}

var ST={};
function gs(tid,ei){if(!ST[tid])ST[tid]={};if(!ST[tid][ei])ST[tid][ei]={done:{},sel:{}};return ST[tid][ei];}

function init(){
  var tabs=document.getElementById("tabs"),main=document.getElementById("main");
  T.forEach(function(t,ti){
    var btn=el("button","tab-btn"+(ti===0?" on":""),t.lb);
    btn.onclick=function(){showTab(ti);};tabs.appendChild(btn);
    var sec=el("div","sec"+(ti===0?" on":"")); sec.id="s"+ti;
    sec.appendChild(buildSection(t,ti));main.appendChild(sec);
  });
}

function buildSection(t,ti){
  var w=el("div");
  var lr=el("div","lvrow");t.lv.forEach(function(l){lr.appendChild(el("span","lv lv-"+l,l.toUpperCase()));});w.appendChild(lr);
  var tc=el("div","theory-card");
  var th=el("div","theory-head");th.appendChild(el("div","theory-ic",t.ic));th.appendChild(el("div","theory-ht",t.ti));tc.appendChild(th);
  var tb=el("div","theory-body");
  t.thy.forEach(function(b){var bl=el("div","tb c"+b.c);bl.appendChild(el("div","tb-h",b.h));bl.appendChild(el("div","tb-b",b.t));tb.appendChild(bl);});
  tc.appendChild(tb);w.appendChild(tc);
  w.appendChild(el("div","ex-divider","&Uuml;bungen"));
  t.ex.forEach(function(ex,ei){w.appendChild(buildEx(t,ti,ex,ei));});
  return w;
}

function buildEx(t,ti,ex,ei){
  var sid=ti+"-"+ei;
  var tpMap={inp:"tp-inp",mc:"tp-mc",dd:"tp-dd"};
  var lblMap={inp:"L&uuml;ckentext",mc:"Multiple Choice",dd:"Zuordnung"};
  var card=el("div","ex-card "+tpMap[ex.tp]);
  var hdr=el("div","ex-head");
  hdr.appendChild(el("div","ex-tag",lblMap[ex.tp]));
  hdr.appendChild(el("div","ex-htitle",ex.ti));
  hdr.appendChild(el("div","ex-hcount",ex.items.length+" Aufg."));
  card.appendChild(hdr);
  var body=el("div","ex-body");
  var sc=el("div","sc-bar");sc.id="sc-"+sid;sc.style.display="none";
  var sl=el("div");var sn=el("div","sc-n","");sn.id="scn-"+sid;sl.appendChild(sn);sl.appendChild(el("div","sc-lbl","Ergebnis"));sc.appendChild(sl);
  var se=el("div","sc-emo","");se.id="sce-"+sid;sc.appendChild(se);body.appendChild(sc);
  if(ex.tp==="dd"){
    ex.items.forEach(function(item,ii){body.appendChild(makeDDItem(item,sid+"-"+ii,ii));});
    var cb=el("button","chk-btn","Antworten pr&uuml;fen &#10003;");cb.id="cb-"+sid;
    cb.onclick=(function(a,b){return function(){checkDD(a,b);};})(ti,ei);body.appendChild(cb);
    var rb=el("button","rst-btn","\u21BA Neu versuchen");rb.id="rb-"+sid;
    rb.onclick=(function(a,b){return function(){resetDD(a,b);};})(ti,ei);body.appendChild(rb);
  } else {
    ex.items.forEach(function(item,ii){body.appendChild(buildItem(t,ti,ex,ei,item,ii));});
    var cb=el("button","chk-btn","Antworten pr&uuml;fen &#10003;");cb.id="cb-"+sid;
    cb.onclick=(function(a,b){return function(){ex.tp==="inp"?checkInp(a,b):checkMC(a,b);};})(ti,ei);body.appendChild(cb);
    var rb=el("button","rst-btn","\u21BA Neu versuchen");rb.id="rb-"+sid;
    rb.onclick=(function(a,b){return function(){resetEx(a,b);};})(ti,ei);body.appendChild(rb);
  }
  card.appendChild(body);return card;
}

function buildItem(t,ti,ex,ei,item,ii){
  var sid=ti+"-"+ei,iid=sid+"-"+ii;
  var xi=el("div","xi");xi.id="xi-"+iid;
  xi.appendChild(el("div","xi-num","Aufgabe "+(ii+1)));
  xi.appendChild(el("div","xi-q",item.q));
  if(ex.tp==="inp"){
    var inp=document.createElement("input");inp.className="xinp";inp.id="inp-"+iid;inp.type="text";
    inp.placeholder="Antwort \u2026";inp.autocomplete="off";inp.setAttribute("autocorrect","off");inp.setAttribute("spellcheck","false");
    xi.appendChild(inp);
  } else {
    var mc=el("div","mc-grid");
    item.op.forEach(function(opt,oi){
      var btn=el("button","mc-btn",opt);btn.id="mc-"+iid+"-"+oi;
      btn.onclick=(function(a,b,c,d){return function(){selMC(a,b,c,d);};})(ti,ei,ii,oi);mc.appendChild(btn);
    });xi.appendChild(mc);
  }
  var fb=el("div","fb");fb.id="fb-"+iid;xi.appendChild(fb);
  return xi;
}

function selMC(ti,ei,ii,oi){
  var sid=ti+"-"+ei,iid=sid+"-"+ii,st=gs(T[ti].id,ei);
  if(st.done[ii])return;st.sel[ii]=oi;
  var ex=T[ti].ex[ei];
  ex.items[ii].op.forEach(function(_,o){document.getElementById("mc-"+iid+"-"+o).className="mc-btn"+(o===oi?" sel":"");});
}

function checkMC(ti,ei){
  var ex=T[ti].ex[ei],sid=ti+"-"+ei,st=gs(T[ti].id,ei),ok=0;
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii,xi=document.getElementById("xi-"+iid),fb=document.getElementById("fb-"+iid);
    var chosen=st.sel[ii]!==undefined?st.sel[ii]:-1,isOk=chosen===item.a;
    if(isOk)ok++;
    item.op.forEach(function(_,o){
      var b=document.getElementById("mc-"+iid+"-"+o);b.style.cssText="";b.className="mc-btn dis";
      if(o===item.a)b.classList.add(isOk&&o===chosen?"cc":"rc");
      else if(o===chosen)b.classList.add("cw");
    });
    xi.className="xi "+(isOk?"ok":"er");fb.className="fb "+(isOk?"ok":"er")+" show";
    if(isOk){fb.textContent="\u2713 Richtig!";}
    else{var d=document.createElement("div");d.innerHTML=item.op[item.a];fb.textContent="\u2717 Richtig: "+d.textContent;}
    st.done[ii]=true;
  });
  showScore(sid,ok,ex.items.length);
  document.getElementById("cb-"+sid).style.display="none";
  document.getElementById("rb-"+sid).style.display="block";
}

function checkInp(ti,ei){
  var ex=T[ti].ex[ei],sid=ti+"-"+ei,ok=0;
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii,inp=document.getElementById("inp-"+iid);
    var xi=document.getElementById("xi-"+iid),fb=document.getElementById("fb-"+iid);
    var d=document.createElement("div");d.innerHTML=item.a;
    var exp=d.textContent.trim().toLowerCase(),val=inp.value.trim().toLowerCase();
    if(val===exp){ok++;xi.className="xi ok";fb.className="fb ok show";fb.textContent="\u2713 Richtig!";}
    else{xi.className="xi er";fb.className="fb er show";d.innerHTML=item.a;var ans=d.textContent;d.innerHTML=item.h;fb.textContent="\u2717 Richtig: "+ans+" \u2014 "+d.textContent;}
    inp.disabled=true;
  });
  showScore(sid,ok,ex.items.length);
  document.getElementById("cb-"+sid).style.display="none";
  document.getElementById("rb-"+sid).style.display="block";
}

function showScore(sid,ok,total){
  var bar=document.getElementById("sc-"+sid);bar.style.display="flex";
  document.getElementById("scn-"+sid).textContent=ok+"/"+total;
  var p=ok/total;
  document.getElementById("sce-"+sid).textContent=p===1?"\uD83C\uDFC6":p>=.7?"\uD83C\uDFAF":p>=.4?"\uD83D\uDCDA":"\uD83D\uDCAA";
  bar.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function resetEx(ti,ei){
  var ex=T[ti].ex[ei],sid=ti+"-"+ei;if(ST[T[ti].id])delete ST[T[ti].id][ei];
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii;document.getElementById("xi-"+iid).className="xi";
    var fb=document.getElementById("fb-"+iid);fb.className="fb";fb.textContent="";
    if(ex.tp==="inp"){var inp=document.getElementById("inp-"+iid);inp.value="";inp.disabled=false;}
    else{item.op.forEach(function(_,oi){var b=document.getElementById("mc-"+iid+"-"+oi);b.className="mc-btn";b.style.cssText="";});}
  });
  document.getElementById("sc-"+sid).style.display="none";
  document.getElementById("cb-"+sid).style.display="block";
  document.getElementById("rb-"+sid).style.display="none";
}

function showTab(i){
  document.querySelectorAll(".sec").forEach(function(s,idx){s.classList.toggle("on",idx===i);});
  document.querySelectorAll(".tab-btn").forEach(function(b,idx){b.classList.toggle("on",idx===i);});
  document.querySelectorAll(".tab-btn")[i].scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  window.scrollTo({top:0,behavior:"smooth"});
}
init();
</script>
</body>
</html>
