<style>
  :root{--blue:#8b5cf6;--ink:#2e1065;--bg:#f5f3ff;}

  .hdr{background:var(--ink);padding:45px 20px;text-align:center;color:white;}

  .flip-inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;cursor:pointer;}
  .flipped{transform:rotateY(180deg);}
  .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;box-shadow:0 25px 50px rgba(46,16,101,0.15);}

  .flip-back{background:linear-gradient(145deg,#2e1065,#8b5cf6);color:white;transform:rotateY(180deg);}

  .speaker-btn:active{transform:scale(0.8);}
  .cat-badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:2px 9px;border-radius:99px;margin-bottom:4px;}

  {adj:"engagiert",       syn:"motiviert, leidenschaftlich",  ant:"desinteressiert, gleichgültig",viet:"nhiệt tình, tận tâm", bsp:"Sie ist sehr engagiert in ihrer Arbeit.",     cat:"Arbeit"},
  {adj:"erfolgreich",     syn:"siegreich, leistungsstark",    ant:"erfolglos, gescheitert", viet:"thành công",                bsp:"Er ist ein erfolgreicher Unternehmer.",       cat:"Arbeit"},
  {adj:"erfahren",        syn:"kompetent, routiniert",        ant:"unerfahren, unbedarft",  viet:"có kinh nghiệm, lão luyện",bsp:"Sie ist eine erfahrene Chirurgin.",            cat:"Arbeit"},
  {adj:"flexibel",        syn:"anpassungsfähig, beweglich",   ant:"starr, unflexibel",      viet:"linh hoạt, dễ thích nghi", bsp:"Wir suchen flexible Mitarbeiter.",            cat:"Arbeit"},
  {adj:"qualifiziert",    syn:"kompetent, ausgebildet",       ant:"unqualifiziert, inkompetent",viet:"có năng lực, đủ điều kiện",bsp:"Wir brauchen qualifizierte Fachkräfte.",   cat:"Arbeit"},
  {adj:"sorgfältig",      syn:"genau, akkurat",               ant:"nachlässig, schlampig",  viet:"cẩn thận, tỉ mỉ",          bsp:"Er arbeitet immer sehr sorgfältig.",          cat:"Arbeit"},
  {adj:"stressig",        syn:"anspruchsvoll, belastend",     ant:"entspannend, ruhig",     viet:"căng thẳng, áp lực",        bsp:"Ihr Job ist sehr stressig.",                  cat:"Arbeit"},
  {adj:"teamfähig",       syn:"kooperativ, gesellig",         ant:"einzelgängerisch, unkooperativ",viet:"biết làm việc nhóm", bsp:"Teamfähigkeit ist sehr wichtig.",             cat:"Arbeit"},
  {adj:"zuverlässig",     syn:"verlässlich, beständig",       ant:"unzuverlässig, wankelmütig",viet:"đáng tin cậy",           bsp:"Ein zuverlässiger Partner ist wertvoll.",     cat:"Arbeit"},

  // ── Gesellschaft & Werte ──
  {adj:"demokratisch",    syn:"freiheitlich, partizipativ",   ant:"autoritär, diktatorisch",viet:"dân chủ",                   bsp:"Eine demokratische Gesellschaft braucht Teilhabe.",cat:"Gesellschaft"},
  {adj:"fair",            syn:"gerecht, unparteiisch",        ant:"unfair, ungerecht",      viet:"công bằng",                 bsp:"Es ist wichtig, fair zu sein.",               cat:"Gesellschaft"},
  {adj:"fortschrittlich", syn:"modern, innovativ",            ant:"rückständig, konservativ",viet:"tiến bộ, hiện đại",        bsp:"Das Land hat eine fortschrittliche Politik.", cat:"Gesellschaft"},
  {adj:"konservativ",     syn:"traditionell, bewahrend",      ant:"progressiv, modern",     viet:"bảo thủ, truyền thống",     bsp:"Er hat konservative Ansichten.",              cat:"Gesellschaft"},
  {adj:"sozial",          syn:"gemeinschaftlich, solidarisch",ant:"asozial, egoistisch",    viet:"xã hội, cộng đồng",         bsp:"Soziale Verantwortung ist wichtig.",          cat:"Gesellschaft"},
  {adj:"umweltbewusst",   syn:"nachhaltig, ökologisch",       ant:"umweltschädlich, rücksichtslos",viet:"có ý thức môi trường",bsp:"Immer mehr Menschen leben umweltbewusst.",   cat:"Gesellschaft"},

  // ── Häufig in B2-C1 Prüfungen ──

  {adj:"fundamental",     syn:"grundlegend, wesentlich",      ant:"unwichtig, oberflächlich",viet:"cơ bản, nền tảng",         bsp:"Das ist ein fundamentales Problem.",          cat:"Prüfung"},

];

const catColors = {
  "Charakter":    "bg-violet-100 text-violet-700",
  "Qualität":     "bg-blue-100 text-blue-700",
  "Gefühle":      "bg-rose-100 text-rose-700",
  "Intellekt":    "bg-indigo-100 text-indigo-700",
  "Verhalten":    "bg-orange-100 text-orange-700",
  "Beschreibung": "bg-pink-100 text-pink-700",
  "Situation":    "bg-amber-100 text-amber-800",
  "Arbeit":       "bg-teal-100 text-teal-700",
  "Gesellschaft": "bg-emerald-100 text-emerald-700",
  "Prüfung":      "bg-cyan-100 text-cyan-700"
};

let current = 0;

function speak(text){
  const msg = new SpeechSynthesisUtterance();
  msg.text = text; msg.lang = 'de-DE';
  window.speechSynthesis.speak(msg);
}
function speakCurrent(){ speak(data[current].adj); }

function showTab(n){
  document.getElementById('content1').classList.toggle('hidden', n!==1);
  document.getElementById('content2').classList.toggle('hidden', n!==2);
  document.getElementById('tab1').className = n===1 ? 'flex-1 py-5 tab-active text-2xl font-bold uppercase' : 'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  document.getElementById('tab2').className = n===2 ? 'flex-1 py-5 tab-active text-2xl font-bold uppercase' : 'flex-1 py-5 text-2xl font-bold text-slate-300 uppercase';
  if(n===2) updateFlashcard();
}

function renderList(){
  document.getElementById('content1').innerHTML = data.map((item, i) => {
    const cc = catColors[item.cat] || "bg-slate-100 text-slate-600";
    return `
    <div class="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm">
      <div class="flex items-start gap-5">
        <div class="text-violet-400 font-black opacity-25 text-2xl w-10 text-center pt-1">${i+1}</div>
        <div class="flex-1 min-w-0">
          <div class="mb-2"><span class="cat-badge ${cc}">${item.cat}</span></div>
          <h3 class="font-black text-slate-800 text-3xl mb-3 leading-tight">${item.adj}</h3>
          <div class="flex flex-col gap-1 mb-3">
            <p class="text-slate-500 text-sm font-bold"><span class="text-violet-400 mr-1">&#8776;</span> ${item.syn}</p>
            <p class="text-slate-400 text-sm font-bold"><span class="text-red-400 mr-1">&#8596;</span> ${item.ant}</p>
          </div>
          <p class="text-slate-400 text-sm italic mb-2">z.B.: &ldquo;${item.bsp}&rdquo;</p>
          <p class="text-violet-600 text-xl font-extrabold">&#x1F1FB;&#x1F1F3; ${item.viet}</p>
        </div>
        <button onclick="speak('${item.adj.replace(/'/g,"\\'")}\')" class="w-14 h-14 bg-violet-50 text-violet-500 rounded-2xl flex items-center justify-center text-xl active:scale-90 transition-all flex-none speaker-btn"><i class="fa-solid fa-volume-high"></i></button>
      </div>
    </div>`;
  }).join('');
}

function updateFlashcard(){
  const item = data[current];
  const cc = catColors[item.cat] || "bg-slate-100 text-slate-600";
  const catEl = document.getElementById('f-cat');
  catEl.className = 'cat-badge ' + cc + ' mb-3';
  catEl.textContent = item.cat;
  document.getElementById('f-main').textContent = item.adj;
  document.getElementById('f-syn').innerHTML  = '<span style="opacity:.7">&#8776; Synonym:</span> ' + item.syn;
  document.getElementById('f-ant').innerHTML  = '<span style="opacity:.7">&#8596; Gegenteil:</span> ' + item.ant;
  document.getElementById('f-bsp').textContent = '\u201e' + item.bsp + '\u201c';
  document.getElementById('f-viet').textContent = item.viet;
  document.getElementById('counter').textContent = `${current+1} / ${data.length}`;
  document.getElementById('card-inner').classList.remove('flipped');
}

function toggleFlip(){ document.getElementById('card-inner').classList.toggle('flipped'); }
function next(){ current=(current+1)%data.length; updateFlashcard(); }
function prev(){ current=(current-1+data.length)%data.length; updateFlashcard(); }
function random(){ current=Math.floor(Math.random()*data.length); updateFlashcard(); }
window.onload = renderList;
</script>
</body>
</html>
