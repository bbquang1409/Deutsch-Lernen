<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsche Phonetik</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;min-height:100vh;color:#1a2336;display:flex;flex-direction:column;align-items:center}
.header{background:#1a2336;width:100%;padding:20px 16px;text-align:center}
.header h1{color:#fff;font-size:22px;font-weight:800}
.header h1 span{color:#4ecdc4}
.header p{color:#8fa3bf;font-size:13px;margin-top:4px}
.cards{display:flex;flex-direction:column;gap:16px;padding:28px 16px;width:100%;max-width:480px}
.card{background:#fff;border-radius:20px;padding:24px 20px;display:flex;align-items:center;gap:20px;text-decoration:none;color:#1a2336;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:2.5px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.card:hover{border-color:#4ecdc4;transform:translateY(-3px);box-shadow:0 8px 24px rgba(78,205,196,0.2)}
.card:active{transform:scale(0.97)}
.icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.icon.teal{background:linear-gradient(135deg,#4ecdc4,#2bb5ac)}
.icon.navy{background:linear-gradient(135deg,#2d3f5a,#1a2336)}
.card-text h2{font-size:18px;font-weight:800;margin-bottom:4px}
.card-text p{font-size:13px;color:#8fa3bf;line-height:1.4}
.badge{display:inline-block;background:#e8faf8;color:#0e9488;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-top:6px}
.badge.navy{background:#e8edf4;color:#2d3f5a}
</style>
</head>
<body>
<div class="header">
  <h1>Deutsche <span>Phonetik</span></h1>
  <p>Wähle eine Lektion aus</p>
</div>
<div class="cards">
  <a href="Alphabet.html" class="card">
    <div class="icon teal">🔤</div>
    <div class="card-text">
      <h2>Das Alphabet</h2>
      <p>26 Buchstaben + Umlaute (Ä Ö Ü ß) + Buchstabieralphabet. Jeden Buchstaben anhören.</p>
      <span class="badge">30 Buchstaben · Audio</span>
    </div>
  </a>
  <a href="Ausspracheregeln.html" class="card">
    <div class="icon navy">📖</div>
    <div class="card-text">
      <h2>Ausspracheregeln</h2>
      <p>Ausspracheregeln: ei, ie, eu, ch, sch, st/sp, ss/ß… Wörter anklicken zum Anhören.</p>
      <span class="badge navy">11 Regeln · Beispiele</span>
    </div>
  </a>
</div>
</body>
</html>
