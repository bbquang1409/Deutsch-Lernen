<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nominativ & Akkusativ</title>
<style>
:root {
  --bg: #f2f1ed;
  --card: #ffffff;
  --border: #e0ded6;
  --text: #1a1917;
  --text2: #5c5a57;
  --text3: #9a9892;
  --teal: #0f6e56;
  --teal-l: #e1f5ee;
  --teal-m: #1d9e75;
  --red: #a32d2d;
  --red-l: #fcebeb;
  --amber: #854f0b;
  --amber-l: #faeeda;
  --blue: #185fa5;
  --blue-l: #e6f1fb;
  --blue-m: #378add;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── HOME ── */
.home-header{
  background:var(--teal);
  padding:2rem 1.25rem 1.5rem;
  color:#fff;
}
.home-header h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.01em;}
.home-header p{font-size:0.78rem;opacity:0.72;margin-top:4px;}
.home-totals{
  display:flex;gap:10px;margin-top:1rem;
}
.home-stat{
  background:rgba(255,255,255,0.14);
  border-radius:10px;
  padding:8px 14px;
  font-size:0.75rem;
  text-align:center;
}
.home-stat strong{display:block;font-size:1.1rem;font-weight:700;}

.home-body{flex:1;padding:1rem 1rem 2rem;}
.home-body h2{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:10px;}

.level-card{
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--border);
  padding:1rem 1.1rem;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  transition:transform 0.12s,box-shadow 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.level-card:active{transform:scale(0.97);}
.level-card.done{border-color:var(--teal-m);}

.level-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.level-info{flex:1;min-width:0;}
.level-title{font-size:1rem;font-weight:700;color:var(--text);}
.level-desc{font-size:0.75rem;color:var(--text2);margin-top:2px;line-height:1.4;}
.level-meta{display:flex;align-items:center;gap:8px;margin-top:6px;}
.diff-badge{
  font-size:0.65rem;font-weight:700;
  padding:2px 8px;border-radius:20px;
  text-transform:uppercase;letter-spacing:0.04em;
}
.d1{background:#e1f5ee;color:#0f6e56;}
.d2{background:#e6f1fb;color:#185fa5;}
.d3{background:#faeeda;color:#854f0b;}
.d4{background:#faece7;color:#993c1d;}
.d5{background:#f7c1c1;color:#a32d2d;}
.level-score-txt{font-size:0.72rem;color:var(--text3);}

.mini-progress{
  height:3px;background:var(--border);border-radius:2px;
  overflow:hidden;margin-top:6px;
}
.mini-progress-fill{height:100%;background:var(--teal-m);border-radius:2px;transition:width 0.4s;}

.level-chevron{color:var(--text3);font-size:1.2rem;flex-shrink:0;}

/* ── EXERCISE SCREEN ── */
.ex-header{
  background:var(--teal);
  padding:0.9rem 1rem;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
}
.back-btn{
  background:rgba(255,255,255,0.18);
  border:none;color:#fff;
  width:36px;height:36px;border-radius:50%;
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:active{background:rgba(255,255,255,0.3);}
.ex-header-info{flex:1;min-width:0;}
.ex-header-title{font-size:0.95rem;font-weight:700;color:#fff;}
.ex-header-sub{font-size:0.7rem;color:rgba(255,255,255,0.7);margin-top:1px;}
.ex-score-chip{
  background:rgba(255,255,255,0.18);
  border-radius:20px;padding:4px 11px;
  font-size:0.78rem;font-weight:700;color:#fff;
  flex-shrink:0;
}

.ex-progress{height:3px;background:rgba(255,255,255,0.2);}
.ex-progress-fill{height:100%;background:#fff;transition:width 0.4s;}

.ex-body{flex:1;padding:0.875rem 0.875rem 3rem;}

.q-list{display:flex;flex-direction:column;gap:0.75rem;}
.q-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:0.875rem 1rem;
}
.q-num{
  font-size:0.62rem;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;
}
.q-sent{
  font-size:1.02rem;line-height:1.8;
  display:flex;flex-wrap:wrap;align-items:baseline;gap:0 1px;
}
.blank{
  display:inline-block;
  min-width:46px;padding:1px 6px;
  border-bottom:2px solid #b0ada5;
  text-align:center;
  border-radius:4px 4px 0 0;
  font-size:0.95rem;
  cursor:pointer;
  transition:all 0.13s;
  -webkit-tap-highlight-color:transparent;
}
.blank:active{opacity:0.7;}
.blank.sel{border-bottom-color:var(--blue-m);background:var(--blue-l);}
.blank.ok{border-bottom-color:var(--teal-m);background:var(--teal-l);color:var(--teal);font-weight:700;cursor:default;}
.blank.bad{border-bottom-color:var(--red);background:var(--red-l);color:var(--red);}
.blank.rev{border-bottom-color:var(--blue-m);background:var(--blue-l);color:var(--blue);cursor:default;}

.opts-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.opt{
  padding:7px 16px;border-radius:22px;
  border:1.5px solid var(--border);
  background:var(--bg);
  font-size:0.9rem;font-weight:600;
  cursor:pointer;color:var(--text);
  transition:all 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.opt:active{transform:scale(0.94);background:var(--teal-l);border-color:var(--teal-m);color:var(--teal);}

.analysis{
  margin-top:10px;padding:10px 12px;
  border-radius:8px;border-left:3px solid;
  font-size:0.79rem;line-height:1.55;
}
.analysis.wrong{background:#fff8f3;border-color:var(--amber);color:#3d2506;}
.analysis.hint{background:var(--teal-l);border-color:var(--teal-m);color:#063d28;}
.analysis-label{
  font-size:0.65rem;font-weight:800;
  text-transform:uppercase;letter-spacing:0.07em;
  margin-bottom:5px;opacity:0.65;
}
.ktag{
  display:inline-block;font-size:0.67rem;font-weight:700;
  padding:1px 7px;border-radius:10px;margin-right:4px;
  vertical-align:middle;
}
.ktag-n{background:var(--blue-l);color:var(--blue);}
.ktag-a{background:var(--amber-l);color:var(--amber);}

.hint-row{display:flex;justify-content:flex-end;margin-top:8px;}
.hint-btn{
  font-size:0.72rem;color:var(--text3);
  background:none;border:none;cursor:pointer;
  text-decoration:underline;padding:2px 0;
}

/* Result */
.result{
  text-align:center;padding:3rem 1rem 2rem;
}
.result-big{font-size:4rem;font-weight:800;color:var(--teal);line-height:1;}
.result-pct{font-size:0.85rem;color:var(--text2);margin-top:6px;}
.result-msg{font-size:1rem;margin-top:14px;color:var(--text);line-height:1.5;}
.result-btns{display:flex;flex-direction:column;gap:10px;margin-top:24px;max-width:260px;margin-left:auto;margin-right:auto;}
.btn-primary{
  padding:12px 0;border-radius:10px;
  background:var(--teal);color:#fff;border:none;
  font-size:0.9rem;font-weight:700;cursor:pointer;
}
.btn-secondary{
  padding:11px 0;border-radius:10px;
  background:var(--card);color:var(--teal);
  border:1.5px solid var(--teal-m);
  font-size:0.9rem;font-weight:700;cursor:pointer;
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <h1>Nominativ &amp; Akkusativ</h1>
    <p>Miteinander! Deutsch A1 · Grammatikübungen</p>
    <div class="home-totals">
      <div class="home-stat"><strong id="ht-correct">0</strong>Richtig</div>

      <div class="home-stat"><strong id="ht-pct">0%</strong>Fortschritt</div>
    </div>
  </div>
  <div class="home-body">
    <h2>Wähle eine Übung</h2>
    <div id="level-list"></div>
  </div>
</div>

<!-- EXERCISE SCREEN -->
<div class="screen" id="screen-ex">
  <div class="ex-header">
    <button class="back-btn" onclick="goHome()">&#8592;</button>
    <div class="ex-header-info">
      <div class="ex-header-title" id="ex-title"></div>
      <div class="ex-header-sub" id="ex-sub"></div>
    </div>

  </div>
  <div class="ex-progress"><div class="ex-progress-fill" id="ex-bar" style="width:0%"></div></div>
  <div class="ex-body" id="ex-body"></div>
</div>

};

// ─── HELPERS ────────────────────────────────────────────────────────────────
function tabStats(ti){
  let c=0,tot=0,filled=0;
  TABS[ti].sentences.forEach((s,si)=>s.blanks.forEach((b,bi)=>{
    tot++;
    if(S.ans[ti][si][bi]!==null||S.rev[ti][si][bi]) filled++;
    if(S.ans[ti][si][bi]===b.answer) c++;
  }));
  return{c,tot,filled,pct:Math.round(filled/tot*100)};
}
function totalStats(){
  let c=0,tot=0;
  TABS.forEach((t,ti)=>t.sentences.forEach((s,si)=>s.blanks.forEach((b,bi)=>{
    tot++;if(S.ans[ti][si][bi]===b.answer)c++;
  })));
  return{c,tot};
}
function isDone(ti){
  return TABS[ti].sentences.every((s,si)=>s.blanks.every((_,bi)=>S.rev[ti][si][bi]||S.ans[ti][si][bi]!==null));
}

// ─── SCREENS ────────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){
  S.tab=null; S.sel=null;
  renderHome();
  showScreen('screen-home');
}

function openTab(ti){
  S.tab=ti; S.sel=null;
  renderEx();
  showScreen('screen-ex');
}

// ─── RENDER HOME ────────────────────────────────────────────────────────────
function renderHome(){
  const{c,tot}=totalStats();
  document.getElementById('ht-correct').textContent=c;
  document.getElementById('ht-total').textContent=tot;
  document.getElementById('ht-pct').textContent=Math.round(c/tot*100)+'%';

  const diffC=['','d1','d2','d3','d4','d5'];
  document.getElementById('level-list').innerHTML=TABS.map((t,i)=>{
    const{c,tot,pct}=tabStats(i);
    const done=isDone(i);
    return`<div class="level-card${done?' done':''}" onclick="openTab(${i})">
      <div class="level-icon" style="background:${t.iconBg}">${t.icon}</div>
      <div class="level-info">
        <div class="level-title">${t.title}</div>
        <div class="level-desc">${t.desc}</div>
        <div class="level-meta">
          <span class="diff-badge ${diffC[t.diff]}">${t.diffLabel}</span>
          <span class="level-score-txt">${c}/${tot} richtig${done?' · ✓ Fertig':''}</span>
        </div>
        <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="level-chevron">›</div>
    </div>`;
  }).join('');
}

// ─── RENDER EXERCISE ────────────────────────────────────────────────────────
function renderEx(){
  const ti=S.tab, tab=TABS[ti];
  const{c,tot,pct}=tabStats(ti);
  document.getElementById('ex-title').textContent=tab.title+' – '+tab.diffLabel;
  document.getElementById('ex-sub').textContent=tab.desc;
  document.getElementById('ex-chip').textContent=c+'/'+tot;
  document.getElementById('ex-bar').style.width=pct+'%';

  if(isDone(ti)){
    const p=Math.round(c/tot*100);
    const msg=p===100?'🎯 Perfekt! Alle richtig!':p>=80?'👍 Sehr gut! Fast perfekt.':p>=60?'📖 Gut! Noch ein bisschen üben.':'💪 Weiter so! Du schaffst das.';
    document.getElementById('ex-body').innerHTML=`<div class="result">
      <div class="result-big">${c}/${tot}</div>
      <div class="result-pct">${p}% richtig</div>
      <div class="result-msg">${msg}</div>
      <div class="result-btns">
        <button class="btn-primary" onclick="resetTab(${ti})">↺ Nochmal üben</button>
        <button class="btn-secondary" onclick="goHome()">← Zurück zur Übersicht</button>
      </div>
    </div>`;
    return;
  }

  document.getElementById('ex-body').innerHTML='<div class="q-list">'+
    tab.sentences.map((s,si)=>buildCard(ti,si,s)).join('')+'</div>';
}

function buildCard(ti,si,s){
  const parts=s.text;
  let sent='';
  parts.forEach((p,pi)=>{
    if(p) sent+=`<span>${p}</span>`;
    if(pi<s.blanks.length){
      const b=s.blanks[pi];
      const ans=S.ans[ti][si][pi], rev=S.rev[ti][si][pi];
      const isSel=S.sel&&S.sel[0]===ti&&S.sel[1]===si&&S.sel[2]===pi;
      let cls='blank';
      if(rev) cls+=' rev';
      else if(ans===b.answer) cls+=' ok';
      else if(ans!==null) cls+=' bad';
      else if(isSel) cls+=' sel';
      const clickable=!rev&&ans!==b.answer;
      const show=rev?b.answer:(ans||'_____');
      sent+=`<span class="${cls}"${clickable?` onclick="selBlank(${ti},${si},${pi})"`:''} style="cursor:${clickable?'pointer':'default'}">${show}</span>`;
    }
  });

  let analysis='';
  s.blanks.forEach((b,bi)=>{
    const ans=S.ans[ti][si][bi], rev=S.rev[ti][si][bi];
    if(rev)
      analysis+=`<div class="analysis hint"><div class="analysis-label">Grammatik-Erklärung</div>${b.analysis}</div>`;
    else if(ans!==null&&ans!==b.answer)
      analysis+=`<div class="analysis wrong"><div class="analysis-label">⚠ Falsch – Warum?</div>${b.analysis}<br><b>Richtige Antwort: „${b.answer}"</b></div>`;
  });

  let opts='';
  if(S.sel&&S.sel[0]===ti&&S.sel[1]===si){
    const bi=S.sel[2], b=s.blanks[bi];
    if(!S.rev[ti][si][bi]&&S.ans[ti][si][bi]!==b.answer)
      opts=`<div class="opts-row">${s.opts.map(o=>`<button class="opt" onclick="choose(${ti},${si},${bi},'${o}')">${o}</button>`).join('')}</div>`;
  }

  const allFilled=s.blanks.every((_,bi)=>S.ans[ti][si][bi]!==null||S.rev[ti][si][bi]);
  const hint=!allFilled?`<div class="hint-row"><button class="hint-btn" onclick="reveal(${ti},${si})">Lösung anzeigen</button></div>`:'';

  return`<div class="q-card" id="qc-${ti}-${si}">
    <div class="q-num">Satz ${si+1} von ${TABS[ti].sentences.length}</div>
    <div class="q-sent">${sent}</div>
    ${opts}${analysis}${hint}
  </div>`;
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function selBlank(ti,si,bi){
  S.sel=(S.sel&&S.sel[0]===ti&&S.sel[1]===si&&S.sel[2]===bi)?null:[ti,si,bi];
  renderEx();
}

function choose(ti,si,bi,val){
  S.ans[ti][si][bi]=val;
  const b=TABS[ti].sentences[si].blanks[bi];
  if(val===b.answer){
    const next=TABS[ti].sentences[si].blanks.findIndex((_,i)=>i>bi&&S.ans[ti][si][i]===null&&!S.rev[ti][si][i]);
    S.sel=next!==-1?[ti,si,next]:null;
  }
  renderEx();
  // scroll card into view smoothly
  setTimeout(()=>{
    const el=document.getElementById(`qc-${ti}-${si}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

function reveal(ti,si){
  TABS[ti].sentences[si].blanks.forEach((_,bi)=>{S.rev[ti][si][bi]=true;S.ans[ti][si][bi]=null;});
  S.sel=null;
  renderEx();
}

function resetTab(ti){
  S.ans[ti]=TABS[ti].sentences.map(s=>s.blanks.map(()=>null));
  S.rev[ti]=TABS[ti].sentences.map(s=>s.blanks.map(()=>false));
  S.sel=null;
  renderEx();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
goHome();
</script>
</body>
</html>
