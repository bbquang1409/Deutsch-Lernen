<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Syntax – Grammatik B1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--s:#ffffff;--s2:#e8eef5;--bd:rgba(0,0,0,0.08);
  --a:#0d9488;--a2:#4f46e5;--a3:#d97706;--a4:#7c3aed;
  --tx:#1e293b;--mu:#64748b;
  --ok:#16a34a;--er:#dc2626;
  --ok-bg:rgba(22,163,74,.08);--er-bg:rgba(220,38,38,.08);
  --ok-bd:rgba(22,163,74,.3);--er-bd:rgba(220,38,38,.3);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

.hdr{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:12px 16px 8px;display:flex;align-items:center;gap:12px}
.hdr-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.hdr-t{font-family:'DM Serif Display',serif;font-size:20px;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;white-space:nowrap}
.hdr-b{font-size:10px;font-weight:600;color:var(--mu);letter-spacing:.06em;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.name-inp{border:1.5px solid var(--bd);border-radius:99px;background:var(--s2);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;outline:none;width:130px;transition:border-color .2s}
.name-inp:focus{border-color:var(--a)}.name-inp::placeholder{color:var(--mu)}
.timer-wrap{display:flex;align-items:center;gap:6px;background:var(--s2);border:1.5px solid var(--bd);border-radius:99px;padding:5px 12px}
.timer-dig{font-family:'DM Serif Display',serif;font-size:16px;color:var(--tx);letter-spacing:.03em;min-width:46px;text-align:right}
.timer-dig.warn{color:var(--er);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.timer-btn{background:var(--a);border:none;border-radius:99px;color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;padding:3px 10px;cursor:pointer;transition:background .2s}
.timer-btn:hover{background:var(--a2)}

.tabs{display:flex;overflow-x:auto;gap:6px;padding:10px 14px;background:var(--s);border-bottom:1px solid var(--bd);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:99px;border:1.5px solid var(--bd);background:var(--bg);color:var(--mu);cursor:pointer;transition:all .18s;white-space:nowrap}
.tab.on{background:var(--a);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 8px rgba(13,148,136,.3)}
.tab:hover:not(.on){border-color:var(--a);color:var(--a)}

.main{padding:14px;max-width:680px;margin:0 auto}
.sec{display:none}.sec.on{display:block;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.tc{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tc h2{font-family:'DM Serif Display',serif;font-size:21px;color:var(--tx);margin-bottom:14px;line-height:1.25}
.lv-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.lv{font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 10px;border-radius:99px;text-transform:uppercase}
.lv-b1{background:rgba(13,148,136,.1);color:var(--a);border:1px solid rgba(13,148,136,.25)}
.lv-b2{background:rgba(79,70,229,.1);color:var(--a2);border:1px solid rgba(79,70,229,.25)}

.tb{border-left:3px solid var(--a);border-radius:0 10px 10px 0;padding:11px 14px;margin-bottom:9px;background:rgba(13,148,136,.05)}
.tb.p{border-left-color:var(--a2);background:rgba(79,70,229,.05)}
.tb.g{border-left-color:var(--a3);background:rgba(217,119,6,.05)}
.tb.k{border-left-color:var(--er);background:rgba(220,38,38,.05)}
.tb .lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--a);text-transform:uppercase;margin-bottom:4px}
.tb.p .lbl{color:var(--a2)}.tb.g .lbl{color:var(--a3)}.tb.k .lbl{color:var(--er)}
.tb p{font-size:14px;line-height:1.7;color:var(--tx)}.tb b,.tb strong{font-weight:700}

.xcard{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.xhdr{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.xicn{width:30px;height:30px;border-radius:8px;background:rgba(13,148,136,.1);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.xtit{font-size:14px;font-weight:600;color:var(--tx)}.xsub{font-size:11px;color:var(--mu);margin-top:1px}
.xbody{padding:12px 14px}

.xi{background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:13px;margin-bottom:9px;transition:border-color .2s,background .2s}
.xi.ok{border-color:var(--ok-bd);background:var(--ok-bg)}
.xi.er{border-color:var(--er-bd);background:var(--er-bg)}
.xnum{font-size:10px;color:var(--mu);font-weight:600;letter-spacing:.06em;margin-bottom:5px;text-transform:uppercase}
.xq{font-size:14px;line-height:1.6;color:var(--tx);margin-bottom:9px}

.xinp{width:100%;background:var(--s);border:1.5px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 13px;outline:none;transition:border-color .2s}
.xinp:focus{border-color:var(--a2)}
.xi.ok .xinp{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
.xi.er .xinp{border-color:var(--er);color:var(--er);background:var(--er-bg)}

.mcopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px}
@media(max-width:420px){.mcopts{grid-template-columns:1fr}}
.mcb{background:var(--s);border:1.5px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;cursor:pointer;text-align:left;transition:all .15s;line-height:1.35}
.mcb:hover:not(.dis){border-color:var(--a);color:var(--a);background:rgba(13,148,136,.04)}
.mcb:active:not(.dis){transform:scale(.98)}
.mcb.cc{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok);font-weight:600}
.mcb.cw{background:var(--er-bg);border-color:var(--er-bd);color:var(--er)}
.mcb.rc{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
.mcb.dis{pointer-events:none;opacity:.45}

.pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:34px}
.chip{padding:5px 13px;border-radius:99px;background:rgba(79,70,229,.08);border:1.5px solid rgba(79,70,229,.25);color:var(--a2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;display:inline-block}
.chip:hover{background:var(--a2);color:#fff;border-color:transparent}
.chip.used{opacity:.25;pointer-events:none}
.azone{min-height:42px;border:2px dashed var(--bd);border-radius:10px;display:flex;flex-wrap:wrap;gap:6px;padding:7px 9px;background:var(--bg);align-items:center}
.pchip{padding:4px 12px;border-radius:99px;background:var(--a2);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-block}
.pchip:hover{background:var(--er)}
.azone.ok-z{border-color:var(--ok-bd);background:var(--ok-bg)}
.azone.er-z{border-color:var(--er-bd);background:var(--er-bg)}

.fb{margin-top:8px;font-size:13px;border-radius:8px;padding:8px 11px;display:none;line-height:1.5}
.fb.show{display:block}.fb.ok{background:var(--ok-bg);color:var(--ok)}.fb.er{background:var(--er-bg);color:var(--er)}

.chkbtn{width:100%;margin-top:8px;padding:11px;border-radius:10px;border:none;background:var(--a2);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.chkbtn:hover{background:var(--a)}.chkbtn:active{opacity:.85}
.rstbtn{width:100%;padding:9px;border-radius:10px;border:1.5px solid var(--bd);background:transparent;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;transition:all .2s}
.rstbtn:hover{border-color:var(--a3);color:var(--a3)}

.scbar{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin-bottom:12px}
.scn{font-size:26px;font-weight:700;font-family:'DM Serif Display',serif;color:var(--a)}
.sclbl{font-size:12px;color:var(--mu)}.scemo{font-size:22px;margin-left:auto}

.ft{text-align:center;font-size:11px;color:var(--mu);padding:20px 16px 40px;letter-spacing:.04em}
.ft span{color:var(--er)}
</style>
</head>

// TIMER
var tSecs=0,tRun=false,tInt=null;
function toggleTimer(){
  if(!tRun){tRun=true;document.getElementById("timerBtn").textContent="\u23F8";
    tInt=setInterval(function(){tSecs++;var m=String(Math.floor(tSecs/60)).padStart(2,"0"),s=String(tSecs%60).padStart(2,"0");var el=document.getElementById("timerDig");el.textContent=m+":"+s;el.className="timer-dig"+(tSecs>600?" warn":"");},1000);
  }else{tRun=false;document.getElementById("timerBtn").textContent="\u25B6";clearInterval(tInt);}
}

var mcDone={};var scores={};

function init(){
  var tabsEl=document.getElementById("tabsEl"),mainEl=document.getElementById("mainEl");
  TABS.forEach(function(t,ti){
    var btn=document.createElement("button");
    btn.className="tab"+(ti===0?" on":"");
    btn.innerHTML=t.lb;
    btn.onclick=function(){showTab(ti);};
    tabsEl.appendChild(btn);

    var sec=document.createElement("div");
    sec.className="sec"+(ti===0?" on":"");
    sec.id="sec-"+t.id;

    // theory card
    var tc=document.createElement("div");tc.className="tc";
    var lvRow='<div class="lv-row">'+t.lv.map(function(l){return '<span class="lv lv-'+l+'">'+l.toUpperCase()+'</span>';}).join("")+'</div>';
    tc.innerHTML=lvRow+'<h2>'+t.ti+'</h2>'+t.theory.map(function(r){return '<div class="tb'+(r.cl?" "+r.cl:"")+'"><div class="lbl">'+r.lb+'</div><p>'+r.tx+'</p></div>';}).join("");
    sec.appendChild(tc);

    // exercise cards
    t.ex.forEach(function(ex,ei){
      var sid=t.id+"-"+ei;
      scores[sid]={ok:0,total:ex.items.length,done:0};
      var card=document.createElement("div");card.className="xcard";
      card.innerHTML='<div class="xhdr"><div class="xicn">'+ex.ic+'</div><div><div class="xtit">'+ex.ti+'</div><div class="xsub">'+(ex.tp==="inp"?"Erg&auml;nze das Verb":ex.tp==="ro"?"W&ouml;rter ordnen":"Multiple Choice")+'</div></div></div>';
      var body=document.createElement("div");body.className="xbody";

      // score bar placeholder (prepended for inp and ro, inserted inline for mc)
      var scHtml='<div class="scbar" id="sc-'+sid+'" style="display:none"><div><div class="scn" id="scn-'+sid+'">0/0</div><div class="sclbl">Ergebnis</div></div><div class="scemo" id="sce-'+sid+'">&#x1F3AF;</div></div>';

      if(ex.tp==="inp"){
        body.innerHTML=scHtml;
        ex.items.forEach(function(item,ii){
          var iid=sid+"-"+ii;
          var xi=document.createElement("div");xi.className="xi";xi.id="xi-"+iid;
          xi.innerHTML='<div class="xnum">Aufgabe '+(ii+1)+'</div><div class="xq">'+item.q+'</div><input class="xinp" id="inp-'+iid+'" placeholder="Antwort&hellip;" autocomplete="off" autocorrect="off" spellcheck="false"><div class="fb" id="fb-'+iid+'"></div>';
          body.appendChild(xi);
        });
        var chk=document.createElement("button");chk.className="chkbtn";chk.textContent="Antworten pr\u00FCfen";chk.id="cb-"+sid;
        chk.onclick=function(){checkInp(sid,ex);};body.appendChild(chk);
        var rst=document.createElement("button");rst.className="rstbtn";rst.textContent="\u21BA Zur\u00FCcksetzen";rst.id="rb-"+sid;rst.style.display="none";
        rst.onclick=function(){resetInp(sid,ex);};body.appendChild(rst);

      } else if(ex.tp==="mc"){
        body.innerHTML=scHtml;
        ex.items.forEach(function(item,ii){
          var iid=sid+"-"+ii;
          var xi=document.createElement("div");xi.className="xi";xi.id="xi-"+iid;
          var cols=item.op.length<=2?'style="grid-template-columns:1fr 1fr"':'';
          var opts=item.op.map(function(op,oi){return '<button class="mcb" id="mc-'+iid+'-'+oi+'" onclick="checkMC(\''+iid+'\','+oi+','+item.a+','+item.op.length+',\''+sid+'\')">'+op+'</button>';}).join("");
          xi.innerHTML='<div class="xnum">Aufgabe '+(ii+1)+'</div><div class="xq">'+item.q+'</div><div class="mcopts" '+cols+'>'+opts+'</div><div class="fb" id="fb-'+iid+'"></div>';
          body.appendChild(xi);
        });

      } else if(ex.tp==="ro"){
        body.innerHTML=scHtml;
        ex.items.forEach(function(item,ii){
          var iid=sid+"-"+ii;
          // Strip trailing punctuation from each word token so chips never contain . , etc.
          var words=item.w.split(" / ").map(function(w){return w.replace(/[.,!?;:]+$/,"");});
          var shuf=[].concat(words).sort(function(){return Math.random()-.5;});
          var xi=document.createElement("div");xi.className="xi";xi.id="xi-"+iid;xi.setAttribute("data-answer",item.a);
          var chips=shuf.map(function(w,wi){return '<span class="chip" id="chip-'+iid+'-'+wi+'" data-word="'+w+'" onclick="addChip(this,\''+iid+'\')">'+w+'</span>';}).join("");
          xi.innerHTML='<div class="xnum">Aufgabe '+(ii+1)+'</div><div class="xq">Ordne die W&ouml;rter zu einem Satz:</div><div class="pool" id="pool-'+iid+'">'+chips+'</div><div class="azone" id="zone-'+iid+'"></div><div class="fb" id="fb-'+iid+'"></div>';
          body.appendChild(xi);
        });
        var chk2=document.createElement("button");chk2.className="chkbtn";chk2.textContent="S\u00E4tze pr\u00FCfen";chk2.id="cb-"+sid;
        chk2.onclick=function(){checkReorder(sid,ex);};body.appendChild(chk2);
        var rst2=document.createElement("button");rst2.className="rstbtn";rst2.textContent="\u21BA Zur\u00FCcksetzen";rst2.id="rb-"+sid;rst2.style.display="none";
        rst2.onclick=function(){resetReorder(sid,ex);};body.appendChild(rst2);
      }

      card.appendChild(body);sec.appendChild(card);
    });
    mainEl.appendChild(sec);
  });
}

function checkInp(sid,ex){
  var ok=0;
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii;
    var inp=document.getElementById("inp-"+iid);
    var val=inp.value.trim().toLowerCase();
    var ans=item.a.toLowerCase();
    var fb=document.getElementById("fb-"+iid);
    var xi=document.getElementById("xi-"+iid);
    inp.disabled=true;
    if(val===ans){xi.className="xi ok";fb.className="fb ok show";fb.textContent="\u2713 Richtig!";ok++;}
    else{xi.className="xi er";fb.className="fb er show";fb.textContent="\u2717 L\u00F6sung: "+item.a+(item.h?" \u2014 "+item.h:"");}
  });
  var sc=document.getElementById("sc-"+sid);
  document.getElementById("scn-"+sid).textContent=ok+"/"+ex.items.length;
  document.getElementById("sce-"+sid).textContent=ok===ex.items.length?"&#x1F3C6;":ok>ex.items.length/2?"&#x1F44D;":"&#x1F4DA;";
  sc.style.display="flex";
  document.getElementById("cb-"+sid).style.display="none";
  document.getElementById("rb-"+sid).style.display="block";
}
function resetInp(sid,ex){
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii;
    document.getElementById("xi-"+iid).className="xi";
    var inp=document.getElementById("inp-"+iid);inp.value="";inp.disabled=false;
    var fb=document.getElementById("fb-"+iid);fb.className="fb";fb.textContent="";
  });
  document.getElementById("sc-"+sid).style.display="none";
  document.getElementById("cb-"+sid).style.display="block";
  document.getElementById("rb-"+sid).style.display="none";
}

function checkMC(iid,chosen,correct,optCount,sid){
  if(mcDone[iid])return;mcDone[iid]=true;
  for(var oi=0;oi<optCount;oi++){var b=document.getElementById("mc-"+iid+"-"+oi);if(b)b.className="mcb dis";}
  var fb=document.getElementById("fb-"+iid),xi=document.getElementById("xi-"+iid);
  var cb=document.getElementById("mc-"+iid+"-"+chosen),rb=document.getElementById("mc-"+iid+"-"+correct);
  if(chosen===correct){
    cb.className="mcb cc";xi.className="xi ok";fb.className="fb ok show";fb.textContent="\u2713 Richtig!";
    scores[sid].ok=(scores[sid].ok||0)+1;
  }else{
    cb.className="mcb cw";if(rb)rb.className="mcb rc";xi.className="xi er";fb.className="fb er show";fb.textContent="\u2717 Nicht ganz. Richtig: Option "+(correct+1);
  }
  scores[sid].done=(scores[sid].done||0)+1;
  if(scores[sid].done>=scores[sid].total){
    var ok=scores[sid].ok||0,tot=scores[sid].total;
    var sc=document.getElementById("sc-"+sid);
    document.getElementById("scn-"+sid).textContent=ok+"/"+tot;
    document.getElementById("sce-"+sid).textContent=ok===tot?"&#x1F3C6;":ok>tot/2?"&#x1F44D;":"&#x1F4DA;";
    if(sc)sc.style.display="flex";
  }
}

function addChip(chip,iid){
  if(chip.classList.contains("used"))return;
  chip.classList.add("used");
  var zone=document.getElementById("zone-"+iid);
  var p=document.createElement("span");p.className="pchip";p.textContent=chip.dataset.word;
  p.onclick=function(){chip.classList.remove("used");zone.removeChild(p);};
  zone.appendChild(p);
}
function normRO(s){return s.trim().replace(/[.,!?;:]+$/,"").toLowerCase();}
function checkReorder(sid,ex){
  var ok=0;
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii;
    var zone=document.getElementById("zone-"+iid);
    var ans=Array.from(zone.querySelectorAll(".pchip")).map(function(c){return c.textContent;}).join(" ");
    var fb=document.getElementById("fb-"+iid),xi=document.getElementById("xi-"+iid);
    var correct=normRO(ans)===normRO(item.a);
    if(correct){xi.className="xi ok";zone.className="azone ok-z";fb.className="fb ok show";fb.textContent="\u2713 Richtig!";ok++;}
    else{xi.className="xi er";zone.className="azone er-z";fb.className="fb er show";fb.textContent="\u2717 Richtig: "+item.a.replace(/[.,!?;:]+$/,"");}
  });
  document.getElementById("scn-"+sid).textContent=ok+"/"+ex.items.length;
  document.getElementById("sce-"+sid).textContent=ok===ex.items.length?"&#x1F3C6;":ok>ex.items.length/2?"&#x1F44D;":"&#x1F4DA;";
  document.getElementById("sc-"+sid).style.display="flex";
  document.getElementById("cb-"+sid).style.display="none";
  document.getElementById("rb-"+sid).style.display="block";
}
function resetReorder(sid,ex){
  ex.items.forEach(function(item,ii){
    var iid=sid+"-"+ii;
    document.getElementById("xi-"+iid).className="xi";
    var zone=document.getElementById("zone-"+iid);zone.className="azone";zone.innerHTML="";
    document.getElementById("fb-"+iid).className="fb";
    document.querySelectorAll("[id^='chip-"+iid+"']").forEach(function(c){c.classList.remove("used");});
  });
  document.getElementById("sc-"+sid).style.display="none";
  document.getElementById("cb-"+sid).style.display="block";
  document.getElementById("rb-"+sid).style.display="none";
}

function showTab(i){
  document.querySelectorAll(".sec").forEach(function(s,idx){s.classList.toggle("on",idx===i);});
  document.querySelectorAll(".tab").forEach(function(b,idx){b.classList.toggle("on",idx===i);});
  document.querySelectorAll(".tab")[i].scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  window.scrollTo({top:0,behavior:"smooth"});
}
init();
</script>
</body>
