<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>ShadowEcho</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 40px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
}

#text {
  font-size: 22px;
  margin: 20px;
}

#result {
  font-size: 20px;
  margin-top: 20px;
  color: green;
}
</style>

</head>

<body>

<h2>🎧 ShadowEcho</h2>

<div id="text">Nhấn Play để bắt đầu</div>

<button onclick="play()">▶️ Play</button> <button onclick="stop()">⏹ Stop</button>

<div id="result"></div>

<script>
const audio = new Audio("2_04_Miteinander_B11_KB_L5_A3c.mp3");

let sentences = [
  {s:0.5, e:3.2, t:"Guten Morgen, wie geht es dir?"},
  {s:3.5, e:6.5, t:"Ich habe heute viel zu tun."}
];

let index = 0;
let playing = false;
let token = 0;

let recognition;
let resultText = "";

function play(){
  index = 0;
  next();
}

function stop(){
  playing = false;
  audio.pause();
  token++;
}

function next(){
  if(index >= sentences.length) return;

  let s = sentences[index];
  document.getElementById("text").innerText = s.t;

  playSentence(s);
}

function playSentence(s){
  const myToken = ++token;

  audio.pause();
  audio.currentTime = s.s;

  audio.play().catch(()=>{});

  audio.ontimeupdate = ()=>{
    if(myToken !== token) return;

    if(audio.currentTime >= s.e){
      audio.pause();
      audio.ontimeupdate = null;

      startRecording();
    }
  };
}

function startRecording(){
  if(!('webkitSpeechRecognition' in window)){
    document.getElementById("result").innerText = "Trình duyệt không hỗ trợ mic";
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "de-DE";
  recognition.continuous = false;

  resultText = "";

  recognition.onresult = (e)=>{
    resultText = e.results[0][0].transcript;
  };

  recognition.onend = ()=>{
    evaluate(resultText);
  };

  recognition.start();
}

function evaluate(user){
  let origin = sentences[index].t.toLowerCase();

  let oWords = origin.split(" ");
  let uWords = user.toLowerCase().split(" ");

  let correct = 0;

  oWords.forEach(w=>{
    if(uWords.includes(w)) correct++;
  });

  let score = Math.round(correct / oWords.length * 100);

  document.getElementById("result").innerText =
    "Bạn nói: " + user + " | Điểm: " + score + "%";

  index++;
  setTimeout(next, 1000);
}
</script>

</body>
</html>
