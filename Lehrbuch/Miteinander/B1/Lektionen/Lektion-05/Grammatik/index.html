<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>ShadowEcho</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 40px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#text {
  font-size: 22px;
  margin: 20px;
  font-weight: bold;
}

#result {
  font-size: 18px;
  margin-top: 20px;
  color: green;
}
</style>

</head>

<body>

<h2>🎧 ShadowEcho</h2>

<div id="text">Nhấn Play để bắt đầu</div>

<button onclick="startApp()">▶️ Play</button> <button onclick="stopApp()">⏹ Stop</button>

<div id="result"></div>

<script>
const audio = new Audio("2_04_Miteinander_B11_KB_L5_A3c.mp3");

const sentences = [
  {s:0.5, e:3.2, t:"Guten Morgen, wie geht es dir?"},
  {s:3.5, e:6.5, t:"Ich habe heute viel zu tun."}
];

let index = 0;
let token = 0;
let running = false;

let recognition;
let resultText = "";

function startApp(){
  running = true;
  index = 0;
  next();
}

function stopApp(){
  running = false;
  token++;
  audio.pause();
  audio.currentTime = 0;
  document.getElementById("text").innerText = "Đã dừng";
}

function next(){
  if(!running) return;

  if(index >= sentences.length){
    document.getElementById("text").innerText = "Hoàn thành!";
    return;
  }

  const s = sentences[index];
  document.getElementById("text").innerText = s.t;

  playSentence(s);
}

function playSentence(s){
  const myToken = ++token;

  audio.pause();
  audio.currentTime = s.s;

  audio.play().catch(()=>{});

  audio.ontimeupdate = function(){
    if(myToken !== token) return;

    if(audio.currentTime >= s.e){
      audio.pause();
      audio.ontimeupdate = null;

      setTimeout(startRecording, 300);
    }
  };
}

function startRecording(){
  if(!running) return;

  if(!('webkitSpeechRecognition' in window)){
    document.getElementById("result").innerText = "Trình duyệt không hỗ trợ mic";
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "de-DE";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  resultText = "";

  recognition.onresult = function(e){
    resultText = e.results[0][0].transcript;
  };

  recognition.onerror = function(){
    document.getElementById("result").innerText = "Lỗi nhận diện giọng nói";
  };

  recognition.onend = function(){
    evaluate(resultText);
  };

  recognition.start();
}

function evaluate(user){
  if(!running) return;

  const origin = sentences[index].t.toLowerCase();

  const oWords = origin.split(" ");
  const uWords = user.toLowerCase().split(" ");

  let correct = 0;

  oWords.forEach(w=>{
    if(uWords.includes(w)) correct++;
  });

  const score = Math.round(correct / oWords.length * 100);

  document.getElementById("result").innerText =
    "Bạn nói: " + user + " | Điểm: " + score + "%";

  index++;

  setTimeout(next, 1200);
}
</script>

</body>
</html>
