<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shadowing – Lektion 5 A3c</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --surface: #1a2535;
  --surface2: #243044;
  --border: #2e3f58;
  --blue: #3b82f6;
  --blue-lt: #1e3a5f;
  --green: #22c55e;
  --green-lt: #14532d;
  --rose: #f43f5e;
  --rose-lt: #4c0519;
  --amber: #f59e0b;
  --amber-lt: #451a03;
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ── HEADER ── */
.hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  flex-shrink: 0;
}
.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.hdr-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
}
.hdr h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  color: var(--text);
  line-height: 1.2;
}
.loop-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
}
.loop-badge.active { color: var(--amber); border-color: var(--amber); }
.loop-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .2s;
}
.loop-dot.lit { background: var(--amber); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  background: var(--border);
  border-radius: 99px;
  height: 3px;
}
.progress-fill {
  height: 3px;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--blue), var(--accent));
  transition: width .4s ease;
  width: 0%;
}

/* ── SENTENCE NAV ── */
.snav {
  flex-shrink: 0;
  padding: 10px 12px 6px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.snav::-webkit-scrollbar { display: none; }
.snav-btn {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  font-family: 'Outfit', sans-serif;
}
.snav-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.snav-btn.done {
  background: var(--green-lt);
  border-color: var(--green);
  color: var(--green);
}

/* ── MAIN CONTENT ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── SENTENCE CARD ── */
.sentence-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
}
.sentence-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--accent));
}
.speaker-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.sentence-text {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  line-height: 1.45;
  color: var(--text);
}
.sentence-de { font-size: 13px; color: var(--muted); margin-top: 8px; font-style: italic; }

/* playing animation */
.sentence-card.playing { border-color: var(--blue); }
.sentence-card.playing .sentence-text { color: #fff; }

/* ── WAVE VISUALIZER ── */
.wave-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 32px;
  margin: 4px 0;
}
.wave-bar {
  width: 3px;
  border-radius: 99px;
  background: var(--blue);
  height: 6px;
  transition: height .1s;
}
.playing .wave-bar { animation: wave .6s ease-in-out infinite; }
.wave-bar:nth-child(1) { animation-delay: 0s; }
.wave-bar:nth-child(2) { animation-delay: .1s; }
.wave-bar:nth-child(3) { animation-delay: .2s; }
.wave-bar:nth-child(4) { animation-delay: .3s; }
.wave-bar:nth-child(5) { animation-delay: .2s; }
.wave-bar:nth-child(6) { animation-delay: .1s; }
.wave-bar:nth-child(7) { animation-delay: 0s; }
@keyframes wave {
  0%, 100% { height: 6px; }
  50% { height: 22px; }
}

/* ── LOOP STATUS ── */
.loop-status {
  display: flex;
  gap: 5px;
  justify-content: center;
  margin: 2px 0;
}
.lp { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all .2s; }
.lp.done { background: var(--amber); transform: scale(1.2); }
.lp.current { background: var(--blue); box-shadow: 0 0 6px var(--blue); }

/* ── CONTROLS ── */
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.ctrl-btn {
  padding: 13px 8px;
  border: none;
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all .15s;
  user-select: none;
}
.ctrl-btn:active { transform: scale(.95); }
.ctrl-btn .icon { font-size: 22px; }
.ctrl-btn .lbl { font-size: 11px; letter-spacing: .5px; }

.btn-play  { background: #1e3a5f; color: var(--accent); border: 1.5px solid var(--blue); }
.btn-play.active { background: var(--blue); color: #fff; }
.btn-loop  { background: var(--amber-lt); color: var(--amber); border: 1.5px solid #78350f; }
.btn-loop.active { background: var(--amber); color: #000; }
.btn-rec   { background: #1c1917; color: var(--rose); border: 1.5px solid #7f1d1d; }
.btn-rec.recording { background: var(--rose); color: #fff; animation: pulse-rec 1s infinite; }
@keyframes pulse-rec { 0%,100%{opacity:1} 50%{opacity:.7} }

/* ── SCORE CARD ── */
.score-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.score-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 3px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  flex-shrink: 0;
  transition: all .4s;
}
.score-circle.great { border-color: var(--green); color: var(--green); background: var(--green-lt); }
.score-circle.ok    { border-color: var(--amber); color: var(--amber); background: var(--amber-lt); }
.score-circle.low   { border-color: var(--rose);  color: var(--rose);  background: var(--rose-lt); }
.score-info { flex: 1; }
.score-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.score-transcript { font-size: 11px; color: var(--muted); line-height: 1.5; font-style: italic; }

/* ── TRANSCRIPT CARD ── */
.transcript-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
}
.transcript-title {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.transcript-line {
  font-size: 13px; line-height: 1.7; color: var(--muted);
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: color .15s;
  display: flex; gap: 8px;
}
.transcript-line:last-child { border-bottom: none; }
.transcript-line.active { color: var(--accent); font-weight: 600; }
.transcript-line:hover { color: var(--text); }
.tl-num {
  font-size: 11px; font-weight: 700; color: var(--border);
  min-width: 18px; padding-top: 2px;
}
.tl-num.active { color: var(--blue); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 10px 16px 14px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.nav-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
}
.nav-btn:not(:disabled):hover { border-color: var(--blue); color: var(--accent); }
.nav-btn:disabled { opacity: .3; cursor: default; }
.nav-btn.primary {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-tag">Lektion 5 · A3c · Shadowing</div>
      <h1>Reparaturcafé – Dialog</h1>
    </div>
    <div class="loop-badge" id="loopBadge">
      <div class="loop-dot" id="ld1"></div>
      <div class="loop-dot" id="ld2"></div>
      <div class="loop-dot" id="ld3"></div>
      <span id="loopLabel">3×</span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="globalProgress"></div>
  </div>
</div>

<!-- SENTENCE NAV -->
<div class="snav" id="snav"></div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- Sentence card -->
  <div class="sentence-card" id="sentenceCard">
    <div class="speaker-label" id="speakerLabel">SPRECHER</div>
    <div class="sentence-text" id="sentenceText">–</div>
    <div class="wave-wrap" id="waveWrap">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <div class="loop-status" id="loopStatus">
      <div class="lp" id="lp0"></div>
      <div class="lp" id="lp1"></div>
      <div class="lp" id="lp2"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn btn-play" id="btnPlay" onclick="handlePlay()">
      <span class="icon" id="playIcon">▶️</span>
      <span class="lbl" id="playLabel">HÖREN</span>
    </button>
    <button class="ctrl-btn btn-loop" id="btnLoop" onclick="handleLoop()">
      <span class="icon">🔁</span>
      <span class="lbl">LOOP 3×</span>
    </button>
    <button class="ctrl-btn btn-rec" id="btnRec" onclick="handleRecord()">
      <span class="icon" id="recIcon">🎤</span>
      <span class="lbl" id="recLabel">SPRECHEN</span>
    </button>
  </div>

  <!-- Score -->
  <div class="score-card" id="scoreCard" style="display:none">
    <div class="score-circle" id="scoreCircle">–</div>
    <div class="score-info">
      <div class="score-title" id="scoreTitle">Ergebnis</div>
      <div class="score-transcript" id="scoreTranscript"></div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript-card">
    <div class="transcript-title">📄 Vollständiger Dialog</div>
    <div id="transcriptList"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Zurück</button>
  <button class="nav-btn primary" id="btnNext" onclick="navigate(1)">Weiter →</button>
</div>

<!-- AUDIO -->
<audio id="audio" preload="auto">
  <source src="2_04_Miteinander_B11_KB_L5_A3c.mp3" type="audio/mpeg">
</audio>

<script>
/* ============================================================
   DATA – Sentences with approximate timestamps (seconds)
   Format: { speaker, text, start, end }
   Timestamps estimated from dialog timing – fine-tune if needed
   ============================================================ */
const SENTENCES = [
  { speaker:"Nazan",  text:"Wer schreibt mit? Soll ich Notizen machen?",                                start:0.5,  end:3.2 },
  { speaker:"Zofia",  text:"Das wäre toll. Danke, Nazan.",                                               start:3.5,  end:5.2 },
  { speaker:"Miro",   text:"Also wir brauchen auf jeden Fall Fotos.",                                    start:5.8,  end:8.0 },
  { speaker:"Heinz",  text:"Fotos, die richtig gut sind. Kannst du die nicht machen, Zofia?",           start:8.3,  end:12.0 },
  { speaker:"Zofia",  text:"Ja, das kann ich gern übernehmen.",                                          start:12.5, end:14.5 },
  { speaker:"Zofia",  text:"Vielleicht machen wir ein großes Foto, das das ganze Team zeigt.",          start:15.0, end:18.5 },
  { speaker:"Miro",   text:"Das klingt gut.",                                                            start:19.0, end:20.0 },
  { speaker:"Miro",   text:"Und dann schreiben wir kurze Texte, die zu den Fotos passen.",              start:20.2, end:23.5 },
  { speaker:"Heinz",  text:"Genau. Wer wir sind, was wir hier im Reparaturcafé machen.",                start:24.0, end:27.0 },
  { speaker:"Nazan",  text:"Und wir müssen natürlich zeigen, wie vielfältig wir sind.",                 start:27.5, end:30.5 },
  { speaker:"Nazan",  text:"Heinz kann nicht nur Deutsch, sondern auch Russisch und Kroatisch.",        start:31.0, end:34.5 },
  { speaker:"Heinz",  text:"Das klingt super!",                                                          start:35.0, end:36.2 },
  { speaker:"Heinz",  text:"Würdest du die Texte schreiben, Nazan?",                                    start:36.5, end:38.8 },
  { speaker:"Nazan",  text:"In Ordnung, aber ich möchte das nicht allein machen.",                     start:39.5, end:42.0 },
  { speaker:"Nazan",  text:"Können wir die Texte vielleicht zu zweit schreiben? Heinz?",               start:42.3, end:45.5 },
  { speaker:"Heinz",  text:"Ich weiß nicht. Ich glaube, darin bin ich nicht so gut.",                  start:46.0, end:49.0 },
  { speaker:"Miro",   text:"Kein Problem. Dann schreiben wir beide die Texte.",                         start:49.5, end:52.0 },
  { speaker:"Nazan",  text:"Natürlich. Danke, Miro.",                                                   start:52.5, end:54.0 },
  { speaker:"Zofia",  text:"So … Dann haben wir Bilder und Texte. Jetzt fehlt nur noch die Überschrift.", start:54.5, end:58.5 },
  { speaker:"Miro",   text:"Das Multi-Kulti-Team aus dem Reparaturcafé.",                               start:59.0, end:61.5 },
  { speaker:"Nazan",  text:"Genau. In großen Buchstaben und ganz bunt.",                               start:62.0, end:64.5 },
  { speaker:"Heinz",  text:"Das kann ich machen.",                                                      start:65.0, end:66.3 },
  { speaker:"Heinz",  text:"Vielleicht hilft mir Ilias dabei.",                                         start:66.8, end:68.5 },
  { speaker:"Zofia",  text:"Okay, Ilias kommt gleich, aber dann ist das Team noch nicht komplett.",    start:69.0, end:73.0 },
  { speaker:"Miro",   text:"Genau. Drei arbeiten heute nicht.",                                         start:73.5, end:75.5 },
  { speaker:"Zofia",  text:"Kein Problem. Wir können die Fotos an einem anderen Tag machen.",          start:76.0, end:79.5 },
  { speaker:"Miro",   text:"Das mache ich. Ich spreche nochmal mit den anderen.",                       start:80.0, end:83.0 },
  { speaker:"Zofia",  text:"Alles klar, so machen wir es.",                                             start:83.5, end:85.5 },
];

const SPEAKER_COLORS = {
  Nazan: '#f59e0b',
  Zofia: '#3b82f6',
  Miro:  '#22c55e',
  Heinz: '#a78bfa',
};

const TOTAL_LOOPS = 3;
const audio = document.getElementById('audio');

let current = 0;
let loopCount = 0;
let isLooping = false;
let isPlaying = false;
let isRecording = false;
let recognition = null;
let scores = new Array(SENTENCES.length).fill(null);
let stopTimer = null;

/* ── INIT ── */
function init() {
  buildSnav();
  buildTranscript();
  loadSentence(0);

  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('ended', onAudioEnded);
}

/* ── BUILD NAV ── */
function buildSnav() {
  const nav = document.getElementById('snav');
  SENTENCES.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'snav-btn';
    btn.id = `sn${i}`;
    btn.textContent = i + 1;
    btn.onclick = () => { stopAll(); loadSentence(i); };
    nav.appendChild(btn);
  });
}

/* ── BUILD TRANSCRIPT ── */
function buildTranscript() {
  const list = document.getElementById('transcriptList');
  SENTENCES.forEach((s, i) => {
    const line = document.createElement('div');
    line.className = 'transcript-line';
    line.id = `tl${i}`;
    line.innerHTML = `
      <span class="tl-num" id="tln${i}">${i+1}</span>
      <span><strong style="color:${SPEAKER_COLORS[s.speaker]||'#60a5fa'}">${s.speaker}:</strong> ${s.text}</span>`;
    line.onclick = () => { stopAll(); loadSentence(i); };
    list.appendChild(line);
  });
}

/* ── LOAD SENTENCE ── */
function loadSentence(idx) {
  current = idx;
  loopCount = 0;
  isPlaying = false;
  isLooping = false;
  stopAll();

  const s = SENTENCES[idx];

  // sentence card
  const card = document.getElementById('sentenceCard');
  card.classList.remove('playing');
  card.style.borderColor = SPEAKER_COLORS[s.speaker] || 'var(--border)';
  card.style.setProperty('--accent', SPEAKER_COLORS[s.speaker] || '#60a5fa');

  document.getElementById('speakerLabel').textContent = s.speaker.toUpperCase();
  document.getElementById('speakerLabel').style.color = SPEAKER_COLORS[s.speaker] || '#60a5fa';
  document.getElementById('sentenceText').textContent = s.text;

  // top gradient color by speaker
  card.style.backgroundImage = `linear-gradient(135deg, ${SPEAKER_COLORS[s.speaker]||'#3b82f6'}15 0%, transparent 60%)`;

  // loop dots
  updateLoopDots(0);
  resetPlayBtn();
  hideScore();

  // nav highlights
  document.querySelectorAll('.snav-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    if (scores[i] !== null) b.classList.add('done');
  });
  document.querySelectorAll('.transcript-line').forEach((l, i) => {
    l.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.tl-num').forEach((n, i) => {
    n.classList.toggle('active', i === idx);
  });

  // scroll transcript line into view
  const tline = document.getElementById(`tl${idx}`);
  if (tline) tline.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // progress
  document.getElementById('globalProgress').style.width =
    ((idx + 1) / SENTENCES.length * 100) + '%';

  // nav buttons
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').textContent =
    idx === SENTENCES.length - 1 ? '✓ Fertig' : 'Weiter →';

  // scroll snav
  const snavBtn = document.getElementById(`sn${idx}`);
  if (snavBtn) snavBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

/* ── PLAY ── */
function handlePlay() {
  if (isLooping) { stopAll(); return; }
  if (isPlaying) { stopAll(); return; }
  playSentence();
}

function playSentence() {
  const s = SENTENCES[current];
  clearTimeout(stopTimer);
  audio.currentTime = s.start;
  audio.play();
  isPlaying = true;

  const dur = (s.end - s.start) * 1000;
  stopTimer = setTimeout(() => {
    audio.pause();
    isPlaying = false;
    document.getElementById('sentenceCard').classList.remove('playing');
    resetPlayBtn();
  }, dur + 100);

  document.getElementById('sentenceCard').classList.add('playing');
  document.getElementById('btnPlay').classList.add('active');
  document.getElementById('playIcon').textContent = '⏹';
  document.getElementById('playLabel').textContent = 'STOP';
}

function stopAll() {
  clearTimeout(stopTimer);
  audio.pause();
  isPlaying = false;
  isLooping = false;
  loopCount = 0;
  document.getElementById('sentenceCard').classList.remove('playing');
  resetPlayBtn();
  document.getElementById('btnLoop').classList.remove('active');
  updateLoopDots(0);
  updateLoopBadge(false);
  if (isRecording && recognition) { recognition.stop(); }
}

function resetPlayBtn() {
  const btn = document.getElementById('btnPlay');
  btn.classList.remove('active');
  document.getElementById('playIcon').textContent = '▶️';
  document.getElementById('playLabel').textContent = 'HÖREN';
}

/* ── LOOP ── */
function handleLoop() {
  if (isLooping) { stopAll(); return; }
  stopAll();
  isLooping = true;
  loopCount = 0;
  document.getElementById('btnLoop').classList.add('active');
  updateLoopBadge(true);
  runLoop();
}

function runLoop() {
  if (!isLooping || loopCount >= TOTAL_LOOPS) {
    isLooping = false;
    document.getElementById('btnLoop').classList.remove('active');
    updateLoopBadge(false);
    document.getElementById('sentenceCard').classList.remove('playing');
    resetPlayBtn();
    return;
  }

  updateLoopDots(loopCount);
  const s = SENTENCES[current];
  audio.currentTime = s.start;
  audio.play();
  document.getElementById('sentenceCard').classList.add('playing');

  const dur = (s.end - s.start) * 1000;
  stopTimer = setTimeout(() => {
    audio.pause();
    loopCount++;
    updateLoopDots(loopCount);
    document.getElementById('sentenceCard').classList.remove('playing');

    if (loopCount < TOTAL_LOOPS) {
      setTimeout(runLoop, 600); // pause between loops
    } else {
      isLooping = false;
      document.getElementById('btnLoop').classList.remove('active');
      updateLoopBadge(false);
      // nudge to record
      const recBtn = document.getElementById('btnRec');
      recBtn.style.animation = 'pulse-rec .4s 3';
      setTimeout(() => recBtn.style.animation = '', 1200);
    }
  }, dur + 50);
}

function updateLoopDots(n) {
  for (let i = 0; i < TOTAL_LOOPS; i++) {
    const lp = document.getElementById(`lp${i}`);
    if (!lp) continue;
    lp.className = 'lp';
    if (i < n) lp.classList.add('done');
    else if (i === n && isLooping) lp.classList.add('current');
  }
}

function updateLoopBadge(active) {
  const badge = document.getElementById('loopBadge');
  badge.classList.toggle('active', active);
  ['ld1','ld2','ld3'].forEach((id, i) => {
    const d = document.getElementById(id);
    d.classList.toggle('lit', active && i < loopCount);
  });
}

function onTimeUpdate() {
  // keep badge dots in sync
  if (isLooping) {
    ['ld1','ld2','ld3'].forEach((id, i) => {
      document.getElementById(id).classList.toggle('lit', i < loopCount);
    });
  }
}

function onAudioEnded() {
  isPlaying = false;
  document.getElementById('sentenceCard').classList.remove('playing');
  resetPlayBtn();
}

/* ── RECORD ── */
function handleRecord() {
  if (isRecording) {
    stopRecording();
    return;
  }
  stopAll();

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Bitte Chrome oder Edge verwenden für die Spracherkennung.');
    return;
  }

  const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SRClass();
  recognition.lang = 'de-DE';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btnRec').classList.add('recording');
    document.getElementById('recIcon').textContent = '⏹';
    document.getElementById('recLabel').textContent = 'STOP';
    hideScore();
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const score = calcScore(SENTENCES[current].text, transcript);
    scores[current] = score;
    showScore(score, transcript);
    // mark nav done
    const snavBtn = document.getElementById(`sn${current}`);
    if (snavBtn) snavBtn.classList.add('done');
  };

  recognition.onerror = (e) => {
    console.warn('Speech error:', e.error);
    stopRecording();
  };

  recognition.onend = () => {
    stopRecording();
  };

  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e){} }
  document.getElementById('btnRec').classList.remove('recording');
  document.getElementById('recIcon').textContent = '🎤';
  document.getElementById('recLabel').textContent = 'SPRECHEN';
}

/* ── SCORE ── */
function calcScore(original, spoken) {
  const norm = s => s.toLowerCase()
    .replace(/[.,!?;:„"…–]/g, '')
    .replace(/\s+/g, ' ').trim();
  const a = norm(original);
  const b = norm(spoken);
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (!longer.length) return 100;
  const dist = editDistance(longer, shorter);
  return Math.round((1 - dist / longer.length) * 100);
}

function editDistance(s1, s2) {
  const m = s1.length, n = s2.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = s1[i-1]===s2[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function showScore(pct, transcript) {
  const card = document.getElementById('scoreCard');
  const circle = document.getElementById('scoreCircle');
  const title = document.getElementById('scoreTitle');
  const trans = document.getElementById('scoreTranscript');

  card.style.display = 'flex';
  circle.textContent = pct + '%';
  circle.className = 'score-circle';

  if (pct >= 80) {
    circle.classList.add('great');
    title.textContent = '🏆 Ausgezeichnet!';
  } else if (pct >= 55) {
    circle.classList.add('ok');
    title.textContent = '👍 Gut gemacht!';
  } else {
    circle.classList.add('low');
    title.textContent = '💪 Nochmal versuchen!';
  }

  trans.textContent = '„' + transcript + '"';
}

function hideScore() {
  document.getElementById('scoreCard').style.display = 'none';
}

/* ── NAVIGATE ── */
function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= SENTENCES.length) return;
  stopAll();
  loadSentence(next);
}

/* ── START ── */
init();
</script>
