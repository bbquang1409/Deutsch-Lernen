<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schattenlesen Pro - Lektion 05</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --secondary: #10b981;
            --text: #f1f5f9;
            --accent: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
        }

        /* Header */
        .header { padding: 15px; text-align: center; background: var(--card); border-bottom: 1px solid #334155; }
        h1 { font-size: 1.2rem; margin: 0; color: var(--primary); }

        /* Transcript Area */
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 180px; }
        .line { 
            padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            background: var(--card); border: 2px solid #334155; opacity: 0.4; transition: 0.3s;
        }
        .line.active { opacity: 1; border-color: var(--primary); background: #24334d; transform: scale(1.02); }
        .speaker { color: var(--primary); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        /* Chữ học viên nói hiện ra ở đây */
        .user-speech { 
            margin-top: 10px; padding: 8px; min-height: 1.5rem;
            color: var(--accent); font-style: italic; font-size: 1rem; border-top: 1px solid #334155;
        }

        /* Control Panel */
        .controls { 
            position: fixed; bottom: 0; width: 100%; background: #111827; 
            padding: 20px; border-top: 2px solid #334155; display: flex; flex-direction: column; gap: 12px;
        }

        .main-btn {
            height: 75px; border-radius: 16px; border: none; color: white;
            font-size: 1.3rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-listen { background: var(--primary); }
        .btn-speak { background: var(--secondary); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .sub-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sub { background: #334155; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }

        .status-msg { text-align: center; font-size: 0.85rem; color: #94a3b8; height: 1.2rem; }

        audio { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>DEUTSCH-TRAINING: LEKTION 05</h1>
</div>

<audio id="audioPlayer" src="2_04_Miteinander_B11_KB_L5_A3c.mp3"></audio>

<div class="content" id="transcript">
    <div class="line active" id="l0">
        <span class="speaker">Nazan</span>
        <div class="text-original">Wer schreibt mit? Soll ich Notizen machen?</div>
        <div class="user-speech" id="speech-0"></div>
    </div>
    <div class="line" id="l1">
        <span class="speaker">Zofia</span>
        <div class="text-original">Das wäre toll. Danke, Nazan. Also …</div>
        <div class="user-speech" id="speech-1"></div>
    </div>
    </div>

<div class="controls">
    <div id="statusMsg" class="status-msg">Bereit zum Starten</div>
    
    <button id="masterBtn" class="main-btn btn-listen" onclick="handleAction()">
        <span id="btnIcon">▶</span> <span id="btnText">HÖREN</span>
    </button>

    <div class="sub-btn-group">
        <button class="btn-sub" onclick="replayCurrent()">↩ WIEDERHOLEN</button>
        <button class="btn-sub" onclick="resetAll()">🔄 NEUSTART</button>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const masterBtn = document.getElementById('masterBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const statusMsg = document.getElementById('statusMsg');
    const lines = document.querySelectorAll('.line');
    
    let currentIdx = 0;
    let isListening = false;

    // Web Speech API
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognizer = Recognition ? new Recognition() : null;
    if (recognizer) {
        recognizer.lang = 'de-DE';
        recognizer.interimResults = true; // Hiện chữ ngay khi đang nói
    }

    function handleAction() {
        if (audio.paused && !isListening) {
            // 1. Chế độ HÖREN (Nghe)
            audio.play();
            updateUI('playing');
        } else if (!audio.paused) {
            // 2. Chuyển sang SPRECHEN (Nói)
            audio.pause();
            startRecognition();
        } else {
            // 3. Kết thúc câu, nhảy sang câu mới
            stopRecognition();
            prepareNextLine();
            updateUI('ready');
        }
    }

    function updateUI(state) {
        if (state === 'playing') {
            masterBtn.className = "main-btn btn-speak";
            btnIcon.innerText = "🛑";
            btnText.innerText = "STOPP & SPRECHEN";
            statusMsg.innerText = "Hören Sie zu...";
        } else if (state === 'speaking') {
            masterBtn.className = "main-btn btn-listen";
            btnIcon.innerText = "✔";
            btnText.innerText = "NÄCHSTER SATZ";
            statusMsg.innerText = "Sprechen Sie jetzt!";
        } else {
            btnIcon.innerText = "▶";
            btnText.innerText = "HÖREN";
            statusMsg.innerText = "Bereit cho câu tiếp theo";
        }
    }

    function startRecognition() {
        if (!recognizer) return alert("Speech API không hỗ trợ trình duyệt này.");
        isListening = true;
        updateUI('speaking');
        recognizer.start();

        recognizer.onresult = (event) => {
            let resultText = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                resultText += event.results[i][0].transcript;
            }
            document.getElementById(`speech-${currentIdx}`).innerText = "Du sagst: " + resultText;
        };
    }

    function stopRecognition() {
        if (recognizer) recognizer.stop();
        isListening = false;
    }

    function prepareNextLine() {
        lines[currentIdx].classList.remove('active');
        if (currentIdx < lines.length - 1) {
            currentIdx++;
            lines[currentIdx].classList.add('active');
            lines[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            statusMsg.innerText = "Lektion abgeschlossen!";
            masterBtn.disabled = true;
        }
    }

    function replayCurrent() {
        stopRecognition();
        audio.currentTime = Math.max(0, audio.currentTime - 3);
        audio.play();
        updateUI('playing');
    }

    function resetAll() { location.reload(); }
</script>

</body>
</html>
