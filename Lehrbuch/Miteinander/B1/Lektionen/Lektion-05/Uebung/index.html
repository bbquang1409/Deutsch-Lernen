<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing A3c</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f0f2f5;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
}

.text {
    font-size: 20px;
    line-height: 1.5;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

.play { background: #4CAF50; color: white; }
.record { background: #2196F3; color: white; }
.stop { background: #f44336; color: white; }

.result {
    text-align: center;
    font-size: 18px;
    margin-top: 10px;
    font-weight: bold;
}

.nav {
    display: flex;
    gap: 5px;
}

.nav button {
    flex: 1;
    background: #ddd;
}

.active {
    background: #4CAF50 !important;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <h2>🎧 Shadowing A3c</h2>

    <audio id="audio" src="2_04_Miteinander_B11_KB_L5_A3c.mp3"></audio>

    <div class="text" id="sentence"></div>

    <button class="play" onclick="playSentence()">▶️ Listen</button>
    <button class="record" onclick="startRecording()">🎤 Record</button>
    <button class="stop" onclick="stopRecording()">⏹ Stop</button>

    <div class="result" id="result">Match: ---</div>
</div>

<div class="card nav" id="nav"></div>

</div>

<script>

// ===== DATA: chia câu =====
const sentences = [
"Wer schreibt mit? Soll ich Notizen machen?",
"Das wäre toll. Danke, Nazan.",
"Also wir brauchen auf jeden Fall Fotos.",
"Fotos, die richtig gut sind.",
"Ja, das kann ich gern übernehmen.",
"Vielleicht machen wir ein großes Foto.",
"Das klingt gut.",
"Und dann schreiben wir kurze Texte.",
"Genau. Wer wir sind.",
"Das klingt super!"
];

let current = 0;
let recognition;

// ===== load sentence =====
function loadSentence() {
    document.getElementById("sentence").innerText = sentences[current];

    document.querySelectorAll(".nav button").forEach((btn, i) => {
        btn.classList.toggle("active", i === current);
    });
}

// ===== audio =====
function playSentence() {
    let audio = document.getElementById("audio");

    // NOTE: simple play toàn file (vì không có timestamps)
    audio.currentTime = 0;
    audio.play();
}

// ===== speech =====
function startRecording() {
    if (!('webkitSpeechRecognition' in window)) {
        alert("Chrome Android hoặc PC nhé 😄");
        return;
    }

    recognition = new webkitSpeechRecognition();
    recognition.lang = "de-DE";
    recognition.continuous = false;

    recognition.onresult = function(event) {
        let userText = event.results[0][0].transcript;
        compare(userText);
    };

    recognition.start();
}

function stopRecording() {
    if (recognition) recognition.stop();
}

// ===== compare =====
function compare(userText) {
    let original = sentences[current];

    let score = similarity(original.toLowerCase(), userText.toLowerCase());

    document.getElementById("result").innerText =
        "Match: " + Math.round(score * 100) + "%";
}

// ===== algorithm =====
function similarity(s1, s2) {
    let longer = s1.length > s2.length ? s1 : s2;
    let shorter = s1.length > s2.length ? s2 : s1;
    let longerLength = longer.length;

    if (longerLength === 0) return 1.0;

    return (longerLength - editDistance(longer, shorter)) / longerLength;
}

function editDistance(s1, s2) {
    let costs = [];

    for (let i = 0; i <= s1.length; i++) {
        let lastValue = i;

        for (let j = 0; j <= s2.length; j++) {
            if (i == 0)
                costs[j] = j;
            else {
                if (j > 0) {
                    let newValue = costs[j - 1];

                    if (s1.charAt(i - 1) != s2.charAt(j - 1))
                        newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;

                    costs[j - 1] = lastValue;
                    lastValue = newValue;
                }
            }
        }

        if (i > 0)
            costs[s2.length] = lastValue;
    }

    return costs[s2.length];
}

// ===== nav buttons =====
function initNav() {
    let nav = document.getElementById("nav");

    sentences.forEach((_, i) => {
        let btn = document.createElement("button");
        btn.innerText = i + 1;

        btn.onclick = () => {
            current = i;
            loadSentence();
        };

        nav.appendChild(btn);
    });
}

// init
initNav();
loadSentence();

</script>

</body>
</html>
