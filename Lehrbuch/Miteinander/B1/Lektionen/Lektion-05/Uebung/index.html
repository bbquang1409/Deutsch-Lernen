<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing PRO</title>

<style>
body { font-family: Arial; background:#f0f2f5; margin:0; }
.container { max-width:600px; margin:auto; padding:10px; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.text span.correct { color:green; }
.text span.wrong { color:red; }

.text {
  font-size:22px;
  line-height:1.6;
  font-weight:bold;
}

button {
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.play{background:#4CAF50;color:white;}
.auto{background:#FF9800;color:white;}
.stop{background:#f44336;color:white;}

.result { text-align:center; margin-top:10px; font-size:18px; }

.nav { display:flex; flex-wrap:wrap; gap:5px; }
.nav button { flex:1 0 18%; background:#ddd; }
.active { background:#4CAF50!important;color:white; }
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🎧 Shadowing A3c</h2>

<audio id="audio" src="2_04_Miteinander_B11_KB_L5_A3c.mp3"></audio>

<div class="text" id="sentence"></div>

<button class="play" onclick="playOnce()">▶️ Listen</button>
<button class="auto" onclick="autoMode()">⚡ Auto Mode</button>
<button class="stop" onclick="stopAll()">⏹ Stop</button>

<div class="result" id="result">Match: ---</div>
</div>

<div class="card nav" id="nav"></div>

</div>

<script>

// ===== DATA =====
const data = [
{ text:"Wer schreibt mit Soll ich Notizen machen", start:0, end:3 },
{ text:"Das wäre toll Danke Nazan", start:3, end:6 },
{ text:"Also wir brauchen auf jeden Fall Fotos", start:6, end:10 },
{ text:"Fotos die richtig gut sind", start:10, end:13 },
{ text:"Ja das kann ich gern übernehmen", start:13, end:17 }
];

let current=0, recognition, timer, auto=false;

// ===== load =====
function load(){
  document.getElementById("sentence").innerHTML =
    data[current].text.split(" ").map(w=>`<span>${w}</span>`).join(" ");

  document.querySelectorAll(".nav button")
    .forEach((b,i)=>b.classList.toggle("active",i===current));
}

// ===== play =====
function playSegment(cb){
  let a=document.getElementById("audio");
  let {start,end}=data[current];

  a.currentTime=start;
  a.play();

  timer=setInterval(()=>{
    if(a.currentTime>=end){
      a.pause();
      clearInterval(timer);
      if(cb) cb();
    }
  },50);
}

function playOnce(){ stopAll(); playSegment(); }

// ===== auto mode =====
function autoMode(){
  stopAll();
  auto=true;

  playSegment(()=>{
    setTimeout(()=>{
      startRecording(true);
    },500);
  });
}

// ===== speech =====
function startRecording(isAuto=false){
  if(!('webkitSpeechRecognition'in window)){
    alert("Dùng Chrome nhé 😄");return;
  }

  recognition=new webkitSpeechRecognition();
  recognition.lang="de-DE";

  recognition.onresult=(e)=>{
    let user=e.results[0][0].transcript;
    compare(user);

    if(auto){
      setTimeout(()=>{
        next();
        autoMode();
      },1500);
    }
  };

  recognition.start();
}

// ===== compare + highlight =====
function compare(user){
  let original=data[current].text.split(" ");
  let spoken=user.split(" ");

  let html="";
  let correct=0;

  original.forEach((w,i)=>{
    if(spoken[i] && spoken[i].toLowerCase()===w.toLowerCase()){
      html+=`<span class="correct">${w} </span>`;
      correct++;
    } else {
      html+=`<span class="wrong">${w} </span>`;
    }
  });

  document.getElementById("sentence").innerHTML=html;

  let score=Math.round(correct/original.length*100);
  document.getElementById("result").innerText="Match: "+score+"%";
}

// ===== control =====
function stopAll(){
  let a=document.getElementById("audio");
  a.pause();
  clearInterval(timer);
  auto=false;
}

function next(){
  current=(current+1)%data.length;
  load();
}

// ===== nav =====
function initNav(){
  let nav=document.getElementById("nav");

  data.forEach((_,i)=>{
    let b=document.createElement("button");
    b.innerText=i+1;
    b.onclick=()=>{current=i;load();};
    nav.appendChild(b);
  });
}

initNav();
load();

</script>

</body>
</html>
