<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadowing Pro – Lektion 5</title>
    <style>
        :root {
            --bg: #f0f7ff;
            --card: #ffffff;
            --primary: #2563eb;
            --secondary: #059669;
            --error: #dc2626;
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; flex-direction: column; height: 100vh; 
        }

        .header { padding: 15px; text-align: center; background: white; border-bottom: 2px solid #dbeafe; }
        h1 { font-size: 1rem; margin: 0; color: var(--primary); font-weight: 800; }

        .content { flex: 1; overflow-y: auto; padding: 20px 15px 220px 15px; }

        .line { 
            padding: 20px; margin-bottom: 15px; border-radius: 20px; 
            background: var(--card); border: 1px solid #e2e8f0; 
            transition: 0.3s; opacity: 0.4;
        }
        .line.active { opacity: 1; border: 2px solid var(--primary); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.1); }

        .speaker { font-weight: 800; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        /* Hiển thị so sánh từ */
        .word-compare { font-size: 1.15rem; line-height: 1.6; font-weight: 500; }
        .word-correct { color: var(--secondary); border-bottom: 2px solid var(--secondary); }
        .word-wrong { color: var(--error); text-decoration: line-through; opacity: 0.7; }
        .word-pending { color: var(--text); }

        .feedback-box { 
            margin-top: 15px; padding: 12px; border-radius: 12px; 
            background: #f8fafc; font-size: 0.9rem; min-height: 40px;
        }

        .footer { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            padding: 20px; border-top: 2px solid #e2e8f0;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-main {
            height: 75px; border-radius: 20px; border: none; color: white;
            font-size: 1.2rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-listen { background: var(--primary); box-shadow: 0 5px 0 #1d4ed8; }
        .btn-record { background: #ea580c; box-shadow: 0 5px 0 #c2410c; }
        .btn-next { background: var(--secondary); box-shadow: 0 5px 0 #047857; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        .sub-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sub { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

<div class="header"><h1>A3c: CHATTEN & SPRECHEN</h1></div>
<audio id="audio" src="2_04_Miteinander_B11_KB_L5_A3c.mp3"></audio>

<div class="content" id="container"></div>

<div class="footer">
    <div id="status" style="text-align:center; font-size:0.8rem; font-weight:bold; color:#64748b;">BEREIT</div>
    <button id="masterBtn" class="btn-main btn-listen" onclick="handleFlow()">▶ HÖREN</button>
    <div class="sub-group">
        <button class="btn-sub" onclick="audio.currentTime -= 4; audio.play();">WIEDERHOLEN</button>
        <button class="btn-sub" onclick="location.reload()">NEUSTART</button>
    </div>
</div>

<script>
const data = [
    { s: "Nazan", t: "Wer schreibt mit? Soll ich Notizen machen?" },
    { s: "Zofia", t: "Das wäre toll. Danke, Nazan. Also …" },
    { s: "Miro", t: "Also wir brauchen auf jeden Fall Fotos." },
    { s: "Heinz", t: "Mhm. Fotos, die richtig gut sind. Kannst du die nicht machen, Zofia? Du bist doch Fotografin." }
    // Thêm các câu khác tại đây...
];

let idx = 0;
let state = 'idle'; // idle, listening, recording, evaluated
let fullTranscript = "";

const container = document.getElementById('container');
const masterBtn = document.getElementById('masterBtn');
const audio = document.getElementById('audio');

// Khởi tạo Speech
const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognizer = Rec ? new Rec() : null;
if(recognizer) {
    recognizer.lang = 'de-DE';
    recognizer.continuous = true;
    recognizer.interimResults = true;
}

function render() {
    container.innerHTML = data.map((d, i) => `
        <div class="line ${i === idx ? 'active' : ''}" id="l${i}">
            <span class="speaker">${d.s}</span>
            <div class="word-compare" id="w${i}">${d.t}</div>
            <div class="feedback-box" id="f${i}">Hören Sie zuerst zu...</div>
        </div>
    `).join('');
}
render();

function handleFlow() {
    if (state === 'idle' || state === 'evaluated') {
        audio.play();
        state = 'listening';
        updateUI();
    } else if (state === 'listening') {
        audio.pause();
        startRecording();
    } else if (state === 'recording') {
        stopRecording();
        evaluate();
    } else if (state === 'evaluated') {
        next();
    }
}

function startRecording() {
    fullTranscript = "";
    state = 'recording';
    updateUI();
    recognizer.start();
    recognizer.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + " ";
            else interim += e.results[i][0].transcript;
        }
        document.getElementById(`f${idx}`).innerText = "Du sagst: " + fullTranscript + interim;
    };
}

function stopRecording() {
    recognizer.stop();
    state = 'evaluated';
    updateUI();
}

function evaluate() {
    const original = data[idx].t.toLowerCase().replace(/[.,!?]/g, "").split(" ");
    const spoken = fullTranscript.toLowerCase().split(" ");
    
    const html = original.map(word => {
        const isMatch = spoken.some(s => s.includes(word) || word.includes(s));
        return `<span class="${isMatch ? 'word-correct' : 'word-wrong'}">${word}</span>`;
    }).join(" ");
    
    document.getElementById(`w${idx}`).innerHTML = html;
    const score = Math.round((original.filter(w => spoken.some(s => s.includes(w))).length / original.length) * 100);
    document.getElementById(`f${idx}`).innerHTML = `<b>Ergebnis: ${score}% Match</b>. Từ đỏ là bạn đọc chưa rõ.`;
}

function updateUI() {
    const btn = masterBtn;
    const st = document.getElementById('status');
    if (state === 'listening') {
        btn.innerHTML = "🛑 STOPP & SPRECHEN";
        btn.className = "btn-main btn-record";
        st.innerText = "HÖREN...";
    } else if (state === 'recording') {
        btn.innerHTML = "✔ FERTIG & PRÜFEN";
        btn.className = "btn-main btn-next";
        st.innerText = "BITTE SPRECHEN...";
    } else if (state === 'evaluated') {
        btn.innerHTML = "▶ NÄCHSTER SATZ";
        btn.className = "btn-main btn-listen";
        st.innerText = "AUSGEWERTET";
    }
}

function next() {
    if (idx < data.length - 1) {
        idx++;
        render();
        document.getElementById(`l${idx}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        state = 'idle';
        updateUI();
    } else {
        alert("Glückwunsch! Bạn đã hoàn thành bài tập.");
    }
}
</script>
</body>
</html>
