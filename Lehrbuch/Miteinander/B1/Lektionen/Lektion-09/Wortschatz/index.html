<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;--card:#fff;--border:#c5d8ee;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  .hdr{background:#1e3a5f;padding:28px 20px 24px;position:relative;overflow:hidden;text-align:center;}
  .hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% -10%,#3b82f6 0%,transparent 55%),radial-gradient(ellipse at 10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;pointer-events:none;}
  .hdr-inner{position:relative;max-width:700px;margin:0 auto;}
  .hdr-tag{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#93c5fd;margin-bottom:6px;}

  .hdr p{font-size:13px;color:rgba(255,255,255,.5);}
  .hdr-back{display:inline-block;margin-top:14px;background:rgba(255,255,255,.12);border-radius:10px;color:#93c5fd;font-size:12px;font-weight:600;padding:7px 16px;text-decoration:none;border:1px solid rgba(255,255,255,.18);}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;max-width:700px;margin:32px auto;padding:0 20px 48px;}
  .card{background:var(--card);border-radius:18px;padding:28px 18px 24px;box-shadow:0 4px 20px rgba(37,99,235,.08);border:2px solid var(--border);text-align:center;text-decoration:none;color:var(--ink);transition:transform .18s,border-color .18s,box-shadow .18s;display:flex;flex-direction:column;align-items:center;gap:14px;}
  .card:hover{transform:translateY(-5px);border-color:var(--blue);box-shadow:0 10px 32px rgba(37,99,235,.18);}
  .card-icon{width:62px;height:62px;border-radius:16px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
  .card-title{font-size:15px;font-weight:700;color:var(--ink);}
  .card-sub{font-size:11px;color:#5b7a99;margin-top:-8px;line-height:1.4;}
  .footer{text-align:center;padding:10px 0 28px;font-size:11px;color:#8aa3bc;}
</style>
</head>
