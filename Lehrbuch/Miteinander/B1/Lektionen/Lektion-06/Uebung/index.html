<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Shadowing - Nur auf Deutsch</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC; --card: #FFFFFF; --primary: #3B82F6;
            --text: #1E293B; --muted: #64748B; --border: #E2E8F0;
            --success: #22C55E; --danger: #EF4444; --amber: #F59E0B;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .hdr { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); text-align: center; }
        .hdr h1 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin: 0; color: var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .s-card { 
            width: 100%; max-width: 400px; background: var(--card); border-radius: 28px; 
            padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center; transition: 0.3s; position: relative;
        }
        .speaker { font-weight: 800; font-size: 0.75rem; color: var(--primary); letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .text { font-family: 'DM Serif Display', serif; font-size: 1.5rem; line-height: 1.4; margin: 0; min-height: 80px; }

        .score-badge {
            position: absolute; top: -15px; right: 20px; padding: 5px 15px;
            border-radius: 20px; font-weight: 800; font-size: 0.8rem; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .controls-hub { 
            background: var(--card); padding: 25px 20px 45px; border-radius: 32px 32px 0 0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; align-items: center; gap: 12px;
        }

        .btn-main {
            width: 75px; height: 75px; border-radius: 50%; border: none;
            background: var(--primary); color: white; font-size: 1.6rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); transition: 0.2s;
        }
        .btn-main.rec { background: var(--danger); animation: pulse 1s infinite; }

        .label-main { font-weight: 800; font-size: 0.85rem; color: var(--primary); height: 20px; text-transform: uppercase; }

        .btn-sub {
            background: #F1F5F9; color: var(--text); border: 1px solid var(--border); 
            padding: 12px 50px; border-radius: 18px; font-family: 'Outfit'; 
            font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }

        .user-said { font-size: 0.85rem; color: var(--muted); font-style: italic; margin-top: 12px; text-align: center; height: 20px; width: 100%; }

        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

        <h1>Miteinander B1 · Shadowing</h1>
    </div>

    <div class="main">
        <div id="scoreBadge" class="score-badge"></div>
        <div class="s-card">
            <span class="speaker" id="spk">PERSON</span>
            <p class="text" id="txt">Laden...</p>
        </div>
        <div class="user-said" id="transcript"></div>
    </div>

    <div class="controls-hub">
        <span class="label-main" id="lbl">HÖREN</span>
        <button class="btn-main" id="actionBtn">▶</button>
        <button class="btn-sub" id="nextBtn">WEITER ⮕</button>
    </div>
