<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mobil Lernen – Lektion 06</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef4fb;--card:#fff;--ink:#1e3a5f;--muted:#5b7a99;--border:#c5d8ee;
  --blue:#2563eb;--blue-lt:#dbeafe;--blue-dk:#1d4ed8;
  --green:#16a34a;--green-lt:#dcfce7;
  --rose:#e11d48;--rose-lt:#ffe4e6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:60px;}

/* ── HEADER ── */
header{background:#1e3a5f;color:#fff;padding:24px 20px 20px;position:relative;overflow:hidden;text-align:center;}
header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% -10%,#3b82f6 0%,transparent 55%),
             radial-gradient(ellipse at 10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;}
header .inner{position:relative;}
.hd-tag{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#93c5fd;margin-bottom:6px;}
header h1{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;}
header p{font-size:12px;color:rgba(255,255,255,.55);}
.hdr-back{display:inline-block;margin-top:10px;background:rgba(255,255,255,.13);border-radius:10px;
  color:#93c5fd;font-size:12px;font-weight:600;padding:6px 14px;text-decoration:none;
  border:1px solid rgba(255,255,255,.15);}

/* ── MODE SELECTOR ── */
.mode-wrap{max-width:440px;margin:20px auto 0;padding:0 16px;display:flex;gap:10px;}
.mode-btn{flex:1;padding:11px;border-radius:12px;border:2px solid var(--border);background:var(--card);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ── FLASHCARD WRAP ── */
.fc-wrap{max-width:440px;margin:0 auto;padding:18px 16px;}
.fc-progress{background:var(--border);border-radius:99px;height:5px;margin-bottom:6px;}
.fc-progress-bar{background:var(--blue);height:5px;border-radius:99px;transition:width .4s;}
.fc-counter{text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px;}

/* ── 3D FLIP CARD ── */
.fc-scene{width:100%;min-height:260px;perspective:1000px;cursor:pointer;margin-bottom:4px;}
.fc-scene:active .fc-card-inner:not(.is-flipped){transform:scale(.98);}

.fc-card-inner{
  width:100%;min-height:260px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.fc-card-inner.is-flipped{transform:rotateY(180deg);}

.fc-face{
  position:absolute;width:100%;min-height:260px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:28px 20px;text-align:center;
  box-shadow:0 4px 24px rgba(37,99,235,.13);
  border:2px solid var(--border);
}

/* FRONT face */
.fc-front{
  background:var(--card);
}
.fc-art-badge{font-size:12px;font-weight:700;color:var(--blue);
  background:var(--blue-lt);padding:4px 14px;border-radius:99px;}
.fc-de{font-family:'DM Serif Display',serif;font-size:30px;color:var(--ink);line-height:1.25;}
.fc-pl{font-size:14px;color:var(--muted);font-style:italic;margin-top:-4px;}
.fc-hint{font-size:12px;color:#94a3b8;margin-top:4px;}
.tts-btn{background:var(--blue-lt);border:none;border-radius:99px;width:42px;height:42px;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;}
.tts-btn:hover{background:#bfdbfe;}

/* BACK face – rotated 180° */
.fc-back{
  background:linear-gradient(135deg,#1e3a5f 0%,#1d4ed8 100%);
  border-color:#1d4ed8;
  transform:rotateY(180deg);
}
.fc-vi-main{font-size:22px;font-weight:700;color:#fff;line-height:1.4;}
.fc-pl-back{font-size:13px;color:#93c5fd;margin-top:2px;}
.fc-ex-back{font-size:12px;color:rgba(255,255,255,.65);font-style:italic;
  line-height:1.55;max-width:320px;border-top:1px solid rgba(255,255,255,.2);
  padding-top:10px;margin-top:4px;}

/* tap hint shown only before first flip */
.fc-tap-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;min-height:18px;}

/* ── ANSWER BUTTONS ── */
.fc-btns{display:flex;gap:12px;margin-top:12px;}
.fc-btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .1s;display:none;}
.fc-btn.show{display:block;}
.fc-btn:active{transform:scale(.97);}
.fc-btn-wrong{background:var(--rose-lt);color:var(--rose);}
.fc-btn-ok{background:var(--green-lt);color:var(--green);}

/* ── SCORE SCREEN ── */
.score-screen{display:none;max-width:440px;margin:40px auto;padding:0 16px;text-align:center;}
.score-screen.show{display:block;}
.score-emoji{font-size:56px;margin-bottom:12px;}
.score-big{font-family:'DM Serif Display',serif;font-size:48px;color:var(--blue);}
.score-msg{font-size:16px;color:var(--muted);margin:8px 0 24px;}
.btn-restart{background:var(--blue);color:#fff;border:none;border-radius:14px;
  padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin:6px;}
.btn-back-link{background:var(--card);color:var(--ink);border:2px solid var(--border);
  border-radius:14px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;margin:6px;}
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="hd-tag">LEKTION 06 · MOBIL LERNEN</div>
    <h1>Amadou – Miteinander reden</h1>
    <p id="modeLabel">Alle Vokabeln lernen</p>
    <a href="index.html" class="hdr-back">← Zurück zur Übersicht</a>
  </div>
</header>

<div class="mode-wrap">
  <button class="mode-btn active" id="btnLearn" onclick="setMode('learn')">📚 Vokabeln lernen</button>
  <button class="mode-btn" id="btnTest" onclick="setMode('test')">🎯 Wortschatztest</button>
</div>

<div class="fc-wrap" id="fcWrap">
  <div class="fc-progress"><div class="fc-progress-bar" id="fcBar" style="width:0%"></div></div>
  <div class="fc-counter" id="fcCounter">1 / —</div>

  <!-- 3D scene -->
  <div class="fc-scene" id="fcScene" onclick="flipCard()">
    <div class="fc-card-inner" id="fcCardInner">

      <!-- FRONT -->
      <div class="fc-face fc-front">
        <button class="tts-btn" id="ttsBtn" onclick="event.stopPropagation();speakCurrent()">🔊</button>
        <div class="fc-art-badge" id="fcArt" style="display:none"></div>
        <div class="fc-de" id="fcDe">Lade…</div>
        <div class="fc-pl" id="fcPlFront"></div>
        <div class="fc-hint" id="fcHint">Tippen zum Umdrehen 👆</div>
      </div>

      <!-- BACK -->
      <div class="fc-face fc-back">
        <div class="fc-vi-main" id="fcVi"></div>
        <div class="fc-pl-back" id="fcPlBack"></div>
        <div class="fc-ex-back" id="fcEx"></div>
      </div>

    </div>
  </div>

  <div class="fc-tap-hint" id="tapHint"></div>

  <div class="fc-btns" id="fcBtns">
    <button class="fc-btn fc-btn-wrong" id="btnWrong" onclick="answer(false)">✗ Nochmal</button>
    <button class="fc-btn fc-btn-ok"    id="btnOk"    onclick="answer(true)">✓ Gewusst</button>
  </div>
</div>

<div class="score-screen" id="scoreScreen">
  <div class="score-emoji" id="scoreEmoji">⭐</div>
  <div class="score-big" id="scoreBig"></div>
  <div class="score-msg" id="scoreMsg"></div>
  <button class="btn-restart" onclick="restartTest()">🔄 Nochmal</button>
  <a href="index.html" class="btn-back-link">← Zurück</a>
</div>

<script>
/* ══════════════════════════════════════════
   WORTSCHATZ LEKTION 06
   pl: Pluralform (null = kein Plural)
   ══════════════════════════════════════════ */
const WORDS = [
  {de:"die Abteilung",     pl:"die Abteilungen",    art:"die", vi:"bộ phận, phòng ban",          ex:"Mir ist aufgefallen, dass ich mich als Einzige in der Abteilung um den Automaten kümmere."},
  {de:"aktuell",           pl:null,                 art:"",    vi:"hiện tại, hiện thời",           ex:"Olaf sollte den aktuellen Projektstand präsentieren."},
  {de:"realistisch",       pl:null,                 art:"",    vi:"thực tế, khả thi",              ex:"Ist der Zeitplan realistisch?"},
  {de:"nass",              pl:null,                 art:"",    vi:"ướt",                           ex:"Bist du nass geworden?"},
  {de:"der Pfleger",       pl:"die Pfleger",        art:"der", vi:"người chăm sóc, y tá",          ex:"Ein Pfleger kümmert sich sehr nett um meinen Vater."},
  {de:"der Flug",          pl:"die Flüge",          art:"der", vi:"chuyến bay",                    ex:"Ich habe Flüge für den Urlaub gebucht."},
  {de:"merkwürdig",        pl:null,                 art:"",    vi:"kỳ lạ, lạ lùng",                ex:"Es ist merkwürdig, dass Olaf noch nicht da ist."},
  {de:"genießen",          pl:null,                 art:"",    vi:"tận hưởng, thưởng thức",        ex:"Wir haben ein gemütliches Wochenende zu zweit genossen."},
  {de:"der Gegensatz",     pl:"die Gegensätze",     art:"der", vi:"sự tương phản, mặt đối lập",   ex:"Im Gegensatz zu mir war Amadou sehr viel unterwegs."},
  {de:"das Altersheim",    pl:"die Altersheime",    art:"das", vi:"viện dưỡng lão",                ex:"Hat sich dein Vater ans Altersheim gewöhnt?"},
  {de:"die Arbeitslosigkeit", pl:null,              art:"die", vi:"nạn thất nghiệp",               ex:"Arbeitslosigkeit ist ein schwieriges gesellschaftliches Thema."},
  {de:"die Katastrophe",   pl:"die Katastrophen",   art:"die", vi:"thảm họa",                      ex:"Das ist doch keine Katastrophe!"},
  {de:"der Konsum",        pl:null,                 art:"der", vi:"sự tiêu thụ, tiêu dùng",        ex:"Nachhaltiger Konsum schützt die Umwelt."},
  {de:"die Religion",      pl:"die Religionen",     art:"die", vi:"tôn giáo",                      ex:"Über Religion spricht man beim Small Talk lieber nicht."},
  {de:"der Skandal",       pl:"die Skandale",       art:"der", vi:"vụ bê bối, scandal",            ex:"Skandale sind kein gutes Thema für Small Talk."},
  {de:"die Umweltverschmutzung", pl:null,           art:"die", vi:"ô nhiễm môi trường",            ex:"Umweltverschmutzung ist ein globales Problem."},
  {de:"der Kiosk",         pl:"die Kioske",         art:"der", vi:"quầy báo, ki-ốt",               ex:"Könntest du mir ein Brötchen vom Kiosk mitbringen?"},
  {de:"die Münze",         pl:"die Münzen",         art:"die", vi:"đồng xu",                       ex:"Könntest du fünf Euro in Münzen wechseln?"},
  {de:"fassen",            pl:null,                 art:"",    vi:"không thể tin được (Ich fasse es nicht!)", ex:"Ich fasse es nicht – er hat den Termin vergessen!"},
  {de:"sich beruhigen",    pl:null,                 art:"",    vi:"bình tĩnh lại, nguôi xuống",    ex:"Jetzt beruhigen wir uns erst mal."},
  {de:"zusammenfassen",    pl:null,                 art:"",    vi:"tóm tắt",                       ex:"Olaf sollte den Projektstand kurz zusammenfassen."},
  {de:"herunterfahren",    pl:null,                 art:"",    vi:"tắt máy (máy tính)",             ex:"Du solltest den Computer herunterfahren."},
  {de:"sich festlegen",    pl:null,                 art:"",    vi:"quyết định dứt khoát, cam kết", ex:"Das haben wir doch schon zusammen festgelegt."},
  {de:"die Sitzung",       pl:"die Sitzungen",      art:"die", vi:"cuộc họp, phiên họp",            ex:"Olaf hat für die Sitzung keine Folien vorbereitet."},
  {de:"die Folie",         pl:"die Folien",         art:"die", vi:"slide trình chiếu",              ex:"Früher hatten wir nie Folien in unseren Sitzungen."},
  {de:"mündlich",          pl:null,                 art:"",    vi:"bằng miệng, bằng lời nói",      ex:"Den Projektstand haben wir immer mündlich mitgeteilt."},
  {de:"mitteilen",         pl:null,                 art:"",    vi:"thông báo, truyền đạt",          ex:"Könntest du mir mitteilen, wann du ankommst?"},
  {de:"aufschreiben",      pl:null,                 art:"",    vi:"viết xuống, ghi lại",            ex:"Schreib dir die wichtigsten Infos auf!"},
  {de:"entstehen",         pl:null,                 art:"",    vi:"phát sinh, hình thành",          ex:"Lasst uns klären, wie das Problem entstanden ist."},
  {de:"grundsätzlich",     pl:null,                 art:"",    vi:"về nguyên tắc, cơ bản là",       ex:"Wir wollen grundsätzlich besser kommunizieren."},
  {de:"der Konflikt",      pl:"die Konflikte",      art:"der", vi:"xung đột, mâu thuẫn",            ex:"Konflikte sind ein Problem, dem man überall begegnet."},
  {de:"sich verlassen auf",pl:null,                 art:"",    vi:"tin tưởng vào, trông cậy vào",   ex:"Ich kann mich auf dich verlassen, oder?"},
  {de:"vertrauen",         pl:null,                 art:"",    vi:"tin tưởng ai đó",                ex:"Du vertraust mir nicht, oder was?"},
  {de:"Bescheid sagen",    pl:null,                 art:"",    vi:"thông báo, báo cho biết",        ex:"Sag mir Bescheid, wenn du fertig bist."},
  {de:"ansprechen",        pl:null,                 art:"",    vi:"đề cập, nêu ra vấn đề",          ex:"Danke, dass du das Problem offen angesprochen hast."},
  {de:"vernünftig",        pl:null,                 art:"",    vi:"hợp lý, có lý trí",              ex:"Lass uns eine vernünftige Lösung finden."},
  {de:"interessiert",      pl:null,                 art:"",    vi:"quan tâm, thích thú",            ex:"Als Konfliktmanager sollte man an Menschen interessiert sein."},
  {de:"sich aufregen",     pl:null,                 art:"",    vi:"bực mình, nổi giận",             ex:"Reg dich nicht auf – wir lösen das."},
  {de:"ernst",             pl:null,                 art:"",    vi:"nghiêm túc",                     ex:"Amadou ist die ganze Zeit ernst geblieben."},
  {de:"die Fortbildung",   pl:"die Fortbildungen",  art:"die", vi:"khóa đào tạo nâng cao",          ex:"Es gibt Fortbildungen zum Thema Konfliktmanagement."},
  {de:"begegnen",          pl:null,                 art:"",    vi:"gặp gỡ, đối mặt với",            ex:"Konflikte begegnen einem in fast jedem Projekt."},
  {de:"besprechen",        pl:null,                 art:"",    vi:"thảo luận, bàn bạc",             ex:"Können wir das kurz besprechen?"},
  {de:"die Kritik",        pl:null,                 art:"die", vi:"sự phê bình, chỉ trích",         ex:"Äußern Sie Ihre Kritik ruhig und sachlich."},
  {de:"der Vorwurf",       pl:"die Vorwürfe",       art:"der", vi:"lời trách móc, cáo buộc",        ex:"Machen Sie keine Vorwürfe."},
  {de:"der Standpunkt",    pl:"die Standpunkte",    art:"der", vi:"quan điểm, lập trường",          ex:"Zeigen Sie Interesse am Standpunkt der anderen Seite."},
  {de:"unterbrechen",      pl:null,                 art:"",    vi:"ngắt lời, cắt ngang",            ex:"Unterbrechen Sie nicht – hören Sie zu!"},
  {de:"die Ansicht",       pl:"die Ansichten",      art:"die", vi:"quan điểm, ý kiến",              ex:"Die anderen haben nicht nur Ansichten, denen Sie widersprechen."},
  {de:"bereit",            pl:null,                 art:"",    vi:"sẵn sàng",                       ex:"Seien Sie bereit zu einem Kompromiss."},
  {de:"dauernd",           pl:null,                 art:"",    vi:"liên tục, cứ mãi",               ex:"Sie macht dauernd Pausen – das nervt alle."},
  {de:"die Konsequenz",    pl:"die Konsequenzen",   art:"die", vi:"hậu quả, kết quả tất yếu",       ex:"Die Konsequenz ist, dass andere mehr übernehmen müssen."},
  {de:"die Rücksicht",     pl:null,                 art:"die", vi:"sự quan tâm, sự chiếu cố",       ex:"Typisch – du nimmst keine Rücksicht auf andere!"},
  {de:"merken",            pl:null,                 art:"",    vi:"nhận ra, nhận thấy",             ex:"Er merkte, wie sehr er sich ärgerte."},
  {de:"der Ärger",         pl:null,                 art:"der", vi:"sự bực bội, tức giận",           ex:"Da er seinen Ärger spürte, sagte er kaum etwas."},
  {de:"spüren",            pl:null,                 art:"",    vi:"cảm nhận, cảm thấy",             ex:"Er spürte seinen Ärger, sagte aber nichts."},
  {de:"verschwinden",      pl:null,                 art:"",    vi:"biến mất",                       ex:"Sie lächelte und verschwand im Besprechungsraum."},
  {de:"heim",              pl:null,                 art:"",    vi:"về nhà",                         ex:"Den ganzen Heimweg dachte er über das Gespräch nach."},
];

/* ── STATE ── */
let mode='learn', queue=[], cur=0, flipped=false, correct=0;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

/* ── MODE ── */
function setMode(m){
  mode=m;
  document.getElementById('btnLearn').classList.toggle('active',m==='learn');
  document.getElementById('btnTest').classList.toggle('active',m==='test');
  document.getElementById('modeLabel').textContent=m==='learn'?'Alle Vokabeln lernen':'Wortschatztest – 10 Karten';
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('fcWrap').style.display='block';
  initDeck();
}

function initDeck(){
  queue=mode==='learn'?shuffle(WORDS):shuffle(WORDS).slice(0,10);
  cur=0; correct=0; flipped=false; showCard();
}

/* ── SHOW CARD ── */
function showCard(){
  if(cur>=queue.length){endSession();return;}
  const w=queue[cur];

  // Reset flip
  flipped=false;
  const inner=document.getElementById('fcCardInner');
  inner.classList.remove('is-flipped');

  // Progress
  document.getElementById('fcBar').style.width=Math.round(cur/queue.length*100)+'%';
  document.getElementById('fcCounter').textContent=(cur+1)+' / '+queue.length;

  // FRONT: Artikel badge
  const artEl=document.getElementById('fcArt');
  if(w.art){
    artEl.textContent=w.art;
    artEl.style.display='inline-block';
  } else {
    artEl.style.display='none';
  }

  // FRONT: Wort (nur Singular auf der Vorderseite)
  document.getElementById('fcDe').textContent=w.de;

  // FRONT: Plural-hint auf Vorderseite (kleiner grauer Text)
  const plFront=document.getElementById('fcPlFront');
  if(w.art && w.pl){
    plFront.textContent='Pl.: '+w.pl;
  } else {
    plFront.textContent='';
  }

  // FRONT: hint
  document.getElementById('fcHint').textContent='Tippen zum Umdrehen 👆';

  // BACK: Bedeutung
  document.getElementById('fcVi').textContent=w.vi;

  // BACK: Plural (prominent)
  const plBack=document.getElementById('fcPlBack');
  if(w.art && w.pl){
    plBack.textContent='Sg: '+w.de+'  ·  Pl: '+w.pl;
  } else {
    plBack.textContent='';
  }

  // BACK: Beispiel
  document.getElementById('fcEx').textContent=w.ex||'';

  // Answer buttons hidden until flipped (learn mode only)
  hideAnswerBtns();

  // Auto TTS
  setTimeout(()=>speakCurrent(),300);
}

/* ── FLIP ── */
function flipCard(){
  if(flipped) return;
  flipped=true;
  document.getElementById('fcCardInner').classList.add('is-flipped');
  document.getElementById('fcHint').textContent='';

  // In learn mode: show Nochmal / Gewusst after flip
  if(mode==='learn'){
    setTimeout(showAnswerBtns, 300);
  }
}

function showAnswerBtns(){
  document.getElementById('btnWrong').classList.add('show');
  document.getElementById('btnOk').classList.add('show');
}
function hideAnswerBtns(){
  document.getElementById('btnWrong').classList.remove('show');
  document.getElementById('btnOk').classList.remove('show');
}

/* ── TTS: Sg. pause Pl. ── */
function speakCurrent(){
  if(!window.speechSynthesis) return;
  const w=queue[cur];
  window.speechSynthesis.cancel();

  if(w.art && w.pl){
    // Sg → pause → Pl
    const u1=new SpeechSynthesisUtterance(w.de);
    u1.lang='de-DE'; u1.rate=0.85;
    const pause=new SpeechSynthesisUtterance(' ');
    pause.lang='de-DE'; pause.rate=0.1; pause.volume=0;
    const u2=new SpeechSynthesisUtterance(w.pl);
    u2.lang='de-DE'; u2.rate=0.85;
    window.speechSynthesis.speak(u1);
    window.speechSynthesis.speak(pause);
    window.speechSynthesis.speak(u2);
  } else {
    const u=new SpeechSynthesisUtterance(w.de);
    u.lang='de-DE'; u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}

/* ── ANSWER ── */
function answer(ok){
  window.speechSynthesis.cancel();
  if(ok){
    correct++;
    cur++;
  } else {
    const w=queue.splice(cur,1)[0];
    queue.splice(Math.min(cur+3, queue.length), 0, w);
  }
  showCard();
}

/* ── WORTSCHATZTEST MODE ── */
// In test mode cards have no Nochmal/Gewusst — tap to flip, swipe right=ok, swipe left=wrong
// Simplified: tap flips, then two buttons appear
// Actually we reuse same flow for both modes

/* ── END ── */
function endSession(){
  window.speechSynthesis.cancel();
  document.getElementById('fcWrap').style.display='none';
  document.getElementById('scoreScreen').classList.add('show');
  if(mode==='learn'){
    document.getElementById('scoreEmoji').textContent='🎉';
    document.getElementById('scoreBig').textContent='Fertig!';
    document.getElementById('scoreMsg').textContent='Alle '+WORDS.length+' Vokabeln durchgelernt!';
  } else {
    const pct=Math.round(correct/10*100);
    document.getElementById('scoreEmoji').textContent=pct>=80?'🏆':pct>=60?'⭐':'💪';
    document.getElementById('scoreBig').textContent=correct+'/10 ('+pct+'%)';
    document.getElementById('scoreMsg').textContent=pct>=80?'Ausgezeichnet!':pct>=60?'Gut gemacht!':'Weiter üben!';
  }
}
function restartTest(){ setMode(mode); }

initDeck();
</script>
</body>
</html>
