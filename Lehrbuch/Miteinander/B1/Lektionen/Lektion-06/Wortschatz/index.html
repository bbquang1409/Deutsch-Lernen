<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lektion 06 – Wortschatz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;--card:#fff;--border:#c5d8ee;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.hdr{background:#1e3a5f;padding:24px 20px 20px;position:relative;overflow:hidden;text-align:center;}
.hdr::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% -10%,#3b82f6 0%,transparent 55%),
             radial-gradient(ellipse at 10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;}
.hdr-inner{position:relative;max-width:700px;margin:0 auto;}
.hdr-tag{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#93c5fd;margin-bottom:6px;}
.hdr h1{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;margin-bottom:4px;}
.hdr p{font-size:13px;color:rgba(255,255,255,.5);}
.hdr-back{display:inline-block;margin-top:14px;background:rgba(255,255,255,.12);
  border-radius:10px;color:#93c5fd;font-size:12px;font-weight:600;padding:7px 16px;text-decoration:none;}

.section-label{max-width:700px;margin:28px auto 10px;padding:0 20px;
  font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--blue);}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;
  max-width:700px;margin:0 auto;padding:0 20px;}
.card{background:var(--card);border-radius:16px;padding:20px 16px;
  box-shadow:0 2px 14px rgba(37,99,235,.09);border:2px solid var(--border);
  cursor:pointer;text-decoration:none;color:var(--ink);transition:all .2s;
  display:flex;flex-direction:column;gap:5px;}
.card:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:0 6px 24px rgba(37,99,235,.17);}
.card-title{font-size:15px;font-weight:800;}
.card-sub{font-size:11px;color:#5b7a99;}

/* Grammatik */
.gram-header{max-width:700px;margin:0 auto;padding:0 20px;}
.gram-toggle{width:100%;background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:18px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;text-align:left;}
.gram-toggle:hover{border-color:var(--blue);}
.gram-toggle-title{font-size:15px;font-weight:800;color:var(--ink);}
.gram-toggle-sub{font-size:11px;color:#5b7a99;margin-top:3px;}
.gram-arrow{font-size:16px;color:var(--blue);transition:transform .25s;flex-shrink:0;}
.gram-arrow.open{transform:rotate(180deg);}
.gram-list{max-width:700px;margin:0 auto;padding:0 20px;display:none;flex-direction:column;gap:8px;padding-top:8px;}
.gram-list.open{display:flex;}
.gram-item{background:#f0f7ff;border:1.5px solid var(--border);border-radius:12px;
  padding:14px 16px;text-decoration:none;color:var(--ink);
  display:flex;align-items:center;justify-content:space-between;transition:all .2s;}
.gram-item:hover{border-color:var(--blue);background:var(--card);}
.gram-item-title{font-size:14px;font-weight:700;}
.gram-item-sub{font-size:11px;color:#5b7a99;margin-top:2px;}
.gram-item-arrow{font-size:14px;color:var(--blue);}
.spacer{height:40px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-tag">Miteinander! B1.1</div>
    <h1>Lektion 06 – Wortschatz</h1>
    <p>Amadou – Miteinander reden</p>
    <a href="../index.html" class="hdr-back">← Zurück zur Übersicht</a>
  </div>
</div>

<div class="section-label">Lernmaterialien</div>
<div class="grid">
  <a href="wortlist.html" class="card">
    <div class="card-title">Wortliste</div>
    <div class="card-sub">Alle Vokabeln mit Beispielen</div>
  </a>
  <a href="mobil.html" class="card">
    <div class="card-title">Mobil Lernen</div>
    <div class="card-sub">Flashcards & Quiz</div>
  </a>
  <a href="taeglicher-test.html" class="card">
    <div class="card-title">Täglicher Test</div>
    <div class="card-sub">50 Fragen · 5 Typen · 15 Min</div>
  </a>
  <a href="uebung.html" class="card">
    <div class="card-title">Übungen</div>
    <div class="card-sub">7 Übungstypen DE→DE</div>
  </a>
</div>

<div class="section-label" style="margin-top:20px;">Grammatik</div>
<div class="gram-header">
  <button class="gram-toggle" onclick="toggleGram()">
    <div>
      <div class="gram-toggle-title">Grammatikübungen</div>
      <div class="gram-toggle-sub" id="gramSub">Lädt…</div>
    </div>
    <div class="gram-arrow" id="gramArrow">▼</div>
  </button>
</div>
<div class="gram-list" id="gramList"></div>
<div class="spacer"></div>

<script>
/* ══ GRAMMATIK CONFIG ══
   Neue Datei hinzufügen → einfach hier eine Zeile ergänzen!
   ══════════════════════ */
const GRAMMATIK_FILES = [
  { file:'grammatik/index.html',
    title:'Grammatikübersicht & Übungen',
    sub:'Fragesätze · Relativsätze · Präteritum · 39 Aufgaben' },
  // { file:'grammatik/uebung2.html', title:'Übung 2 – Konjunktiv II', sub:'10 Aufgaben' },
];

function buildGramList(){
  const list=document.getElementById('gramList');
  const sub=document.getElementById('gramSub');
  sub.textContent=GRAMMATIK_FILES.length+' Übungseinheit'+(GRAMMATIK_FILES.length>1?'en':'')+' verfügbar';
  GRAMMATIK_FILES.forEach(g=>{
    const a=document.createElement('a'); a.href=g.file; a.className='gram-item';
    a.innerHTML=`<div><div class="gram-item-title">${g.title}</div><div class="gram-item-sub">${g.sub}</div></div><div class="gram-item-arrow">→</div>`;
    list.appendChild(a);
  });
  if(GRAMMATIK_FILES.length===1){
    document.getElementById('gramList').classList.add('open');
    document.getElementById('gramArrow').classList.add('open');
  }
}
function toggleGram(){
  document.getElementById('gramList').classList.toggle('open');
  document.getElementById('gramArrow').classList.toggle('open');
}
buildGramList();
</script>
</body>
</html>
