<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root{--blue:#2563eb;--ink:#1e3a5f;--bg:#eef4fb;--card:#fff;--border:#c5d8ee;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  .hdr{background:#1e3a5f;padding:24px 20px 20px;position:relative;overflow:hidden;text-align:center;}
  .hdr::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 80% -10%,#3b82f6 0%,transparent 55%),
               radial-gradient(ellipse at 10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;}
  .hdr-inner{position:relative;max-width:700px;margin:0 auto;}
  .hdr-tag{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#93c5fd;margin-bottom:6px;}
  .hdr h1{font-family:'DM Serif Display',serif;font-size:26px;color:#fff;margin-bottom:4px;}
  .hdr p{font-size:13px;color:rgba(255,255,255,.5);}
  .hdr-back{display:inline-block;margin-top:14px;background:rgba(255,255,255,.12);
    border-radius:10px;color:#93c5fd;font-size:12px;font-weight:600;padding:7px 16px;text-decoration:none;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;
    max-width:700px;margin:30px auto;padding:0 20px 40px;}
  .card{background:var(--card);border-radius:18px;padding:28px 20px;
    box-shadow:0 4px 20px rgba(37,99,235,.1);border:2px solid var(--border);
    text-align:center;cursor:pointer;text-decoration:none;color:var(--ink);
    transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .card:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 8px 30px rgba(37,99,235,.2);}
  .card-icon{width:60px;height:60px;border-radius:16px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--blue);}
  .card-title{font-size:15px;font-weight:800;color:var(--ink);}
  .card-sub{font-size:11px;color:#5b7a99;margin-top:-6px;}
</style>
</head>
<body>
<div class="hdr">

</div>

    <div class="card-title">Wortliste</div>
    <div class="card-sub">Alle Vokabeln</div>
  </a>
  <a href="mobil.html" class="card">
    <div class="card-icon"><i class="fas fa-mobile-alt"></i></div>
    <div class="card-title">Mobil Lernen</div>
    <div class="card-sub">Flashcards & Quiz</div>
  </a>
  <a href="taeglicher-test.html" class="card">
    <div class="card-icon"><i class="fas fa-calendar-check"></i></div>
    <div class="card-title">Täglicher Test</div>
    <div class="card-sub">10 min · mit Score</div>
  </a>
  <a href="uebung.html" class="card">
    <div class="card-icon"><i class="fas fa-puzzle-piece"></i></div>
    <div class="card-title">Übungen</div>
    <div class="card-sub">7 Übungstypen</div>

</div>
