<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lektion 01 – Miteinander B1</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      margin:0; 
      background:#f0f4f8; 
      color:#333; 
      text-align:center; 
      padding:20px; 
      min-height:100vh; 
    }
    h1 { 
      color:#1e40af; 
      margin:20px 0; 
      font-size:2em; 
    }
    .grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); 
      gap:20px; 
      max-width:1000px; 
      margin:40px auto; 
    }
    .card { 
      background:white; 
      border-radius:16px; 
      padding:40px 20px; 
      box-shadow:0 8px 24px rgba(0,0,0,0.1); 
      cursor:pointer; 
      transition:all 0.3s; 
      text-decoration:none; 
      color:inherit; 
    }
    .card:hover { 
      transform:translateY(-10px); 
      box-shadow:0 20px 40px rgba(0,0,0,0.18); 
    }
    .icon { 
      font-size:5em; 
      margin-bottom:15px; 
      color:#3b82f6; 
    }
    .title { 
      font-size:1.8em; 
      color:#1e40af; 
    }
    @media (max-width: 600px) {
      h1 { font-size:1.6em; }
      .card { padding:30px 15px; }
      .icon { font-size:4em; }
      .title { font-size:1.5em; }
    }
  </style>
</head>
<body>

  <h1>Lektion 01</h1>

  <div class="grid">
    <a href="Wortschatz/index.html" class="card">
      <div class="icon"><i class="fas fa-book"></i></div>
      <div class="title">Wortschatz</div>
    </a>

    <a href="Grammatik/grammatik-01.html" class="card">
      <div class="icon"><i class="fas fa-chalkboard-user"></i></div>
      <div class="title">Grammatik</div>
    </a>

    <a href="Übung/uebung-01.html" class="card">
      <div class="icon"><i class="fas fa-edit"></i></div>
      <div class="title">Übung</div>
    </a>
  </div>

</body>
</html>
