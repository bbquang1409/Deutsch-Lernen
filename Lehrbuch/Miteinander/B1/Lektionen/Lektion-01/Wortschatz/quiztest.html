<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lektion 01 – Quiztest</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; padding:40px 20px; background:#f8f9fa; color:#333; line-height:1.6; }
    h1 { color:#1e40af; text-align:center; margin-bottom:30px; }
    .zurueck { display:block; margin:15px 0; color:#3b82f6; text-decoration:none; font-weight:bold; text-align:center; }
    .quiz-container { max-width:900px; margin:0 auto; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .question { font-size:1.2em; font-weight:bold; margin-bottom:15px; }
    .options { display:flex; flex-direction:column; }
    .option { background:#eff6ff; margin-bottom:10px; padding:10px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
    .option:hover { background:#bfdbfe; }
    .option.selected { background:#3b82f6; color:white; }
    .option.correct { background:#10b981; color:white; }
    .option.wrong { background:#ef4444; color:white; }
    #submit-btn { background:#1e40af; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; margin-top:20px; }
    #result { margin-top:20px; font-weight:bold; font-size:1.2em; }
  </style>
</head>
<body>

  <h1>Lektion 01 – Quiztest</h1>
  <a href="index.html" class="zurueck">← Zurück zu den Bereichen</a>

  <div class="quiz-container">
    <div id="quiz"></div>
    <button id="submit-btn">Überprüfen</button>
    <div id="result"></div>
  </div>

  <script>
    // Dữ liệu từ vựng (nhúng trực tiếp, thêm đầy đủ từ vựng của bạn vào đây)
    const vocabulary = [
      { word: 'die Türkei (f.)', correct: 'Thổ Nhĩ Kỳ', wrong: ['Đức', 'Pháp', 'Ý'] },
      { word: 'das Gebäck (n.)', correct: 'bánh ngọt, bánh quy', wrong: ['nước uống', 'món ăn', 'trái cây'] },
      { word: 'die Runde, -n (f.)', correct: 'nhóm bạn, buổi tụ họp', wrong: ['căn phòng', 'con đường', 'sách vở'] },
      { word: 'der Integrationskurs, -e (m.)', correct: 'khóa học hòa nhập', wrong: ['khóa học nấu ăn', 'khóa học lái xe', 'khóa học thể thao'] },
      { word: 'städtisch', correct: 'thuộc thành phố', wrong: ['thuộc nông thôn', 'thuộc núi', 'thuộc biển'] },
      { word: 'die Herausforderung, -en (f.)', correct: 'thách thức', wrong: ['cơ hội', 'dễ dàng', 'thư giãn'] },
      { word: 'die Fremdsprache, -n (f.)', correct: 'ngoại ngữ', wrong: ['ngôn ngữ mẹ đẻ', 'tiếng địa phương', 'tiếng máy tính'] },
      { word: 'fließend', correct: 'thành thạo', wrong: ['kém', 'trung bình', 'hiểu lơ mơ'] },
      { word: 'der Zufall, -e (m.)', correct: 'sự tình cờ', wrong: ['kế hoạch', 'ý định', 'sự sắp đặt'] },
      { word: 'die Software, -s (f.)', correct: 'phần mềm', wrong: ['phần cứng', 'máy tính', 'mạng lưới'] },
      // Thêm đầy đủ từ còn lại vào đây (tương tự mẫu)
      // Ví dụ:
      { word: 'gratulieren', correct: 'chúc mừng', wrong: ['chào hỏi', 'cảm ơn', 'xin lỗi'] },
      { word: 'Klasse!', correct: 'tuyệt vời!', wrong: ['tệ quá', 'bình thường', 'không ổn'] },
      // ... thêm tiếp ...
    ];

    const quizContainer = document.getElementById('quiz');
    const submitBtn = document.getElementById('submit-btn');
    const resultContainer = document.getElementById('result');
    let currentQuiz = [];
    let selections = [];

    function generateQuiz() {
      // Chọn ngẫu nhiên 10-15 từ
      const numQuestions = Math.floor(Math.random() * 6) + 10;
      currentQuiz = vocabulary.sort(() => 0.5 - Math.random()).slice(0, numQuestions);

      let html = '';
      currentQuiz.forEach((item, index) => {
        const options = [item.correct, ...item.wrong].sort(() => 0.5 - Math.random());
        html += `
          <div class="question">Was bedeutet "${item.word}"?</div>
          <div class="options" id="options-${index}">
            ${options.map((opt, i) => `<div class="option" onclick="selectOption(${index}, ${i})">${opt}</div>`).join('')}
          </div>
        `;
      });
      quizContainer.innerHTML = html;
      submitBtn.style.display = 'block';
      resultContainer.innerHTML = '';
      selections = [];
    }

    function selectOption(questionIndex, optionIndex) {
      selections[questionIndex] = optionIndex;
      const options = document.getElementById(`options-${questionIndex}`).querySelectorAll('.option');
      options.forEach(opt => opt.classList.remove('selected'));
      options[optionIndex].classList.add('selected');
    }

    submitBtn.addEventListener('click', () => {
      let score = 0;
      currentQuiz.forEach((item, index) => {
        const selectedOption = document.getElementById(`options-${index}`).querySelectorAll('.option')[selections[index]];
        if (selectedOption.textContent === item.correct) {
          score++;
          selectedOption.classList.add('correct');
        } else {
          selectedOption.classList.add('wrong');
        }
      });
      resultContainer.innerHTML = `Bạn đúng ${score} / ${currentQuiz.length} câu!`;
      submitBtn.style.display = 'none';
      generateQuiz(); // Tạo quiz mới
    });

    generateQuiz();
  </script>

</body>
</html>
