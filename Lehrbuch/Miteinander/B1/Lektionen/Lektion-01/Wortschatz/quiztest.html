<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lektion 01 – Quiztest</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      margin:0; 
      background:#f8f9fa; 
      color:#333; 
      line-height:1.6; 
      padding:20px; 
      min-height:100vh; 
    }
    h1 { 
      color:#1e40af; 
      text-align:center; 
      margin:20px 0; 
      font-size:1.8em; 
    }
    .zurueck { 
      display:block; 
      margin:15px 0; 
      color:#3b82f6; 
      text-decoration:none; 
      font-weight:bold; 
      text-align:center; 
      font-size:1.1em; 
    }
    .mode-buttons { 
      text-align:center; 
      margin:30px 0; 
    }
    .mode-btn { 
      background:#1e40af; 
      color:white; 
      border:none; 
      padding:14px 28px; 
      margin:10px 5px; 
      border-radius:8px; 
      cursor:pointer; 
      font-size:1.2em; 
      width:90%; 
      max-width:400px; 
    }
    .mode-btn:hover { background:#2563eb; }
    .quiz-container { 
      max-width:100%; 
      margin:0 auto; 
      background:white; 
      padding:20px; 
      border-radius:12px; 
      box-shadow:0 4px 16px rgba(0,0,0,0.1); 
    }
    .question { 
      font-size:1.4em; 
      font-weight:bold; 
      margin:20px 0; 
      text-align:center; 
    }
    .options { 
      display:flex; 
      flex-direction:column; 
      gap:12px; 
    }
    .option { 
      background:#eff6ff; 
      padding:16px; 
      border-radius:8px; 
      cursor:pointer; 
      font-size:1.2em; 
      transition:all 0.2s; 
      text-align:center; 
    }
    .option:hover { background:#bfdbfe; }
    .option.selected { background:#3b82f6; color:white; }
    .option.correct { background:#10b981; color:white; }
    .option.wrong { background:#ef4444; color:white; }
    .controls { text-align:center; margin:25px 0; }
    .next-btn, .submit-btn, .retry-btn { 
      background:#1e40af; 
      color:white; 
      border:none; 
      padding:14px 32px; 
      border-radius:8px; 
      cursor:pointer; 
      font-size:1.2em; 
      margin:10px; 
      width:90%; 
      max-width:400px; 
    }
    .next-btn:hover, .submit-btn:hover, .retry-btn:hover { background:#2563eb; }
    #result { 
      margin-top:30px; 
      font-size:1.4em; 
      font-weight:bold; 
      text-align:center; 
      color:#1e40af; 
    }
    @media (max-width: 600px) {
      .mode-btn, .next-btn, .submit-btn, .retry-btn { width:100%; margin:10px 0; }
      .quiz-container { padding:15px; }
      .question { font-size:1.3em; }
      .option { font-size:1.1em; padding:14px; }
    }
  </style>
</head>
<body>

  <h1>Lektion 01 – Quiztest</h1>
  <a href="index.html" class="zurueck">← Zurück zu den Bereichen</a>

  <div class="mode-buttons">
    <button class="mode-btn" onclick="startFullMode()">Toàn bộ danh sách (Học bài)</button>
    <button class="mode-btn" onclick="startRandomMode()">Zufalltest 10 từ</button>
  </div>

  <div class="quiz-container" id="quizContainer" style="display:none;">
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div class="controls">
      <button class="next-btn" id="nextBtn" style="display:none;">Tiếp theo</button>
      <button class="submit-btn" id="submitBtn" style="display:none;">Überprüfen</button>
      <button class="retry-btn" id="retryBtn" style="display:none;">Nächste</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    // Toàn bộ từ vựng (đã đầy đủ từ ảnh bạn gửi)
    const vocabulary = [
      { word: 'die Türkei', meaning: 'Thổ Nhĩ Kỳ' },
      { word: 'das Gebäck', meaning: 'bánh ngọt, bánh quy' },
      { word: 'die Runde, die Runden', meaning: 'buổi tụ họp, nhóm bạn' },
      { word: 'der Integrationskurs, die Integrationskurse', meaning: 'khóa học hòa nhập' },
      { word: 'städtisch', meaning: 'thuộc thành phố' },
      { word: 'die Herausforderung, die Herausforderungen', meaning: 'thách thức' },
      { word: 'die Fremdsprache, die Fremdsprachen', meaning: 'ngoại ngữ' },
      { word: 'fließend', meaning: 'thành thạo' },
      { word: 'der Zufall, die Zufälle', meaning: 'sự tình cờ' },
      { word: 'die Software, die Softwares', meaning: 'phần mềm' },
      { word: 'gratulieren', meaning: 'chúc mừng' },
      { word: 'Klasse', meaning: 'tuyệt vời' },
      { word: 'nützlich', meaning: 'hữu ích' },
      { word: 'die Möglichkeit, die Möglichkeiten', meaning: 'cơ hội, khả năng' },
      { word: 'die Weiterbildung, die Weiterbildungen', meaning: 'đào tạo nâng cao' },
      { word: 'die Industrie, die Industrien', meaning: 'công nghiệp' },
      { word: 'der Meister, die Meister', meaning: 'thợ bậc thầy' },
      { word: 'die Meisterin, die Meisterinnen', meaning: 'nữ thợ bậc thầy' },
      { word: 'finanziell', meaning: 'về tài chính' },
      { word: 'die Förderung, die Förderungen', meaning: 'hỗ trợ, tài trợ' },
      { word: 'das Klima, die Klimate', meaning: 'khí hậu' },
      { word: 'überhaupt', meaning: 'hoàn toàn, nói chung' },
      { word: 'übrigens', meaning: 'nhân tiện' },
      { word: 'überprüfen', meaning: 'kiểm tra' },
      { word: 'die Diät, die Diäten', meaning: 'chế độ ăn kiêng' },
      { word: 'faul', meaning: 'lười biếng' },
      { word: 'obwohl', meaning: 'mặc dù' },
      { word: 'die Erholung', meaning: 'sự nghỉ ngơi' },
      { word: 'die Spur, die Spuren', meaning: 'dấu vết' },
      { word: 'nämlich', meaning: 'cụ thể là' },
      { word: 'schweigen', meaning: 'im lặng' },
      { word: 'die Reaktion, die Reaktionen', meaning: 'phản ứng' },
      { word: 'die Gewohnheit, die Gewohnheiten', meaning: 'thói quen' },
      { word: 'ständig', meaning: 'liên tục' },
      { word: 'der Blutdruck', meaning: 'huyết áp' },
      { word: 'das Blut', meaning: 'máu' },
      { word: 'der Druck', meaning: 'áp lực' },
      { word: 'der Puls', meaning: 'mạch' },
      { word: 'verbrauchen', meaning: 'tiêu thụ' },
      { word: 'halt', meaning: 'thì thôi' },
      { word: 'die Leistung, die Leistungen', meaning: 'thành tích, hiệu suất' },
      { word: 'die Rolle, die Rollen', meaning: 'vai trò' },
      { word: 'die Gefahr, die Gefahren', meaning: 'nguy hiểm' },
      { word: 'beachten', meaning: 'chú ý' },
      { word: 'die Teilnahme, die Teilnahmen', meaning: 'sự tham gia' },
      { word: 'die Vorsorge', meaning: 'sự phòng ngừa' },
      { word: 'regelmäßig', meaning: 'thường xuyên' },
      { word: 'die Impfung, die Impfungen', meaning: 'tiêm chủng' },
      { word: 'die Mitgliedschaft, die Mitgliedschaften', meaning: 'tư cách thành viên' },
      { word: 'der Raucher, die Raucher / die Raucherin, die Raucherinnen', meaning: 'người hút thuốc' },
      { word: 'wertvoll', meaning: 'giá trị' },
      { word: 'sich testen', meaning: 'tự kiểm tra' },
      { word: 'das Interview, die Interviews', meaning: 'cuộc phỏng vấn' },
      { word: 'das Mitglied, die Mitglieder', meaning: 'thành viên' },
      { word: 'teilnehmen', meaning: 'tham gia' },
      { word: 'Sport treiben', meaning: 'chơi thể thao' },
      { word: 'sinnvoll', meaning: 'có ý nghĩa' },
      { word: 'seltsam', meaning: 'lạ lùng' },
      { word: 'negativ', meaning: 'tiêu cực' },
      { word: 'der Tagesablauf', meaning: 'lịch trình trong ngày' },
      { word: 'angenehm', meaning: 'thư giãn, dễ chịu' },
      { word: 'die Eile', meaning: 'sự vội vã' },
      { word: 'treu', meaning: 'trung thành' },
      { word: 'sich wohl fühlen', meaning: 'cảm thấy khỏe' },
      { word: 'zuverlässig', meaning: 'đáng tin cậy' },
      { word: 'das Abenteuer', meaning: 'cuộc phiêu lưu' },
      { word: 'maximal', meaning: 'tối đa' },
      { word: 'ankreuzen', meaning: 'đánh dấu' },
      { word: 'fest', meaning: 'cố định' },
      { word: 'derselbe / dieselbe / dasselbe', meaning: 'cùng một' }
    ];

    const quizContainer = document.getElementById('quizContainer');
    const questionDiv = document.getElementById('question');
    const optionsDiv = document.getElementById('options');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const retryBtn = document.getElementById('retryBtn');
    const resultDiv = document.getElementById('result');

    let mode = '';
    let currentIndex = 0;
    let score = 0;
    let questionsAnswered = 0;
    let currentQuestion = null;
    let selectedOption = null;

    function startFullMode() {
      mode = 'full';
      currentIndex = 0;
      score = 0;
      quizContainer.style.display = 'block';
      generateFullQuestion();
    }

    function startRandomMode() {
      mode = 'random';
      currentIndex = 0;
      score = 0;
      questionsAnswered = 0;
      quizContainer.style.display = 'block';
      generateRandomQuestion();
    }

    function generateFullQuestion() {
      currentQuestion = vocabulary[currentIndex];
      questionDiv.textContent = `Was bedeutet "${currentQuestion.word}"?`;
      const options = [currentQuestion.meaning];
      while (options.length < 4) {
        const random = vocabulary[Math.floor(Math.random() * vocabulary.length)].meaning;
        if (!options.includes(random)) options.push(random);
      }
      options.sort(() => Math.random() - 0.5);
      optionsDiv.innerHTML = '';
      options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = opt;
        div.onclick = () => selectOption(div, opt === currentQuestion.meaning);
        optionsDiv.appendChild(div);
      });
      submitBtn.style.display = 'block';
      nextBtn.style.display = 'none';
      retryBtn.style.display = 'none';
      resultDiv.textContent = '';
      selectedOption = null;
    }

    function generateRandomQuestion() {
      if (questionsAnswered >= 10) {
        resultDiv.textContent = `Bạn đúng ${score} / 10 câu!`;
        retryBtn.style.display = 'block';
        submitBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsDiv.innerHTML = '';
        questionDiv.textContent = '';
        return;
      }
      currentQuestion = vocabulary[Math.floor(Math.random() * vocabulary.length)];
      questionDiv.textContent = `Was bedeutet "${currentQuestion.word.split(',')[0].trim()}"?`; // Chỉ hiển thị số ít
      const options = [currentQuestion.meaning];
      while (options.length < 4) {
        const random = vocabulary[Math.floor(Math.random() * vocabulary.length)].meaning;
        if (!options.includes(random)) options.push(random);
      }
      options.sort(() => Math.random() - 0.5);
      optionsDiv.innerHTML = '';
      options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = opt;
        div.onclick = () => selectOption(div, opt === currentQuestion.meaning);
        optionsDiv.appendChild(div);
      });
      submitBtn.style.display = 'block';
      nextBtn.style.display = 'none';
      retryBtn.style.display = 'none';
      resultDiv.textContent = '';
      selectedOption = null;
    }

    function selectOption(element, isCorrect) {
      selectedOption = element;
      const options = optionsDiv.querySelectorAll('.option');
      options.forEach(opt => opt.classList.remove('selected'));
      element.classList.add('selected');
      if (isCorrect) {
        element.classList.add('correct');
        speakWord(currentQuestion.word);
        resultDiv.textContent = 'Richtig!';
        submitBtn.style.display = 'none';
        if (mode === 'full') {
          setTimeout(() => {
            currentIndex = (currentIndex + 1) % vocabulary.length;
            generateFullQuestion();
          }, 1500);
        } else {
          questionsAnswered++;
          score++;
          setTimeout(generateRandomQuestion, 1500);
        }
      } else {
        element.classList.add('wrong');
        resultDiv.textContent = 'Falsch. Noch mal bitte.';
      }
    }

    retryBtn.addEventListener('click', () => {
      startRandomMode();
    });
  </script>

</body>
</html>
