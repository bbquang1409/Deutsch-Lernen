<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L08 Übung – Übersicht</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap');

    :root {
      --teal:   #1a7f6e;
      --teal-d: #0f4c3a;
      --teal-l: #e0f5f1;
      --gold:   #f5d000;
      --bg:     #f0faf8;
      --dark:   #1a2a2e;
      --gray:   #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; padding-bottom: 60px; }

    /* HEADER */
    .header { background: linear-gradient(135deg, var(--teal-d) 0%, var(--teal) 100%); color: white; padding: 20px 16px 28px; position: relative; overflow: hidden; text-align: center; }
    .header::before { content: ''; position: absolute; top: -30px; right: -30px; width: 130px; height: 130px; background: rgba(255,255,255,0.08); border-radius: 50%; }
    .header::after  { content: ''; position: absolute; bottom: -20px; left: 35%; width: 90px; height: 90px; background: rgba(245,208,0,0.12); border-radius: 50%; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.18); color: white; border: none; border-radius: 20px; padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; margin-bottom: 14px; }
    .header-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; margin-bottom: 6px; font-family: 'Nunito', sans-serif; }
    .header h1 { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; line-height: 1.2; }
    .header h1 em { color: var(--gold); font-style: normal; }
    .header-sub { font-size: 13px; opacity: 0.85; margin-top: 6px; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; max-width: 700px; margin: 28px auto; padding: 0 16px; }

    .skill-card { background: white; border-radius: 16px; padding: 28px 18px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 2px solid var(--teal-l); text-align: center; text-decoration: none; color: var(--dark); display: flex; flex-direction: column; align-items: center; gap: 12px; transition: all 0.22s; }
    .skill-card:hover { transform: translateY(-6px); border-color: var(--teal); box-shadow: 0 12px 32px rgba(26,127,110,0.18); }

    .skill-icon { width: 64px; height: 64px; border-radius: 18px; background: var(--teal-l); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--teal); flex-shrink: 0; }
    .skill-title { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: var(--teal-d); }
    .skill-sub { font-size: 12px; color: var(--gray); line-height: 1.4; margin-top: -6px; }

    .footer { text-align: center; padding: 24px; font-size: 11px; color: #8aa3bc; }
  </style>
</head>
<body>

<div class="header">
  <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Zurück</a>
  <div class="header-label">Lektion 08 · Übung</div>
  <h1>Hoa – <em>Der Glückspilz</em></h1>
  <div class="header-sub">Wähle eine Übungsart</div>
</div>

<div class="grid">

  <a href="hoeren.html" class="skill-card">
    <div class="skill-icon"><i class="fas fa-headphones"></i></div>
    <div class="skill-title">Hören</div>
    <div class="skill-sub">Hörverständnis & Aufgaben</div>
  </a>

  <!-- Weitere Übungen können hier ergänzt werden -->

</div>

<div class="footer">Made with love by BBQ</div>

</body>
</html>
