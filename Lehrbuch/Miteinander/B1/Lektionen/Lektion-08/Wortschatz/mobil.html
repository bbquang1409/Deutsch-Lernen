<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mobil Lernen – Lektion 08</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef4fb;--card:#fff;--ink:#1e3a5f;--muted:#5b7a99;--border:#c5d8ee;
  --blue:#2563eb;--blue-lt:#dbeafe;--green:#16a34a;--green-lt:#dcfce7;--rose:#e11d48;--rose-lt:#ffe4e6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:60px;}
header{background:#1e3a5f;color:#fff;padding:28px 20px 24px;position:relative;overflow:hidden;text-align:center;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% -10%,#3b82f6 0%,transparent 55%),radial-gradient(ellipse at 10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;}
header .inner{position:relative;}
.hd-tag{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#93c5fd;margin-bottom:6px;}
header h1{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px;}
header p{font-size:13px;color:rgba(255,255,255,.55);}
.hdr-back{display:inline-block;margin-top:12px;background:rgba(255,255,255,.13);border-radius:10px;color:#93c5fd;font-size:12px;font-weight:600;padding:7px 16px;text-decoration:none;border:1px solid rgba(255,255,255,.15);}
.mode-wrap{max-width:440px;margin:24px auto 0;padding:0 16px;display:flex;gap:10px;}
.mode-btn{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.fc-wrap{max-width:440px;margin:0 auto;padding:20px 16px;}
.fc-progress{background:var(--border);border-radius:99px;height:6px;margin-bottom:6px;}
.fc-progress-bar{background:var(--blue);height:6px;border-radius:99px;transition:width .4s;}
.fc-counter{text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px;}
.fc-card{background:var(--card);border-radius:20px;box-shadow:0 4px 24px rgba(37,99,235,.13);padding:36px 24px;text-align:center;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:transform .1s;border:2px solid var(--border);}
.fc-card:active{transform:scale(.98);}
.fc-art{font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-lt);padding:4px 12px;border-radius:99px;}
.fc-de{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);line-height:1.2;}
.fc-vi{font-size:20px;color:var(--muted);display:none;}
.fc-ex{font-size:13px;color:#64748b;font-style:italic;display:none;line-height:1.5;max-width:320px;}
.fc-tap{font-size:13px;color:#94a3b8;margin-top:4px;}
.fc-card.flipped .fc-vi{display:block;}
.fc-card.flipped .fc-ex{display:block;}
.fc-card.flipped .fc-tap{display:none;}
.tts-btn{background:var(--blue-lt);border:none;border-radius:99px;width:44px;height:44px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:background .15s;flex-shrink:0;}
.tts-btn:hover{background:#bfdbfe;}
.fc-btns{display:flex;gap:12px;margin-top:16px;}
.fc-btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .1s;}
.fc-btn:active{transform:scale(.97);}
.fc-btn-wrong{background:var(--rose-lt);color:var(--rose);}
.fc-btn-ok{background:var(--green-lt);color:var(--green);}
.main-hidden{display:none;}
.score-screen{display:none;max-width:440px;margin:40px auto;padding:0 16px;text-align:center;}
.score-screen.show{display:block;}
.score-emoji{font-size:56px;margin-bottom:12px;}
.score-big{font-family:'DM Serif Display',serif;font-size:48px;color:var(--blue);}
.score-msg{font-size:16px;color:var(--muted);margin:8px 0 24px;}
.btn-restart{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin:6px;}
.btn-back{background:var(--card);color:var(--ink);border:2px solid var(--border);border-radius:14px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;margin:6px;}
.footer{text-align:center;padding:20px;font-size:11px;color:#8aa3bc;}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div class="hd-tag">LEKTION 08 · MOBIL LERNEN</div>
    <h1>Hoa – Der Glückspilz</h1>
    <p id="modeLabel">Alle Vokabeln lernen</p>
    <a href="index.html" class="hdr-back">← Zurück zur Übersicht</a>
  </div>
</header>
<div class="mode-wrap">
  <button class="mode-btn active" id="btnLearn" onclick="setMode('learn')">📚 Vokabeln lernen</button>
  <button class="mode-btn" id="btnTest" onclick="setMode('test')">🎯 Wortschatztest</button>
</div>
<div class="fc-wrap" id="fcWrap">
  <div class="fc-progress"><div class="fc-progress-bar" id="fcBar" style="width:0%"></div></div>
  <div class="fc-counter" id="fcCounter">1 / —</div>
  <div class="fc-card" id="fcCard" onclick="flipCard()">
    <button class="tts-btn" id="ttsBtn" onclick="event.stopPropagation();speakCurrent()">🔊</button>
    <div class="fc-art" id="fcArt"></div>
    <div class="fc-de" id="fcDe">Lade…</div>
    <div class="fc-vi" id="fcVi"></div>
    <div class="fc-ex" id="fcEx"></div>
    <div class="fc-tap" id="fcTap">Tippen zum Umdrehen</div>
  </div>
  <div class="fc-btns main-hidden" id="fcBtns">
    <button class="fc-btn fc-btn-wrong" onclick="answer(false)">✗ Nochmal</button>
    <button class="fc-btn fc-btn-ok" onclick="answer(true)">✓ Gewusst</button>
  </div>
</div>
<div class="score-screen" id="scoreScreen">
  <div class="score-emoji" id="scoreEmoji">⭐</div>
  <div class="score-big" id="scoreBig"></div>
  <div class="score-msg" id="scoreMsg"></div>
  <button class="btn-restart" onclick="restartTest()">🔄 Nochmal</button>
  <a href="index.html" class="btn-back">← Zurück</a>
</div>
<div class="footer">Made with love by BBQ</div>
<script>
const WORDS=[
  {de:"tauschen",art:"",vi:"hoán đổi / trao đổi",ex:"Sie tauschen heute die Rollen."},
  {de:"der Versuch",art:"der",vi:"lần thử / thí nghiệm",ex:"Hoa braucht mehrere Versuche."},
  {de:"der Metzger",art:"der",vi:"người bán thịt / thợ làm thịt",ex:"Er ist nicht Metzger und auch nicht Erzieher."},
  {de:"das Tier",art:"das",vi:"con vật / động vật",ex:"Sag mal, mag Tessa eigentlich Tiere? – Ja, besonders Katzen."},
  {de:"das Kraftfahrzeug",art:"das",vi:"xe có động cơ / phương tiện cơ giới",ex:"Kostja ist Kfz-Mechatroniker."},
  {de:"der Spezialist",art:"der",vi:"chuyên gia",ex:"Ich wollte immer schon Spezialist für Elektromotoren werden."},
  {de:"der Bereich",art:"der",vi:"lĩnh vực / khu vực",ex:"In vielen Bereichen fehlen Fachkräfte."},
  {de:"die Fachkraft",art:"die",vi:"lao động có chuyên môn",ex:"Es werden Fachkräfte in der Gastronomie gesucht."},
  {de:"die Gaststätte",art:"die",vi:"quán ăn / nhà hàng",ex:"Es werden Fachkräfte in der Gastronomie gesucht, also z. B. in Gaststätten."},
  {de:"leiden",art:"",vi:"chịu đựng / thiếu hụt",ex:"Auch das Handwerk leidet sehr unter dem Fachkräftemangel."},
  {de:"klassisch",art:"",vi:"cổ điển / truyền thống",ex:"Nicht nur die klassischen Lehrlinge werden gesucht."},
  {de:"der Lehrling",art:"der",vi:"học nghề / thực tập sinh",ex:"Nicht nur die klassischen Lehrlinge werden gesucht."},
  {de:"die Aussicht",art:"die",vi:"triển vọng / viễn cảnh",ex:"Auch ältere Bewerber*innen haben sehr gute Aussichten."},
  {de:"staatlich",art:"",vi:"thuộc nhà nước / công lập",ex:"Die meisten wissen nicht, dass es staatliche Unterstützung gibt."},
  {de:"die Tätigkeit",art:"die",vi:"hoạt động / công việc",ex:"Wenn Sie eine neue Tätigkeit haben wollen, informieren Sie sich."},
  {de:"das Bundesland",art:"das",vi:"tiểu bang liên bang",ex:"In jedem Bundesland bieten Handelskammern Beratungsgespräche an."},
  {de:"die Grafik",art:"die",vi:"biểu đồ / đồ thị",ex:"Die Grafik zeigt eine ziemlich geringe Zahl von Personen."},
  {de:"das Einkommen",art:"das",vi:"thu nhập",ex:"Jeder Dritte freut sich über ein höheres Einkommen nach der Weiterbildung!"},
  {de:"die Stelle",art:"die",vi:"vị trí / chỗ làm",ex:"Fast die Hälfte bekommt sofort eine bessere Stelle."},
  {de:"der Wissenschaftler",art:"der",vi:"nhà khoa học",ex:"Ich finde, Wissenschaftler ist ein interessanterer Beruf als Architekt."},
  {de:"der Architekt",art:"der",vi:"kiến trúc sư",ex:"Ich finde, Wissenschaftler ist ein interessanterer Beruf als Architekt."},
  {de:"der Hase",art:"der",vi:"con thỏ",ex:"Meiner Tochter gefällt der kleinere Hase mit den längeren Ohren."},
  {de:"das Wissen",art:"das",vi:"kiến thức / tri thức",ex:"80 Prozent geben an, dass sie mehr Wissen im Beruf haben."},
  {de:"betragen",art:"",vi:"đạt / lên đến (số lượng)",ex:"Der Anteil der Leute, die mehr Gehalt bekommen, beträgt 34 Prozent."},
  {de:"die Verbesserung",art:"die",vi:"sự cải thiện / cải tiến",ex:"Die Grafik zeigt, welche Verbesserungen eine Weiterbildung bringt."},
  {de:"der Wert",art:"der",vi:"giá trị / con số",ex:"Die Werte für mehr Selbstbewusstsein liegen bei 62 Prozent."},
  {de:"der Link",art:"der",vi:"đường dẫn / liên kết",ex:"Danke für den Link!"},
  {de:"die Seite",art:"die",vi:"trang web / trang sách",ex:"Sieh mal, was ich auf der Seite gefunden habe!"},
  {de:"garantieren",art:"",vi:"đảm bảo / bảo đảm",ex:"Als Handwerker bekommt man nach der Ausbildung garantiert einen Job."},
  {de:"der Zweifel",art:"der",vi:"sự nghi ngờ / hoài nghi",ex:"Jetzt gibt es keine Zweifel mehr, denn es passt genau!"},
  {de:"das Semester",art:"das",vi:"học kỳ",ex:"Er studiert im 3. Semester Elektrotechnik an einer Hochschule."},
  {de:"die Hochschule",art:"die",vi:"trường đại học / cao đẳng",ex:"Er studiert Elektrotechnik an einer Hochschule."},
  {de:"das Labor",art:"das",vi:"phòng thí nghiệm",ex:"Sie arbeitet jetzt als Zahntechnikerin in einem Labor."},
  {de:"die Nachfrage",art:"die",vi:"nhu cầu / sự hỏi thăm",ex:"Große Nachfrage nach Nachhilfe: Katalog mit Angeboten erschienen."},
  {de:"erscheinen",art:"",vi:"xuất hiện / được xuất bản",ex:"Katalog mit aktuellen Angeboten erschienen."},
  {de:"die Krippe",art:"die",vi:"nhà trẻ",ex:"Pünktlicher Umzug der Krippe in neues Gebäude."},
  {de:"der Reiseführer",art:"der",vi:"hướng dẫn viên du lịch",ex:"Junger Reiseführer sucht interessanten Job."},
  {de:"schließlich",art:"",vi:"cuối cùng / rốt cuộc",ex:"Schließlich habe ich mich für eine Umschulung entschieden."},
  {de:"der Kaufmann",art:"der",vi:"thương nhân / nhân viên kinh doanh",ex:"In meinem Heimatland war ich Kaufmann."},
  {de:"das Institut",art:"das",vi:"viện / học viện",ex:"Ein Institut ist eine Bildungs- oder Forschungseinrichtung."},
  {de:"die Studierende",art:"die",vi:"sinh viên đại học",ex:"Studierende sind Personen aller Geschlechter, die an einer Uni lernen."},
  {de:"die Technologie",art:"die",vi:"công nghệ",ex:"Technologien sind technische Geräte und Methoden."},
  {de:"die Kompetenz",art:"die",vi:"năng lực / khả năng",ex:"Kompetenzen sind das Wissen und die Fähigkeiten im Beruf."},
  {de:"technisch",art:"",vi:"thuộc kỹ thuật / kỹ thuật",ex:"Eine Fortbildung bringt neue Kenntnisse zu technischen Geräten."},
  {de:"sich beschäftigen",art:"",vi:"bận rộn / bận tâm",ex:"Es gibt ein paar Fragen, mit denen Sie sich beschäftigen müssen."},
  {de:"die Terrasse",art:"die",vi:"sân thượng / hiên nhà",ex:"Das Café hat eine Terrasse, auf der es angenehm ruhig ist."},
  {de:"sich eignen",art:"",vi:"phù hợp / thích hợp",ex:"Für die sich die teure Fortbildung wirklich eignet."},
  {de:"usw.",art:"",vi:"vân vân / v.v.",ex:"Wie kann man Miete, Essen usw. bezahlen?"},
];
let mode='learn';
let queue=[];
let current=0;
let flipped=false;
let correct=0;
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function setMode(m){
  mode=m;
  document.getElementById('btnLearn').classList.toggle('active',m==='learn');
  document.getElementById('btnTest').classList.toggle('active',m==='test');
  document.getElementById('modeLabel').textContent=m==='learn'?'Alle Vokabeln lernen':'Wortschatztest – 10 Karten';
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('fcWrap').style.display='block';
  initDeck();
}
function initDeck(){
  queue=mode==='learn'?shuffle(WORDS):shuffle(WORDS).slice(0,10);
  current=0;correct=0;flipped=false;
  updateCard();
}
function updateCard(){
  if(current>=queue.length){endSession();return;}
  const w=queue[current];
  flipped=false;
  document.getElementById('fcCard').classList.remove('flipped');
  const artEl=document.getElementById('fcArt');
  artEl.textContent=w.art||'';
  artEl.style.display=w.art?'inline-block':'none';
  document.getElementById('fcDe').textContent=w.de;
  document.getElementById('fcVi').textContent=w.vi;
  document.getElementById('fcEx').textContent=w.ex||'';
  document.getElementById('fcTap').style.display='block';
  document.getElementById('fcBtns').classList.toggle('main-hidden',mode==='learn');
  const pct=Math.round(current/queue.length*100);
  document.getElementById('fcBar').style.width=pct+'%';
  document.getElementById('fcCounter').textContent=(current+1)+' / '+queue.length;
  setTimeout(()=>speakCurrent(),300);
}
function flipCard(){
  if(flipped)return;
  flipped=true;
  document.getElementById('fcCard').classList.add('flipped');
  if(mode==='learn') document.getElementById('fcBtns').classList.remove('main-hidden');
}
function speakCurrent(){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(queue[current].de.replace(/[()\/]/g,' '));
  u.lang='de-DE';u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function answer(ok){
  if(ok){correct++;current++;updateCard();}
  else{const w=queue.splice(current,1)[0];const pos=Math.min(current+3,queue.length);queue.splice(pos,0,w);updateCard();}
}
function endSession(){
  document.getElementById('fcWrap').style.display='none';
  const screen=document.getElementById('scoreScreen');
  screen.classList.add('show');
  if(mode==='learn'){
    document.getElementById('scoreEmoji').textContent='🎉';
    document.getElementById('scoreBig').textContent='Fertig!';
    document.getElementById('scoreMsg').textContent='Sie haben alle '+WORDS.length+' Vokabeln durchgelernt.';
  }else{
    const pct=Math.round(correct/10*100);
    document.getElementById('scoreEmoji').textContent=pct>=80?'🏆':pct>=60?'⭐':'💪';
    document.getElementById('scoreBig').textContent=correct+'/10 ('+pct+'%)';
    document.getElementById('scoreMsg').textContent=pct>=80?'Ausgezeichnet!':pct>=60?'Gut gemacht!':'Weiter üben!';
  }
}
function restartTest(){setMode(mode);}
initDeck();
</script>
</body>
</html>
