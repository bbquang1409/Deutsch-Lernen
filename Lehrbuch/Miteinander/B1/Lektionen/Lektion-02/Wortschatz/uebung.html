<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lektion 02 – Übungen</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      margin:0; 
      background:#f0f4f8; 
      color:#333; 
      text-align:center; 
      padding:20px; 
      min-height:100vh; 
    }
    h1 { 
      color:#1e40af; 
      margin:20px 0; 
      font-size:2em; 
    }
    .zurueck { 
      display:block; 
      margin:15px 0; 
      color:#3b82f6; 
      text-decoration:none; 
      font-weight:bold; 
      font-size:1.2em; 
    }
    .grid { 
      display:grid; 
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); 
      gap:25px; 
      max-width:1000px; 
      margin:40px auto; 
    }
    .card { 
      background:white; 
      border-radius:16px; 
      padding:40px 20px; 
      box-shadow:0 8px 24px rgba(0,0,0,0.1); 
      cursor:pointer; 
      transition:all 0.3s; 
      text-decoration:none; 
      color:inherit; 
      position: relative; 
      overflow: hidden; 
    }
    .card:hover { 
      transform:translateY(-10px); 
      box-shadow:0 20px 40px rgba(0,0,0,0.18); 
    }
    .icon { 
      font-size:5em; 
      margin-bottom:15px; 
      color:#3b82f6; 
    }
    .title { 
      font-size:1.8em; 
      color:#1e40af; 
    }
    .new-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ef4444;
      color: white;
      font-size: 0.8em;
      padding: 4px 8px;
      border-radius: 12px;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      h1 { font-size:1.6em; }
      .card { padding:30px 15px; }
      .icon { font-size:4em; }
      .title { font-size:1.5em; }
    }
  </style>
</head>
<body>

  <h1>Lektion 02 – Übungen</h1>
  <a href="index.html" class="zurueck">← Zurück zu Wortschatz</a>

  <div class="grid" id="uebungGrid"></div>

  <script>
    const uebungen = [
      { file: 'uebung-01.html', title: 'Übung 1: Was passt? Ergänzen Sie.' },
      { file: 'uebung-02.html', title: 'Übung 2: Ergänzen Sie die Wörter.' },
      { file: 'taglicher-test.html', title: 'Täglicher Vokabeltest', icon: 'fa-clock', badge: 'Täglich' },
      { file: 'uebung-03.html', title: 'Übung 3: Lesen und denken Sie.', icon: 'fa-brain' }
    ];

    const grid = document.getElementById('uebungGrid');

    uebungen.forEach(uebung => {
      const card = document.createElement('a');
      card.href = uebung.file;
      card.className = 'card';
      card.innerHTML = `
        ${uebung.badge ? '<span class="new-badge">' + uebung.badge + '</span>' : ''}
        <div class="icon"><i class="fas ${uebung.icon || 'fa-file-lines'}"></i></div>
        <div class="title">${uebung.title}</div>
      `;
      grid.appendChild(card);
    });
  </script>

</body>
</html>
