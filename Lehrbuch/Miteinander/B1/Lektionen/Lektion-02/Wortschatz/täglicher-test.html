<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Täglicher Vokabeltest – Lektion 02</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#f8f9fa; color:#333; min-height:100vh; padding:15px; }
    h1 { color:#1e40af; text-align:center; margin:20px 0; font-size:1.8em; }
    .container { max-width:900px; margin:0 auto; background:white; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.1); }
    .name-input { margin:30px auto; max-width:400px; }
    .name-input input { width:100%; padding:14px; font-size:1.3em; border:2px solid #3b82f6; border-radius:10px; text-align:center; }
    .start-btn { background:#1e40af; color:white; border:none; padding:14px 40px; font-size:1.3em; border-radius:10px; margin:20px auto; display:block; cursor:pointer; }
    .timer { text-align:center; font-size:1.8em; font-weight:bold; margin:10px 0; color:#1e40af; }
    .timer.low { color:#ef4444; }
    .question { font-size:1.4em; font-weight:bold; margin:25px 0; text-align:center; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .option { background:#eff6ff; padding:16px; border-radius:10px; cursor:pointer; font-size:1.2em; transition:all 0.2s; }
    .option:hover { background:#bfdbfe; }
    .option.selected { background:#3b82f6; color:white; }
    .option.correct { background:#10b981; color:white; }
    .option.wrong { background:#ef4444; color:white; }
    .result { text-align:center; margin:40px 0; }
    .name-result { font-size:2.8em; font-weight:bold; color:#1e40af; margin:20px 0; }
    .score { font-size:3em; font-weight:bold; margin:15px 0; }
    .evaluation { font-size:1.6em; margin:20px 0; }
    .datetime { color:#666; margin-top:30px; font-size:1.2em; }
  </style>
</head>
<body>

  <h1>Täglicher Vokabeltest – Lektion 02</h1>

  <div class="container" id="startScreen">
    <h2>Wie heißen Sie?</h2>
    <div class="name-input">
      <input type="text" id="userName" placeholder="Ihr Name" autocomplete="off">
    </div>
    <button class="start-btn" onclick="startTest()">Test starten</button>
  </div>

  <div class="container" id="quizScreen" style="display:none;">
    <div class="timer" id="timer">10:00</div>
    <div id="progress" style="text-align:center; font-size:1.3em; margin-bottom:15px;"></div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
  </div>

  <div class="container" id="resultScreen" style="display:none;">
    <div class="result">
      <div id="userNameResult" class="name-result"></div>
      <div id="scoreResult" class="score"></div>
      <div id="evaluation" class="evaluation"></div>
      <div id="datetime" class="datetime"></div>
    </div>
    <button class="start-btn" onclick="restartTest()">Neuer Test</button>
  </div>

  <!-- Nút Ende und zurück -->
  <button class="end-btn" onclick="endExercise()">Ende und zurück</button>

  <style>
    .end-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .end-btn:hover { background: #dc2626; }
  </style>

  <script>
    // === TỪ VỰNG Lektion 02 (copy từ wortlist) ===
    const vocabulary = [
      { de: "die Lage", vi: "vị trí, địa điểm" },
      { de: "fröhlich", vi: "vui vẻ, rực rỡ, tươi sáng" },
      { de: "der Einbrecher", vi: "kẻ đột nhập" },
      { de: "die Einbrecherin", vi: "kẻ đột nhập (nữ)" },
      { de: "zuletzt", vi: "lần cuối cùng, gần đây nhất" },
      { de: "fliehen", vi: "chạy trốn, trốn thoát" },
      { de: "der Bart", vi: "bộ râu" },
      { de: "der Turnschuh", vi: "giày thể thao" },
      { de: "die Aufschrift", vi: "dòng chữ, chữ in trên áo" },
      { de: "die Kripo", vi: "cảnh sát hình sự" },
      { de: "aufmerksam", vi: "chú ý, cẩn thận" },
      { de: "anlassen", vi: "để bật (đèn, thiết bị)" },
      { de: "verdächtig", vi: "đáng nghi, khả nghi" },
      { de: "die Tafel", vi: "bảng (đen/trắng), bảng thông báo" },
      { de: "wegräumen", vi: "dọn đi, cất đi" },
      { de: "das Dachgeschoss", vi: "tầng áp mái, gác mái" },
      { de: "der Dieb", vi: "tên trộm" },
      { de: "die Diebin", vi: "kẻ trộm (nữ)" },
      { de: "die Beschreibung", vi: "sự mô tả, lời tả" },
      { de: "die Klamotten", vi: "quần áo (thân mật)" },
      { de: "beobachten", vi: "quan sát, theo dõi" },
      { de: "das Missverständnis", vi: "sự hiểu lầm" },
      { de: "stehlen", vi: "ăn cắp, trộm" },
      { de: "der Briefträger", vi: "người đưa thư" },
      { de: "die Briefträgerin", vi: "người đưa thư (nữ)" },
      { de: "aufessen", vi: "ăn hết" },
      { de: "die Rückmeldung", vi: "phản hồi, thông báo lại" },
      { de: "aufhängen", vi: "treo lên" },
      { de: "die Monatskarte", vi: "vé tháng" },
      { de: "sich bedanken", vi: "cảm ơn" },
      { de: "der Anbieter", vi: "nhà cung cấp" },
      { de: "die Anbieterin", vi: "nhà cung cấp (nữ)" },
      { de: "wegen", vi: "vì, do" },
      { de: "kontaktieren", vi: "liên hệ" },
      { de: "abschließen", vi: "ký kết (hợp đồng)" },
      { de: "der Einzug", vi: "ngày dọn vào nhà" },
      { de: "die Kopie", vi: "bản sao" },
      { de: "der Reisepass", vi: "hộ chiếu" },
      { de: "der Personalausweis", vi: "chứng minh thư / thẻ căn cước" },
      { de: "klingen", vi: "nghe có vẻ" },
      { de: "mehrmals", vi: "nhiều lần" },
      { de: "die Hotline", vi: "đường dây nóng / tổng đài hỗ trợ" },
      { de: "die Abrechnung", vi: "hóa đơn, bảng kê" },
      { de: "der Kundendienst", vi: "bộ phận chăm sóc khách hàng" },
      { de: "kündigen", vi: "hủy hợp đồng, từ chức" }
    ];

    let userName = "";
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 600;

    function startTest() {
      userName = document.getElementById("userName").value.trim();
      if (!userName) {
        alert("Bitte geben Sie Ihren Namen ein.");
        return;
      }

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("quizScreen").style.display = "block";

      generateQuestions();
      startTimer();
      showQuestion();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const timerDisplay = document.getElementById("timer");
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

        if (timeLeft <= 120) timerDisplay.classList.add("low");

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showResult(true);
        }
      }, 1000);
    }

    function generateQuestions() {
      questions = [];
      const used = new Set();

      // 8 câu Đức → Việt
      while (questions.length < 8) {
        const randIndex = Math.floor(Math.random() * vocabulary.length);
        const item = vocabulary[randIndex];
        if (used.has(item.de)) continue;
        used.add(item.de);

        let options = [item.vi];
        while (options.length < 4) {
          const randOpt = vocabulary[Math.floor(Math.random() * vocabulary.length)].vi;
          if (!options.includes(randOpt)) options.push(randOpt);
        }
        options.sort(() => Math.random() - 0.5);
        questions.push({
          type: "de-to-vi",
          question: item.de,
          correct: item.vi,
          options: options
        });
      }

      // 8 câu Việt → Đức
      while (questions.length < 16) {
        const randIndex = Math.floor(Math.random() * vocabulary.length);
        const item = vocabulary[randIndex];
        if (used.has(item.de)) continue;
        used.add(item.de);

        let options = [item.de];
        while (options.length < 4) {
          const randOpt = vocabulary[Math.floor(Math.random() * vocabulary.length)].de;
          if (!options.includes(randOpt)) options.push(randOpt);
        }
        options.sort(() => Math.random() - 0.5);
        questions.push({
          type: "vi-to-de",
          question: item.vi,
          correct: item.de,
          options: options
        });
      }

      // Giữ nguyên bankGrammar và bankLogic từ Lektion 01 (vì là template chung)
      const bankGrammar = [ /* giữ nguyên như source bạn gửi */ ];
      const bankLogic = [ /* giữ nguyên như source bạn gửi */ ];

      const shuffledGrammar = [...bankGrammar].sort(() => Math.random() - 0.5);
      questions = questions.concat(shuffledGrammar.slice(0, 7));

      const shuffledLogic = [...bankLogic].sort(() => Math.random() - 0.5);
      questions = questions.concat(shuffledLogic.slice(0, 7));

      questions = questions.sort(() => Math.random() - 0.5);
    }

    // Các hàm còn lại giữ nguyên từ source Lektion 01
    function showQuestion() { /* copy nguyên từ source */ }
    function selectAnswer(selected, correct, div) { /* copy nguyên */ }
    function showResult(timeUp = false) { /* copy nguyên */ }
    function restartTest() { location.reload(); }
    function endExercise() {
      if (confirm("Möchtest du die Übung wirklich beenden und zurück zu den Übungen gehen?")) {
        window.location.href = "uebung.html";
      }
    }
  </script>

  <button class="end-btn" onclick="endExercise()">Ende und zurück</button>
</body>
</html>
