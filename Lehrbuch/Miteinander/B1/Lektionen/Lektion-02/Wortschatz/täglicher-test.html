<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lektion 02 – Täglicher Test</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      margin:0; 
      background:#f0f4f8; 
      color:#333; 
      text-align:center; 
      padding:20px; 
      min-height:100vh; 
    }
    h1 { 
      color:#1e40af; 
      margin:20px 0; 
      font-size:2em; 
    }
    .zurueck { 
      display:block; 
      margin:15px 0; 
      color:#3b82f6; 
      text-decoration:none; 
      font-weight:bold; 
      font-size:1.2em; 
    }
    #quiz-container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      padding: 40px 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    #question {
      font-size: 1.6em;
      margin-bottom: 30px;
      color: #1e40af;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }
    .option {
      background: #f8f9fa;
      padding: 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2em;
      transition: all 0.3s;
    }
    .option:hover {
      background: #e2e8f0;
    }
    .correct {
      background: #d1fae5 !important;
      color: #065f46;
    }
    .wrong {
      background: #fee2e2 !important;
      color: #991b1b;
    }
    #feedback {
      font-size: 1.4em;
      margin: 20px 0;
      font-weight: bold;
    }
    #next-btn {
      padding: 12px 30px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      margin-top: 20px;
      display: none;
    }
    #next-btn:hover {
      background: #2563eb;
    }
    .audio-btn {
      cursor: pointer;
      font-size: 1.2em;
      margin-left: 8px;
      color: #3b82f6;
    }
  </style>
</head>
<body>

  <h1>Lektion 02 – Täglicher Test</h1>
  <a href="../index.html" class="zurueck">← Zurück zu Lektion 02</a>

  <div id="quiz-container">
    <div id="question"></div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <button id="next-btn">Weiter</button>
  </div>

  <script>
    // Danh sách từ vựng Lektion 02 (từ + nghĩa tiếng Việt)
    const vocab = [
      { de: "die Lage", vi: "vị trí, địa điểm" },
      { de: "fröhlich", vi: "vui vẻ, rực rỡ" },
      { de: "der Einbrecher", vi: "kẻ đột nhập" },
      { de: "die Einbrecherin", vi: "kẻ đột nhập (nữ)" },
      { de: "zuletzt", vi: "lần cuối cùng" },
      { de: "fliehen", vi: "chạy trốn" },
      { de: "der Bart", vi: "bộ râu" },
      { de: "der Turnschuh", vi: "giày thể thao" },
      { de: "die Aufschrift", vi: "dòng chữ trên áo" },
      { de: "die Kripo", vi: "cảnh sát hình sự" },
      { de: "aufmerksam", vi: "chú ý, cẩn thận" },
      { de: "anlassen", vi: "để bật" },
      { de: "verdächtig", vi: "đáng nghi" },
      { de: "die Tafel", vi: "bảng" },
      { de: "wegräumen", vi: "dọn đi" },
      { de: "das Dachgeschoss", vi: "tầng áp mái" },
      { de: "der Dieb", vi: "tên trộm" },
      { de: "die Diebin", vi: "kẻ trộm (nữ)" },
      { de: "die Beschreibung", vi: "mô tả" },
      { de: "die Klamotten", vi: "quần áo (thân mật)" },
      { de: "beobachten", vi: "quan sát" },
      { de: "das Missverständnis", vi: "sự hiểu lầm" },
      { de: "stehlen", vi: "ăn cắp" },
      { de: "der Briefträger", vi: "người đưa thư" },
      { de: "die Briefträgerin", vi: "người đưa thư (nữ)" },
      { de: "aufessen", vi: "ăn hết" },
      { de: "die Rückmeldung", vi: "phản hồi" },
      { de: "aufhängen", vi: "treo lên" },
      { de: "die Monatskarte", vi: "vé tháng" },
      { de: "sich bedanken", vi: "cảm ơn" },
      { de: "der Anbieter", vi: "nhà cung cấp" },
      { de: "die Anbieterin", vi: "nhà cung cấp (nữ)" },
      { de: "wegen", vi: "vì, do" },
      { de: "kontaktieren", vi: "liên hệ" },
      { de: "abschließen", vi: "ký kết" },
      { de: "der Einzug", vi: "ngày dọn vào" },
      { de: "die Kopie", vi: "bản sao" },
      { de: "der Reisepass", vi: "hộ chiếu" },
      { de: "der Personalausweis", vi: "chứng minh thư" },
      { de: "klingen", vi: "nghe có vẻ" },
      { de: "mehrmals", vi: "nhiều lần" },
      { de: "die Hotline", vi: "tổng đài hỗ trợ" },
      { de: "die Abrechnung", vi: "hóa đơn" },
      { de: "der Kundendienst", vi: "chăm sóc khách hàng" },
      { de: "kündigen", vi: "hủy hợp đồng" }
    ];

    let questions = [];
    let currentIndex = 0;

    function startTest() {
      questions = vocab.sort(() => 0.5 - Math.random()).slice(0, 10);
      currentIndex = 0;
      showQuestion();
    }

    function showQuestion() {
      if (currentIndex >= questions.length) {
        document.getElementById('question').innerHTML = "<h2>Fertig! Du hast alle Fragen beantwortet.</h2>";
        document.getElementById('options').innerHTML = "";
        document.getElementById('feedback').innerHTML = "";
        document.getElementById('next-btn').style.display = 'none';
        return;
      }

      const q = questions[currentIndex];
      document.getElementById('question').innerHTML = `Was bedeutet <strong>${q.de}</strong>? <span class="audio-btn" onclick="playTTS('${q.de}')"><i class="fas fa-volume-up"></i></span>`;
      document.getElementById('options').innerHTML = "";
      document.getElementById('feedback').innerHTML = "";
      document.getElementById('next-btn').style.display = 'none';

      let options = [q.vi];
      while (options.length < 4) {
        const random = vocab[Math.floor(Math.random() * vocab.length)].vi;
        if (!options.includes(random)) options.push(random);
      }
      options = options.sort(() => 0.5 - Math.random());

      options.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = opt;
        div.onclick = () => checkAnswer(opt === q.vi, div);
        document.getElementById('options').appendChild(div);
      });
    }

    function checkAnswer(isCorrect, selected) {
      document.querySelectorAll('.option').forEach(o => o.onclick = null);

      if (isCorrect) {
        selected.classList.add('correct');
        document.getElementById('feedback').innerHTML = "Richtig!";
        playTTS(questions[currentIndex].de);
      } else {
        selected.classList.add('wrong');
        document.getElementById('feedback').innerHTML = "Falsch...";
      }

      document.querySelectorAll('.option').forEach(o => {
        if (o.textContent === questions[currentIndex].vi) o.classList.add('correct');
      });

      document.getElementById('next-btn').style.display = 'block';
    }

    function playTTS(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      }
    }

    document.getElementById('next-btn').onclick = () => {
      currentIndex++;
      showQuestion();
    };

    // Bắt đầu test ngay khi load trang (giống kiểu täglicher test)
    startTest();
  </script>

</body>
</html>
