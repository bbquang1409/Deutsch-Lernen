<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Täglicher Vokabeltest – Lektion 02</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#f8f9fa; color:#333; min-height:100vh; padding:15px; }
    h1 { color:#1e40af; text-align:center; margin:20px 0; font-size:1.8em; }
    .container { max-width:900px; margin:0 auto; background:white; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.1); }
    .name-input { margin:30px auto; max-width:400px; }
    .name-input input { width:100%; padding:14px; font-size:1.3em; border:2px solid #3b82f6; border-radius:10px; text-align:center; }
    .btn { 
      background:#1e40af; 
      color:white; 
      border:none; 
      padding:14px 40px; 
      font-size:1.2em; 
      border-radius:10px; 
      cursor:pointer; 
      margin:25px auto; 
      display:block; 
      opacity:0.95; 
    }
    .btn:hover { opacity:1; background:#2563eb; }
    .end-btn { 
      background:#64748b; 
      opacity:0.88; 
    }
    .end-btn:hover { opacity:1; background:#475569; }
    .timer { text-align:center; font-size:1.8em; font-weight:bold; margin:10px 0; color:#1e40af; }
    .timer.low { color:#ef4444; }
    .progress { text-align:center; font-size:1.3em; margin:10px 0; color:#64748b; font-weight:bold; }
    .question { font-size:1.4em; font-weight:bold; margin:25px 0; text-align:center; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .option { background:#eff6ff; padding:16px; border-radius:10px; cursor:pointer; font-size:1.2em; transition:all 0.2s; }
    .option:hover { background:#bfdbfe; }
    .option.selected { background:#3b82f6; color:white; }
    .option.correct { background:#10b981; color:white; }
    .option.wrong { background:#ef4444; color:white; }
    .result { text-align:center; margin:40px 0; }
    .name-result { font-size:2.8em; font-weight:bold; color:#1e40af; margin:20px 0; }
    .score { font-size:3em; font-weight:bold; margin:15px 0; }
    .evaluation { font-size:1.6em; margin:20px 0; }
    .datetime { color:#666; margin-top:30px; font-size:1.2em; }
  </style>
</head>
<body>

  <h1>Täglicher Vokabeltest – Lektion 02</h1>

  <div class="container" id="startScreen">
    <h2>Wie heißen Sie?</h2>
    <div class="name-input">
      <input type="text" id="userName" placeholder="Ihr Name" autocomplete="off">
    </div>
    <button class="btn" onclick="startTest()">Test starten</button>
  </div>

  <div class="container" id="quizScreen" style="display:none;">
    <div class="timer" id="timer">10:00</div>
    <div class="progress" id="progress">Câu 1 / 30</div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
  </div>

  <div class="container" id="resultScreen" style="display:none;">
    <div class="result">
      <div id="userNameResult" class="name-result"></div>
      <div id="scoreResult" class="score"></div>
      <div id="evaluation" class="evaluation"></div>
      <div id="datetime" class="datetime"></div>
    </div>
    <button class="btn" onclick="restartTest()">Neuer Test</button>
    <button class="end-btn" onclick="endExercise()">Ende und zurück</button>
  </div>

  <script>
    let userName = "";
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 600;

    // Database từ vựng Lektion 02 (44 từ)
    const vocabDB = [
      { de: "die Lage", vi: "vị trí, địa điểm" },
      { de: "fröhlich", vi: "vui vẻ, rực rỡ" },
      { de: "der Einbrecher", vi: "kẻ đột nhập" },
      { de: "die Einbrecherin", vi: "kẻ đột nhập (nữ)" },
      { de: "zuletzt", vi: "lần cuối cùng" },
      { de: "fliehen", vi: "chạy trốn" },
      { de: "der Bart", vi: "bộ râu" },
      { de: "der Turnschuh", vi: "giày thể thao" },
      { de: "die Aufschrift", vi: "dòng chữ trên áo" },
      { de: "die Kripo", vi: "cảnh sát hình sự" },
      { de: "aufmerksam", vi: "chú ý, cẩn thận" },
      { de: "anlassen", vi: "để bật" },
      { de: "verdächtig", vi: "đáng nghi" },
      { de: "die Tafel", vi: "bảng" },
      { de: "wegräumen", vi: "dọn đi" },
      { de: "das Dachgeschoss", vi: "tầng áp mái" },
      { de: "der Dieb", vi: "tên trộm" },
      { de: "die Diebin", vi: "kẻ trộm (nữ)" },
      { de: "die Beschreibung", vi: "mô tả" },
      { de: "die Klamotten", vi: "quần áo (thân mật)" },
      { de: "beobachten", vi: "quan sát" },
      { de: "das Missverständnis", vi: "sự hiểu lầm" },
      { de: "stehlen", vi: "ăn cắp" },
      { de: "der Briefträger", vi: "người đưa thư" },
      { de: "die Briefträgerin", vi: "người đưa thư (nữ)" },
      { de: "aufessen", vi: "ăn hết" },
      { de: "die Rückmeldung", vi: "phản hồi" },
      { de: "aufhängen", vi: "treo lên" },
      { de: "die Monatskarte", vi: "vé tháng" },
      { de: "sich bedanken", vi: "cảm ơn" },
      { de: "der Anbieter", vi: "nhà cung cấp" },
      { de: "die Anbieterin", vi: "nhà cung cấp (nữ)" },
      { de: "wegen", vi: "vì, do" },
      { de: "kontaktieren", vi: "liên hệ" },
      { de: "abschließen", vi: "ký kết" },
      { de: "der Einzug", vi: "ngày dọn vào" },
      { de: "die Kopie", vi: "bản sao" },
      { de: "der Reisepass", vi: "hộ chiếu" },
      { de: "der Personalausweis", vi: "chứng minh thư" },
      { de: "klingen", vi: "nghe có vẻ" },
      { de: "mehrmals", vi: "nhiều lần" },
      { de: "die Hotline", vi: "tổng đài hỗ trợ" },
      { de: "die Abrechnung", vi: "hóa đơn" },
      { de: "der Kundendienst", vi: "chăm sóc khách hàng" },
      { de: "kündigen", vi: "hủy hợp đồng" }
    ];

    // Database ngữ pháp cố định (8 câu)
    const grammarDB = [
      { question: "Artikel und Plural von 'Lage'?", correct: "die, Lagen", options: ["die, Lagen", "der, Lagen", "das, Lagen", "den, Lagen"] },
      { question: "Artikel und Plural von 'Einbrecher'?", correct: "der, Einbrecher", options: ["der, Einbrecher", "die, Einbrecher", "das, Einbrecher", "den, Einbrecher"] },
      { question: "Artikel und Plural von 'Aufschrift'?", correct: "die, Aufschriften", options: ["die, Aufschriften", "der, Aufschriften", "das, Aufschriften", "den, Aufschriften"] },
      { question: "Artikel und Plural von 'Dachgeschoss'?", correct: "das, Dachgeschosse", options: ["das, Dachgeschosse", "die, Dachgeschosse", "der, Dachgeschosse", "den, Dachgeschosse"] },
      { question: "Partizip Perfekt von 'fliehen'?", correct: "geflohen", options: ["geflohen", "fliehen", "floh", "flieh"] },
      { question: "Partizip Perfekt von 'wegräumen'?", correct: "weggeräumt", options: ["weggeräumt", "wegräumen", "räumte weg", "räumen"] },
      { question: "Artikel und Plural von 'Missverständnis'?", correct: "das, Missverständnisse", options: ["das, Missverständnisse", "die, Missverständnisse", "der, Missverständnisse", "den, Missverständnisse"] },
      { question: "Artikel und Plural von 'Rückmeldung'?", correct: "die, Rückmeldungen", options: ["die, Rückmeldungen", "der, Rückmeldungen", "das, Rückmeldungen", "den, Rückmeldungen"] }
    ];

    // Database logic (8 câu tư duy, tình huống)
    const logicDB = [
      { question: "Warum soll man das Licht anlassen, wenn man abends weggeht?", correct: "Um Einbrecher abzuschrecken", options: ["Um Einbrecher abzuschrecken", "Um Strom zu sparen", "Um die Nachbarn zu ärgern", "Um das Haus hell zu machen"] },
      { question: "Was ist das Beste, wenn man eine verdächtige Person sieht?", correct: "Sofort die Polizei rufen und beobachten", options: ["Sofort die Polizei rufen und beobachten", "Selbst verfolgen", "Foto machen und posten", "Nichts tun und warten"] },
      { question: "Warum passt die Beschreibung 'Bart, Jeans, Turnschuhe, schwarzer Kapuzenpulli mit Superheld'?", correct: "Weil das die Kleidung des gesuchten Einbrechers ist", options: ["Weil das die Kleidung des gesuchten Einbrechers ist", "Weil das der neue Mieter ist", "Weil das der Briefträger ist", "Weil das der Vermieter ist"] },
      { question: "Was bedeutet 'Einbrecher unterwegs' am besten?", correct: "Der Einbrecher ist noch auf freiem Fuß", options: ["Der Einbrecher ist noch auf freiem Fuß", "Der Einbrecher ist im Gefängnis", "Der Einbrecher ist im Urlaub", "Der Einbrecher ist der Nachbar"] },
      { question: "Wenn jemand sagt 'Das ist ein Missverständnis', was ist die beste Reaktion?", correct: "Die Situation ruhig erklären", options: ["Die Situation ruhig erklären", "Laut werden", "Weggehen", "Die Polizei rufen"] },
      { question: "Warum soll man verdächtige Personen nicht selbst ansprechen?", correct: "Weil es gefährlich sein kann", options: ["Weil es gefährlich sein kann", "Weil man Zeit sparen will", "Weil man höflich sein soll", "Weil die Polizei zu langsam ist"] },
      { question: "Was ist das Wichtigste bei einem Einbruchverdacht?", correct: "Nicht allein handeln, sondern Polizei rufen", options: ["Nicht allein handeln, sondern Polizei rufen", "Selbst die Tür öffnen", "Warten bis der Einbrecher weg ist", "Licht ausmachen"] },
      { question: "Warum ist 'aufmerksam sein' besonders wichtig?", correct: "Um verdächtige Personen früh zu erkennen", options: ["Um verdächtige Personen früh zu erkennen", "Um Strom zu sparen", "Um schön auszusehen", "Um Freunde zu treffen"] }
    ];

    function startTest() {
      userName = document.getElementById("userName").value.trim();
      if (!userName) {
        alert("Bitte geben Sie Ihren Namen ein.");
        return;
      }

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("quizScreen").style.display = "block";

      generateQuestions();
      startTimer();
      showQuestion();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById("timer").textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 120) document.getElementById("timer").classList.add("low");
        if (timeLeft <= 0) { clearInterval(timerInterval); showResult(true); }
      }, 1000);
    }

    function generateQuestions() {
      questions = [];
      const used = new Set();

      // 7 câu Đức → Việt (random mỗi lần)
      let count = 0;
      while (questions.length < 7 && count < 100) {
        count++;
        const item = vocabDB[Math.floor(Math.random() * vocabDB.length)];
        if (used.has(item.de)) continue;
        used.add(item.de);
        let opts = [item.vi];
        while (opts.length < 4) {
          const r = vocabDB[Math.floor(Math.random() * vocabDB.length)].vi;
          if (r !== item.vi && !opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        questions.push({question: `Was bedeutet "${item.de}"?`, correct: item.vi, options: opts});
      }

      // 7 câu Việt → Đức (random mỗi lần)
      count = 0;
      while (questions.length < 14 && count < 100) {
        count++;
        const item = vocabDB[Math.floor(Math.random() * vocabDB.length)];
        if (used.has(item.de)) continue;
        used.add(item.de);
        let opts = [item.de];
        while (opts.length < 4) {
          const r = vocabDB[Math.floor(Math.random() * vocabDB.length)].de;
          if (r !== item.de && !opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        questions.push({question: `Wie heißt "${item.vi}" auf Deutsch?`, correct: item.de, options: opts});
      }

      // Thêm 8 câu ngữ pháp (cố định, shuffle)
      const grammarCopy = [...grammarDB].sort(() => Math.random() - 0.5);
      questions = questions.concat(grammarCopy);

      // Thêm 8 câu logic (cố định, shuffle)
      const logicCopy = [...logicDB].sort(() => Math.random() - 0.5);
      questions = questions.concat(logicCopy);

      // Mix toàn bộ 30 câu
      questions = questions.sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
      document.getElementById("progress").textContent = `Câu ${currentQuestionIndex + 1} / 30`;
      const q = questions[currentQuestionIndex];
      document.getElementById("question").textContent = q.question;
      const optsDiv = document.getElementById("options");
      optsDiv.innerHTML = "";
      q.options.forEach(opt => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = opt;
        div.onclick = () => selectAnswer(opt, q.correct, div);
        optsDiv.appendChild(div);
      });
    }

    function selectAnswer(selected, correct, div) {
      document.querySelectorAll(".option").forEach(o => o.onclick = null);
      if (selected === correct) {
        div.classList.add("correct");
        score++;
      } else {
        div.classList.add("wrong");
        document.querySelectorAll(".option").forEach(o => {
          if (o.textContent === correct) o.classList.add("correct");
        });
      }
      currentQuestionIndex++;
      setTimeout(() => currentQuestionIndex < questions.length ? showQuestion() : showResult(), 1400);
    }

    function showResult(timeUp = false) {
      clearInterval(timerInterval);
      document.getElementById("quizScreen").style.display = "none";
      document.getElementById("resultScreen").style.display = "block";

      const now = new Date();
      const dateStr = now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

      document.getElementById("userNameResult").textContent = userName;
      document.getElementById("scoreResult").textContent = `${score} / 30`;

      let ev = timeUp ? "Zeit abgelaufen!" : score >= 26 ? "Ausgezeichnet!" : score >= 22 ? "Sehr gut!" : score >= 18 ? "Gut!" : "Weiter üben!";
      document.getElementById("evaluation").textContent = ev;
      document.getElementById("datetime").innerHTML = `Test am ${dateStr}<br>um ${timeStr} Uhr`;
    }

    function restartTest() { location.reload(); }

    function endExercise() {
      if (confirm("Möchtest du die Übung wirklich beenden und zurück zu den Übungen gehen?")) {
        window.location.href = "uebung.html";
      }
    }
  </script>
</body>
</html>
