<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Täglicher Vokabeltest – Lektion 02</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#f8f9fa; color:#333; min-height:100vh; padding:15px; }
    h1 { color:#1e40af; text-align:center; margin:20px 0; font-size:1.8em; }
    .container { max-width:900px; margin:0 auto; background:white; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.1); }
    .name-input { margin:30px auto; max-width:400px; }
    .name-input input { width:100%; padding:14px; font-size:1.3em; border:2px solid #3b82f6; border-radius:10px; text-align:center; }
    .btn { 
      background:#1e40af; 
      color:white; 
      border:none; 
      padding:14px 40px; 
      font-size:1.3em; 
      border-radius:10px; 
      margin:20px auto; 
      display:block; 
      cursor:pointer; 
      opacity: 0.95; 
      transition: opacity 0.2s, background 0.2s; 
    }
    .btn:hover { opacity:1; background:#2563eb; }
    .back-btn { 
      background:#6b7280; /* nhạt hơn, xám xanh */
      opacity: 0.85; 
    }
    .back-btn:hover { opacity:1; background:#4b5563; }
    .end-btn { 
      background:#dc2626; 
      opacity: 0.9; 
    }
    .end-btn:hover { opacity:1; background:#b91c1c; }
    .timer { text-align:center; font-size:1.8em; font-weight:bold; margin:10px 0; color:#1e40af; }
    .timer.low { color:#ef4444; }
    .question { font-size:1.4em; font-weight:bold; margin:25px 0; text-align:center; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .option { background:#eff6ff; padding:16px; border-radius:10px; cursor:pointer; font-size:1.2em; transition:all 0.2s; }
    .option:hover { background:#bfdbfe; }
    .option.selected { background:#3b82f6; color:white; }
    .option.correct { background:#10b981; color:white; }
    .option.wrong { background:#ef4444; color:white; }
    .result { text-align:center; margin:40px 0; }
    .name-result { font-size:2.8em; font-weight:bold; color:#1e40af; margin:20px 0; }
    .score { font-size:3em; font-weight:bold; margin:15px 0; }
    .evaluation { font-size:1.6em; margin:20px 0; }
    .datetime { color:#666; margin-top:30px; font-size:1.2em; }
  </style>
</head>
<body>

  <h1>Täglicher Vokabeltest – Lektion 02</h1>

  <div class="container" id="startScreen">
    <h2>Wie heißen Sie?</h2>
    <div class="name-input">
      <input type="text" id="userName" placeholder="Ihr Name" autocomplete="off">
    </div>
    <button class="btn" onclick="startTest()">Test starten</button>
  </div>

  <div class="container" id="quizScreen" style="display:none;">
    <div class="timer" id="timer">10:00</div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
  </div>

  <div class="container" id="resultScreen" style="display:none;">
    <div class="result">
      <div id="userNameResult" class="name-result"></div>
      <div id="scoreResult" class="score"></div>
      <div id="evaluation" class="evaluation"></div>
      <div id="datetime" class="datetime"></div>
    </div>
    <button class="btn" onclick="restartTest()">Neuer Test</button>
    <button class="btn end-btn" onclick="endExercise()">Ende und zurück</button>
  </div>

  <script>
    let userName = "";
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 600;

    // Từ vựng Lektion 02
    const vocabulary = [
      { de: "die Lage", vi: "vị trí, địa điểm" },
      { de: "fröhlich", vi: "vui vẻ, rực rỡ" },
      { de: "der Einbrecher", vi: "kẻ đột nhập" },
      { de: "die Einbrecherin", vi: "kẻ đột nhập (nữ)" },
      { de: "zuletzt", vi: "lần cuối cùng" },
      { de: "fliehen", vi: "chạy trốn" },
      { de: "der Bart", vi: "bộ râu" },
      { de: "der Turnschuh", vi: "giày thể thao" },
      { de: "die Aufschrift", vi: "dòng chữ trên áo" },
      { de: "die Kripo", vi: "cảnh sát hình sự" },
      { de: "aufmerksam", vi: "chú ý, cẩn thận" },
      { de: "anlassen", vi: "để bật" },
      { de: "verdächtig", vi: "đáng nghi" },
      { de: "die Tafel", vi: "bảng" },
      { de: "wegräumen", vi: "dọn đi" },
      { de: "das Dachgeschoss", vi: "tầng áp mái" },
      { de: "der Dieb", vi: "tên trộm" },
      { de: "die Diebin", vi: "kẻ trộm (nữ)" },
      { de: "die Beschreibung", vi: "mô tả" },
      { de: "die Klamotten", vi: "quần áo (thân mật)" },
      { de: "beobachten", vi: "quan sát" },
      { de: "das Missverständnis", vi: "sự hiểu lầm" },
      { de: "stehlen", vi: "ăn cắp" },
      { de: "der Briefträger", vi: "người đưa thư" },
      { de: "die Briefträgerin", vi: "người đưa thư (nữ)" },
      { de: "aufessen", vi: "ăn hết" },
      { de: "die Rückmeldung", vi: "phản hồi" },
      { de: "aufhängen", vi: "treo lên" },
      { de: "die Monatskarte", vi: "vé tháng" },
      { de: "sich bedanken", vi: "cảm ơn" },
      { de: "der Anbieter", vi: "nhà cung cấp" },
      { de: "die Anbieterin", vi: "nhà cung cấp (nữ)" },
      { de: "wegen", vi: "vì, do" },
      { de: "kontaktieren", vi: "liên hệ" },
      { de: "abschließen", vi: "ký kết" },
      { de: "der Einzug", vi: "ngày dọn vào" },
      { de: "die Kopie", vi: "bản sao" },
      { de: "der Reisepass", vi: "hộ chiếu" },
      { de: "der Personalausweis", vi: "chứng minh thư" },
      { de: "klingen", vi: "nghe có vẻ" },
      { de: "mehrmals", vi: "nhiều lần" },
      { de: "die Hotline", vi: "tổng đài hỗ trợ" },
      { de: "die Abrechnung", vi: "hóa đơn" },
      { de: "der Kundendienst", vi: "chăm sóc khách hàng" },
      { de: "kündigen", vi: "hủy hợp đồng" }
    ];

    function startTest() {
      userName = document.getElementById("userName").value.trim();
      if (!userName) {
        alert("Bitte geben Sie Ihren Namen ein.");
        return;
      }

      document.getElementById("startScreen").style.display = "none";
      document.getElementById("quizScreen").style.display = "block";

      generateQuestions();
      startTimer();
      showQuestion();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timer").textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        if (timeLeft <= 120) document.getElementById("timer").classList.add("low");
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showResult(true);
        }
      }, 1000);
    }

    function generateQuestions() {
      questions = vocabulary.sort(() => 0.5 - Math.random()).slice(0, 10).map(item => ({
        question: `Was bedeutet "${item.de}"?`,
        correct: item.vi,
        options: [item.vi, ...getRandomWrong(item.vi, 3)]
      }));
    }

    function getRandomWrong(correct, count) {
      const wrong = [];
      while (wrong.length < count) {
        const rand = vocabulary[Math.floor(Math.random() * vocabulary.length)].vi;
        if (rand !== correct && !wrong.includes(rand)) wrong.push(rand);
      }
      return wrong;
    }

    function showQuestion() {
      if (currentQuestionIndex >= questions.length) {
        showResult();
        return;
      }

      const q = questions[currentQuestionIndex];
      document.getElementById("question").textContent = q.question;
      document.getElementById("options").innerHTML = "";
      q.options.forEach(opt => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = opt;
        div.onclick = () => selectAnswer(opt, q.correct, div);
        document.getElementById("options").appendChild(div);
      });
    }

    function selectAnswer(selected, correct, div) {
      document.querySelectorAll(".option").forEach(o => o.onclick = null);
      if (selected === correct) {
        div.classList.add("correct");
        score++;
      } else {
        div.classList.add("wrong");
        document.querySelectorAll(".option").forEach(o => {
          if (o.textContent === correct) o.classList.add("correct");
        });
      }
      currentQuestionIndex++;
      setTimeout(showQuestion, 1500);
    }

    function showResult(timeUp = false) {
      clearInterval(timerInterval);
      document.getElementById("quizScreen").style.display = "none";
      document.getElementById("resultScreen").style.display = "block";

      const now = new Date();
      const dateStr = now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

      document.getElementById("userNameResult").textContent = userName;
      document.getElementById("scoreResult").textContent = `${score} / ${questions.length}`;

      let evaluation = "";
      if (timeUp) evaluation = "Zeit abgelaufen!";
      else if (score >= 9) evaluation = "Ausgezeichnet!";
      else if (score >= 7) evaluation = "Sehr gut!";
      else if (score >= 5) evaluation = "Gut!";
      else evaluation = "Weiter üben!";

      document.getElementById("evaluation").textContent = evaluation;
      document.getElementById("datetime").innerHTML = `Test am ${dateStr}<br>um ${timeStr} Uhr`;
    }

    function restartTest() {
      location.reload();
    }

    function endExercise() {
      if (confirm("Möchtest du die Übung wirklich beenden und zurück zu den Übungen gehen?")) {
        window.location.href = "uebung.html";
      }
    }
  </script>

</body>
</html>
