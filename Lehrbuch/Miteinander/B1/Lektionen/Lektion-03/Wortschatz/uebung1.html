<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Übung 1 – Lücken füllen</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#f8f9fa; color:#333; padding:20px; line-height:1.7; }
    h1 { color:#1e40af; text-align:center; margin:30px 0; }
    .sentence { margin:20px 0; font-size:1.2em; }
    .gap { border-bottom:2px dashed #3b82f6; min-width:120px; display:inline-block; text-align:center; }
    .check-btn { background:#10b981; color:white; padding:12px 25px; border:none; border-radius:8px; font-size:1.1em; cursor:pointer; margin:20px auto; display:block; }
    .feedback { text-align:center; font-weight:bold; font-size:1.2em; margin:15px 0; }
    .back-btn { background:#6b7280; color:white; padding:12px 30px; border:none; border-radius:8px; font-size:1.1em; cursor:pointer; margin:30px auto; display:block; width:fit-content; text-decoration:none; }
  </style>
</head>
<body>

  <h1>Übung 1 – Lücken füllen</h1>

  <div class="sentence">
    1. Hoa geht zur <span class="gap" data-answer="Berufsberatung"></span>, um sich über Jobs zu informieren.
  </div>
  <div class="sentence">
    2. Sie möchte eine <span class="gap" data-answer="Festanstellung"></span> in einem Café haben.
  </div>
  <div class="sentence">
    3. Hoa hat schon viel <span class="gap" data-answer="Arbeitserfahrung"></span> in Deutschland.
  </div>
  <div class="sentence">
    4. Sie möchte sich <span class="gap" data-answer="weiterbilden"></span> und neue Kurse besuchen.
  </div>
  <div class="sentence">
    5. Bei der <span class="gap" data-answer="Messe"></span> kann man viele Vorträge hören.
  </div>

  <button class="check-btn" onclick="checkAnswers()">Prüfen</button>
  <div class="feedback" id="feedback"></div>

  <a href="uebung.html" class="back-btn">Zurück zu Übungen</a>

  <script>
    function checkAnswers() {
      let correct = 0;
      const gaps = document.querySelectorAll('.gap');
      gaps.forEach(gap => {
        const user = gap.textContent.trim().toLowerCase();
        const answer = gap.dataset.answer.toLowerCase();
        if (user === answer) {
          gap.style.background = '#d1fae5';
          gap.style.borderColor = '#10b981';
          correct++;
        } else {
          gap.style.background = '#fee2e2';
          gap.style.borderColor = '#ef4444';
          gap.textContent = gap.dataset.answer;
        }
      });
      document.getElementById('feedback').textContent = `Du hast ${correct} von 5 richtig!`;
      document.getElementById('feedback').style.color = correct === 5 ? '#065f46' : '#991b1b';
    }
  </script>

</body>
</html>
