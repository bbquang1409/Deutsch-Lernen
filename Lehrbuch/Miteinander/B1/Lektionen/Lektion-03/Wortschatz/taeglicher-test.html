<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Täglicher Vokabeltest – Lektion 03</title>
  <style>
    body { font-family: system-ui, sans-serif; margin:0; background:#f8f9fa; color:#333; min-height:100vh; padding:15px; }
    h1 { color:#1e40af; text-align:center; margin:20px 0; font-size:1.8em; }
    .container { max-width:900px; margin:0 auto; background:white; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.1); position:relative; }
    .name-input { margin:30px auto; max-width:400px; }
    .name-input input { width:100%; padding:14px; font-size:1.3em; border:2px solid #3b82f6; border-radius:10px; text-align:center; }
    .start-btn { background:#1e40af; color:white; border:none; padding:14px 40px; font-size:1.3em; border-radius:10px; margin:20px auto; display:block; cursor:pointer; }
    .timer { text-align:center; font-size:1.8em; font-weight:bold; margin:10px 0; color:#1e40af; }
    .timer.low { color:#ef4444; }
    .question { font-size:1.4em; font-weight:bold; margin:25px 0; text-align:center; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .option { background:#eff6ff; padding:16px; border-radius:10px; cursor:pointer; font-size:1.2em; transition:all 0.2s; user-select: none; }
    .option:hover { background:#bfdbfe; }
    .option.selected { background:#3b82f6; color:white; }
    .option.correct { background:#10b981; color:white; }
    .option.wrong { background:#ef4444; color:white; }
    .result { text-align:center; margin:40px 0; }
    .name-result { font-size:2.8em; font-weight:bold; color:#1e40af; margin:20px 0; }
    .score { font-size:3em; font-weight:bold; margin:15px 0; }
    .evaluation { font-size:1.6em; margin:20px 0; }
    .datetime { color:#666; margin-top:30px; font-size:1.2em; }
    .end-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .end-btn:hover { background: #dc2626; }
  </style>
</head>
<body>

  <h1>Täglicher Vokabeltest – Lektion 03</h1>

  <div class="container" id="startScreen">
    <h2>Wie heißen Sie?</h2>
    <div class="name-input">
      <input type="text" id="userName" placeholder="Ihr Name" autocomplete="off">
    </div>
    <button class="start-btn" onclick="startTest()">Test starten</button>
  </div>

  <div class="container" id="quizScreen" style="display:none;">
    <button class="end-btn" onclick="endTest()">Ende und zurück</button>
    <div class="timer" id="timer">10:00</div>
    <div id="progress" style="text-align:center; font-size:1.3em; margin-bottom:15px;"></div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
  </div>

  <div class="container" id="resultScreen" style="display:none;">
    <div class="result">
      <div id="userNameResult" class="name-result"></div>
      <div id="scoreResult" class="score"></div>
      <div id="evaluation" class="evaluation"></div>
      <div id="datetime" class="datetime"></div>
    </div>
    <button class="start-btn" onclick="restartTest()">Neuer Test</button>
  </div>

  <script>
    const bankDeToVi = [
      { question: "die Berufsberatung, -en", correct: "tư vấn nghề nghiệp", options: ["tư vấn nghề nghiệp", "tư vấn học tập", "tư vấn du học", "tư vấn sức khỏe"], type: "de-to-vi" },
      { question: "die Buchhandlung, -en", correct: "hiệu sách", options: ["hiệu sách", "hiệu thuốc", "hiệu bánh", "hiệu quần áo"], type: "de-to-vi" },
      { question: "die Festanstellung, -en", correct: "việc làm chính thức", options: ["việc làm chính thức", "việc làm thời vụ", "việc làm tự do", "việc làm bán thời gian"], type: "de-to-vi" },
      { question: "die Arbeitserfahrung, -en", correct: "kinh nghiệm làm việc", options: ["kinh nghiệm làm việc", "kinh nghiệm học tập", "kinh nghiệm sống", "kinh nghiệm du lịch"], type: "de-to-vi" },
      { question: "der Schulabschluss, -e", correct: "bằng tốt nghiệp phổ thông", options: ["bằng tốt nghiệp phổ thông", "bằng đại học", "bằng nghề", "bằng lái xe"], type: "de-to-vi" },
      { question: "offiziell", correct: "chính thức", options: ["chính thức", "không chính thức", "bí mật", "cá nhân"], type: "de-to-vi" },
      { question: "das System, -e", correct: "hệ thống", options: ["hệ thống", "máy móc", "phương pháp", "công cụ"], type: "de-to-vi" },
      { question: "anerkennen (hat anerkannt)", correct: "công nhận", options: ["công nhận", "phủ nhận", "bỏ qua", "chấp nhận"], type: "de-to-vi" },
      { question: "sich weiterbilden (hat sich weitergebildet)", correct: "học thêm, nâng cao", options: ["học thêm, nâng cao", "học lại", "học cơ bản", "nghỉ học"], type: "de-to-vi" },
      { question: "die Selbstständigkeit (nur Sg.)", correct: "tự kinh doanh", options: ["tự kinh doanh", "làm thuê", "học nghề", "tìm việc"], type: "de-to-vi" },
      { question: "die Messe, -n", correct: "hội chợ", options: ["hội chợ", "hội nghị", "buổi họp", "lễ hội"], type: "de-to-vi" },
      { question: "sondern", correct: "mà (phủ định và bổ sung)", options: ["mà (phủ định và bổ sung)", "và", "hoặc", "nhưng"], type: "de-to-vi" },
      { question: "der Vortrag, -e", correct: "bài thuyết trình", options: ["bài thuyết trình", "bài hát", "bài thơ", "bài báo"], type: "de-to-vi" },
      { question: "der Handwerker, - / die Handwerkerin, -nen", correct: "thợ thủ công", options: ["thợ thủ công", "nhân viên văn phòng", "giáo viên", "bác sĩ"], type: "de-to-vi" },
      { question: "der Unternehmer, - / die Unternehmerin, -nen", correct: "doanh nhân", options: ["doanh nhân", "nhân viên", "học sinh", "người lao động"], type: "de-to-vi" },
      { question: "erfolgreich", correct: "thành công", options: ["thành công", "thất bại", "bình thường", "khó khăn"], type: "de-to-vi" },
      { question: "die Kenntnis, -se", correct: "kiến thức", options: ["kiến thức", "kỹ năng", "trải nghiệm", "bí quyết"], type: "de-to-vi" },
      { question: "erforderlich", correct: "cần thiết", options: ["cần thiết", "không cần", "tùy chọn", "tùy ý"], type: "de-to-vi" },
      { question: "die Unterstützung (Sg.)", correct: "sự hỗ trợ", options: ["sự hỗ trợ", "sự phản đối", "sự cản trở", "sự giúp đỡ"], type: "de-to-vi" },
      { question: "sowohl ... als auch ...", correct: "cả ... lẫn ...", options: ["cả ... lẫn ...", "chỉ ...", "hoặc ...", "không ... cũng không ..."], type: "de-to-vi" },
      { question: "der Snack, -s", correct: "đồ ăn nhẹ", options: ["đồ ăn nhẹ", "bữa chính", "đồ uống", "tráng miệng"], type: "de-to-vi" },
      { question: "die Homepage, -s", correct: "trang chủ website", options: ["trang chủ website", "trang cá nhân", "trang mạng xã hội", "trang tin tức"], type: "de-to-vi" },
      { question: "(sich) überlegen (hat sich überlegt)", correct: "suy nghĩ, cân nhắc", options: ["suy nghĩ, cân nhắc", "quyết định nhanh", "bỏ qua", "chấp nhận"], type: "de-to-vi" },
      { question: "quer", correct: "ngang (chuyển ngành)", options: ["ngang (chuyển ngành)", "dọc", "thẳng", "ngược"], type: "de-to-vi" },
      { question: "das Gericht, -e", correct: "món ăn", options: ["món ăn", "tòa án", "phòng ăn", "bếp"], type: "de-to-vi" },
      { question: "öfter", correct: "thường xuyên hơn", options: ["thường xuyên hơn", "ít hơn", "hiếm khi", "không bao giờ"], type: "de-to-vi" },
      { question: "etwa", correct: "khoảng (ước lượng)", options: ["khoảng (ước lượng)", "chính xác", "hơn", "ít hơn"], type: "de-to-vi" },
      { question: "die Versicherung, -en", correct: "bảo hiểm", options: ["bảo hiểm", "tiết kiệm", "đầu tư", "vay"], type: "de-to-vi" },
      { question: "weder ... noch ...", correct: "không ... cũng không ...", options: ["không ... cũng không ...", "cả ... lẫn ...", "hoặc ... hoặc ...", "chỉ ..."], type: "de-to-vi" },
      { question: "sich lohnen (hat sich gelohnt)", correct: "đáng giá", options: ["đáng giá", "không đáng", "lãng phí", "tốn kém"], type: "de-to-vi" }
    ];

    const bankViToDe = bankDeToVi.map(item => {
      const allGermanWords = bankDeToVi.map(i => i.question);
      let options = [item.question];
      while (options.length < 4) {
        const rand = allGermanWords[Math.floor(Math.random() * allGermanWords.length)];
        if (!options.includes(rand)) options.push(rand);
      }
      options = options.sort(() => Math.random() - 0.5);
      return {
        question: item.correct,
        correct: item.question,
        options,
        type: "vi-to-de"
      };
    });

    const bankGrammar = [
      { q: "Artikel und Plural von 'Berufsberatung'?", a: "die, Berufsberatungen", options: ["der, Berufsberatungen", "die, Berufsberatungen", "das, Berufsberatungen", "den, Berufsberatungen"], type: "grammar" },
      { q: "Artikel und Plural von 'Buchhandlung'?", a: "die, Buchhandlungen", options: ["der, Buchhandlungen", "die, Buchhandlungen", "das, Buchhandlungen", "den, Buchhandlungen"], type: "grammar" },
      { q: "Artikel und Plural von 'Festanstellung'?", a: "die, Festanstellungen", options: ["der, Festanstellungen", "die, Festanstellungen", "das, Festanstellungen", "den, Festanstellungen"], type: "grammar" },
      { q: "Partizip Perfekt von 'anstellen'?", a: "angestellt", options: ["angestellt", "anstellen", "stellte an", "anstellend"], type: "grammar" },
      { q: "Artikel und Plural von 'Arbeitserfahrung'?", a: "die, Arbeitserfahrungen", options: ["der, Arbeitserfahrungen", "die, Arbeitserfahrungen", "das, Arbeitserfahrungen", "den, Arbeitserfahrungen"], type: "grammar" },
      { q: "Artikel und Plural von 'Schulabschluss'?", a: "der, Schulabschlüsse", options: ["der, Schulabschlüsse", "die, Schulabschlüsse", "das, Schulabschlüsse", "den, Schulabschlüsse"], type: "grammar" },
      { q: "Partizip Perfekt von 'anerkennen'?", a: "anerkannt", options: ["anerkannt", "anerkennen", "erkannte an", "anerkanntend"], type: "grammar" },
      { q: "Artikel und Plural von 'System'?", a: "das, Systeme", options: ["der, Systeme", "die, Systeme", "das, Systeme", "den, Systeme"], type: "grammar" },
      { q: "Partizip Perfekt von 'weiterbilden' (sich)?", a: "weitergebildet", options: ["weitergebildet", "weiterbilden", "bildete weiter", "weiterbildend"], type: "grammar" },
      { q: "Artikel und Plural von 'Selbstständigkeit'?", a: "die, Selbstständigkeiten", options: ["der, Selbstständigkeiten", "die, Selbstständigkeiten", "das, Selbstständigkeiten", "den, Selbstständigkeiten"], type: "grammar" },
      { q: "Artikel und Plural von 'Messe'?", a: "die, Messen", options: ["der, Messen", "die, Messen", "das, Messen", "den, Messen"], type: "grammar" },
      { q: "Artikel und Plural von 'Vortrag'?", a: "der, Vorträge", options: ["der, Vorträge", "die, Vorträge", "das, Vorträge", "den, Vorträge"], type: "grammar" },
      { q: "Artikel und Plural von 'Handwerker'?", a: "der, Handwerker", options: ["der, Handwerker", "die, Handwerker", "das, Handwerker", "den, Handwerker"], type: "grammar" },
      { q: "Artikel und Plural von 'Unternehmer'?", a: "der, Unternehmer", options: ["der, Unternehmer", "die, Unternehmer", "das, Unternehmer", "den, Unternehmer"], type: "grammar" },
      { q: "Partizip Perfekt von 'überlegen' (sich)?", a: "überlegt", options: ["überlegt", "überlegen", "überlegte", "überlegend"], type: "grammar" },
      { q: "Artikel und Plural von 'Gericht'?", a: "das, Gerichte", options: ["der, Gerichte", "die, Gerichte", "das, Gerichte", "den, Gerichte"], type: "grammar" },
      { q: "Artikel und Plural von 'Versicherung'?", a: "die, Versicherungen", options: ["der, Versicherungen", "die, Versicherungen", "das, Versicherungen", "den, Versicherungen"], type: "grammar" },
      { q: "Partizip Perfekt von 'lohnen' (sich)?", a: "gelohnt", options: ["gelohnt", "lohnen", "lohnte", "lohnend"], type: "grammar" },
      { q: "Artikel und Plural von 'Speisekarte'?", a: "die, Speisekarten", options: ["der, Speisekarten", "die, Speisekarten", "das, Speisekarten", "den, Speisekarten"], type: "grammar" },
      { q: "Partizip Perfekt von 'surfen'?", a: "gesurft", options: ["gesurft", "surfen", "surfte", "surfend"], type: "grammar" },
      { q: "Artikel und Plural von 'Snack'?", a: "der, Snacks", options: ["der, Snacks", "die, Snacks", "das, Snacks", "den, Snacks"], type: "grammar" },
      { q: "Artikel und Plural von 'Homepage'?", a: "die, Homepages", options: ["der, Homepages", "die, Homepages", "das, Homepages", "den, Homepages"], type: "grammar" },
      { q: "Partizip Perfekt von 'probieren'?", a: "probiert", options: ["probiert", "probieren", "probierte", "probierend"], type: "grammar" },
      { q: "Artikel und Plural von 'Unterstützung'?", a: "die, Unterstützungen", options: ["der, Unterstützungen", "die, Unterstützungen", "das, Unterstützungen", "den, Unterstützungen"], type: "grammar" },
      { q: "Artikel und Plural von 'Kenntnis'?", a: "die, Kenntnisse", options: ["der, Kenntnisse", "die, Kenntnisse", "das, Kenntnisse", "den, Kenntnisse"], type: "grammar" },
      { q: "Partizip Perfekt von 'erfordern'?", a: "erfordert", options: ["erfordert", "erfordern", "erforderte", "erfordernd"], type: "grammar" }
    ];

    const bankLogic = [
      { q: "Was ist das Gegenteil von 'erfolgreich'?", a: "erfolglos", options: ["erfolglos", "reich", "berühmt", "schnell"], type: "logic" },
      { q: "Synonym von 'sich lohnen' im Alltag?", a: "sich auszahlen", options: ["sich auszahlen", "sich ärgern", "sich freuen", "sich lohnen"], type: "logic" },
      { q: "Was ist das Gegenteil von 'regelmäßig'?", a: "unregelmäßig", options: ["unregelmäßig", "ständig", "oft", "immer"], type: "logic" },
      { q: "Synonym von 'etwa' in einer Schätzung?", a: "ungefähr", options: ["ungefähr", "genau", "viel", "wenig"], type: "logic" },
      { q: "Was ist das Gegenteil von 'nützlich'?", a: "nutzlos", options: ["nutzlos", "hilfreich", "wichtig", "teuer"], type: "logic" },
      { q: "Synonym von 'fördern' im beruflichen Kontext?", a: "unterstützen", options: ["unterstützen", "verhindern", "bestrafen", "ignorieren"], type: "logic" },
      { q: "Was ist das Gegenteil von 'sicher'?", a: "unsicher", options: ["unsicher", "gefährlich", "ruhig", "angenehm"], type: "logic" },
      { q: "Synonym von 'Erholung'?", a: "Entspannung", options: ["Entspannung", "Arbeit", "Stress", "Anstrengung"], type: "logic" },
      { q: "Was ist das Gegenteil von 'freundlich'?", a: "unfreundlich", options: ["unfreundlich", "freundlich", "hilfsbereit", "nett"], type: "logic" },
      { q: "Synonym von 'Möglichkeit'?", a: "Chance", options: ["Chance", "Problem", "Hindernis", "Risiko"], type: "logic" },
      { q: "Was ist das Gegenteil von 'entspannt'?", a: "gestresst", options: ["gestresst", "entspannt", "ruhig", "gelassen"], type: "logic" },
      { q: "Synonym von 'Zufall'?", a: "Glücksfall", options: ["Glücksfall", "Plan", "Absicht", "Fehler"], type: "logic" }
    ];

    let userName = "";
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 600;

    function startTest() {
      userName = document.getElementById("userName").value.trim();
      if (!userName) {
        alert("Bitte geben Sie Ihren Namen ein.");
        return;
      }
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("quizScreen").style.display = "block";
      generateQuestions();
      startTimer();
      showQuestion();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timer").textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        if (timeLeft <= 120) document.getElementById("timer").classList.add("low");
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showResult(true);
        }
      }, 1000);
    }

    function endTest() {
      if (confirm("Möchtest du den Test wirklich beenden?")) {
        clearInterval(timerInterval);
        location.reload();
      }
    }

    function generateQuestions() {
      questions = [];
      const shuffledDeVi = [...bankDeToVi].sort(() => Math.random() - 0.5).slice(0, 8);
      const shuffledViDe = [...bankViToDe].sort(() => Math.random() - 0.5).slice(0, 8);
      const shuffledGrammar = [...bankGrammar].sort(() => Math.random() - 0.5).slice(0, 7);
      const shuffledLogic = [...bankLogic].sort(() => Math.random() - 0.5).slice(0, 7);
      questions = [...shuffledDeVi, ...shuffledViDe, ...shuffledGrammar, ...shuffledLogic].sort(() => Math.random() - 0.5);
    }

    function showQuestion() {
      const q = questions[currentQuestionIndex];
      document.getElementById("progress").textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
      const questionDiv = document.getElementById("question");
      const questionText = q.question || q.q; 
      
      if (q.type === "de-to-vi") {
        questionDiv.innerHTML = `Was bedeutet <strong>"${questionText}"</strong>?`;
      } else if (q.type === "vi-to-de") {
        questionDiv.innerHTML = `Wie heißt <strong>"${questionText}"</strong> trên tiếng Đức?`;
      } else {
        questionDiv.innerHTML = questionText;
      }

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";
      const correctAnswer = q.correct || q.a;

      q.options.forEach(opt => {
        const div = document.createElement("div");
        div.className = "option";
        div.textContent = opt;
        div.onclick = () => selectAnswer(opt, correctAnswer, div);
        optionsDiv.appendChild(div);
      });
    }

    function selectAnswer(selected, correct, div) {
      const options = div.parentElement.children;
      for (let opt of options) {
        opt.onclick = null;
        if (opt.textContent === correct) opt.classList.add("correct");
        if (opt.textContent === selected && selected !== correct) opt.classList.add("wrong");
      }
      if (selected === correct) score++;
      setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) showQuestion();
        else showResult();
      }, 1000);
    }

    function showResult(timeUp = false) {
      clearInterval(timerInterval);
      document.getElementById("quizScreen").style.display = "none";
      document.getElementById("resultScreen").style.display = "block";
      const now = new Date();
      document.getElementById("userNameResult").textContent = userName;
      document.getElementById("scoreResult").textContent = `${score} / ${questions.length}`;
      let eval = score >= 25 ? "Ausgezeichnet!" : score >= 15 ? "Gut gemacht!" : "Weiter üben!";
      document.getElementById("evaluation").textContent = (timeUp ? "Zeit abgelaufen! " : "") + eval;
      document.getElementById("datetime").innerHTML = `Test am ${now.toLocaleDateString('de-DE')}<br>um ${now.toLocaleTimeString('de-DE')} Uhr`;
    }

    function restartTest() { location.reload(); }
  </script>
</body>
</html>
