<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Mobil Lernen – Lektion 03</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#eef4fb; --card:#fff; --ink:#1e3a5f; --muted:#5b7a99;
  --border:#c5d8ee; --blue:#2563eb; --blt:#dbeafe; --bdk:#1d4ed8;
  --green:#16a34a; --glt:#dcfce7;
  --red:#dc2626; --rlt:#fee2e2;
  --gold:#d97706; --golt:#fef3c7;
  --sh:0 4px 24px rgba(37,99,235,.12);
  --shl:0 8px 40px rgba(37,99,235,.18);
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:#1e3a5f;padding:16px 20px 14px;position:relative;overflow:hidden;flex-shrink:0;}
.hdr::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 90% -10%,#3b82f6 0%,transparent 55%),
             radial-gradient(ellipse at -10% 110%,#0ea5e9 0%,transparent 50%);opacity:.4;}
.hdr-inner{position:relative;max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hdr-text .tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#93c5fd;margin-bottom:2px;}
.hdr-text h1{font-family:'DM Serif Display',serif;font-size:19px;color:#fff;line-height:1.2;}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.hdr-back{background:rgba(255,255,255,.12);border:none;border-radius:10px;color:#93c5fd;
  font-size:12px;font-weight:600;padding:7px 12px;text-decoration:none;white-space:nowrap;flex-shrink:0;}

/* ── MODE SCREEN ── */
#modeScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:16px;}
.mode-card{width:100%;max-width:400px;background:var(--card);border:2px solid var(--border);border-radius:var(--r);
  padding:22px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:18px;
  box-shadow:var(--sh);}
.mode-card:active{transform:scale(.98);}
.mode-card:hover{border-color:var(--blue);box-shadow:var(--shl);}
.mode-card.blue:hover,.mode-card.blue:focus{border-color:var(--blue);}
.mc-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.mc-icon.a{background:var(--blt);}
.mc-icon.b{background:var(--glt);}
.mc-title{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:3px;}
.mc-sub{font-size:12px;color:var(--muted);}
.mode-divider{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}

/* ── QUIZ SCREEN ── */
#quizScreen{flex:1;display:none;flex-direction:column;}
#quizScreen.show{display:flex;}

/* PROGRESS BAR */
.prog-wrap{background:var(--card);border-bottom:2px solid var(--border);padding:10px 16px;flex-shrink:0;}
.prog-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;gap:10px;}
.prog-bg{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:99px;
  transition:width .4s cubic-bezier(.4,0,.2,1);width:0%;}
.prog-txt{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;}
.prog-ok{font-size:12px;font-weight:700;color:var(--green);min-width:32px;text-align:right;}

/* CONTENT */
.qcontent{flex:1;max-width:480px;width:100%;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}

/* QUESTION CARD */
.qcard{background:var(--card);border-radius:var(--r);box-shadow:var(--shl);padding:22px 18px 18px;
  text-align:center;position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--blue),#60a5fa);}
.qcard-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;}
.qcard-word{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);
  line-height:1.2;margin-bottom:5px;}
.qcard-detail{font-size:13px;color:var(--blue);font-weight:600;min-height:18px;margin-bottom:4px;}
.qcard-ex{font-size:12px;color:var(--muted);font-style:italic;line-height:1.6;
  background:var(--bg);border-radius:10px;padding:8px 12px;margin-top:8px;text-align:left;}
.read-badge{display:inline-flex;align-items:center;gap:5px;background:var(--blt);
  border-radius:99px;padding:3px 11px;font-size:10px;font-weight:700;color:var(--bdk);
  margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;
  opacity:0;transition:opacity .3s;}
.read-badge.show{opacity:1;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:9px;}
.opt{background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:14px 16px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  color:var(--ink);cursor:pointer;text-align:left;transition:all .15s;
  display:flex;align-items:center;gap:11px;width:100%;}
.opt:active{transform:scale(.98);}
.opt:hover:not(:disabled):not(.off){border-color:var(--blue);background:var(--blt);}
.ol{width:26px;height:26px;border-radius:8px;background:var(--bg);display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;color:var(--muted);flex-shrink:0;transition:all .15s;}
.opt:hover:not(:disabled):not(.off) .ol{background:var(--blue);color:#fff;}
/* correct = green */
.opt.correct{border-color:var(--green)!important;background:var(--glt)!important;color:var(--green)!important;}
.opt.correct .ol{background:var(--green)!important;color:#fff!important;}
/* wrong = red */
.opt.wrong{border-color:var(--red)!important;background:var(--rlt)!important;color:var(--red)!important;
  animation:shk .35s ease;}
.opt.wrong .ol{background:var(--red)!important;color:#fff!important;}
/* off = disabled other options when correct chosen */
.opt.off{opacity:.38;pointer-events:none;}
.opt:disabled{cursor:default;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* FEEDBACK */
.feedback{border-radius:14px;padding:12px 16px;text-align:center;
  display:none;animation:fUp .2s ease;}
.feedback.show{display:block;}
.feedback.ok{background:var(--glt);border:2px solid var(--green);color:var(--green);}
.feedback.retry{background:var(--golt);border:2px solid var(--gold);color:var(--gold);}
.fb-em{font-size:22px;margin-bottom:3px;}
.fb-tx{font-size:14px;font-weight:700;}
@keyframes fUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* RESULT SCREEN */
#resultScreen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;}
#resultScreen.show{display:flex;}
.res-card{width:100%;max-width:400px;background:var(--card);border-radius:var(--r);
  box-shadow:var(--shl);padding:36px 24px;text-align:center;}
.res-em{font-size:56px;margin-bottom:10px;}
.res-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--ink);margin-bottom:5px;}
.res-pct{font-size:54px;font-weight:900;color:var(--blue);margin:6px 0;}
.res-msg{font-size:14px;color:var(--muted);margin-bottom:20px;}
.res-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.rstat{background:var(--bg);border-radius:14px;padding:14px 10px;}
.rstat-val{font-size:26px;font-weight:800;}
.rstat-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.rstat.g .rstat-val{color:var(--green);}
.rstat.r .rstat-val{color:var(--red);}
.btnp{width:100%;background:var(--blue);color:#fff;border:none;border-radius:14px;
  padding:15px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);margin-bottom:10px;transition:all .15s;}
.btnp:active{transform:scale(.98);}
.btns{width:100%;background:transparent;border:2px solid var(--border);border-radius:14px;
  padding:13px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all .15s;}
.btns:active{transform:scale(.98);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-text">
      <div class="tag">Miteinander! B1.1</div>
      <h1>Lektion 03 – Vokabeln</h1>
      <p>Traumjob gesucht!</p>
    </div>
    <a class="hdr-back" href="index.html">← Zurück</a>
  </div>
</div>

<!-- MODE SELECTION SCREEN -->
<div id="modeScreen">
  <div class="mode-card" onclick="startFull()">
    <div class="mc-icon a">📚</div>
    <div>
      <div class="mc-title">Vokabeln lernen</div>
      <div class="mc-sub">Alle 30 Wörter • Ohne Ende</div>
    </div>
  </div>
  <div class="mode-divider">oder</div>
  <div class="mode-card" onclick="startRandom()">
    <div class="mc-icon b">🎲</div>
    <div>
      <div class="mc-title">Wortschatztest</div>
      <div class="mc-sub">10 zufällige Wörter • Mit Score</div>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen">
  <!-- Progress bar (nur im random mode) -->
  <div class="prog-wrap" id="progWrap" style="display:none">
    <div class="prog-inner">
      <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-txt" id="progTxt">0 / 10</div>
      <div class="prog-ok" id="progOk"></div>
    </div>
  </div>

  <div class="qcontent">
    <!-- Question Card -->
    <div class="qcard" id="qcard">
      <div class="qcard-label" id="qLabel"></div>
      <div class="read-badge" id="readBadge"><div class="rdot"></div>Wird vorgelesen …</div>
      <div class="qcard-word" id="qWord"></div>
      <div class="qcard-detail" id="qDetail"></div>
      <div class="qcard-ex" id="qEx"></div>
    </div>

    <!-- Options -->
    <div class="options" id="optWrap"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback">
      <div class="fb-em" id="fbEm"></div>
      <div class="fb-tx" id="fbTx"></div>
    </div>
  </div>
</div>

<!-- RESULT SCREEN (random mode) -->
<div id="resultScreen">
  <div class="res-card">
    <div class="res-em" id="resEm"></div>
    <div class="res-title">Fertig!</div>
    <div class="res-pct" id="resPct"></div>
    <div class="res-msg" id="resMsg"></div>
    <div class="res-stats">
      <div class="rstat g"><div class="rstat-val" id="resOk"></div><div class="rstat-lbl">Richtig ✓</div></div>
      <div class="rstat r"><div class="rstat-val" id="resWr"></div><div class="rstat-lbl">Falsch ✗</div></div>
    </div>
    <button class="btnp" onclick="startRandom()">↺ Neuer Test</button>
    <button class="btns" onclick="backToMenu()">← Zurück zum Menü</button>
  </div>
</div>

<script>
/* ── WORTDATENBANK ── */
const W = [
  {de:"die Berufsberatung, -en",   vi:"tư vấn nghề nghiệp",          art:"die", base:"Berufsberatung",    pl:"Berufsberatungen", type:"noun", ex:"Hoa könnte zur Berufsberatung gehen und sich informieren."},
  {de:"die Buchhandlung, -en",     vi:"hiệu sách",                    art:"die", base:"Buchhandlung",      pl:"Buchhandlungen",   type:"noun", ex:"Hoa könnte als Verkäuferin in einer Buchhandlung arbeiten."},
  {de:"die Festanstellung, -en",   vi:"việc làm chính thức",          art:"die", base:"Festanstellung",    pl:"Festanstellungen", type:"noun", ex:"Fest angestellt sein bedeutet eine unbefristete Stelle."},
  {de:"die Arbeitserfahrung, -en", vi:"kinh nghiệm làm việc",         art:"die", base:"Arbeitserfahrung",  pl:"Arbeitserfahrungen",type:"noun",ex:"Hoa hat schon Arbeitserfahrung in Deutschland."},
  {de:"der Schulabschluss, -¨e",   vi:"bằng tốt nghiệp phổ thông",   art:"der", base:"Schulabschluss",    pl:"Schulabschlüsse",  type:"noun", ex:"Haben Sie einen Schulabschluss und eine Ausbildung?"},
  {de:"offiziell",                 vi:"chính thức",                   art:null,  base:"offiziell",         pl:null,               type:"adj",  ex:"Einen offiziellen Berufsabschluss habe ich leider nicht."},
  {de:"das System, -e",            vi:"hệ thống",                     art:"das", base:"System",            pl:"Systeme",          type:"noun", ex:"Eine Ausbildung nach dem System hier habe ich nicht."},
  {de:"anerkennen",                vi:"công nhận",                    art:null,  base:"anerkennen",        pl:null,               type:"verb", conj:"erkannte an, hat anerkannt",                ex:"Vielleicht können Sie Ihren Abschluss anerkennen lassen."},
  {de:"sich weiterbilden",         vi:"học thêm, nâng cao trình độ",  art:null,  base:"sich weiterbilden", pl:null,               type:"verb", conj:"bildete sich weiter, hat sich weitergebildet",ex:"Haben Sie sich weitergebildet?"},
  {de:"die Selbstständigkeit",     vi:"tự kinh doanh, làm chủ",       art:"die", base:"Selbstständigkeit", pl:null,               type:"noun", ex:"Der Berater informiert über Selbstständigkeit."},
  {de:"die Messe, -n",             vi:"hội chợ triển lãm",            art:"die", base:"Messe",             pl:"Messen",           type:"noun", ex:"Der Berater empfiehlt, zur Gründermesse zu gehen."},
  {de:"sondern",                   vi:"mà (sau phủ định)",            art:null,  base:"sondern",           pl:null,               type:"konj", ex:"Sie möchte nicht angestellt sein, sondern selbstständig."},
  {de:"der Vortrag, -¨e",          vi:"bài thuyết trình",             art:"der", base:"Vortrag",           pl:"Vorträge",         type:"noun", ex:"Bei der Gründermesse kann man Vorträge hören."},
  {de:"der Handwerker / die Handwerkerin", vi:"thợ thủ công",         art:"der", base:"Handwerker",        pl:"Handwerker",       type:"noun", ex:"Sie sucht eine Stelle als Handwerkerin."},
  {de:"der Unternehmer / die Unternehmerin", vi:"doanh nhân",         art:"der", base:"Unternehmer",       pl:"Unternehmer",      type:"noun", ex:"Elif Aydin zeigt, wie man eine Firma gründet."},
  {de:"erfolgreich",               vi:"thành công",                   art:null,  base:"erfolgreich",       pl:null,               type:"adj",  ex:"Wie kann man erfolgreich eine Firma gründen?"},
  {de:"die Kenntnis, -se",         vi:"kiến thức, hiểu biết",         art:"die", base:"Kenntnis",          pl:"Kenntnisse",       type:"noun", ex:"Sogar ohne Programmierkenntnisse kann man eine Webseite erstellen."},
  {de:"erforderlich",              vi:"cần thiết, bắt buộc",          art:null,  base:"erforderlich",      pl:null,               type:"adj",  ex:"Anmeldung erforderlich!"},
  {de:"die Unterstützung",         vi:"sự hỗ trợ",                    art:"die", base:"Unterstützung",     pl:null,               type:"noun", ex:"Wo Sie sich Unterstützung holen können."},
  {de:"sowohl … als auch",         vi:"cả … lẫn …",                  art:null,  base:"sowohl … als auch", pl:null,               type:"konj", ex:"Sowohl für den Service als auch für den Aufbau."},
  {de:"die Homepage, -s",          vi:"trang chủ (website)",          art:"die", base:"Homepage",          pl:"Homepages",        type:"noun", ex:"Sie brauchen eine Homepage für Ihr Geschäft."},
  {de:"(sich) überlegen",          vi:"suy nghĩ, cân nhắc",           art:null,  base:"sich überlegen",    pl:null,               type:"verb", conj:"überlegte sich, hat sich überlegt",           ex:"Er überlegt, noch einmal zu studieren."},
  {de:"das Gericht, -e",           vi:"món ăn",                       art:"das", base:"Gericht",           pl:"Gerichte",         type:"noun", ex:"Bei uns gibt es vietnamesische und internationale Gerichte."},
  {de:"die Versicherung, -en",     vi:"bảo hiểm",                     art:"die", base:"Versicherung",      pl:"Versicherungen",   type:"noun", ex:"Ich musste mich um die Versicherungen kümmern."},
  {de:"weder … noch",              vi:"không … cũng không …",         art:null,  base:"weder … noch",      pl:null,               type:"konj", ex:"Manchmal hatte ich weder zum Kochen noch zum Essen Zeit."},
  {de:"sich lohnen",               vi:"đáng giá, có lợi",             art:null,  base:"sich lohnen",       pl:null,               type:"verb", conj:"lohnte sich, hat sich gelohnt",               ex:"Es hat sich gelohnt: Anfang März habe ich eröffnet."},
  {de:"die Speisekarte, -n",       vi:"thực đơn",                     art:"die", base:"Speisekarte",       pl:"Speisekarten",     type:"noun", ex:"Wie viele Gerichte sollten auf der Speisekarte stehen?"},
  {de:"probieren",                 vi:"thử, nếm thử",                 art:null,  base:"probieren",         pl:null,               type:"verb", conj:"probierte, hat probiert",                     ex:"Wer Süßes mag, sollte auch den Kuchen probieren."},
  {de:"öfter",                     vi:"thường xuyên hơn",             art:null,  base:"öfter",             pl:null,               type:"adv",  ex:"Meine Freunde haben öfter gesagt: Du solltest kochen."},
  {de:"etwa",                      vi:"khoảng (ước lượng)",           art:null,  base:"etwa",              pl:null,               type:"adv",  ex:"Der Weg war lang – etwa ein halbes Jahr."},
];

/* ── HELPERS ── */
const $=id=>document.getElementById(id);
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
const pick=(a,n)=>shuf(a).slice(0,n);

/* Vorlesetext: Nomen = "der Vortrag, die Vorträge" | Verb = "anerkennen – erkannte an, hat anerkannt" | Rest = base */
function buildSpeak(w){
  if(w.type==='noun'&&w.art) return `${w.art} ${w.base}${w.pl?`, die ${w.pl}`:''}`;
  if(w.type==='verb'&&w.conj) return `${w.base} – ${w.conj}`;
  return w.base;
}
/* Detail line */
function buildDetail(w){
  if(w.type==='noun'&&w.art) return `${w.art} ${w.base}${w.pl?`, die ${w.pl}`:' (kein Plural)'}`;
  if(w.type==='verb'&&w.conj) return w.conj;
  const lb={adj:'Adjektiv',adv:'Adverb',konj:'Konjunktion'};
  return lb[w.type]||'';
}
const esc=s=>s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

/* ── SPEECH ── */
let voices=[];
function loadV(){voices=speechSynthesis.getVoices();}
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=loadV;loadV();}

function speak(text,cb){
  if(!window.speechSynthesis){cb&&cb();return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE';u.rate=0.85;u.pitch=1;
  const dv=voices.find(v=>v.lang.startsWith('de')&&!v.name.includes('Google'))||voices.find(v=>v.lang.startsWith('de'));
  if(dv)u.voice=dv;
  $('readBadge').classList.add('show');
  u.onend=u.onerror=()=>{$('readBadge').classList.remove('show');cb&&cb();};
  setTimeout(()=>speechSynthesis.speak(u),80);
}

/* ── STATE ── */
let mode='';        // 'full' | 'random'
let queue=[];       // words to show
let idx=0;          // current position
let score=0;        // correct first-try (random)
let answered=0;     // questions answered (random)
let firstTry=true;  // first attempt flag for current word

/* ── SCREENS ── */
function showScreen(name){
  $('modeScreen').style.display = name==='mode'?'':'none';
  // flex needed for quizScreen
  if(name==='quiz'){$('quizScreen').style.display='flex';}else{$('quizScreen').style.display='none';}
  $('resultScreen').classList.toggle('show', name==='result');
}

function backToMenu(){
  speechSynthesis.cancel();
  showScreen('mode');
}

/* ── START FULL ── */
function startFull(){
  mode='full';
  queue=shuf([...W]);
  idx=0;
  $('progWrap').style.display='none';
  showScreen('quiz');
  showQ();
}

/* ── START RANDOM ── */
function startRandom(){
  mode='random';
  queue=pick(W,10);
  idx=0; score=0; answered=0;
  $('progWrap').style.display='';
  $('progFill').style.width='0%';
  $('progTxt').textContent='1 / 10';
  $('progOk').textContent='';
  showScreen('quiz');
  showQ();
}

/* ── SHOW QUESTION ── */
function showQ(){
  firstTry=true;
  const w=queue[idx];

  // label
  if(mode==='random'){
    $('qLabel').textContent=`Frage ${idx+1} von 10`;
    $('progFill').style.width=(idx/10*100)+'%';
    $('progTxt').textContent=`${idx+1} / 10`;
  } else {
    $('qLabel').textContent=`Wort ${idx+1} von ${queue.length}`;
  }

  // card content — show German word, user must pick Vietnamese meaning
  $('qWord').textContent=w.de;
  $('qDetail').textContent=buildDetail(w);
  $('qEx').textContent=`„${w.ex}"`;
  $('readBadge').classList.remove('show');

  // animate card
  const c=$('qcard');c.style.animation='none';c.offsetHeight;c.style.animation='';

  // 4 options: correct + 3 distractors (Vietnamese meanings)
  const dist=pick(W.filter(x=>x.vi!==w.vi),3);
  const opts=shuf([w,...dist]);
  const L=['A','B','C','D'];

  $('optWrap').innerHTML=opts.map((o,i)=>`
    <button class="opt" id="op${i}" onclick="choose(${i},'${esc(o.vi)}','${esc(w.vi)}')">
      <div class="ol">${L[i]}</div><span>${o.vi}</span>
    </button>`).join('');

  // hide feedback
  $('feedback').className='feedback';
}

/* ── CHOOSE ── (same logic as wortschatztest.html) ── */
function choose(i, chosen, correctVi){
  const isOk = chosen===correctVi;
  const w = queue[idx];

  if(isOk){
    // Mark all: correct green, others grey-out
    for(let k=0;k<4;k++){
      const b=$('op'+k); if(!b) continue;
      b.disabled=true;
      const span=b.querySelector('span');
      if(span&&span.textContent===correctVi) b.classList.add('correct');
      else b.classList.add('off');
    }

    // Feedback
    const fems=['🎉','✨','🌟','👏','💪'];
    showFb('ok', firstTry?fems[0|Math.random()*5]:'✅',
      firstTry?'Richtig! Sehr gut!':'Richtig – nächstes Mal direkt!');

    // Score (random: only first try)
    if(mode==='random'&&firstTry){ score++; $('progOk').textContent=`✓ ${score}`; }

    // Speak → then advance automatically
    speak(buildSpeak(w), ()=>{
      setTimeout(()=>{
        if(mode==='random') advance();
        else advance();
      }, 800);
    });

  } else {
    // Only this button red — others stay active (wie wortschatztest.html)
    const b=$('op'+i);
    b.classList.add('wrong');
    b.disabled=true;
    firstTry=false;
    showFb('retry','💡','Noch einmal bitte!');

    // Clear feedback message after 1.8s, button stays red/disabled
    setTimeout(()=>{ $('feedback').className='feedback'; }, 1800);
  }
}

function showFb(cls,em,tx){
  $('feedback').className='feedback show '+cls;
  $('fbEm').textContent=em;
  $('fbTx').textContent=tx;
}

/* ── ADVANCE ── */
function advance(){
  if(mode==='random'){
    answered++;
    if(answered>=10){ showResult(); return; }
  } else {
    idx=(idx+1)%queue.length;
    showQ(); return;
  }
  idx++;
  showQ();
}

/* ── RESULT (random) ── */
function showResult(){
  const wr=10-score;
  const pct=score*10;
  $('resOk').textContent=score;
  $('resWr').textContent=wr;
  $('resPct').textContent=pct+'%';

  let em,msg,spk;
  if(score>=8){em='🏆';msg='Ausgezeichnet! Weiter so!';spk='Gratuliere! Sehr gut!';}
  else if(score>=5){em='😊';msg='Gut gemacht! Weiter üben.';spk='Gut gemacht!';}
  else{em='📚';msg='Kein Problem – nochmal versuchen!';spk='Schade. Versuche es nochmal!';}

  $('resEm').textContent=em;
  $('resMsg').textContent=msg;
  showScreen('result');
  setTimeout(()=>speak(spk),800);
}
</script>
